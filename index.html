อดไปแล้วหรือยัง?”", "แดนนี่พยักหน้า ตามแผนของท่านเอเดรียน ตอนนี้พวกเขาต้องต้อนแม่มดทั้งสองคนไปยังลานกว้างที่ท่าเรือ เพราะศาสนจักรได้ซุ่มกำลังพลธนูหน้าไม้นับพันนายไว้ที่นั่นแล้ว และการระดมยิงเพียงระลอกเดียวก็จะเปลี่ยนแม่มดทั้งสองให้กลายเป็นเม่น", "วิธีนี้จะช่วยลดจำนวนผู้บาดเจ็บล้มตายให้เหลือน้อยที่สุด", "เมื่อพิจารณาจากการสั่งการอันยอดเยี่ยมของท่านเอเดรียนก่อนหน้านี้ แดนนี่จึงไม่สงสัยในแผนการนี้เลยแม้แต่น้อย", "“ถ้าเช่นนั้น แดนนี่ ภารกิจของเจ้าก็สำเร็จลุล่วงอย่างสมบูรณ์แล้ว”", "ลินน์ลุกขึ้นยืน ใช้มือขวาตบไหล่แดนนี่เบาๆ และเอ่ยด้วยความซาบซึ้ง", "“ตอนนี้ถึงเวลาส่งเจ้าไปพบกับนักบวชอัลเบิร์ตแล้วล่ะ!”", "อัลเบิร์ตงั้นหรือ? เกิดอะไรขึ้นกับเขากัน?", "แดนนี่ชะงักไป แต่ก่อนที่เขาจะทันได้คิดอะไรออก แสงสีเงินอันเจิดจ้าก็ปาดผ่านลำคอของเขา เลือดสีแดงฉานพุ่งกระฉูดออกจากบาดแผล นักบวชหนุ่มยกมือขึ้นกุมลำคอที่เปิดกว้าง ใบหน้าของเขาเต็มไปด้วยความไม่อยากจะเชื่อ ก่อนจะล้มตึงลงไปกองกับพื้นอย่างแรง", "ลินน์มองดูร่างไร้วิญญาณตรงหน้าอย่างจนปัญญา เขาส่ายหน้า และหยิบเศษผ้าบนโต๊ะขึ้นมาเช็ดคราบเลือดออกจากมีดสั้น", "ด้วยเหตุนี้ ลูกสมุนสองคนที่แอนล็อคส่งมาเพื่อล่อเขาออกมาก็ถูกจัดการไปเรียบร้อยแล้ว ทว่าใบหน้าของลินน์กลับไม่ได้แสดงความยินดีออกมามากนัก", "ท้ายที่สุดแล้ว คู่ต่อสู้ของเขาก็ไม่ใช่คนโง่ การใช้ตัวตนของเอเดรียนในการสั่งการจะทำให้แอนล็อคไหวตัวทันอย่างรวดเร็ว และตระหนักได้ว่าลินน์มีความสามารถในการปลอมตัวเป็นคนอื่น", "โชคดีที่นี่คือเป้าหมายของลินน์พอดิบพอดี!", "เนื่องจากนักบวชธรรมดาไม่สามารถทำลายเวทมนตร์ประเภทนี้ได้ แอนล็อคจึงไม่มีทางเลือกอื่นนอกจากต้องลงมือด้วยตัวเอง!", "แม้จะต้องเดินอ้อมไปบ้าง แต่ท้ายที่สุดแล้ว ลินน์ก็ใช้กองกำลังของศัตรูเองเพื่อล่อท่านอาร์ชบิชอปออกมา และย้ายสมรภูมิกลับไปยังท่าเรือของเมืองท่าได้สำเร็จ!"]}, {"t": "ครั้งนี้ ข้าคงต้องขอโทษเจ้าแล้วล่ะ", "c": ["“เวทใบมีดน้ำแข็งแบบทวีคูณ!”", "ณ ถนนสายหนึ่งทางตอนเหนือของเมืองท่า จอห์นนี่กางมือทั้งสองข้างออก ใบมีดผลึกน้ำแข็งรูปทรงข้าวหลามตัดที่หนาแน่นก็ปรากฏขึ้นกลางอากาศอย่างรวดเร็ว ก่อนจะพุ่งเข้าใส่พวกทหารยามที่ขวางทางอยู่ราวกับฝูงตั๊กแตน", "ตามมาด้วยเสียงร้องโหยหวน ทหารยามหลายคนที่หลบไม่พ้นก็ตกตายคาที่ในทันที แต่ทหารถือโล่จำนวนมากก็ตีวงล้อมเข้ามาจากด้านหลังเสียแล้ว", "จอห์นนี่ขบกรามแน่น นางชักดาบขึ้นปัดป้องหอกยาวของทหารยามนายหนึ่ง อาศัยจังหวะนั้นพุ่งตัวไปข้างหน้า และตวัดดาบฟันบั่นคอของศัตรู ส่งผลให้สาดเลือดกระเซ็นไปทั่ว ในเวลาเดียวกัน ทหารยามอีกคนก็ตวัดดาบยาวฟันเข้าใส่จอห์นนี่", "ประกายอันคมกริบของใบดาบปรากฏขึ้นตรงหน้า แต่นางก็ไม่มีเรี่ยวแรงพอที่จะหันกลับไปรับดาบยาวที่ฟาดฟันเข้ามาได้อีกแล้ว การต่อสู้ที่ดำเนินติดต่อกันมาครึ่งชั่วโมงก็ได้ผลาญพละกำลังและพลังเวทของเด็กสาวไปจนแทบจะหมดสิ้น", "โชคดีที่ในจังหวะนั้น อูฐภูเขาอันดุร้ายตัวหนึ่งก็ได้พุ่งพรวดเข้ามา มันชนทหารยามจนล้มลงไปกับพื้นในพริบตา จากนั้นไป๋เก๋อซึ่งนั่งอยู่บนหลังอูฐก็เป่านกหวีดไม้ในมือทันที", "ฝูงอีกาสีเทาที่บินโฉบอยู่เหนือเมืองท่า ดูเหมือนจะได้รับคำสั่ง พวกมันพุ่งเข้าใส่ทหารโล่เหล่านั้นอย่างบ้าคลั่ง", "กรงเล็บและจะงอยปากอันแหลมคมได้ข่วนและจิกทึ้งใบหน้าและลำคอที่ไร้การป้องกัน แต่ท้ายที่สุดแล้ว พวกมันก็เป็นแค่นกตัวเท่าฝ่ามือ ไม่ว่าจะพยายามมากแค่ไหน มันก็ยากที่จะสร้างความเสียหายถึงตายได้", "ด้วยโอกาสจากความชุลมุนนี้ จอห์นนี่ก็รีบพุ่งตัวกระโจนขึ้นไปบนหลังอูฐ ก่อนที่พวกนางทั้งสองจะหลบหนีไปอีกทิศทางหนึ่ง", "แต่ใบหน้าของไป๋เก๋อในตอนนี้ก็เริ่มซีดเผือดลงเรื่อยๆ ร่างกายของเริ่มนางอ่อนระทวยจนต้องใช้สองมือยึดประคองตัวแนบไปกับหลังอูฐ อาศัยมันเป็นพาหนะพาพวกนางมุ่งหน้าต่อไป", "จอห์นนี่มองนางด้วยความห่วงใยและลอบถอนหายใจออกมา", "“ดูเหมือนว่าครั้งนี้ ข้าคงต้องขอโทษเจ้าแล้วล่ะ ไป๋เก๋อ!”", "“ข้าไม่คิดเลยว่านอกจากพวกเราจะช่วยคาร์ลออกมาไม่ได้แล้ว เรายังตกลงไปในกับดักของศาสนจักรอีก...”", "จอห์นนี่เสกเวทลูกไฟออกมาเพื่อขับไล่ทหารยามที่ไล่ตามมาให้ถอยร่นไปชั่วคราว ความรู้สึกเสียใจเริ่มเกาะกุมหัวใจของนาง", "นางไม่ได้รู้สึกเสียใจเลยที่ตัดสินใจมาช่วยลินน์ แต่นางเสียใจที่ลากไป๋เก๋อเข้ามาพัวพันกับเรื่องนี้ด้วย", "เมื่อไม่กี่วันก่อน หลังจากรู้ข่าวว่าศาสนจักรจับกุมสาวกปีศาจไว้ได้คนหนึ่ง และมีแผนจะประหารชีวิตเขาหลังจากพ้นวันแห่งแสงจันทร์ จอห์นนี่ก็เกิดความคิดที่จะชิงตัวนักโทษขึ้นมา", "แต่ด้วยพลังของนางเพียงลำพังนั้นมันช่างอ่อนแอเกินไป ไม่มีโอกาสสำเร็จเลยแม้แต่น้อย", "แต่เวทมนตร์แห่งจิตวิญญาณของไป๋เก๋อจะมีประโยชน์อย่างมากในสถานการณ์เช่นนี้ เพราะมันสามารถควบคุมสัตว์ต่างๆ ให้ไปสอดแนมข้อมูล สร้างความโกลาหล หรือเบี่ยงเบนความสนใจของศัตรูได้", "ด้วยความคิดนี้ จอห์นนี่จึงได้วางแผนปฏิบัติการช่วยเหลือทั้งหมด โดยเริ่มจากการให้ไป๋เก๋อส่งฝูงอีกาสีเทาคาบเชื้อไฟไปจุดตามสถานที่สำคัญๆ อย่างเช่นยุ้งฉาง เพื่อดึงดูดความสนใจของพวกทหารยามและสร้างความวุ่นวาย จากนั้นก็บุกเข้าไปในคุกเพื่อช่วยคน", "ทว่าเมื่อลงมือปฏิบัติจริง จอห์นนี่ถึงได้ตระหนักว่าตนเองประเมินสถานการณ์ต่ำเกินไปมากแค่ไหน เพราะกองทหารรักษาการณ์ของเมืองท่านั้นได้เตรียมพร้อมรับมืออย่างเต็มรูปแบบไว้ก่อนแล้ว และตอบสนองต่อเหตุการณ์ได้อย่างรวดเร็วมาก", "พวกนางได้หลงเข้าไปในกับดักที่ศาสนจักรวางเอาไว้เสียเต็มเปา...", "“ไม่หรอก ข้า...ข้าเป็นคนเลือกที่จะมาเอง”", "ไป๋เก๋อกล่าวลอดไรฟัน ร่างของนางสั่นสะท้านด้วยความหวาดกลัวอยู่บนหลังอูฐ", "นางกลัวตายจนแทบจับไข้ แต่นางก็รู้ดีว่าลินน์ต่างหากที่เป็นฝ่ายอาสาสละตัวเองเพื่อคุ้มกันการล่าถอยของพวกนาง ทำให้พวกนางหนีรอดออกมาจากปราสาทได้ราวกับปาฏิหาริย์", "ดังนั้น เมื่อไป๋เก๋อรู้ว่าจอห์นนี่วางแผนที่จะเสี่ยงชีวิตไปช่วยลินน์ นางก็ตัดสินใจตามมาด้วยอย่างเด็ดเดี่ยว", "แม่มดฝึกหัดทั้งสองมองสบตากัน มองเห็นความมุ่งมั่นในแววตาของอีกฝ่าย จอห์นนี่กระชับดาบในมือแน่นขึ้น และเอ่ยปลุกใจ", "“การโจมตีของพวกมันเริ่มแผ่วลงแล้ว เราอาจจะยังมีโอกาสหนีรอดไปได้”", "ไป๋เก๋อพยักหน้า น้ำตารื้นคลอเบ้า แต่นางก็ยังคงยกขลุ่ยไม้ขึ้นจรดริมฝีปากและเป่ามันอีกครั้ง", "ฝูงอีกาสีเทาที่เคยมีจำนวนมหาศาลจนมืดฟ้ามัวดิน ลดลงเหลือเพียงราวๆ ร้อยตัวหลังจากผ่านการโจมตีมาหลายระลอก ซึ่งนั่นแทบจะไม่เพียงพอต่อการทำหน้าที่สอดแนมด้วยซ้ำ พวกมันไม่สามารถแม้แต่จะเบี่ยงเบนความสนใจของศัตรูได้อีกต่อไปแล้ว", "ความกดดันแทบทั้งหมดจากการต่อสู้ประจันหน้าจึงตกอยู่บนบ่าของจอห์นนี่แต่เพียงผู้เดียว", "ราวกับคำอธิษฐานของนางได้รับการตอบรับ จำนวนทหารยามที่ตีวงล้อมพวกนางเริ่มลดน้อยลงเรื่อยๆ และความดุดันในการโจมตีก็ลดลงอย่างเห็นได้ชัด ไม่มีใครพยายามพุ่งเข้าใส่พวกนางแบบยอมแลกชีวิตอีกต่อไป", "ทว่าสีหน้าของจอห์นนี่กลับยิ่งดูเคร่งเครียดหนักขึ้นเรื่อยๆ ตามข้อมูลการสอดแนมของไป๋เก๋อ พวกนางถูกทหารปิดล้อมเอาไว้ โดยเปิดทางให้หนีเพียงแค่เส้นทางเดียวเท่านั้น", "หากพวกนางเบี่ยงออกนอกเส้นทางนี้ ก็จะได้รับการต้อนรับจากกำแพงโล่และค่ายกลดาบที่เรียงรายกั ค!", "ภาพการไล่ล่าในเมืองอูเออร์ยังคงชัดเจนอยู่ในความทรงจำ ความแข็งแกร่งและความน่าสะพรึงกลัวของศัตรูผู้นี้นั้นสุดจะพรรณนา และเหนือชั้นเกินกว่าที่พ่อมดฝึกหัดเพียงไม่กี่คนจะต่อกรด้วยได้", "สิ่งที่ทำให้จอห์นนี่จมดิ่งลงสู่ความสิ้นหวังมากยิ่งขึ้นไปอีก ก็คือการปรากฏตัวของร่างหลายร่างทางฝั่งซ้ายของพวกนาง คนที่เดินนำหน้ามาคือชายหนุ่มที่มีใบหน้าเคร่งขรึม ซึ่งดูจากการแต่งกายแล้ว น่าจะเป็นนักบวชจากโบสถ์ใดโบสถ์หนึ่ง", "กองกำลังจากทั้งสองฝ่ายเข้าปิดล้อมอย่างรวดเร็ว กักขังพวกนางทั้งสองไว้ตรงกลาง", "ในขณะนี้ จอห์นนี่และไป๋เก๋อก็เหมือนกับนกที่ถูกขังอยู่ในกรง โอกาสที่จะหลบหนีถูกตัดขาดไปโดยสิ้นเชิง!"]}, {"t": "ข้าไม่ได้อยู่ข้างๆ พวกท่านแล้วหรือไง?", "c": ["เมื่อพิจารณาว่าแม่มดทั้งสองถูกใช้เป็นเหยื่อล่อเพื่อดึงดูดศัตรูตัวฉกาจให้ออกมา เหล่านักบวชจึงไม่ได้ผลีผลามลงมือในทันที ทว่าพวกเขากลับหันไปมองนักบวชแดนนี่ที่อยู่ฝั่งตรงข้าม และเอ่ยถามอย่างหมดความอดทน", "“แดนนี่ ตอนนี้นักบวชเอเดรียนอยู่ที่ไหน?”", "“ท่านหมายความว่าอย่างไรกัน? ท่านเอเดรียนไม่ได้ยืนอยู่ข้างๆ ท่านแล้วหรอกหรือ?”", "ชายที่เดินนำหน้าก้าวออกมา พร้อมกับเอ่ยถามด้วยความงุนงงอย่างยิ่ง", "“ให้ข้าอธิบายเถอะ ตามข้อสันนิษฐานของท่านอาร์ชบิชอป สาวกปีศาจเมื่อครู่นี้จะต้องสวมรอยเป็นข้า และคอยบงการทุกการเคลื่อนไหวของพวกเจ้า...”", "ขณะที่เอเดรียนกำลังอธิบาย ท่อนแขนอันเหี่ยวย่นก็ยกขึ้นมาขวางหน้าเขาเอาไว้", "“ท่านอาร์ชบิชอป?”", "เอเดรียนชะงักไปเล็กน้อย และเอ่ยถามด้วยความประหลาดใจ", "แอนล็อคไม่ตอบกลับและไม่มีทีท่าลังเล เขาเพียงแค่ชูไม้เท้าในมือขึ้น", "พลังศักดิ์สิทธิ์ระดับสามวงแหวน พลังคำศักดิ์สิทธิ์ แสงวิญญาณ!", "จุดแสงอันเจิดจ้าปะทุขึ้นจากปลายไม้เท้า จากนั้นก็ขยายวงออกเป็นคลื่นกระแทกแห่งแสงรูปครึ่งวงกลม เข้าครอบคลุมจอห์นนี่ ไป๋เก๋อ นักบวชแดนนี่ ไปจนถึงทหารยามที่อยู่เบื้องหลังพวกเขา", "พื้นถนนที่ขรุขระปริแตกออกเป็นชั้นๆ ภายใต้การกัดกร่อนของคลื่นพลังงานอันทรงพลัง และแม่มดทั้งสองก็สัมผัสได้ถึงเงาของมัจจุราชที่กำลังคืบคลานเข้ามาอย่างรวดเร็วในเวลาเดียวกัน!", "เวทมนตร์หลายสิบบทแล่นผ่านเข้ามาในหัวของจอห์นนี่ทีละบท ทว่านางกลับนึกไม่ออกเลยว่ามีเวทมนตร์บทไหนที่สามารถต้านทานพลังศักดิ์สิทธิ์ระดับสามวงแหวนอันน่าสะพรึงกลัวนี้ได้...", "การรอคอยความตายดูเห ัวเอง ท่ามกลางการตามล่าอย่างไม่ลดละของแอนล็อค", "“ช่วงหลายวันนี้พวกเจ้าไปซ่อนตัวอยู่ที่ไหนมา? พวกเจ้าไม่ได้ไปหาลอดด์กับสมาคมเดินเรือหรอกรึ?”", "ลินน์เอ่ยถามด้วยความงุนงงเล็กน้อย", "หลังจากเข้ามาในเมืองท่า นอกเหนือจากการหาวิธีข้ามทะเลแล้ว ภารกิจที่สำคัญที่สุดของเขาก็คือการสืบหาเบาะแสเกี่ยวกับแม่มดทั้งสอง", "ตามความเข้าใจของเขา หากพวกนางไม่ได้ถูกศาสนจักรจับตัวไป พวกนางก็ควรจะไปขอความช่วยเหลือจากลอดด์สิ", "จอห์นนี่ส่ายหน้าอย่างอ่อนใจ ทหารยามของเมืองท่าเฝ้าระวังอย่างเข้มงวด และจุดตรวจก็ถูกควบคุมโดยพวกนักบวชของศาสนจักร ทำให้พวกนางไม่สามารถลอบเข้าไปได้ พวกนางจึงใช้เวลาในแต่ละวันไปกับการจับอีกาสีเทาในป่า เพื่อรับรู้ข้อมูลข่าวสารผ่านนกที่ไม่สะดุดตาเหล่านี้", "ขณะที่ทั้งสามกำลังอธิบาย ลูกศรแสงอันเกรี้ยวกราดหลายดอกก็พุ่งทะยานมาจากเบื้องหลังด้วยความเร็วสูง", "เห็นได้ชัดว่าภายในเวลาเพียงไม่กี่วินาที แอนล็อคก็หาวิธีทะลวงผ่านกำแพงไฟมาได้แล้ว", "ลินน์หันขวับกลับไปมอง ด้วยการเสริมพลังจากโหมดโอเวอร์โหลด วิถีของลูกศรแสงแต่ละดอกจึงถูกแปรสภาพเป็นข้อมูลในหัวของเขา", "เวทศรพลังเวท", "ในชั่วพริบตา ขีปนาวุธที่อัดแน่นไปด้วยพลังเวทบริสุทธิ์จำนวนถึงสามสิบหกลูกก็ลอยตระหง่านอยู่กลางอากาศ จากนั้นด้วยการเล็งเป้าอย่างแม่นยำ พวกมันก็พุ่งเข้าปะทะและระเบิดลูกศรแสงจำนวนนับไม่ถ้วนจนแหลกสลายไปกลางอากาศ", "จอห์นนี่และไป๋เก๋อที่กำลังเตรียมร่ายเวทป้องกันถึงกับหยุดชะงักและหันไปมองลินน์ ความรู้สึกอุ่นใจพลันบังเกิดขึ้นในใจของพวกนางอย่างไม่รู้ตัว", "“แล้วตอนนี้เราจะไปที่ไหนกัน?”", "จอห์นนี่เอ่ยถามด้วยความเร็ว", "“เรามีเรือจอดอยู่ที่ท่าเรือของเมือง หากไปถึงที่นั่น เราก็จะมีโอกาสรอด”", "ลินน์อธิบายอย่างกระชับ และลอบปรายตามองไปด้านหลังอีกครั้ง", "แอนล็อคและคนอื่นๆ ไล่ตามมาทันแล้ว", "จากรูปลักษณ์ภายนอก ท่านอาร์ชบิชอปแทบไม่ต่างอะไรกับชายชราที่รอวันลงโลง ทั้งผมหงอกขาวและดวงตาที่ลึกโบ๋ ทว่าการเคลื่อนไหวของเขากลับรวดเร็วกว่าพวกนักบวชที่อยู่ข้างๆ มากนัก", "ในระหว่างที่ปลอมตัวเป็นเอเดรียน ลินน์ก็ได้รับรู้ข้อมูลบางอย่าง นักบวชระดับสูงของศาสนจักรล้วนได้รับพรจากเทพเจ้า ทำให้สมรรถภาพทางร่างกายของพวกเขาเหนือล้ำกว่าคนธรรมดาอย่างมหาศาล การปะทะตรงๆ ย่อมไม่ใช่ทางเลือกที่ฉลาดนัก", "เดิมทีเขาตั้งใจจะปรากฏตัวในคราบของนักบวชแดนนี่ เพื่อดูว่าจะสามารถใช้เล่ห์เหลี่ยมหลอกลวงได้อีกหรือไม่ อาจจะหาโอกาสลอบโจมตีจากด้านหลัง ทว่าสิ่งที่น่าประหลาดใจก็คือ ท่านอาร์ชบิชอปกลับมองทะลุการปลอมตัวของเขาได้ตั้งแต่แรกเห็น", "หรือว่าเป็นเพราะเขาไม่มีแสงสว่างแห่งเทพเจ้าสถิตอยู่กันนะ?", "ลินน์คิดในใจ ขณะที่เสียงคลื่นซัดสาดกระทบโขดหินดังกึกก้อง ท่าเรือก็ปรากฏให้เห็นอยู่เบื้องหน้าแล้ว", "ในวินาทีนั้น จู่ๆ ไป๋เก๋อก็กำข้อมือของเขาแน่น ริมฝีปากของนางสั่นระริก และนางก็กรีดร้องออกมาด้วยน้ำเสียงที่เจือไปด้วยเสียงสะอื้น", "“ข้าเห็นทหารสวมเกราะจำนวนมาก พวกมันมีเยอะมาก อย่างน้อยๆ เป็นพันคนเลย!”", "เมื่อมองผ่านสายตาของฝูงอีกาสีเทา ความหวาดกลัวก็เข้าเกาะกุมหัวใจของไป๋เก๋อ ทหารยามจำนวนนับไม่ถ้วนที่สวมชุดเกราะและถือโล่ขนาดใหญ่ กำลังเคลื่อนทัพถาโถมเข้ามาหาพวกเขาราวกับคลื่นสีดำทะมึน", "ความรู้สึกหนาวเหน็บแล่นปราดไปตามสันหลังของจอห์นนี่ นางไม่เคยคาดคิดเลยว่านอกจากอาร์ชบิชอปแอนล็อคแล้ว เมืองท่ายังแอบซ่อนกองทหารชั้นยอดนับพันนายเอาไว้อีก", "ทว่าในสถานการณ์ที่หน้าสิ่วหน้าขวานเช่นนี้ ลินน์กลับหัวเราะร่วนออกมา", "“ดี ในที่สุดพวกมันก็ตัดสินใจลงมือเสียที หลังจากปล่อยให้รอมาตั้งนาน!”"]}, {"t": "เมืองท่า...สั่นสะเทือน!", "c": ["จอห์นนี่และไป๋เก๋อมองดูลินน์ที่จู่ๆ ก็อารมณ์ดีขึ้นมาด้วยความงุนงงอย่างถึงที่สุด และไม่เข้าใจจริงๆ ว่าทำไมเขาถึงยังสามารถฝืนหัวเราะออกมาได้ในสถานการณ์เช่นนี้", "“ไปกันเถอะ เราต้องเร่งมือแล้ว!”", "ลินน์ไม่ได้ตั้งใจจะอธิบาย เพราะเขาไม่สามารถที่จะรับประกันได้เลยว่าพวกนักบวชจะไม่มีเวทมนตร์ศักดิ์สิทธิ์ประเภทที่สามารถดักฟังการสนทนาของพวกเขาได้ในตอนนี้", "ในบรรดาภัยคุกคามทั้งหมดในเมืองท่า สิ่งที่ลินน์หวาดกลัวมากที่สุดก็คือแอนล็อคและกองทหารชั้นยอดสามพันนายที่ซุ่มซ่อนอยู่", "แต่ในตอนนี้ เมื่อปัญหาใหญ่ทั้งสองมารวมตัวกันแล้ว มันก็ย่อมเป็นเรื่องดีกว่าที่เคยเป็นมาอย่างแน่นอน!", "“สรรเสริญแด่องค์เอลา พลังคำศักดิ์สิทธิ์ พายุวันสิ้นโลก!”", "เบื้องหลังของพวกเขา เสียงสวดภาวนาอันแหบพร่าของท่านอาร์ชบิชอปดังก้องขึ้นอีกครั้ง พร้อมด้วยพายุที่มองไม่เห็นซึ่งหอบเอาเศษซากปรักหักพังและฝุ่นควันจำนวนมหาศาลพัดกระหน่ำเข้าหาพวกเขาราวกับพายุคลั่ง", "เหล่านักบวชแห่งศาสนจักรหลายคนก็ร่ายเวทตามมาติดๆ โดยใช้พลังศักดิ์สิทธิ์ระดับหนึ่งวงแหวนหลายบทเพื่อสกัดกั้นเส ยตา แต่ทว่า เวทศรพลังเวท ที่พุ่งเข้ามาในตอนนี้ กลับกลายเป็นฟางเส้นสุดท้ายที่ทำให้อูฐล้มลง", "ความสมดุลที่เดิมทีต่างฝ่ายต่างยันกันไว้ถูกทำลายลงในทันที และหัตถ์อสูรเพลิงขนาดยักษ์ก็ค่อยๆ ทะลวงผ่านประกายแสงศักดิ์สิทธิ์อันเจิดจ้าเข้าไป บีบขยี้ท่านอาร์ชบิชอปซึ่งมีสีหน้าไม่ยินยอมพร้อมใจ จนร่างแหลกเหลวคาที่", "จนกระทั่งวินาทีแห่งความตาย แอนล็อคก็เพิ่งจะตระหนักได้ว่า แม่มดทั้งสองคนที่เขามองข้ามมาตลอดนั้น ไม่ได้ไร้ประโยชน์อย่างที่เขาคิดไว้เลย", "เมื่อมองดูร่างของแอนล็อคถูกบดขยี้ด้วยหัตถ์อสูรเพลิง ลินน์ก็อดไม่ได้ที่จะถอนหายใจด้วยความโล่งอก จากนั้นก็รีบกวาดสายตามองไปรอบๆ อย่างระแวดระวัง เพราะเขากังวลอย่างยิ่งว่าการลงมือฆ่าแอนล็อคอาจจะไปกระตุ้นโทสะจากเบื้องบน...", "แต่โชคดีที่ความกังวลของเขาไม่ได้กลายเป็นจริง และกลิ่นอายอันน่าสะพรึงกลัวในอากาศก็ค่อยๆ สลายตัวไป", "ในที่สุดมันก็จบลงแล้ว...", "ร่างของลินน์โอนเอนไปมา แทบจะล้มลงไปกองกับพื้น หลังจากการต่อสู้อย่างต่อเนื่องมาตลอดทั้งคืน พลังเวทและพละกำลังของเขาก็เหือดแห้งไปจนหมดสิ้น ทิ้งไว้เพียงความเหนื่อยล้าอย่างแสนสาหัส", "[โหมดโอเวอร์โหลดสิ้นสุดลง พลังงานคงเหลือ 2.1 เปอร์เซ็นต์]", "เสียงจากชิปในสมองดังก้องขึ้น ลินน์ประคองร่างของตนเอง พร้อมมองไปที่ไป๋เก๋อที่นอนไม่ได้สติอยู่ในอ้อมแขนของจอห์นนี่ แล้วเอ่ยถาม", "“ไป๋เก๋อเป็นยังไงบ้าง?”", "“ข้าไม่รู้ สภาพของนางย่ำแย่มาก นางต้องได้รับการรักษาทันที”", "จอห์นนี่กล่าวด้วยความร้อนใจอย่างยิ่ง", "ลินน์มองออกไปยังท้องทะเลอันปั่นป่วน พลางคิดว่าในเมื่อลอดด์สามารถรับสัญญาณที่เขาส่งไปและลงมือตามแผนได้ เขา ก็น่าจะเดินทางมาถึงที่นี่แล้วเมื่อถึงเวลา...", "แต่ทำไมตอนนี้เขาถึงไม่เห็นแม้แต่เงาของเรือเลยล่ะ..."]}, {"t": "กลับลำ! กลับเข้าฝั่งเดี๋ยวนี้!", "c": ["ไม่กี่นาทีก่อนหน้านี้ เหนือทะเลหมอก", "ชายร่างกำยำคนหนึ่งกำมีดยาวในมือแน่น แล้วเงื้อฟันลงมาที่ลอดด์อย่างดุดัน แต่ในจังหวะที่คมมีดกำลังจะฟันลงมา จู่ๆ มันก็หยุดชะงัก และสีหน้าอันดุร้ายของเขาก็ค่อยๆ แปรเปลี่ยนเป็นความรู้สึกลำบากใจอย่างถึงที่สุด แล้วเอ่ยปากอย่างระมัดระวัง", "“ท่านลอดด์ เราจะทำแบบนี้จริงๆ หรือขอรับ?”", "“เลิกพูดมาก แล้วลงมือได้แล้ว!”", "ลอดด์ขาเป๋ขบกรามแน่นพลางกล่าว เขายื่นมือขวาออกไปตรงๆ ที่เผยให้เห็นรอยประทับรูปเปลวเพลิงที่เด่นชัดอยู่บนหลังมือ", "ขณะที่พูด หัวใจของลอดด์ก็บีบรัดอย่างรุนแรงเช่นกัน ทว่านี่คือทางเลือกที่หลีกเลี่ยงไม่ได้อย่างเด็ดขาด", "ตั้งแต่เริ่มแรก เขาแทบไม่เชื่อมั่นในปฏิบัติการช่วยเหลืออันบ้าบิ่นและเกินจริงของพ่อมดผู้นั้นเลย ดังนั้นเมื่อเขาสังเกตเห็นว่าท่าเรือของเมืองตกอยู่ในความโกลาหลอย่างกะทันหัน และแผนการที่วางไว้ทั้งหมดต้องพังทลายลงตั้งแต่ยังไม่ได้เริ่ม ลอดด์ก็ตัดสินใจได้ในทันทีว่าพวกพ่อมดที่อยู่ในเมืองคงจะถึงคราวพินาศในไม่ช้า!", "และด้วยเหตุผลนี้เอง ลอดด์จึงตัดสินใจอย่างเด็ดขาด อาศัยจังหวะความวุ่นวายในเมืองท่าเพื่อจัดฉากหลบหนี", "ต้องขอบคุณที่ศาสนจักรทุ่มเทกำลังส่วนใหญ่ไปกับการรับมือลินน์และคนอื่นๆ พวกเขาจึงสามารถเข้าควบคุมเรือลำนี้ได้โดยไม่ต้องออกแรงมากนัก และขนเอาทรัพย์สินที่พกพามาหลบหนีออกจากเมืองท่ามาได้", "ตอนนี้สิ่งเดียวที่ทำให้ลอดด์กังวลก็คือรอยประทับเปลวเพลิงบนมือของเขา หากท่านพ่อมดรู้ว่าเขาวิ่งหนีเอาตัวรอดเมื่อต้องเผชิญกับอันตราย หมอนั่นก็อาจจะลากเขาลงนรกไปด้วยก่อนตายก็เป็นได้", "สำหรับคนที่ไม่ค่อยเข้าใจเรื่องเวทมนตร์อย่างเขา วิธีรับมือเดียวที่เขาคิดออกก็คือการตัดมือข้างนี้ทิ้งซะ!", "ชายร่างกำยำที่กำลังสับสนลังเล ก็ได้แต่ถือมีดค้างไว้แล้วก็ไม่กล้าลงมือฟันเสียที ส่วนอารมณ์ของลอดด์ก็แปรปรวนอย่างหนัก จนกระทั่งเขารู้สึกรำคาญและคว้ามีดยาวมาถือไว้เอง ทำแบบนี้คงจะเร็วกว่ามัวอ้ำอึ้งเป็นไหนๆ!", "“ลูกพี่ สัญญาณ นั่นมันสัญญาณนี่!”", "ที่หัวเรือ จู่ๆ กะลาสีคนหนึ่งก็ตะโกนลั่น ลอดด์เงยหน้าขึ้นมองตามสัญชาตญาณ แล้วเห็นลูกไฟลอยพุ่งขึ้นมาจากท่าเรือ ก่อนจะแตกกระจายสว่างวาบไปทั่วท้องฟ้ายามค่ำคืน", "ลอดด์รู้สึกประหลาดใจเล็กน้อย เขาคิดว่าพ่อมดผู้เจ้าเล่ห์และเหี้ยมโหดคนนั้นคงจะตายไปแล้วเสียอีก เขาไม่คาดคิดเลยว่าอีกฝ่ายจะสามารถฝ่ากลับไปที่ท่าเรือได้จริงๆ", "เมื่อคิดเช่นนี้ เขาจึงอดไม่ได้ที่จะหันไปมองต้นหนเรือที่กำลังถือกล้องส่องทางไกลแบบตาเดียวซึ่งประดิษฐ์ขึ้นจากการเล่นแร่แปรธาตุ", "“ข้าเห็นทหารเกราะดำเพียบเลยขอรับ พวกมันออกมากันหมด แถมอาร์ชบิชอปแอนล็อคก็อยู่ที่นั่นด้วย! พวกพ่อมดดูเหมือนจะถูกล้อมเอาไว้หมดแล้ว...”", "ต้นหนเรือลอบกลืนน้ำลายลงคออย่างยากลำบาก และเอ่ยอย่างตะกุกตะกัก", "ลอดด์เข้าใจสถานการณ์ในทันที พวกเขาถูกไล่ต้อนมาจนถึงจุดนี้แล้ว เมื่อครุ่นคิดอยู่ครู่หนึ่ง เขาก็เอ่ยอย่างตรงไปตรงมา" ลงมือตัดไปก่อน ไม่อย่างนั้นคนที่จะถูกบั่นคอก็คงจะเป็นเขาเองนี่แหละ!"]}, {"t": "ร่างจำแลงแห่งทวยเทพ", "c": ["ภายใต้ความพยายามอย่างไม่ลดละของเหล่ากะลาสี เรือใบก็ฝ่าฟันเกลียวคลื่นอันเชี่ยวกรากมาจอดเทียบท่า ณ บริเวณท่าเรือที่ยังไม่ถูกทำลาย", "เมื่อสัมผัสได้ถึงคลื่นความร้อนที่แผ่ซ่านอยู่ในอากาศ แม้จะเตรียมใจมาบ้างแล้ว แต่หัวใจของลอดด์ก็ยังคงสั่นสะท้านอย่างควบคุมไม่ได้ขณะที่เขาจ้องมองไปยังท่าเรือที่บัดนี้กลายสภาพเป็นซากปรักหักพัง รอยยิ้มบนใบหน้าของเขากลับยิ่งดูประจบประแจงมากกว่าเดิมเสียอีก", "“ท่านลอดด์ ในที่สุดท่านก็มาถึงจนได้ ข้าคิดว่าท่านจะออกเรือข้ามทะเลไปได้สำเร็จแล้วเสียอีก...”", "ลินน์เอ่ยขึ้นขณะเดินก้าวขึ้นมาบนไม้กระดานที่ถูกทอดลงมาอย่างยากลำบาก โดยมีจอห์นนี่และไป๋เก๋อที่หมดสติไปแล้วเดินตามมาด้วย", "“ฮ่าฮ่าฮ่า ท่านพ่อมด ท่านก็พูดติดตลกไปได้...เรื่องแบบนั้นจะเป็นไปได้อย่างไรกัน? มันก็แค่มีการเปลี่ยนแปลงแผนการนิดหน่อย และในเมื่อเราไม่ได้รับคำสั่งเพิ่มเติมจากท่าน เราก็ไม่มีทางเลือกอื่นนอกจากต้องลอยลำอยู่บนมหาสมุทรแห่งนี้เพื่อรอคอยท่านยังไงล่ะ”", "ลอดด์หัวเราะร่วน พลางอธิบายอย่างลื่นไหล", "ลินน์ไม่ได้แฉเจตนาที่แท้จริงของอีกฝ่าย เพราะอันที่จริงเขากับสมาคมเดินเรือก็ไม่ได้รู้จักมักจี่อะไรกันมาแต่ต้น ความร่วมมือของพวกเขาก็เป็นเพียงแค่เรื่องชั่วคราว ซึ่งมีพื้นฐานมาจากภัยคุกคามของศาสนจักรและเป้าหมายในการล่องเรือไปยังดินแดนพ่อมดเท่านั้น", "ด้วยเหตุนี้ แม้ว่าเขาจะสงสัยว่าพวกสมาคมเดินเรืออาจจะทิ้งเขาไว้ข้างหลังเพื่อหนีเอาตัวรอด แต่ลินน์ก็ไม่ได้รู้สึกโกรธเคืองแต่อย่างใด", "“ท่านลอดด์ บนเรือลำนี้มีหมอบ้างหรือไม่?”", "จอห์นนี่ที่ยืนอยู่ข้างๆ ก็พูดแทรกขึ้นมาพลางเอ่ยถามอย่างร้อนใจ", "ลอดด์ปรายตามองไป๋เก๋อที่ยังคงไม่ได้สติ และตระหนักได้ถึงความร้ายแรงของสถานการณ์ในทันที เขาไม่รอช้า สั่งให้ลูกน้องไปตามตัวหมอประจำเรือมาทันที พวกเขาเตรียมพร้อมรับมือกับเหตุฉุกเฉินที่อาจเกิดขึ้นระหว่างการข้ามทะเลด้วยสมุนไพรนานาชนิดไว้เป็นอย่างดี", "ทว่าหลังจากตรวจดูอาการของไป๋เก๋อแล้ว หมอประจำเรือก็ทำได้เพียงส่ายหน้าอย่างจนปัญญา", "“บาดแผลทางร่างกายของท่านแม่มดไม่ได้ร้ายแรงนัก แต่อาการของนางในตอนนี้...อาจจะเป็นปัญหาในด้านอื่นเสียมากกว่า...”", "เมื่อได้ยินเช่นนั้น จอห์นนี่ก็นึกไปถึงฉากที่ไป๋เก๋อใช้ เสียงกร สวดภาวนาอย่างศรัทธาอยู่บนพื้น ก่อนจะเอ่ยถามอย่างตรงไปตรงมา", "“หากข้าจำไม่ผิด พิธีล่าแม่มดควรจะเริ่มขึ้นในตอนเที่ยงของวันพรุ่งนี้ไม่ใช่รึ”", "สองวันก่อนหน้านี้ นครศักดิ์สิทธิ์ได้รับจดหมายขอความช่วยเหลือจากแอนล็อค อาร์ชบิชอปแห่งอาณาเขตนอร์ดแลนด์ผู้นี้นำกองทหารชั้นยอดออกไล่ล่าพ่อมดเพียงไม่กี่คน แต่กลับถูกกวาดล้างเกือบหมดสิ้น และถึงขั้นใช้ พลังคำศักดิ์สิทธิ์ พลังจุติศักดิ์สิทธิ์ ก็ยังไม่สามารถรั้งตัวศัตรูเอาไว้ได้", "ตามกฎของศาลพิพากษา ต่อให้เป็นพ่อมดเต็มตัวที่รับมือยากเพียงใด ก็ยังไม่คู่ควรให้เขาต้องลงมือด้วยตัวเอง อย่างไรก็ตาม แอนล็อคก็ได้ระบุไว้ในจดหมายอย่างชัดเจนว่าพ่อมดผู้นี้นั้นอายุน้อยมาก และมีแนวโน้มสูงที่จะกลายเป็นภัยคุกคามต่อศาสนจักรในอนาคต", "สิ่งที่น่าสะพรึงกลัวยิ่งกว่าก็คือ พ่อมดผู้นี้มีความสามารถในการใช้เพลิงนรกอันเป็นเอกลักษณ์เฉพาะตัว ซึ่งหากปล่อยให้ลุกลาม มันสามารถเผาเมืองทั้งเมืองให้เป็นจุณได้ภายในเวลาอันสั้น และแอนล็อคเองก็ไม่มีวิธีรับมือกับเช่นกัน", "เมื่อพิจารณาจากเรื่องนี้ เพื่อให้แน่ใจว่าจะไม่มีความผิดพลาดใดๆ เกิดขึ้น เขาจึงตัดสินใจเดินทางมาที่เมืองท่าด้วยตัวเอง ระหว่างทาง เมื่อเขาสัมผัสได้ถึงความผันผวนจากการระเบิดของพลังศักดิ์สิทธิ์ เขาจึงทิ้งเหล่านักบวชที่ติดตามมาไว้เบื้องหลัง และรีบรุดมาเพียงลำพังด้วยความเร็วสูงสุด", "น่าเสียดายที่เขายังคงมาช้าไปก้าวหนึ่ง", "“สถานการณ์เป็นเช่นนี้ขอรับ ท่านคาร์ดินัล เมื่อช่วงหัวค่ำ สาวกปีศาจสองคนได้บุกเข้ามาในเมืองท่าและจุดไฟเผายุ้งฉาง...”", "ทีริสเล่าเหตุการณ์ทั้งหมดให้กระชับที่สุดเท่าที่จะทำได้", "เมื่อเอดเวลล์ได้ยินว่าพ่อมดที่เป็นตัวการทำลายท่าเรือ เป็นคนเดียวกับที่แอนล็อคกำลังตามล่าอยู่ สีหน้าของเขาก็เคร่งเครียดขึ้นมาทันที", "จอมเวทผู้ยิ่งใหญ่ที่ปิดบังพลังของตนเอง และลักลอบเข้ามาในอาณาเขตนอร์ดแลนด์ด้วยการปลอมตัว ไม่ต้องคิดให้มากความก็พอจะเดาได้ว่าหมอนั่นกำลังวางแผนก่อกบฏต่อจักรวรรดิและศาสนจักรเป็นแน่", "เมื่อคิดได้เช่นนี้ เอดเวลล์ก็มองผ่านสายตาของร่างจำแลงแห่งทวยเทพ ข้ามซากปรักหักพังของท่าเรือและผืนน้ำอันกว้างใหญ่ ไปจนเห็นเรือรบใบเรือที่กำลังกลืนหายเข้าไปในม่านหมอก", "เมื่อประเมินจากระยะทาง เอดเวลล์ก็ล้มเลิกความคิดที่จะลงมือ เพราะต่อให้เขาใช้พลังศักดิ์สิทธิ์ที่ทรงพลัง เขาก็ไม่สามารถสร้างภัยคุกคามต่อจอมเวทผู้ ิศออกมาด้วยความระมัดระวังอย่างยิ่ง", "ลินน์ชะโงกหน้าเข้าไปใกล้ด้วยความอยากรู้อยากเห็น เข็มทิศนั้นมีรูปทรงกลม ทำจากไม้ และบนพื้นผิวก็ถูกจารึกด้วยอักษรรูนและลวดลายอันซับซ้อนมากมาย จุดที่สะดุดตาที่สุดคือเข็มทิศด้านบนที่หยุดนิ่ง แล้วชี้ตรงไปยังทิศทางที่เรือกำลังมุ่งหน้าไป", "นี่มันคือเข็มทิศงั้นหรือ?", "ลินน์นึกสงสัยในใจ ก่อนจะได้ยินลอดด์อธิบายต่อ", "“เข็มทิศนี้ถูกสร้างขึ้นโดยจอมเวทผู้ยิ่งใหญ่เฮลรัม มันคือสิ่งประดิษฐ์จากการเล่นแร่แปรธาตุ ไม่ว่าท่านจะอยู่ที่ไหน มันก็จะชี้ไปยังทิศทางของดินแดนพ่อมดเสมอขอรับ”", "นี่คือสิ่งที่พวกเขาใช้พึ่งพาในการนำทางฝ่าทะเลหมอก ไม่ว่าพวกเขาจะออกเดินทางจากจุดใด พวกเขาเพียงแค่ต้องตามทิศทางที่เข็มทิศบอกไว้ ก็สามารถค้นพบดินแดนพ่อมดได้แล้ว", "น่าเหลือเชื่อจริงๆ...ลินน์หยิบเข็มทิศขึ้นมาพิจารณาอย่างใกล้ชิด ความสนใจของเขาพุ่งเป้าไปที่จอมเวทผู้ยิ่งใหญ่เฮลรัมผู้นี้ ซึ่งเขาได้ยินชื่อเป็นครั้งที่สองแล้ว", "ดูเหมือนว่าการที่แอนล็อคยอมทุ่มเทวางแผนอย่างยากลำบากเพื่อจัดการกับพ่อมดฝึกหัดเพียงไม่กี่คน โดยใช้ลอดด์เป็นเครื่องมือนั้น ก็คงเพื่อให้ได้มาซึ่งเข็มทิศอันนี้นี่เอง", "หากส่งมอบสิ่งของชิ้นนี้ให้แก่ศาสนจักร ย่อมต้องเป็นความดีความชอบอันใหญ่หลวงอย่างแน่นอน!", "เนื่องจากเขาไม่สามารถถอดรหัสอักษรรูนบนเข็มทิศได้ ลินน์จึงทำได้เพียงจดจำพวกมันไว้ในใจ จากนั้นก็ยื่นมันคืนให้", "ลอดด์ยื่นมือออกมารับ ก่อนจะแสดงสีหน้าสับสนและลำบากใจเล็กน้อย หลังจากผ่านไปพักใหญ่ เขาก็เอ่ยถามอย่างระมัดระวัง", "“ท่านคือจอมเวทผู้ยิ่งใหญ่งั้นหรือขอรับ?”", "“ย่อมไม่ใช่อยู่แล้ว”", "ลินน์ส่ายหน้า เขาไม่กล้ายอมรับเรื่องนั้นหรอก", "ในปัจจุบัน เขานั้นเป็นเพียงแค่พ่อมดฝึกหัดที่เพิ่งจะเคยสัมผัสกับเวทมนตร์ได้ไม่นาน การถูกเข้าใจผิดว่าเป็นพ่อมดเต็มตัวนั้นก็เรื่องหนึ่ง เพราะต้องขอบคุณความช่วยเหลือจากสมองกลที่ทำให้เขาสามารถทำหลายสิ่งหลายอย่างที่ฝั่งพ่อมดเต็มตัวเท่านั้นที่ทำได้ แต่ถึงกระนั้น เขาก็ยังอยู่ห่างไกลจากระดับของจอมเวทผู้ยิ่งใหญ่อยู่มากนัก", "หากไม่ได้ความช่วยเหลือจากคนกว่าพันคนของสมาคมเดินเรือ เขาก็คงไม่มีทางวางกับดักที่สามารถทำลายเมืองท่าได้ทั้งเมืองเช่นนี้", "ความพินาศของแอนล็อคและพรรคพวกนั้นไม่ใช่ผลพวงของเวทมนตร์เสียทีเดียว หากแต่เป็นพลังแห่งวิทยาศาสตร์ต่างหาก", "เมื่อเห็นลินน์ส่ายหน้าปฏิเสธ ลอดด์ก็ดูเหมือนจะมีความเคลือบแคลงใจอยู่บ้าง เพราะเมื่อคืนนี้เขาได้เห็นการระเบิดอันน่าสะพรึงกลัวนั้นด้วยตาของตนเอง นั่นเป็นการแสดงพลังเวทอันยิ่งใหญ่อย่างไม่ต้องสงสัย!", "แต่เมื่อนึกขึ้นได้ว่าก่อนหน้านี้อีกฝ่ายเคยร้องขอวัสดุจำนวนมหาศาล ลอดด์ก็เดาว่าเวทมนตร์ดอกไม้ไฟนี้ น่าจะต้องใช้พิธีกรรมพิเศษที่เตรียมการไว้ล่วงหน้า ถึงจะสามารถปลดปล่อยคาถาที่ทรงพลังเหนือปกติเช่นนั้นออกมาได้", "“หากเป็นเช่นนั้น เมื่อเราไปถึงดินแดนพ่อมด ข้าเกรงว่าท่านอาจจะต้องเผชิญกับการถูกตำหนิและลงโทษนะขอรับ”", "ลอดด์กล่าวพลางถอนหายใจ", "สีหน้าของลินน์เปลี่ยนไปอย่างกะทันหัน สายตาที่เขามองไปยังลอดด์แฝงไปด้วยความอันตราย เขาเริ่มได้กลิ่นทะแม่งๆ ว่าตนเองกำลังจะถูกโยนความผิดให้เสียแล้ว", "ภายใต้สายตาอันเมตตาของใครบางคน ลอดด์ก็รีบอธิบายอย่างลนลาน", "แม้ว่าเขาจะเป็นคนคอยเดินเรือในเส้นทางทะเลจากเมืองท่าไปยังดินแดนพ่อมด แต่จอมเวทผู้ยิ่งใหญ่เฮลรัมต่างหากที่เป็นผู้บุกเบิกเส้นทางนี้ขึ้นมา", "พูดกันตรงๆ เลยก็คือ สมาคมเดินเรือทั้งหมดก็เป็นเพียงแค่เครื่องมือของอีกฝ่ายเท่านั้น ไม่ว่าจะเต็มใจหรือไม่เต็มใจก็ตาม ในแต่ละปีพวกเขาจะต้องขนส่งทรัพยากรที่หายากบางอย่างไปยังดินแดนพ่อมด", "ด้วยความลับที่ปกปิดไว้อย่างมิดชิดมาตลอดระยะเวลากว่าสิบปี จึงไม่เคยเกิดความผิดพลาดร้ายแรงใดๆ ขึ้น แต่เป็นเพราะพวกของจอห์นนี่ ที่ทำให้เส้นทางการขนส่งสายนี้ถูกทำลายย่อยยับไปโดยสมบูรณ์", "หากลินน์เป็นจอมเวทผู้ยิ่งใหญ่ด้วยเช่นกัน แน่นอนว่าเรื่องนี้คงไม่มีอะไรน่ากังวลนัก แต่ถ้าไม่ เขาก็ต้องเตรียมตัวรับการไต่สวนเอาผิด ซึ่งนี่คือเหตุผลที่ลอดด์เจาะจงถามเพื่อยืนยันให้แน่ใจ", "ต้องขอบคุณคำอธิบายของลอดด์ ลินน์สามารถทำความเข้าใจสถานการณ์ได้อย่างรวดเร็ว นั่นทำให้เขารู้สึกหนักใจเล็กน้อย เพราะเขาย่อมตระหนักดีถึงความสำคัญของเส้นทางเดินเรือสายนี้", "ความผิดบัดซบนี้น่าจะตกเป็นของอาจารย์โครของเขามากกว่า หากไม่ใช่เพราะแผนการอันบ้าบิ่นของตาเฒ่านั่นที่ไปลักพาตัวบุตรสาวคนรองของดยุกแล้วถูกจับได้คาหนังคาเขา ศาสนจักรจะสามารถแกะรอยเบาะแสมาจนถึงเมืองท่าได้อย่างไร...", "“นี่คือเส้นทางเดียวจากดินแดนพ่อมดที่มุ่งหน้าไปยังจักรวรรดิเซกัสงั้นหรือ?”", "ลินน์เอ่ยถาม", "“น่าจะมีอีกนะขอรับ...ทะเลหมอกยังเชื่อมต่อกับท่าเรือที่สำคัญอีกแห่งหนึ่ง นั่นคือเมืองหลวงของจักรวรรดิเซกัส นครหลวงวิกเนียร์”", "ลอดด์กล่าวอย่างลังเล แม้จะไม่แน่ใจนัก แต่เขาก็เดาว่าภายในนครวิกเนียร์ จะต้องมีคนอื่นที่ทำหน้าที่เหมือนกับเขาอยู่อย่างแน่นอน", "“ข้าเข้าใจแล้ว”", "ลินน์พยักหน้า ดูเหมือนว่าเรื่องราวจะยังไม่ได้เลวร้ายไปจนถึงขีดสุด แต่เขาก็ไม่มีความตั้งใจที่จะแบกรับความผิดนี้ไว้ เขาต้องหาวิธีสลัดมันทิ้งไปให้จงได้...", "ระหว่างที่กำลังครุ่นคิด ลินน์ก็ยังคงซักไซ้ข้อมูลต่างๆ เกี่ยวกับดินแดนพ่อมดจากลอดด์ต่อไปอย่างแนบเนียน เขาไม่คุ้นเคยกับสถานที่แห่งนั้นเลยแม้แต่น้อย และการขาดแคลนข้อมูลที่เพียงพอก็อาจนำไปสู่ความเสียเปรียบได้อย่างง่ายดาย", "จากการตั้งคำถามหลายข้อ ลินน์ก็เริ่มเข้าใจว่าดินแดนพ่อมดนั้นแตกต่างจากที่เขาจินตนาการไว้ก่อนหน้านี้ มันไม่ใช่ค่ายลี้ภัยที่ถูกสร้างขึ้นโดยกลุ่มพ่อมดที่ถูกศาสนจักรข่มเหง หากแต่เป็นเกาะขนาดยักษ์ที่มีมานานหลายร้อยปีแล้ว มีทั้งเมือง ท่าเรือ และประชากรมากถึงหกแสนคน แทบจะไม่ต่างอะไรกับอาณาจักรย่อมๆ แห่งหนึ่งเลย...", "เว้นเสียแต่ว่าที่นี่ไม่มีกษัตริย์และขุนนาง แต่พวกเขาถูกแทนที่ด้วยบรรดาพ่อมดและสำนักเวทมนตร์ต่างๆ โดยผู้ที่มีอำนาจสูงสุดก็คือสภาพ่อมด ซึ่งประกอบไปด้วยพ่อมดระดับตำนานหลายท่าน..."]}, {"t": "ดวงตามรณะ", "c": ["ระบบการเมืองการปกครองอันล้ำสมัย ของดินแดนพ่อมดทำให้ลินน์ถึงกับตกตะลึง เมื่อรู้ว่ามันได้พัฒนาไปสู่ระบบรัฐสภาประชาธิปไตยอย่างรวดเร็ว", "แต่เมื่อครุ่นคิดดูดีๆ เขาก็พบว่ามันเป็นเรื่องปกติ เพราะพ่อมดระดับสูงเพียงคนเดียวก็เทียบเท่ากับกองทัพทั้งกองทัพแล้ว และหากพลังอำนาจระดับนั้นไม่ได้รับสิทธิ์และเสียงที่คู่ควร มันก็ย่อมนำมาซึ่งความวุ่นวายอย่างหลีกเลี่ยงไม่ได้", "ดังนั้น สถานะของบรรดาพ่อมดที่นั่นจึงแทบจะไม่ต่างอะไรกับพวกชนชั้นสูงเลย!", "“เมื่อเราไปถึงท่าเรือ ท่านจะต้องตกตะลึงกับภาพที่เห็นอย่างแน่นอนขอรับ”", "ลอดด์กล่าวด้วยความรู้สึกอันท่วมท้น", "ตลอดหลายปีที่ผ่านมา เขานั้นเคยเดินทางไปที่ดินแดนพ่อมดอยู่สองสามครั้ง และทุกครั้งมันก็ให้ความรู้สึกราวกับชาวนาที่ใช้ชีวิตอยู่ในหมู่บ้านชนบทมาตลอด จู่ๆ ก็ได้ไปเยือนนครหลวงวิกเนียร์ และความตื่นตาตื่นใจพวกนั้น ก็ยากที่จะพรรณนาออกมาเป็นคำพูดได้", "“ถ้าอย่างนั้น ข้าก็ตั้งตารอที่จะได้เห็นภาพเช่นนั้นจริงๆ”", "ลินน์เอ่ยพร้อมกับรอยยิ้ม", "ขณะที่พวกเขากำลังสนทนากัน จู่ๆ กะลาสีคนหนึ่งก็เดินเข้ามาใกล้และกระซิบอะไรบางอย่างที่ข้างหูของลอดด์", "ลอดด์โบกมือไล่กะลาสีคนนั้นไป แล้วหันมาถามด้วยความเคารพ", "“ท่านแม่มดฟื้นแล้วขอรับ ท่านจะไปเยี่ยมนางสักหน่อยไหม?”", "ลินน์พยักหน้า เขามีคำถามมากมายที่อยากจะถามจอห์นนี่ เขาจึงรีบมุ่งหน้าไปยังห้องพักบนเรือทันที", "ลอดด์มองตามแผ่นหลังของลินน์ที่เดินจากไป เขาไม่ได้เดินตามไป แต่กลับเงยหน้าขึ้นมองท้องฟ้าที่ปกคลุมไปด้วยหมอกหนา หยาดฝนร่วงหล่นทะลุม่านหมอกสีขาวลงมากระทบดาดฟ้าเรือ", "แม้ว่าลมและฝนเพียงเล็กน้อยนี้จะไม่ส่งผลกระทบต่อการเดินทาง แต่ลอดด์ก็อดไม่ได้ที่จะรู้สึกกระวนกระวายใจอยู่ลึกๆ เนื่องจากการออกเรือจากเมืองท่าในปีนี้นั้นล่าช้ากว่ากำหนดไปมาก เพื่อหลบหลีกการจับกุมของศาสนจักร", "หวังว่าท้องทะเลจะสงบลงบ้าง ก่อนที่พวกเราจะแล่นผ่านพ้นพื้นที่แถบนี้ไป...", "...", "ลินน์เดินตามกะลาสีเข้าไปด้านในตัวเรือ ในขณะที่เรือไม้ยังคงโคลงเคลงไปมา อากาศภายในอบอวลไปด้วยกลิ่นเหม็นอับจางๆ ของความเน่าเปื่อย", "โชคดีที่เขาเริ่มชินกับสภาพสุขอนามัยอันย่ำแย่ในยุคกลางเช่นนี้ตลอดหลายวันที่ผ่านมา และนี่ก็ถือว่าดีมากแล้ว เมื่อพิจารณาจากการที่ลอดด์จัดเตรียมห้องพักแยกไว้ให้เป็นพิเศษ ทำให้พวกเขาไม่ต้องไปเบียดเสียดกับลูกเรือคนอื่นๆ", "“ท่านพ่อมด ถึงแล้วขอรับ!”", "กะลาสีที่เดินนำทางหยุดชะงักอยู่หน้าประตูห้องพัก เขามองลินน์ด้วยแววตาที่ฉายรอยหวาดกลัวเล็กน้อย เมื่อภาพเหตุการณ์อันน่าสะพรึงกลัวในเมืองท่าผุดขึ้นมาในความทรงจำ", "ลินน์ไม่ได้ใส่ใจอะไร เขาผลักประตูและก้าวเข้าไปด้านใน", "ห้องพักนี้มีขนาดเพียงไม่กี่ตารางเมตร แม่มดผมสีเงินกำลังนั่งพิงหัวเตียงไม้ สายตาของนางจดจ้องออกไปนอกหน้าต่างที่ถูกบดบังด้วยม่านหมอก มองไปยังผืนมหาสมุทร แสงสลัวๆ ลอดผ่านหน้าต่างเข้ามาทาบทับลงบนพวงแก้มอันขาวซีดของเด็กสาว เผยให้เห็นความงดงามที่ดูอ่อนแอและอมทุกข์", "บางทีอาจจะได้ยินเสียงเปิดประตู จอห์นนี่จึงหันหน้ากลับมา พร้อมหน้าอันงดงามของนางที่ถูกปกคลุมด้วยเงามืดสลัวๆ นางมองลินน์ที่เดินเข้ามาหยุดอยู่ข้างเตียง นิ่งเงียบไปเนิ่นนานก่อนจะเอ่ยขึ้นอย่างกะทันหัน", "“ไป๋เก๋อตายแล้ว!”", "ลินน์ชะงักไปครู่หนึ่ง ก่อนจะตอบกลับด้วยน้ำเสียงแผ่วเบา", "“ข้าผนึกร่างของนางไว้ในน้ำแข็งแล้ว บางทีพวกระดับสูงในดินแดนพ่อมดอาจจะมีวิธีช่วยเหลือนางก็ได้ แต่...”", "แม้ปากจะพูดเช่นนั้น แต่ลินน์ก็รู้ดีว่าความหวังนั้นริบหรี่เพียงใด ไม่ต้องพูดถึงเลยว่าพ่อมดผู้ทรงพลังเหล่านั้นจะมีความสามารถพอหรือไม่ ต่อให้พวกเขามี มันก็แทบจะเป็นไปไม่ได้เลยที่พวกเขาจะยอมยื่นมือเข้าช่วยเหลือพ่อมดฝึกหัดต้อยต่ำเพียงคนเดียว", "ที่เขาทำเช่นนั้น เหตุผลหลักก็เพราะไป๋เก๋อ ผู้ซึ่งหวาดกลัวความตายอย่างสุดหัวใจ กลับกล้าเสี่ยงชีวิตลอบเข้าไปในเมืองท่าเพื่อช่วยเหลือเขา แม้จะรู้ว่ามันเป็นสถานการณ์ที่แทบจะเอาชีวิตไปทิ้งก็ตาม สิ่งนี้ทำให้ลินน์รู้สึกซาบซึ้งใจอยู่ไม่น้อย", "ประการที่สอง พลังงานลึกลับที่ระบบสมองกลดูดซับไปเมื่อคืนนี้ ก็ทำให้เขารู้สึกกังวลใจเป็นอย่างมากเช่นกัน", "จอห์นนี่ดูเหมือนจะไม่ได้ยินคำพูดของลินน์ นางยังคงพึมพำประโยคเดิมซ้ำๆ ด้วยน้ำเสียงแผ่วเบา", "ลินน์ลอบถอนหายใจในใจ เมื่อเห็นสภาพจิตใจของเด็กสาว เขาเกรงว่าคงจะเปล่าประโยชน์ที่จะถามอะไรเพิ่มเติม เขาเพิ่งจะตั้งใจปล่อยให้จอห์นนี่พักผ่อน แต่จู่ๆ ร่างอันอ่อนนุ่มและอบอุ่นก็โถมเข้าสู่อ้อมกอดของเขา", "ลินน์ชะงักงันไปชั่วขณะ ยังไม่ทันได้ตั้งตัว เสียงสะอื้นไห้ของเด็กสาวก็ดังทะลุเข้ามาในโสตประสาท", "“ไป๋เก๋อตายแล้ว...ท่านอาจารย์ตายแล้ว...แล้วก็เคนท์, วิล, บัค, บาร์ตัน...”", "ทุกครั้งที่เอ่ยชื่อแต่ละคนออกมา น้ำเสียงของจอห์นนี่ก็ยิ่งสั่นเครือ หัวไหล่ของนางสั่นสะท้านอย่างควบคุมไม่ได้ และหยาดน้ำตาก็ไหลอาบสองแก้มจนเสื้อคลุมของลินน์เปียกชุ่ม น้ำเสียงของเด็กสาวแหบพร่าไปด้วยเสียงสะอื้น นางพรั่งพรูทุกสิ่งที่เกิดขึ้นในอาณาเขตนอร์ดแลนด์ออกมาอย่างสะอึกสะอื้น", "ตอนที่พวกนักบวชค้นพบกลุ่มของพวกเขา โครมีโอกาสที่จะหนีเอาตัวรอดไปได้ แต่เขากลับเลือกที่จะรั้งท้ายไว้เพื่อคุ้มกันให้พวกนางหนีไป", "นั่นเป็นเหตุผลที่นางสามารถหลบหนีมาได้เพียงลำพัง ก่อนจากมา นางได้ให้สัญญากับอาจารย์ไว้ว่าจะพาศิษย์ฝึกหัดทุกคนกลับไปยังดินแดนพ่อมดอย่างปลอดภัย แต่ทว่านอกจากพวกเขาสองคนแล้ว คนอื่นๆ ล้วนตายหมด...", "ลินน์ยืนนิ่งเงียบ ไม่พูดขัดจังหวะการระบายอารมณ์ของเด็กสาว เขาเข้าใจดีว่าสิ่งที่จอห์นนี่ต้องการ ก็เป็นเพียงแค่หนทางในการปลดปล่อยความหวาดกลัว ความโศกเศร้า และความสิ้นหวังที่สะสมมานานกว่าสิบวัน ซึ่งเป็นสิ่งที่นางไม่สามารถแสดงออกให้คนนอกเห็นได้", "การร้องไห้สลับกับเสียงสะอื้นดำเนินไปนานกว่าสิบนาที อารมณ์ของจอห์นนี่จึงเริ่มกลับมาคงที่อีกครั้ง และในตอนนั้นเองที่นางเพิ่งตระหนักได้ว่านางกำลังสวมกอดลินน์อยู่ และเสื้อผ้าของเขาก็เปียกโชกไปด้วยน้ำตาของนาง", "เด็กสาวรู้สึกเขินอายเล็กน้อย นางคลายอ้อมแขนออก และจู่ๆ บรรยากาศภายในห้องพักก็กลายเป็นความอึดอัดขึ้นมา จอห์นนี่ดูมีท่าทีลุกลี้ลุกลน นางปาดน้ำตาออกจากหางตาแล้วเอ่ยเสียงเบา", "“หากท่านอาจารย์เลือกที่จะพาท่านไปยังเมืองหลักในอาณาเขตนอร์ดแลนด์ตั้งแต่แรก บางทีทุกอย่างอาจจะไม่เป็นเช่นนี้ก็ได้”", "“เจ้าประเมินข้าสูงเกินไปแล้ว จอห์นนี่”", "ลินน์ส่ายหน้า ในตอนนั้นเขายังไม่ได้ทะลุมิติมาเลยด้วยซ้ำ ด้วยความสามารถเดิมของคาร์ล เขาก็คงจะถูกจับกุมตัวไปเช่นกันนั่นแหละ", "“และสิ่งที่เจ้าทำ มันก็เพียงพอแล้ว และถือว่าทำได้ดีแล้วด้วย”", "ลินน์กล่าวอย่างจริงจัง จอห์นนี่ไม่ได้เป็นนักวางกลยุทธ์ที่เก่งกาจ หรือเป็นตาเฒ่าเจ้าเล่ห์อย่างลอดด์", "ในความทรงจำของคาร์ล นางเป็นเพียงเด็กสาวที่มีพรสวรรค์ด้านเวทมนตร์ ซึ่งชอบไปนั่งอ่านหนังสืออยู่ใต้ร่มไม้เท่านั้น", "การที่โครฝากฝังชีวิตของบรรดาพ่อมดฝึกหัดไว้กับความพยายามของจอห์นนี่ มันเป็นเรื่องที่ไม่สมจริงเอาเสียเลย", "จอห์นนี่ไม่ได้ตอบรับคำปลอบโยนของลินน์ แต่กลับเม้มริมฝีปากและเอ่ยถาม", "“ที่เมืองอูเออร์ ทำไมท่านถึงเลือกที่จะรั้งท้ายไว้เพื่อเผชิญหน้ากับท่านอาร์ชบิชอปเพียงลำพังล่ะ?”", "นี่คือสิ่งที่ทำให้นางค้างคาใจมาตลอด แม้ว่าพวกเขาจะล้วนเป็นศิษย์ของโครเหมือนกัน แต่ปกติแล้วพวกเขาก็ไม่ได้สนิทสนมอะไรกันเลย ทว่าที่เมืองอูเออร์ ลินน์กลับยอมเผชิญหน้ากับอันตรายเพียงลำพัง เพื่อเปิดทางให้พวกนางหลบหนีไปได้", "แน่นอนว่าก็เป็นเพราะพวกเจ้ามายืนเกะกะขวางทาง ทำให้ข้าไม่สามารถงัดพลังออกมาใช้ได้อย่างเต็มที่ยังไงล่ะ...", "คำพูดของลินน์จ่ออยู่ที่ริมฝีปาก แต่เขากลืนมันกลับลงไป และเลือกใช้คำพูดที่ถนอมน้ำใจกว่านั้น", "“การเผชิญหน้ากับแอนล็อค ข้าไม่ได้มีความมั่นใจเต็มร้อย และข้าก็ไม่อาจเสียสมาธิไปกับการคอยคุ้มครองพวกเจ้าได้”", "จอห์นนี่มองลินน์อย่างเหม่อลอย นางกำลังจะเอ่ยอะไรบางอย่าง ทว่าจู่ๆ ห้องพักก็สั่นสะเทือนอย่างรุนแรงโดยไม่มีสัญญาณเตือนล่วงหน้า เหวี่ยงร่างของพวกเขาไปกระแทกกับผนังไม้", "ก่อนที่ลินน์จะทันได้ตั้งหลัก เสียงกรีดร้องด้วยความหวาดผวาก็ดังระงมมาจากดาดฟ้าเรือเบื้องบน", "“ดวงตามรณะ...นั่นมันดวงตามรณะ!”"]}, {"t": "พุ่งทะยานเข้าสู่วังน้ำวนขนาดยักษ์!", "c": ["ห้องพักที่โคลงเคลงไปมาและเสียงร้องด้วยความตื่นตระหนกที่ดังมาจากเบื้องบน ขัดจังหวะบทสนทนาระหว่างลินน์และจอห์นนี่ ทั้งสองสบตากันเพียงแวบเดียวก่อนจะรีบพุ่งพรวดขึ้นไปบนดาดฟ้าเรือพร้อมกัน", "ทันทีที่พวกเขาเปิดประตูห้องพัก สายลมกรรโชกแรงที่หนาวเหน็บก็พัดสวนเข้ามา พร้อมกับหยาดฝนที่เย็นเฉียบสาดกระหน่ำลงมาบนดาดฟ้าเรือราวกับห่ากระสุนปืน บ่งบอกถึงจุดเริ่มต้นของพายุร้าย...", "ผิวน้ำทะเลที่เคยเงียบสงบก่อนหน้านี้ บัดนี้กำลังปั่นป่วนอย่างรุนแรง เกลียวคลื่นลูกแล้วลูกเล่าซัดกระหน่ำเข้าใส่ตัวเรืออย่างไม่ลดละ ทำให้เรือรบใบเรือโคลงเคลงไปมาอย่างไม่หยุดหย่อน", "กระแสลมแรงที่พัดมาอย่างต่อเนื่องได้พัดพาให้หมอกหนาทึบที่เคยปกคลุมในตอนแรกเจือจางลงไปมาก นั่นทำให้ระยะการมองเห็นเพิ่มขึ้นเป็นสองเท่า แต่หมอกเหล่านั้นไม่ได้เป็นสีขาวบริสุทธิ์อีกต่อไป มันกลับแปรเปลี่ยนเป็นสีเทาหม่นที่ดูน่าสะพรึงกลัว...", "“เร็วเข้า กางใบเรือให้ตึง ทุกคน ขยับตัวสิ เราต้องหนีออกจากพื้นที่นี้ให้เร็วที่สุด!”", "ความโกลาหลเข้าครอบงำดาดฟ้าเรือ ขณะที่กะลาสีหลายร้อยคนจากสมาคมเดินเรือ วิ่งพล่านไปมาอย่างไร้ทิศทาง สีหน้าของลอดด์ดูย่ำแย่อย่างถึงที่สุด เขาตะโกนสั่งการเสียงดังลั่น ทว่ากลับไร้ผล กะลาสีหลายคนคุกเข่าลงบนดาดฟ้าเรือด้วยความสิ้นหวัง พลางกรีดร้องออกมาอย่างไม่ขาดสาย", "“ท่านลอดด์ เราชนโขดหินหรือขอรับ? หรือว่าเป็นเพราะพายุ?”", "ลินน์รีบเดินเข้าไปหาและเอ่ยถาม", "“ไม่ใช่ นี่มันวังน้ำวน ดวงตามรณะต่างหาก!”", "ลอดด์ตะโกนตอบกลับด้วยความหวาดผวา", "วังน้ำวนงั้นหรือ?", "จู่ๆ ลินน์ก็นึกถึงข้อมูลที่เขารวบรวมมาได้ก่อนหน้านี้ในเมืองท่า เขามองไปยังผืนทะเลที่ปั่นป่วนอีกครั้ง และตระหนักถึงสิ่งที่เขามองข้ามไปก่อนหน้านี้ เกลียวคลื่นที่ม้วนตัวกำลังถาโถมไปในทิศทางเดียวกัน และเรือรบใบเรือที่เขาเหยียบอยู่ก็กำลังถูกดึงดูดเข้าสู่ศูนย์กลางของวังน้ำวนอย่างช้าๆ", "แต่เส้นผ่านศูนย์กลางของวังน้ำวนนี้มันช่างกว้างใหญ่เกินไป และด้วยผืนทะเลที่ถูกปกคลุมไปด้วยหมอกหนาจนไม่มีจุดอ้างอิงใดๆ มันจึงสร้างภาพลวงตาให้เขารู้สึกราวกับว่าเรือกำลังแล่นไปตามปกติ!", "ซี๊ด…ไอ้นี่มันใหญ่ขนาดไหนกันเนี่ย?", "ลินน์อดไม่ได้ที่จะเหงื่อแตกพลั่ก ในขณะที่ลอดด์ราวกับเพิ่งนึกอะไรบางอย่างขึ้นมาได้ เขาหันขวับมาทางลินน์ด้วยสายตาที่เปี่ยมไปด้วยความหวังอย่างแรงกล้า และเอ่ยถามอย่างตื่นเต้น", "“ท่านพ่อมด ท่านมีวิธีแช่แข็งวังน้ำวนทั้งลูกนี้ได้หรือไม่ขอรับ?”", "“เจ้าล้อข้าเล่นหรือไง?”", "ลินน์ขมวดคิ้ว เส้นผ่านศูนย์กลางของวังน้ำวนลูกนี้ต้องกว้างถึงหลายกิโลเมตรแน่ๆ ถึงได้สร้างภาพลวงตาเช่นนี้ได้ พลังอำนาจแบบไหนกันที่จะสามารถแช่แข็งผืนมหาสมุทรอันกว้างใหญ่ขนาดนี้ได้?", "“ถ้าอย่างนั้นพวกเราก็จบสิ้นแล้ว ตอนนี้มันสายเกินไปที่จะหนีแล้วล่ะ!”", "ประกายแห่งความหวังในดวงตาของลอดด์นั้นดับวูบลงในทันที เขาทรุดตัวลงนั่งบนดาดฟ้าเรือ ร่างกายอ่อนระทวยราวกับคนไร้กระดูก พลางพึมพำกับตัวเอง", "ทะเลหมอกเป็นสิ่งที่น่าหวาดหวั่น ไม่ใช่เพียงเพราะหมอกหนาทึบที่แผ่ปกคลุมไปทั่วทั้งบริเวณและนำพาสายตาให้หลงทิศทางไปได้อย่างสมบูรณ์เท่านั้น แต่สิ่งที่สำคัญกว่านั้นก็คือวังน้ำวนที่ถูกขนานนามว่า ดวงตามรณะ!", "มันคือตัวตนที่เติมเต็มความหวาดกลัวให้กับเหล่านักเดินเรือนับไม่ถ้วน ราวกับมัจจุราชที่เร่ร่อนไปทั่วทะเลหมอกอันกว้างใหญ่ ปรากฏตัวขึ้นอย่างไม่มีปี่มีขลุ่ยในมุมใดมุมหนึ่งของพื้นที่ คาดเดาไม่ได้และไร้ซึ่งรูปแบบใดๆ และหากใครโชคร้ายได้เผชิญหน้ากับมัน เหล่ากะลาสีก็เหมือนถูกตัดสินประหารชีวิตในทันที!", "เพราะแรงดูดอันมหาศาลของวังน้ำวนนั้นเหนือล้ำกว่าความเร็วของเรือใบทุกชนิด มีข่าวลือว่าผู้ที่ถูกดูดกลืนเข้าสู่วังน้ำวนในท้ายที่สุด ไม่เพียงแต่จะต้องเผชิญกับความตายอย่างเลี่ยงไม่ได้เท่านั้น แต่วิญญาณของพวกเขาก็จะดำดิ่งลงสู่ขุมนรกอีกด้วย ซึ่งนั่นคือที่มาของชื่อ ดวงตามรณะ...", "หนทางเดียวที่จะแล่นเรือผ่านทะเลหมอกไปได้อย่างปลอดภัยก็คือ การรอจนกว่าจะถึงช่วงวันแห่งแสงจันทร์ ซึ่งเป็นช่วงเวลาที่วังน้ำวนดวงตามรณะจะสงบลงชั่วคราว เมื่อใช้ประโยชน์จากช่วงเวลานั้น เรือต่างๆ ก็จะแล่นออกไปให้ไกลที่สุดเท่าที่จะทำได้จากพื้นที่ที่ดวงตามรณะมักจะปรากฏตัวขึ้น ส่วนที่เหลือก็ปล่อยให้เป็นเรื่องของโชคชะตา", "นั่นคือเหตุผลที่ในปีก่อนๆ ตอนที่มีการขนส่งสินค้า พวกเขาจะพยายามออกเรือในช่วงสองสามวันแรกของวันแห่งแสงจันทร์เสมอ เพื่อหลีกเลี่ยงการเผชิญหน้ากับวังน้ำวนโดยตรง...", "แต่ปีนี้มันต่างออกไป ศาสนจักรได้ปิดล้อมเมืองท่าเอาไว้ ส่งผลให้การออกเดินทางของพวกเขาต้องล่าช้ากว่ากำหนดไปมาก!", "ลินน์ไม่ได้ใส่ใจกับคำพูดเหล่านั้น เขารีบสาวเท้าเข้าไปหากองสัมภาระที่วางซ้อนกันอยู่บนดาดฟ้าเรือ หยิบถังไม้ขึ้นมาสองสามใบ กะน้ำหนักด้วยการเอียงถังไปมา แล้วโยนพวกมันทิ้งลงไปในทิศทางและมุมที่แตกต่างกัน จากนั้นเขาก็ยื่นมือขวาออกไปเพื่อวัดระยะห่างสัมพัทธ์ของวัตถุเหล่านี้", "ในระดับของคนทั่วไป การใช้ถังไม้ที่ลอยน้ำเพียงไม่กี่ใบเป็นจุดอ้างอิงเพื่อคำนวณเส้นผ่านศูนย์กลางและความเร็วในการไหลของวังน้ำวนขนาดยักษ์นั้น ถือเป็นเรื่องไร้สาระสิ้นดี", "แต่สำหรับระบบสมองกล พลังประมวลผลระดับนี้มันก็แค่เรื่องกล้วยๆ...", "“เส้นผ่านศูนย์กลางของวังน้ำวนคือเจ็ดกิโลเมตร ความเร็วหลุดพ้นคือ...ยี่สิบนอต! หากต้องการหลีกเลี่ยงไม่ให้ถูกดูดเข้าสู่วังน้ำวน เราต้องการความเร็วอย่างน้อยยี่สิบนอต!”", "ลินน์ได้รับผลการวิเคราะห์จากสมองกลอย่างรวดเร็ว และอดไม่ได้ที่จะขมวดคิ้ว", "ในโลกเดิมของเขา ความเร็วเพียงแค่ยี่สิบนอตนั้นเป็นสิ่งที่เรือเล็กทุกลำสามารถทำได้ และหลังจากการปฏิรูปพลังงาน ของโบราณเหล่านี้ก็คงทำได้เพียงแค่ถูกทิ้งให้ฝุ่นจับอยู่ในโกดังเท่านั้น", "แต่ตอนนี้เขาอยู่ในโลกต่างมิติอันเลวร้าย และเรือรบใบเรือที่พวกเขากำลังโดยสารอยู่นี้ ดูเหมือนจะมีความเร็วสูงสุดเพียงแค่...เจ็ดนอตเท่านั้น?", "“นี่มันเป็นไปไม่ได้! ต่อให้เป็นเรือเล่นแร่แปรธาตุที่ดีที่สุดจากดินแดนพ่อมด ก็ไม่มีทางทำความเร็วได้ถึงยี่สิบนอตหรอกขอรับ!”", "ลอดด์ได้ยินคำพูดของลินน์เช่นกัน และตะโกนออกมาด้วยความสิ้นหวัง", "แม้เขาจะไม่เข้าใจว่าแท้จริงแล้วความเร็วหลุดพ้นคืออะไร แต่เขาเข้าใจอย่างถ่องแท้ว่าความเร็วยี่สิบนอตนั้นหมายถึงอะไร!", "“ไม่ มันเป็นไปได้!”", "ลินน์กล่าวด้วยน้ำเสียงจริงจังอย่างยิ่ง เขาผลักคนถือท้ายเรือที่ล้มพับกองอยู่บนพื้นให้พ้นทาง แล้วกวาดสายตามองไปรอบๆ ผู้คนที่อยู่รายล้อม", "“ข้าจะเป็นคนคุมพวงมาลัยเอง ทุกคนกลับไปประจำตำแหน่ง ทำตามคำสั่งของข้า แล้วกางใบเรือทั้งหมดขึ้นซะ!”", "“ท่านมีความรู้เรื่องเรือบ้างหรือเปล่าเนี่ย! ด้วยเกลียวคลื่นลูกใหญ่ขนาดนี้ หากเรากางใบเรือทั้งหมดขึ้น เรือลำนี้จะต้องคว่ำภายในพริบตา และพวกเราก็ต้องตายกันหมด!”", "คนถือท้ายเรือที่เพิ่งถูกลินน์ผลักกระเด็นไปเมื่อครู่ ก็กระโดดลุกขึ้นยืนทันทีและแผดเสียงร้องลั่น ด้วยสถานการณ์ในปัจจุบัน เขาไม่สนหรอกว่าอีกฝ่ายจะเป็นพ่อมดหรือไม่", "ทว่าวินาทีต่อมา คำพูดของเขาก็ถูกกลืนกลับลงคอไปจนหมดสิ้น เพราะลูกไฟขนาดยักษ์กำลังควบแน่นขึ้นในฝ่ามือของลินน์", "“ทำซะ ไม่อย่างนั้นแกจะได้ตายเดี๋ยวนี้แหละ!”", "น้ำเสียงของลินน์เย็นชาดุจน้ำแข็ง", "เปลวไฟฟอสฟอรัสขาวสีขาวอมเหลืองทำให้กะลาสีทุกคนบนดาดฟ้าเรือสั่นสะท้านอย่างควบคุมไม่ได้ และคนถือท้ายเรือก็ถึงกับตกใจกลัวจนทรุดฮวบลงไปนั่งกองกับพื้นเสียงดัง", "อย่างไรก็ตาม ในสถานการณ์ที่ทุกคนต่างคิดว่าตัวเองต้องตายอย่างแน่นอน ด้วยความสิ้นหวัง จึงแทบไม่มีใครยอมทำตามคำสั่งเลย และบางคนถึงกับรู้สึกว่ายอมตายด้วยเวทมนตร์ก็ยังดีกว่าถูกวังน้ำวนขนาดยักษ์กลืนกินวิญญาณไป", "ในขณะนั้นเอง เสียงการดึงรอกที่หมุนอย่างรุนแรงก็ดังแว่วมา ลินน์และคนอื่นๆ หันขวับไปมอง และผู้ที่กำลังลงมือทำก็คือจอห์นนี่!", "ในเวลานี้ เด็กสาวกำลังกำเชือกใบเรือไว้แน่น พันมันรอบกว้านสมอ หยาดฝนร่วงหล่นลงมาจากเบื้องบนอย่างต่อเนื่อง ไหลผ่านปลายผมและหน้าอันงดงามของนาง จนเสื้อคลุมเปียกชุ่ม ทว่าจอห์นนี่ไม่ได้สนใจเลยแม้แต่น้อย นางออกแรงดึงเชือกให้แน่นยิ่งขึ้นไปอีก จนกระทั่งห่วงสุดท้ายถูกมัดเข้ากับกว้านสมออย่างแน่นหนา", "“ในเมื่อพวกเจ้าไม่มีทางออกอื่นแล้ว การนั่งรออยู่ตรงนี้ก็ไม่ต่างอะไรกับการรอความตายหรอกนะ!”", "นัยน์ตาของจอห์นนี่ที่งดงามดั่งไพลินจ้องมองไปยังผู้คนที่อยู่ตรงนั้น และเอ่ยออกมาด้วยความเด็ดเดี่ยว", "ลอดด์รีบดึงสติกลับมาเช่นกัน เขาชักแส้ยาวที่เอวออกมา แล้วฟาดลงบนหลังของกะลาสีที่กำลังคุกเข่าสวดภาวนาอยู่บนพื้นอย่างดุดัน พลางตะโกนอย่างเกรี้ยวกราด", "“ทำซะ ทำตามที่ข้าบอก กางใบเรือทั้งหมดขึ้น!”"]}, {"t": "พิชิตดวงตามรณะ!", "c": ["ภายใต้การตวัดแส้สั่งการของลอดด์ เหล่ากะลาสีที่เกาะกุมความหวังเฮือกสุดท้ายก็เริ่มลงมือปฏิบัติการ", "เชือกใบเรือถูกดึงจนตึง รอกถูกหมุนอย่างต่อเนื่อง และใบเรือที่ทำจากหนังอูฐก็ถูกกางขึ้น หนังเหล่านี้มีความเหนียวทนทานเป็นอย่างยิ่ง มัน0สามารถต้านทานได้ทั้งพายุลมแรงและห่าฝนที่ตกลงมาอย่างหนัก", "ลูกเรือที่เหลือเริ่มโยนสัมภาระที่กองอยู่บนดาดฟ้าเรือทิ้งลงทะเล เพื่อลดน้ำหนักของเรือรบใบเรือ", "เมื่อมองดูสัมภาระถูกโยนทิ้งลงน้ำไปทีละชิ้นๆ ลอดด์ก็รู้สึกปวดร้าวราวกับมีดกรีดกลางหัวใจ แต่เขาก็ไร้กำลังที่จะหยุดยั้งมัน เพราะถึงอย่างไรชีวิตของเขาก็ย่อมสำคัญกว่าเสมอ", "สายลมที่ส่งเสียงคำรามและเกลียวคลื่นที่ม้วนตัว ทำให้เรือใบขนาดยักษ์นั้นดูราวกับใบไม้ที่พร้อมจะพลิกคว่ำได้ทุกเมื่อ ตัวเรือโคลงเคลงไปมาอย่างหนัก ราวกับว่ามันอาจจะดำดิ่งลงสู่ก้นมหาสมุทรในวินาทีถัดไป", "วิธีรับมือของลินน์นั้นตรงไปตรงมา นั่นคือการอาศัยการปรับมุมของใบเรือ และใช้ประโยชน์จากพลังของลมพายุเพื่อรักษาสมด วละก็ แต่ตอนนี้มันกลับกลายเป็นความเคารพศรัทธาอย่างแท้จริง", "หลังจากเพิ่งผ่านพ้นการสัมผัสกับพลังอำนาจและความน่าสะพรึงกลัวของดวงตามรณะมาหมาดๆ แน่นอนว่าพวกเขาล้วนเปี่ยมไปด้วยความกตัญญูและเชื่อมั่นในตัวลินน์ ผู้ซึ่งนำทางพวกเขาให้รอดพ้นจากการตามล่าของมัจจุราช", "“โปรดออกคำสั่งมาได้เลย ว่าพวกเราต้องทำอะไรต่อไป!”"]}, {"t": "สถานการณ์ปัจจุบันในดินแดนพ่อมด", "c": ["ลินน์กวาดสายตามองลูกเรือที่กำลังรอรับคำสั่ง แล้วเอ่ยอย่างสบายๆ", "“ในเมื่อเป็นเช่นนี้ ข้าคงต้องขอให้พวกเจ้าอดทนเหน็ดเหนื่อยกันต่อไปอีกหน่อย จนกว่าเราจะหลุดพ้นจากพื้นที่นี้ไปได้อย่างสมบูรณ์ เราจะยังถือว่าปลอดภัยไม่ได้...”", "ภายใต้คำสั่งของลินน์ เหล่ากะลาสีต่างก็ระงับความตื่นเต้นไว้ชั่วคราวและกลับไปประจำตำแหน่งของตน ทว่าสิ่งที่ต่างไปจากเดิมก็คือ ยามที่พวกเขามองออกไปยังทะเลหมอกอันกว้างใหญ่ กลับไม่มีร่องรอยของความหวาดหวั่นอยู่ในแววตาอีกเลย", "“ข้าไม่เคยคิดเลยว่าในชีวิตนี้จะได้หนีรอดจาก ดวงตามรณะ ถึงสองครั้งสองครา”", "ลอดด์เอ่ยขึ้นด้วยความรู้สึกอัศจรรย์ใจ", "“ครั้งที่แล้วเป็นเพราะความช่วยเหลือของจอมเวทผู้ยิ่งใหญ่ท่านนั้นงั้นหรือ?”", "ลินน์เอ่ยถามด้วยความอยากรู้อยากเห็น เนื่องจากเขาสงสัยจากบทสนทนาก่อนหน้านี้แล้วว่า ลอดด์น่าจะเคยเผชิญกับอันตรายเช่นนี้มาแล้วมากกว่าหนึ่งครั้ง", "ลอดด์พยักหน้า ก่อนจะเริ่มบอกเล่าประสบการณ์ในอดีตของตนด้วยน้ำเสียงที่เจือไปด้วยอารมณ์ความรู้สึก", "เหตุการณ์นั้นเกิดขึ้นเมื่อสิบกว่าปีก่อน ตอนที่เขายังเป็นเพียงโจรสลัดธรรมดาๆ คนหนึ่ง ที่ใช้ชีวิตอยู่กับการเข่นฆ่าและปล้นสะดมกลางทะเล", "เนื่องจากพื้นที่ออกหากินของพวกเขาอยู่ใกล้กับทะเลหมอก พวกเขาจึงไม่ต้องกังวลว่าจะถูกกองเรือของจักรวรรดิไล่ล่า และหากจวนตัวจริงๆ พวกเขาก็แค่หนีเข้าไปซ่อนตัวในม่านหมอก ตราบใดที่พวกเขาไม่ล่วงล้ำเข้าไปลึกเกินไปและวนเวียนอยู่แค่รอบนอก พวกเขาก็จะไม่หลงทางจนหาทางกลับไม่ได้", "จนกระทั่งมีอยู่ครั้งหนึ่ง กลุ่มโจรสลัดของเขาได้เผชิญหน้ากับเรือลำใหญ่ที่กำลังแล่นออกมาจากทะเลหมอก...", "ตอนแรก พวกเขาคิดว่ามันเป็นเพียงเรือสินค้าที่หลงเข้าไปในทะเลหมอกและโชคดีหาทางกลับออกมาได้ พวกเขาจึงตัดสินใจอาศัยข้อได้เปรียบเรื่องกำลังคนบุกเข้าโจมตี แต่ใครจะคาดคิดว่าพวกเขากลับต้องเตะเข้ากับตอเหล็กอย่างจัง", "ผู้ที่ลงมือไม่ใช่เฮลรัม แต่เป็นพ่อมดเต็มตัวสองคนที่ติดตามเขามา ถึงกระนั้น กลุ่มโจรสลัดที่มีสมาชิกนับร้อยคนของพวกเขาก็ถูกกวาดล้างจนหมดสิ้น ส่วนขาขวาของลอดด์ก็ถูกแรงระเบิดที่หลงเหลือจากเวทลูกไฟซัดจนขาดกระจุย", "หากไม่ใช่เพราะพวกนั้นต้องการเก็บใครสักคนไว้รีดข้อมูลล่ะก็ เขาคงตายไปนานแล้ว", "ทว่ามันก็เป็นเพราะโอกาสนี้นี่เอง ที่ทำให้เขาสามารถพลิกโชคชะตาของตนเองได้อย่างสิ้นเชิง และกลายมาเป็นตัวแทนของจอมเวทผู้ยิ่งใหญ่เฮลรัมแล้วมาประจำอยู่ที่เมืองท่า...", "เมื่อได้ยินเช่นนี้ ลินน์ก็อดไม่ได้ที่จะปรายตามองลอดด์ พลางสงสัยว่าชายผู้นี้ไปทำอีท่าไหนถึงสามารถสลัดสถานะนักโทษ แล้วก้าวขึ้นมาเป็นที่โปรดปรานของจอมเวทผู้ยิ่งใหญ่ได้", "เขาเคยประจักษ์ถึงความซื่อสัตย์สุจริตของตาเฒ่าเจ้าเล่ห์ผู้นี้มาแล้ว แต่ก็ไม่ได้หมายความว่ามันไม่มีอยู่เลย...แต่ก็เรียกได้ว่ามีอยู่อย่างน้อยนิดเหลือเกิน หากเป็นเขา เขาคงไม่มีวันไว้ใจคนพรรค์นี้มากมายขนาดนั้นหรอก", "หรือว่าเขาถูกจับจุดอ่อนอะไรไว้ได้กันแน่?", "แม้จะคิดเช่นนั้นในใจ แต่ลินน์ก็ไม่ได้พูดขัดจังหวะเรื่องเล่าของลอดด์", "“หลังจากจัดการเรื่องราวที่เมืองท่าแล้วเสร็จ ข้าก็มีบุญวาสนาได้ติดตามท่านเฮลรัมไปยังดินแดนพ่อมด และในระหว่างการข้ามทะเลครั้งนั้นเองที่พวกเราได้เผชิญกับวังน้ำวนขนาดยักษ์”", "ลอดด์กล่าวด้วยความคะนึงหาอดีต", "แน่นอนว่า ดวงตามรณะ ในตอนนั้นไม่ได้น่าสะพรึงกลัวเท่ากับครั้งนี้ มันมีรัศมีครอบคลุมเพียงแค่ประมาณหนึ่งกิโลเมตรเท่านั้น และวิธีการของท่านเฮลรัมนั้นเรียบง่ายมาก เขาแช่แข็งวังน้ำวนทั้งลูกจนกลายเป็นน้ำแข็งไปเลย!", "ถึงกระนั้น เรื่องนี้ก็เพียงพอที่จะทำให้ลินน์รู้สึกประหลาดใจ เพราะดูเหมือนว่าพลังอำนาจที่จอมเวทผู้ยิ่งใหญ่ครอบครองนั้นจะเหนือล้ำกว่าที่เขาจินตนาการไว้มากนัก", "“จริงสิ จุดหมายปลายทางสุดท้ายในการเดินเรือของเราครั้งนี้ ก็คืออาณาเขตของท่านเฮลรัม...ท่าเรืออิเยตาขอรับ”", "ลอดด์พูดเสริม", "ลินน์พยักหน้ารับ ดูเหมือนว่าอีกไม่นาน เขาก็คงจะต้องไปรับมือกับจอมเวทผู้ยิ่งใหญ่ท่านนี้เสียแล้ว", "แต่เขาควรจะเผชิญหน้ากับการถูกตำหนิลงโทษของเฮลรัมอย่างไรดีล่ะ เรื่องนี้เขายังคิดไม่ออกเลย...", "ขณะที่ทั้งสองกำลังสนทนากัน เรือรบใบเรือที่อยู่ใต้ฝ่าเท้าของพวกเขาก็แล่นหลุดพ้นจากบริเวณของวังน้ำวนขนาดยักษ์ได้อย่างสมบูรณ์ และเหล่ากะลาสีบนเรือก็พากันโห่ร้องด้วยความยินดีดังกึกก้อง", "แม้ว่าพวกเขาจะสูญเสียอย่างหนักระหว่างฝ่าฟันดวงตามรณะ แต่คราวนี้ลอดด์กลับใจป้ำผิดปกติ เขาสั่งให้ทุกคนกินดื่มกันได้อย่างเต็มที่ และปล่อยให้ทุกคนได้เฉลิมฉลองกันให้สุดเหวี่ยงในค่ำคืนนี้!", "ทว่าชีวิตกลางทะเลนั้นช่างจืดชืดและน่าเบื่อหน่ายอย่างแท้จริง สิ่งที่เรียกว่าการเฉลิมฉลองก็เป็นเพียงแค่ทุกคนมานั่งล้อมวงกัน กอดถังเบียร์ซดอึกๆ คุยโวโอ้อวดถึงวีรกรรมความกล้าหาญในอดีตของตน และตกปลาทะเลกันอย่างชิลๆ", "บางทีโชคของพวกเขาอาจจะเริ่มดีขึ้นแล้วก็เป็นได้ เพราะในช่วงหลายวันหลังจากนั้น พวกเขาก็ไม่ได้เจอเรื่องน่าหงุดหงิดใจใดๆ อีกเลย ทั่วทั้งผืนทะเลมีเพียงหมอกสีขาวโพลน และหากไม่ใช่เพราะต้องคอยตามเข็มทิศอยู่ตลอด ลินน์คงคิดว่าพวกเขายังไม่ได้ขยับไปไหนจากจุดเดิมเลยด้วยซ้ำ", "นี่คือความน่ากลัวของทะเลหมอก หากจอมเวทผู้ยิ่งใหญ่อย่างเฮลรัมเกิดหลงทิศขึ้นมา ต่อให้พวกเขาสามารถรับมือกับวังน้ำวนขนาดยักษ์ได้ แต่พวกเขาก็คงต้องหลงทางอยู่ในน่านน้ำแถบนี้อย่างสมบูรณ์อยู่ดี", "ตลอดช่วงหลายวันที่รอนแรมกลางทะเล ลินน์ก็ไม่ได้อยู่เฉยๆ เช่นกัน นอกจากการฝึกฝนเวทมนตร์ตามปกติแล้ว เขายังใช้เวลาในแต่ละวันไปกับการซักถามข้อมูลเกี่ยวกับดินแดนพ่อมดจากจอห์นนี่ และในไม่ช้าเขาก็มีความเข้าใจโดยรวมเกี่ยวกับดินแดนอันศักดิ์สิทธิ์ของเหล่าพ่อมดแห่งนี้", "สิ่งแรกและสำคัญที่สุดก็คือทัศนคติที่มีต่อโลกภายนอก ซึ่งแบ่งออกเป็นสองฝ่ายคร่าวๆ", "ฝ่ายแรกคือฝ่ายอนุรักษ์นิยมที่ยึดติดอยู่กับวิถีทางเดิมๆ ซึ่งเป็นทางเลือกของพ่อมดส่วนใหญ่ในดินแดนพ่อมด พวกเขาเพิกเฉยต่อโลกภายนอกอย่างสิ้นเชิง มุ่งเน้นแต่เพียงการศึกษาเวทมนตร์และอยู่แต่ในอาณาเขตของตนเอง ถึงขั้นมองว่าผู้คนนอกดินแดนพ่อมดที่อยู่ภายใต้การปกครองของศาสนจักรนั้น เป็นพวกที่โง่เขลาเบาปัญญาอย่างเหลือเชื่อ", "สำหรับบรรดาพ่อมด เป้าหมายสูงสุดคือการไขความลับของสรรพสิ่งผ่านเวทมนตร์ เพื่อแสวงหาความจริงของโลก หาใช่การต่อสู้แย่งชิงอำนาจและดินแดนเหมือนพวกที่เรียกตัวเองว่ากษัตริย์และขุนนางไม่ ดังนั้น การศึกษาเวทมนตร์ไม่ว่าจะทำที่ไหนก็มีค่าเท่ากัน", "ท้ายที่สุดแล้ว ภายในดินแดนพ่อมดก็มีแหล่งสำรองแร่เวทมนตร์ที่อุดมสมบูรณ์อย่างยิ่ง และด้วยการถูกปิดกั้นโดยทะเลหมอก ศาสนจักรจึงไม่สามารถบุกรุกเข้ามาได้ และมันก็ไม่ใช่เรื่องง่ายที่พวกเขาจะเสี่ยงออกไปข้างนอกเช่นกัน ดังนั้นจึงมุ่งเน้นไปที่การพัฒนาทฤษฎีเวทมนตร์ต่างๆ ให้ก้าวหน้า แล้วค่อยกวาดล้างศัตรูให้สิ้นซากในคราวเดียวในอนาคตยังจะสมเหตุสมผลกว่า", "อีกฝ่ายหนึ่งคือฝ่ายหัวก้าวหน้า ซึ่งสนับสนุนการเผยแพร่พลังแห่งเวทมนตร์ออกสู่โลกภายนอก เช่นเดียวกับจอมเวทผู้ยิ่งใหญ่เฮลรัม พวกเขาเชื่อว่าแม้ดินแดนพ่อมดจะเป็นเกาะขนาดยักษ์ แต่วัสดุหายากหลายอย่างก็ไม่สามารถพึ่งพาตนเองได้ และจำนวนประชากรก็ยังน้อยเกินไป จึงมีความจำเป็นต้องดูดซับสายเลือดใหม่ๆ จากโลกภายนอกเข้ามาอย่างต่อเนื่อง", "แต่ข้อเสียนั้นก็ชัดเจนมาก เพราะยิ่งมีการติดต่อกับโลกภายนอกมากเท่าไร มันก็ยิ่งอันตรายมากขึ้นเท่านั้น การพึ่งพาเพียงแค่พลังที่สะสมอยู่ในดินแดนพ่อมดในปัจจุบัน ย่อมไม่เพียงพอที่จะต่อกรกับศาสนจักรได้ หากที่ตั้งของพวกเขาถูกเปิดเผยอย่างสมบูรณ์ ดินแดนพ่อมดอาจต้องเผชิญกับหายนะครั้งใหญ่ นี่คือเหตุผลพื้นฐานที่ทำให้พ่อมดส่วนใหญ่ฝักใฝ่ฝ่ายอนุรักษ์นิยม!", "สิ่งที่น่าสนใจก็คือ อาจารย์โครของพวกเขานั้นเป็นสมาชิกของฝ่ายหัวก้าวหน้า ซึ่งสังกัดอยู่ในสำนักเวทมนตร์ที่ก่อตั้งโดยจอมเวทผู้ยิ่งใหญ่เฮลรัม...", "“ถ้าอย่างนั้น ก็หมายความว่าการสื่อสารข่าวสารระหว่างดินแดนพ่อมดกับโลกภายนอกเป็นเรื่องที่ยากลำบากมากสินะ?”", "ลินน์ครุ่นคิดขณะที่เอ่ยออกมา", "“คงจะเป็นเช่นนั้น”", "จอห์นนี่พยักหน้า ในช่วงสี่ปีมานี้นางนั้นเคยไปเยือนดินแดนพ่อมดเพียงแค่ครั้งเดียว และความรู้ส่วนใหญ่ที่นางมีเกี่ยวกับที่นั่น ก็มาจากสิ่งที่โครเคยเล่าให้ฟังเป็นปกติ", "“หากเป็นเช่นนั้นจริงๆ...”", "ลินน์จ้องมองออกไปนอกช่องหน้าต่างเรืออย่างครุ่นคิด ราวกับพยายามจะมองให้ทะลุม่านหมอกสีขาวโพลนอันไร้ขอบเขต เพื่อทอดสายตาไปยังดินแดนพ่อมดที่ตั้งตระหง่านอยู่ลึกเข้าไปในมหาสมุทร", "เขาคิดออกแล้วว่าจะจัดการกับการถูกตำหนิลงโทษจากจอมเวทผู้ยิ่งใหญ่ผู้นั้นอย่างไรดี"]}, {"t": "สมาคมเวทมนตร์เร้นลับ", "c": ["นับตั้งแต่ก้าวขึ้นมาบนเรือรบใบเรือ ลินน์ก็เอาแต่ครุ่นคิดมาตลอดว่าเขาควรจะใช้สถานะใดในการเข้าสู่ดินแดนพ่อมด", "ลูกศิษย์ของโครอย่างนั้นหรือ?", "พ่อมดฝึกหัดที่เพิ่งจะฝึกฝนเวทมนตร์มาได้ไม่ถึงครึ่งปีเนี่ยนะ?", "หากเขาเลือกใช้สถานะนี้ เห็นได้ชัดว่าเขาจะต้องเผชิญกับความวุ่นวายนับไม่ถ้วนอย่างแน่นอน", "ทุกคนบนเรือต่างก็ได้ประจักษ์ถึงการร่ายเวทของเขามาแล้วด้วยตาตนเอง ยังไม่ต้องพูดถึงเหตุระเบิดที่เมืองท่า ซึ่งแน่นอนว่านั่นไม่ใช่สิ่งที่พ่อมดฝึกหัดธรรมดาๆ จะสามารถทำได้เลย", "ดังคำกล่าวที่ว่า ชายไร้ความผิดต้องมารับเคราะห์เพราะครอบครองของล้ำค่า ผู้ที่อ่อนแอทว่ากุมความลับอันยิ่งใหญ่ไว้ มักจะตกเป็นเป้าหมายของบรรดาผู้มีความทะเยอทะยานเสมอ", "สถานะของพวกเขาในตอนนี้ก็ถือว่ากลืนไม่เข้าคายไม่ออกอย่างยิ่ง การถูกศาสนจักรตามล่าอย่างไม่ลดละจนต้องหนีหัวซุกหัวซุนมายังดินแดนพ่อมดราวกับสุนัขไร้บ้าน หนำซ้ำยังเป็นต้นเหตุให้เส้นทางเดินเรือที่สำคัญยิ่งต้องถูกทำลายลง หากพวกเขาถูกควบคุมตัวไปสอบสวนทันทีที่ไปถึงท่าเรืออิเยตา มันก็ไม่ใช่เรื่องน่าแปลกใจเลยสักนิด", "ดังนั้น เพื่อทลายสถานการณ์อันน่าอึดอัดนี้ การเปลี่ยนแปลงจึงเป็นสิ่งจำเป็น", "เมื่อคิดได้เช่นนี้ ลินน์จึงหันไปหาจอห์นนี่และเอ่ยถาม", "“เจ้าพอจะรู้ไหมว่า ทำไมท่านอาจารย์ถึงยอมเสี่ยงที่จะถูกจับกุม เพื่อลอบเข้าไปในเมืองหลวงของดยุกแห่งอาณาเขตนอร์ดแลนด์?”", "“ท่านอาจารย์บอกว่า บุตรสาวคนรองของดยุกแห่งนอร์ดแลนด์มีพรสวรรค์ด้านเวทมนตร์ที่ไม่เลวเลยทีเดียว...”", "จอห์นนี่หยุดชะงักไปครู่หนึ่ง ก่อนจะพูดเสริมด้วยน้ำเสียงหนักแน่น", "“และเงินของเราก็เริ่มร่อยหรอลงทุกทีแล้วด้วย...”", "มุมปากของลินน์กระตุกเล็กน้อย เขารู้อยู่แล้วเชียวว่าการที่โครรับบรรดาลูกหลานขุนนางอย่างพวกตนเข้ามาเป็นศิษย์นั้นล้วนถูกคำนวณมาอย่างดี ทั้งหมดก็เพื่อเงินทุนสำหรับการวิจัยล้วนๆ...", "แน่นอนว่ามันยังมีเหตุผลประการที่สอง โดยทั่วไปแล้วพวกขุนนางมักจะรู้หนังสือและมีการศึกษาที่ดี จึงไม่จำเป็นต้องมานั่งสอนทุกอย่างใหม่ตั้งแต่ต้น", "การเรียนรู้เวทมนตร์ยังเป็นเรื่องที่ต้องใช้ค่าใช้จ่ายสูงมาก ยกตัวอย่างเช่น เถ้าเพลิงแดง ที่จำเป็นต้องใช้ในการร่ายเวทลูกไฟนั้น มีราคาสูงถึงหนึ่งเหรียญเงินกับอีกสามสิบเจ็ดเหรียญทองแดง ซึ่งมากพอที่จะจุนเจือครอบครัวยากจนได้ทั้งเดือนเลยทีเดียว", "เวทมนตร์ไม่ใช่สิ่งที่คนยากจนจะสามารถหาเงินมาเรียนได้หรอก!", "โครอาจจะมีความคิดที่อยากจะปั้นพ่อมดขุนนางขึ้นมาสักคนสองคนอยู่ลึกๆ ด้วยเช่นกัน แม้ว่าพ่อมดฝึกหัดเหล่านี้จะไม่ใช่ทายาทสายตรง แต่โอกาสนั้นก็สามารถสร้างขึ้นมาได้...", "ลินน์ไม่ได้ปล่อยให้ความคิดนั้นลอยเตลิดไปไกล เขาส่ายหน้าและเอ่ยแย้ง", "“พวกนั้นมันก็แค่ฉากบังหน้าเท่านั้นแหละ เจ้าเคยได้ยินชื่อ สมาคมเวทมนตร์เร้นลับ บ้างหรือไม่?”", "“มันคืออะไรล่ะนั่น?”", "จอห์นนี่ทำหน้าฉงน", "“มันคือองค์กรพ่อมดที่เร้นลับเอามากๆ ภายในจักรวรรดิเซกัส ซึ่งเป็นการรวมตัวกันของบุคคลสำคัญมากมาย ในช่วงเวลาที่ท่านอาจารย์พาข้าไปศึกษาเวทมนตร์ ข้าก็มีวาสนาได้ติดต่อกับสมาชิกของสมาคมเวทมนตร์เร้นลับอยู่บ้าง”", "ลินน์ปั้นน้ำเป็นตัวได้อย่างไหลลื่น", "วิธีการสอนลูกศิษย์ของโครนั้นค่อนข้างจะตามมีตามเกิด โดยปกติเขาจะให้พ่อมดฝึกหัดแต่ละคนคอยติดตามอยู่ข้างกายสักระยะหนึ่ง ก่อนจะปล่อยทิ้งไว้ในสถานที่ที่ค่อนข้างปลอดภัย เพื่อให้พวกเขาฝึกฝนเวทมนตร์ด้วยตนเอง", "นั่นหมายความว่า ในช่วงเวลาที่โครสอนเขาแบบตัวต่อตัวนั้น มีเพียงพวกเขาสองคนเท่านั้นที่รู้ว่าเกิดอะไรขึ้นบ้าง จอห์นนี่จึงไม่มีทางที่จะโต้แย้งคำพูดของเขาได้เลย", "“หลังจากได้ติดต่อกับสมาคมเวทมนตร์เร้นลับแล้ว ท่านอาจารย์ก็บอกข้าว่า ทฤษฎีงานวิจัยส่วนใหญ่ในดินแดนพ่อมดนั้นล้าหลังและตามยุคสมัยไม่ทันเสียแล้ว...", "ด้วยเหตุนี้ ท่านจึงได้รวบรวมต้นฉบับงานวิจัยลับสุดยอดขึ้นมาอย่างเงียบๆ โดยวางแผนที่จะไปพบกับเพื่อนร่วมงานจากสมาคมเวทมนตร์เร้นลับที่เมืองหลวงของอาณาเขตนอร์ดแลนด์ และหากปฏิบัติการครั้งนี้ล้มเหลว ท่านก็ต้องการให้ข้านำต้นฉบับงานวิจัยอันล้ำค่านี้กลับไปที่ดินแดนพ่อมดให้ได้ ไม่ว่าจะต้องแลกด้วยอะไรก็ตาม!”", "เพียงไม่กี่ประโยค ลินน์ก็สามารถเปลี่ยนสถานะของพวกเขาจากการเป็นผู้ลี้ภัยที่สิ้นหวัง ผู้ซึ่งกำลังหนีการตามล่าของศาสนจักรและเผลอไปทำลายเส้นทางเดินเรืออันสำคัญของดินแดนพ่อมดเข้าโดยบังเอิญ", "บัดนี้เขาได้กลายเป็นสายลับผู้มีความดีความชอบ ซึ่งปฏิบัติตามคำสั่งของอาจารย์โคร ฝ่าฟันอุปสรรคอย่างยากลำบากและหลบหลีกวงล้อมอันแน่นหนาของศาสนจักร จนสามารถนำส่งต้นฉบับงานวิจัยที่บรรจุข้อมูลสำคัญกลับคืนสู่ดินแดนพ่อมดได้ในท้ายที่สุด", "ตราบใดที่น้ำหนักของต้นฉบับงานวิจัยนี้มีมากพอที่จะสร้างข่าวอันสั่นสะเทือนวงการได้ ไม่เพียงแต่พวกเขาจะรอดพ้นจากการถูกไต่สวนเอาผิดเท่านั้น แต่บางทีพวกเขาอาจจะได้รับรางวัลตอบแทนอีกด้วยซ้ำ", "อย่างนั้นหรือ?", "จอห์นนี่ดูมีสีหน้างุนงง โครไม่เคยปริปากพูดถึงเรื่องสมาคมเวทมนตร์เร้นลับอะไรนี่ให้นางฟังเลยแม้แต่น้อย และสีหน้าของลินน์ในยามนี้ก็ดูไม่เหมือนกำลังพูดล้อเล่นอยู่เลยด้วย", "“ถ้าเช่นนั้น ท่านก็กำลังจะบอกว่า ท่านค้นพบวิธีเลื่อนระดับขึ้นเป็นพ่อมดเต็มตัวผ่านทางสมาคมเวทมนตร์เร้นลับอย่างนั้นหรือ?”", "จอห์นนี่เอ่ยถามอย่างครุ่นคิด", "“จะว่าอย่างนั้นก็ได้”", "ลินน์พยักหน้า", "“แต่สถานการณ์ของข้านั้นพิเศษกว่าเล็กน้อย วิธีนี้จึงไม่อาจนำไปใช้กับคนอื่นได้”", "เขาไม่ได้แก้ไขความเข้าใจผิดของนาง", "ในดินแดนพ่อมด มีเพียงพ่อมดเต็มตัวเท่านั้นที่มีสถานะและมีความสามารถพอที่จะปกป้องตัวเองได้ ซึ่งนั่นก็สอดคล้องกับการประเมินความแข็งแกร่งขั้นต่ำสุดที่ทุกคนบนเรือมีต่อตัวเขาพอดี", "หากเขาไม่ต้องการให้มีความวุ่นวายตามมา ไม่ว่าจะเต็มใจหรือไม่ก็ตาม เขาก็ต้องสวมรอยเป็นพ่อมดเต็มตัวเท่านั้น", "ขณะที่ตอบกลับ ลินน์ก็กำลังครุ่นคิดถึงเนื้อหาของ ต้นฉบับงานวิจัย นั้นอยู่ในหัวเช่นกัน", "จากคำบอกเล่าของจอห์นนี่ตลอดหลายวันที่ผ่านมา ความเข้าใจที่ดินแดนพ่อมดมีต่อโลกใบนี้ น่าจะอยู่ในระดับที่ใกล้เคียงกับยุโรปตะวันตกในช่วงยุคฟื้นฟูศิลปวิทยาการ", "เพียงแค่เขางัดเอาทฤษฎีที่ก้าวล้ำนำหน้ายุคสมัยออกมาสักนิด มันก็เพียงพอแล้วที่จะทำให้บรรดาพ่อมดเหล่านั้นอ้าปากค้างด้วยความตื่นตะลึง", "เนื่องจากการมีอยู่ของพลังเวทมนตร์ การแสวงหาความรู้ทางวิชาการของเหล่าพ่อมดจึงเอนเอียงไปในทิศทางใดทิศทางหนึ่งอย่างสุดโต่ง", "แม้ว่าพวกเขาจะมีความก้าวหน้าอย่างมากในศาสตร์ระดับจุลภาค จนถึงขั้นค้นพบแรงโน้มถ่วงได้ตั้งแต่เนิ่นๆ และสร้างเรือเล่นแร่แปรธาตุที่ขับเคลื่อนด้วยพลังงานไอน้ำได้สำเร็จ แต่ทว่าพ่อมดส่วนใหญ่กลับยังคงยึดติดอยู่กับทฤษฎีโลกเป็นศูนย์กลาง โดยเชื่อฝังหัวว่าผืนแผ่นดินที่อยู่ใต้ฝ่าเท้าของพวกตนคือศูนย์กลางของจักรวาลทั้งหมด", "พวกเขาถึงขั้นใช้ผืนแผ่นดินแห่งนี้เป็นจุดอ้างอิงในการวาดแผนผังเส้นโคจรของดาวเคราะห์แต่ละดวงภายในระบบสุริยะ และสร้างทฤษฎีดวงดาวที่เป็นเอกลักษณ์เฉพาะตัวขึ้นมา", "ลินน์เคยเห็นสิ่งที่เรียกว่าแผนผังเส้นโคจรดวงดาวในเอกสารงานวิจัยของโครมาแล้ว ทวีปทั้งทวีปถูกแขวนลอยอยู่ท่ามกลางความว่างเปล่า และถูกโอบล้อมไว้ด้วยบาเรียเวทมนตร์อันแข็งแกร่ง", "จากนั้น ดวงอาทิตย์และดวงจันทร์ก็จะโคจรรอบทวีปเป็นวงกลม ในขณะที่วัตถุบนท้องฟ้าอื่นๆ ก็จะเคลื่อนที่ไปตามเส้นทางที่กำหนด ก่อให้เกิดรูปแบบทางเรขาคณิตที่ซับซ้อนอย่างยิ่ง ซึ่งสอดคล้องกับภาพวาดที่ศาสนจักรพรรณนาไว้ในบทปฐมกาลของคัมภีร์ไบเบิลพอดิบพอดี", "อย่างไรก็ตาม หากนำวัตถุบนท้องฟ้าเหล่านี้มาจัดเรียงใหม่เสียเล็กน้อย และกำหนดให้ดาวฤกษ์เป็นจุดศูนย์กลาง ทุกสิ่งทุกอย่างก็จะกลับมาคุ้นตาอีกครั้ง", "เห็นได้ชัดว่าลัทธิเนรมิตนิยมของศาสนจักรนั้นเป็นเรื่องไร้สาระสิ้นดี แต่แน่นอนว่า เอลา คงไม่สับสนถึงขั้นจำไม่ได้หรอกมั้ง ว่าตัวเองเป็นคนสร้างทวีปหรือสร้างโลกทรงกลมกันแน่ จริงไหม?", "แน่นอนว่าความเชื่อที่ผิดเพี้ยนเช่นนี้ คือหลุมพรางที่แทบทุกอารยธรรมจะต้องสะดุดล้มในจุดใดจุดหนึ่ง พูดง่ายๆ ก็คือ สิ่งที่เรียกว่าสามัญสำนึกได้เข้ามาปิดกั้นกรอบความคิดไว้นั่นเอง...", "เมื่อแรกเกิด มนุษย์เรามักจะมองว่าตัวเองคือตัวเอกเสมอ โดยเชื่อว่าทุกสิ่งทุกอย่างดำรงอยู่เพียงเพื่อหมุนรอบตัวพวกเขา ผืนแผ่นดินใต้ฝ่าเท้าดูเหมือนจะเป็นตัวตนที่พิเศษไม่เหมือนใครในจักรวาลอันกว้างใหญ่ เป็นศูนย์กลางของสรรพสิ่ง", "ทว่าเมื่อศึกษาให้ลึกลงไป ความเป็นจริงอันโหดร้ายก็จะถูกเปิดเผย ไม่ใช่แค่ดาวเคราะห์เท่านั้น แต่แม้กระทั่งระบบดาวฤกษ์ทั้งระบบ ก็ล้วนเป็นเพียงเศษเสี้ยวที่ไร้ความหมายเมื่อเทียบกับภาพรวมของจักรวาลอันกว้างใหญ่ไพศาล", "การโจมตีทฤษฎีโลกแบนเพื่อใช้เป็นจุดเริ่มต้น ถือเป็นทางเลือกที่ดีอย่างไม่ต้องสงสัย เพราะมันไม่เพียงแต่น่าตื่นตะลึงเท่านั้น แต่ยังมีหลักฐานเชิงประจักษ์มากมายมารองรับเพื่อพิสูจน์ถึงความผิดพลาดของมันอีกด้วย การฉีกทลายพันธนาการแห่งสามัญสำนึกทิ้งไป จะทำให้บรรดาพ่อมดเหล่านั้นตระหนักถึงความจริงได้เองอย่างเป็นธรรมชาติ โดยที่เขาแทบจะไม่ต้องพูดอะไรให้มากความเลย", "ลินน์ยังวางแผนที่จะใช้วิธีนี้เพื่อหยั่งเชิงสภาพแวดล้อมทางวิทยาศาสตร์ของดินแดนพ่อมดด้วย เมื่อต้องเผชิญหน้ากับความกังขา มันก็เป็นเรื่องสำคัญอย่างยิ่งที่จะต้องรอดูว่าพวกนั้นจะตรวจสอบอย่างรอบคอบและยอมรับความจริง หรือจะเลือกใช้วิธีปราบปรามกระแสเสียงที่เบี่ยงเบนไปจากกระแสหลักอย่างรุนแรง ซึ่งสิ่งนี้จะเป็นตัวกำหนดทิศทางการกระทำในอนาคตของเขา!"]}, {"t": "นี่ก็คงเป็นแค่เรื่องปาหี่", "c": ["หลังจากตกลงแผนการขั้นต่อไปกันเสร็จสรรพ ลินน์ก็หันกลับมาหาจอห์นนี่อีกครั้งและเอ่ยขึ้น", "“แม้ว่าครั้งนี้เราจะหลบหนีจากการตามล่าของศาสนจักรมาได้สำเร็จ แต่เราก็ดันไปทำลายเส้นทางเดินเรือที่สำคัญมากเข้า เมื่อไปถึงท่าเรืออิเยตา เราอาจจะต้องเผชิญกับความยุ่งยากอยู่บ้าง ถึงตอนนั้นข้าจะเป็นคนอธิบายทุกอย่างเอง”", "จนกระทั่งตอนนั้นเอง จอห์นนี่ถึงเพิ่งตระหนักได้ถึงความร้ายแรงของสถานการณ์ และรู้สึกถึงความวิตกกังวลที่ถาโถมเข้ามา ทว่าเมื่อเห็นลินน์ยังคงมีท่าทีสงบเยือกเย็น นางก็รู้สึกโล่งใจขึ้นมาบ้าง", "ทั้งสองช่วยกันพิจารณาถึงปัญหาที่อาจจะต้องเผชิญเมื่อเข้าสู่ท่าเรืออิเยตา และปรึกษาหารือเกี่ยวกับวิธีรับมือคร่าวๆ จนกระทั่งลินน์ชะงักไปครู่หนึ่งแล้วเอ่ยขึ้นมาอีกครั้ง", "“จริงสิ...ตั้งแต่นี้ไป เจ้าควรเรียกข้าว่าลินน์ มันเป็นนามแฝงใหม่ที่ข้าเพิ่งคิดขึ้นมา ในเมื่อข้ากลายเป็นพ่อมดแล้ว ทางที่ดีก็ไม่ควรใช้ตัวตนในอดีตอีก เพื่อป้องกันไม่ให้ครอบครัวต้องเดือดร้อนในภายหลัง”", "...", "เรือรบใบเรือขนาดยักษ์รอนแรมอยู่กลางทะเลนานถึงครึ่งเดือน ก่อนจะหลุดพ้นออกมาจากม่านหมอกที่ปกคลุมในที่สุด และบัดนี้ โครงร่างของเกาะอันกว้างใหญ่สุดลูกหูลูกตาก็ปรากฏให้เห็นแล้ว", "“เร็วเข้า ออกแรงกันหน่อยพวกเราใกล้จะถึงแล้ว ท่าเรืออิเยตาอยู่ตรงหน้าเรานี่เอง!”", "ลอดด์ตะโกนลั่น และเหล่ากะลาสีทุกคนบนเรือก็กำลังทุ่มเทแรงกายอย่างเต็มที่ เพราะไม่มีใครอยากทนอยู่ในหมอกบ้าๆ นั่นอีกต่อไปแล้ว", "ในเวลาเดียวกัน ลินน์ก็กำลังยืนอยู่บนดาดฟ้าเรือ ทอดสายตามองออกไปเบื้องหน้า เมื่อเรือค่อยๆ แล่นเข้าใกล้ เมืองท่าที่อยู่ตรงหน้าก็ปรากฏชัดเจนขึ้นเรื่อยๆ", "อย่างไรก็ตาม เรือลาดตระเวนหลายลำที่ลอยลำอยู่ใกล้เคียงในผืนทะเลก็รีบเข้ามาตีวงล้อมพวกเขาทันที", "เรือเหล่านั้นมีรูปลักษณ์ที่แปลกประหลาดมาก โดยรวมแล้วดูค่อนข้างแบนราบ ไม่เห็นเสากระโดงเรือหรือใบเรือขนาดใหญ่ที่สูงตระหง่านเลย แต่กลับมีโครงสร้างคล้ายท่อตั้งตระหง่านอยู่บนหลังคาห้องโดยสาร พ่นควันออกมาเป็นจังหวะ", "ปู๊น-ปู๊น-ปู๊น", "เรือกลไฟงั้นหรือ?", "ลินน์มองด้วยความสนใจอย่างยิ่ง และเมื่อเห็นความอยากรู้อยากเห็นของเขา ลอดด์ก็เอ่ยอธิบาย", "“เรือเล่นแร่แปรธาตุเหล่านี้เป็นผลผลิตอันเป็นเอกลักษณ์ของดินแดนพ่อมด พวกมันเร็วกว่าเรือรบใบเรือที่เรากำลังนั่งอยู่มากนัก แถมยังแทบไม่ได้รับผลกระทบจากพายุลมแรงด้วย...”", "ขณะที่เขาอธิบาย เรือรบใบเรือก็ค่อยๆ เข้าเทียบท่าภายใต้การคุ้มกันของเรือเล่นแร่แปรธาตุหลายลำ", "เหล่ากะลาสีทอดสมอและพาดไม้กระดานลงอย่างชำนาญ และชายคนหนึ่งในชุดคลุมสีน้ำเงิน ซึ่งเป็นพ่อมดเต็มตัว ก็ยืนรออยู่ริมท่าเรือแล้ว", "“ไม่ได้เจอกันนานเลยนะ ธีโอดอร์ สหายเก่าของข้า!”", "ลอดด์ก้าวฉับๆ ลงจากเรือและสวมกอดพ่อมดผู้นั้นอย่างอบอุ่น จากนั้นก็หันกลับมาแนะนำทั้งสองคนที่เดินตามหลังมา", "“นี่คือท่านลินน์ และแม่นางจอห์นนี่!”", "“หายากนะเนี่ย นานมากแล้วที่ไม่มีพ่อมดจากโลกภายนอกย่างกรายเข้ามาที่นี่”", "สายตาพินิจพิเคราะห์ของธีโอดอร์กวาดมองทั้งสองคนอยู่ครู่หนึ่ง ก่อนที่เขาจะเอ่ยขึ้นในที่สุด", "“แต่ก็...ยินดีต้อนรับสู่ท่าเรืออิเยตา ข้าเชื่อว่าอีกไม่นานพวกท่านจะหลงรักสถานที่แห่งนี้!”", "“ขอบคุณสำหรับคำกล่าวต้อนรับ ท่านธีโอดอร์!”", "ลินน์ตอบกลับด้วยท่าทีที่ไม่นอบน้อมและไม่เย่อหยิ่งจนเกินไป ในขณะที่จอห์นนี่ย่อเข่าถอนสายบัวทำความเคารพชายผู้นั้นอย่างนอบน้อม", "ธีโอดอร์กล่าวทักทายตอบพอเป็นพิธี จากนั้นก็หันกลับไปมองลอดด์", "“ว่าแต่ ตาเฒ่าขาเป๋ ทำไมปีนี้เจ้าถึงมาด้วยตัวเองล่ะ? แถมยังนั่งเรือรบใบเรือมาเสียด้วย เกิดเรื่องอะไรขึ้นงั้นหรือ?”", "หากไม่ใช่เพราะเขาใช้แว่นตาเล่นแร่แปรธาตุส่องดูจนเห็นลอดด์ยืนอยู่บนดาดฟ้าเรือ ปืนใหญ่คริสตัลเวทที่ท่าเรือคงจะถูกจุดระเบิดเตรียมยิงไปนานแล้ว", "“ข้าเกรงว่าสถานการณ์มันจะซับซ้อนกว่าที่เจ้าคิดไว้นัก พวกเราจำเป็นต้องเข้าพบท่านเฮลรัมเป็นการส่วนตัวเพื่ออธิบายเรื่องทั้งหมด!”", "ลอดด์กล่าวด้วยน้ำเสียงเคร่งเครียดอย่างยิ่ง", "เมื่อได้ยินลอดด์พูดด้วยน้ำเสียงขึงขังเช่นนั้น รอยยิ้มก็เลือนหายไปจากใบหน้าของธีโอดอร์ในทันที เขาขมวดคิ้ว", "“ตอนนี้ท่านเฮลรัมไม่ได้อยู่ที่สถาบัน ข้าจะพาพวกเจ้าไปหาเขาเอง”", "ลอดด์รู้ขั้นตอนดี จึงกำชับเหล่ากะลาสีทุกคนเป็นพิเศษให้รออยู่บนเรือ เพื่อรับการตรวจค้นก่อนจะได้รับอนุญาตให้ลงมา", "เนื่องจากระยะทางไม่ได้ไกลนัก คณะเดินทางจึงไม่ได้นั่งรถม้า แต่เลือกที่จะเดินตามธีโอดอร์มุ่งหน้าเข้าสู่ตัวเมืองชั้นใน", "ตัวเมืองชั้นในของท่าเรืออิเยตานั้น เป็นภาพที่แตกต่างจากภายในจักรวรรดิเซกัสอย่างสิ้นเชิง ถนนลาดยางสีดำมะเมื่อมนั้นสะอาดสะอ้านและราบเรียบ ถนนหนทางกว้างขวางพอที่จะให้รถม้าสามคันแข่งกันได้อย่างสบายๆ อาคารบ้านเรือนที่มีกำแพงสีขาวและหลังคาสีแดงเรียงราย ถูกจัดวางอย่างเป็นระเบียบเรียบร้อย แม้แต่ต้นไม้และดอกไม้ริมทางก็ยังถูกตัดแต่งอย่างสมบูรณ์แบบ แผ่ซ่านกลิ่นอายของสถาปัตยกรรมตะวันตกแบบคลาสสิกอย่างเข้มข้น...", "แม้ว่าจอห์นนี่และลอดด์จะเคยมาเยือนดินแดนพ่อมดมาก่อนแล้ว แต่พวกเขาก็ยังคงรู้สึกตื่นตาตื่นใจอย่างมากกับการมาเยือนในครั้งนี้", "ลินน์แทบจะคิดว่าเขาทะลุมิติข้ามเวลามาอีกรอบแล้ว หากผู้คนในจักรวรรดิเซกัสยังคงใช้ชีวิตอยู่ในยุคกลางอันโหดร้าย ดินแดนพ่อมดก็คงก้าวกระโดดไปสู่ศตวรรษที่สิบเจ็ดหรือสิบแปดแล้ว", "“โอ้ ดูนั่นสิ พวกท่านคิดว่าอย่างไร งดงามใช่ไหมล่ะ?”", "ขณะเดินไปตามทางเดินหินที่ทอดยาวลึกเข้าไปในตัวเมือง ธีโอดอร์ก็ชี้ไปยังน้ำพุขนาดใหญ่และกลุ่มรูปปั้นรูปร่างแปลกตานานาชนิดภายในเมือง พร้อมเอ่ยแนะนำด้วยความภาคภูมิใจ", "“ท่าเรืออิเยตาทั้งหมดนี้ถูกออกแบบโดยท่านราฟาเอล เขานั้นเป็นทั้งสถาปนิกและปรมาจารย์ด้านประติมากรรมที่โด่งดังที่สุดในดินแดนพ่อมด”", "หมอนั่นต้องเป็นโรคย้ำคิดย้ำทำแหงๆ... ลินน์คิดในใจ", "อาคารทุกหลังในท่าเรืออิเยตาถูกจัดวางอย่างเป็นระเบียบเรียบร้อยจนพิถีพิถันเกินพอดี โดยไม่มีความแตกต่างระหว่างฝั่งซ้ายและฝั่งขวาเลยแม้แต่น้อย หากมีแปลงดอกไม้ประดับอยู่ฝั่งหนึ่ง ก็จะต้องมีแปลงดอกไม้ที่หน้าตาเหมือนกันเปี๊ยบประดับอยู่อีกฝั่งหนึ่งอย่างแน่นอน!", "อย่างไรก็ตาม เมื่อได้เห็นทัศนียภาพของเมือง ลินน์ก็เข้าใจแล้วว่าเหตุใดพ่อมดส่วนใหญ่จึงอยากอาศัยอยู่ในดินแดนพ่อมดมากกว่า เพราะหลังจากได้สัมผัสกับสภาพแวดล้อมเช่นนี้ คงไม่มีใครอยากกลับไปอยู่ในจักรวรรดิเซกัสที่ทั้งสกปรก วุ่นวาย และเหม็นคลุ้งอีกต่อไป", "ตลอดเส้นทาง ธีโอดอร์ได้แนะนำทุกสิ่งทุกอย่างเกี่ยวกับท่าเรืออิเยตาให้คณะเดินทางฟังด้วยน้ำเสียงโอ้อวด ตั้งแต่พื้นผิวถนนไปจนถึงการออกแบบสถาปัตยกรรม ลามไปจนถึงวัสดุที่ใช้ทำรูปปั้นแต่ละชิ้น จากนั้นเขาก็มองดูสีหน้าประหลาดใจและตื่นตะลึงของพวกเขาด้วยความเพลิดเพลิน", "ทุกครั้งที่มีคนจากนอกดินแดนพ่อมดเดินทางมาที่นี่ ความรู้สึกเหนือกว่าอย่างแรงกล้าก็จะผุดขึ้นมาในใจของเขาเสมอ", "ลินน์กวาดสายตามองไปรอบๆ เมืองท่าอันเป็นเอกลักษณ์แห่งนี้ด้วยความสนใจอย่างยิ่ง สายตาของเขาจับจ้องไปตามอาคารแต่ละหลัง รูปแบบสถาปัตยกรรมโบราณเช่นนี้ เขาเคยเห็นแต่ในภาพถ่ายขาวดำที่ถูกเก็บไว้ในหอจดหมายเท่านั้น และเขาก็อดไม่ได้ที่จะรู้สึกสงสัยเล็กน้อย คนบนถนนมันน้อยเกินไปหรือเปล่า?", "หลังจากเข้าสู่ตัวเมืองชั้นใน จำนวนผู้คนที่พวกเขามองเห็นรวมกันแล้วยังไม่ถึงร้อยคนเลยด้วยซ้ำ", "ขณะที่เขากำลังคิดถึงเรื่องนี้ จู่ๆ เสียงอึกทึกครึกโครมก็ดังมาจากเบื้องหน้า ลินน์มองไปข้างหน้าและพบว่า จัตุรัสกลางเมืองขนาดใหญ่แออัดไปด้วยผู้คน และดูเหมือนว่ากำลังจะมีคนหลั่งไหลเข้ามาเพิ่มขึ้นเรื่อยๆ", "“วันนี้มีงานเทศกาลอะไรงั้นหรือ?”", "ลินน์เอ่ยถามด้วยความสงสัยเล็กน้อย", "ธีโอดอร์อ้าปากค้าง ลังเลอยู่ครู่หนึ่ง ก่อนจะส่ายหน้าในที่สุดด้วยท่าทีจนปัญญา", "“ก็ไม่เชิงหรอก มันก็คงเป็นแค่เรื่องปาหี่เท่านั้นแหละ!”"]}, {"t": "เด็กสาวผู้ปรารถนาจะโบยบินสู่ท้องนภา", "c": ["“ต้องเป็นพวกฮาล์ฟลิงนั่นที่คิดประดิษฐ์ของแปลกๆ ขึ้นมาอีกแน่เลย”", "ธีโอดอร์ถอนหายใจ ก่อนจะเดินนำคณะแหวกฝูงชนที่เบียดเสียดเข้าไป", "ลินน์ตระหนักถึงสถานะอันสูงส่งของพ่อมดได้อย่างรวดเร็ว เมื่อชาวเมืองท่าที่ยืนเบียดเสียดกันแน่นขนัด พอเห็นตราสัญลักษณ์บนหน้าอกของธีโอดอร์ ก็พากันหลีกทางให้โดยสมัครใจ ทำให้พวกเขาสามารถแทรกตัวไปอยู่แถวหน้าได้อย่างรวดเร็ว และมองเห็นภาพเหตุการณ์ ณ ใจกลางจัตุรัสได้อย่างชัดเจน", "ณ ตรงนั้นมี เครื่องจักรบินได้ขนาดยักษ์ สูงประมาณสองเมตรและมีปีกกว้างเกือบเจ็ดเมตร ตั้งตระหง่านอยู่บนลานหินกรวดที่ปูไว้อย่างราบเรียบ", "ไม่สิ การเรียกมันว่าเครื่องจักรบินได้อาจจะไม่ถูกต้องนัก เพราะมันดูหยาบและเรียบง่ายเกินไป มันเป็นเพียงแค่โครงไม้และเหล็กที่ถูกมัดไว้ด้วยเชือกหนังอย่างแน่นหนา และมีผ้าใบที่ทำจากหนังอูฐขึงคลุมทับโครงสร้างนั้นไว้อีกชั้นหนึ่ง", "มันดูราวกับสัตว์ประหลาดที่หมอบขดตัวอยู่บนพื้น พร้อมที่จะกระพือปีกบิน เรียกเสียงฮือฮาจากฝูงชนที่มุงดูอยู่รอบๆ อย่างไม่ขาดสาย", "“มันใหญ่มากเลย!”", "จอห์นนี่มองเครื่องจักรบินได้ด้วยความตื่นตาตื่นใจและตกตะลึงอย่างยิ่ง", "“นี่คืออุปกรณ์เล่นแร่แปรธาตุชิ้นใหม่ที่ถูกคิดค้นขึ้นในดินแดนพ่อมดงั้นหรือ?”", "“ย่อมไม่ใช่แน่!”", "ธีโอดอร์ตบหน้าผากตัวเองดังฉาด หันหน้าหนีไม่กล้ามอง หวังเพียงว่าจะไม่ต้องขายหน้าต่อหน้าคนนอกไปมากกว่านี้", "ทว่าลินน์กลับพบว่ามันน่าสนใจมาก เขาไม่คาดคิดเลยว่าจะได้เห็นภาพที่แปลกประหลาดเช่นนี้ทันทีที่ก้าวเข้าสู่ท่าเรืออิเยตา", "พวกเขากำลังพยายามจะทดสอบบินมันงั้นหรือ?", "ลินน์กวาดสายตามองแวบเดียวก็สังเกตเห็นใบพัดที่ห้อยอยู่ใต้ปีกคู่แบบสองชั้น", "แต่การใช้เพียงแค่พลังงานไอน้ำ...ผลลัพธ์ที่ได้ดูน่าสงสัยอยู่นะ...", "แม้จะคิดเช่นนั้น แต่ลินน์ก็ยังคงจ้องมองเครื่องจักรบินได้อย่างใจจดใจจ่อ ทุกความพยายามของมนุษย์ที่จะโบยบินขึ้นสู่ท้องฟ้านั้นล้วนคู่ควรแก่การยกย่อง โดยเฉพาะอย่างยิ่งในโลกที่มีเวทมนตร์ดำรงอยู่ ซึ่งทำให้ไม่มีสิ่งใดที่เป็นไปไม่ได้", "“ฮึบบบ”", "ขณะที่เขากำลังครุ่นคิด ลินน์ก็เห็นร่างเล็กๆ ร่างหนึ่งปีนป่ายขึ้นไปบนเครื่องจักรบินได้อย่างคล่องแคล่ว นางมัดรัดข้อต่อชิ้นสุดท้ายด้วยเชือกหนังจนแน่นหนา ก่อนจะรีบหย่อนตัวลงนั่งในห้องนักบิน", "นางดูเหมือนจะมีอายุเพียงแค่แปดหรือเก้าขวบ สว
