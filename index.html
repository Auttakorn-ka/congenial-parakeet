จะต้องกลายเป็นพ่อมดฮาล์ฟลิงคนแรกได้อย่างแน่นอน...”", "ทว่าพวกเขาเฉลิมฉลองกันเร็วเกินไป หลังจากที่เครื่องจักรบินได้ลอยทะยานขึ้นฟ้าด้วยแรงขับเคลื่อน ปัญหามากมายก็ถูกเปิดเผยออกมาให้เห็นในพริบตา", "ขณะที่ลิเดียกำลังปรับทิศทางเพื่อเฉลิมฉลองการเทคออฟที่ประสบความสำเร็จ โดยวางแผนที่จะบินวนรอบท่าเรืออิเยตา นางก็ค้นพบภายในเวลาเพียงไม่กี่วินาทีว่า เครื่องจักรบินได้ของนางสูญเสียความสมดุลและกำลังร่วงหล่นลงมาอย่างรวดเร็ว", "ด้วยความตื่นตระหนก ลิเดียรีบดึงคันบังคับ พยายามควบคุมให้ปีกกระพือขึ้นลงเหมือนนกเพื่อสร้างแรงยก แต่มันกลับทำให้สถานการณ์เลวร้ายยิ่งกว่าเดิม ทิศทางการบินของเครื่องจักรบินได้เริ่มผิดเพี้ยนไปในทันที มันดูราวกับมังกรที่ถูกโจมตีด้วยเวทมนตร์ ก่อนจะหมุนควงสว่านร่วงดิ่งลงมาจากกลางอากาศ..."]}, {"t": "จอมเวทผู้ยิ่งใหญ่เฮลรัม", "c": ["“ข้าว่าแล้วเชียวว่ามันต้องลงเอยแบบนี้”", "เมื่อเห็นเครื่องจักรบินได้หมุนควงร่วงหล่นลงมาจากท้องฟ้า ธีโอดอร์ก็อดไม่ได้ที่จะถอนหายใจด้วยความโล่งอก ก่อนจะบ่นพึมพำออกมาเบาๆ", "“ท่านเฮลรัมไม่ควรตามใจนางขนาดนี้เลยจริงๆ...”", "ลินน์เพ่งสายตามองขึ้นไปบนท้องฟ้า เครื่องจักรบินได้ขนาดยักษ์กำลังแกว่งโคลงเคลงอยู่กลางอากาศ และร่วงดิ่งลงมาในทิศทางของจัตุรัส", "ทว่าใบหน้าของผู้คนที่มารวมตัวกันในจัตุรัสกลับไม่มีร่องรอยของความตื่นตระหนกเลยแม้แต่น้อย ลินน์จึงล้มเลิกความตั้งใจที่จะเข้าไปแทรกแซง โดยให้เหตุผลกับตัวเองว่า คงมีคนคอยรับหน้าที่จัดการกับความวุ่นวายนี้อยู่แล้ว", "และก็เป็นอย่างที่คิด ทันทีที่เครื่องจักรบินได้กำลังจะพุ่งชนพื้น พ่อมดหลายคนที่อยู่ตรงจัตุรัสก็ลงมือพร้อมกัน พวกเขาร่ายเวทชะลอการร่วงหล่น เพื่อประคองให้เครื่องจักรลงจอดกลางจัตุรัสได้อย่างนุ่มนวล แม้ว่าปีกที่พังยับเยินของมันจะหลุดลุ่ยไปนานแล้ว และผ้าใบหนังอูฐที่เคยขึงคลุมไว้ก็ถูกลมพัดปลิวหายไปไหนต่อไหนแล้วก็ตาม", "“มันบินได้แค่แป๊บเดียวจริงๆ ด้วย...”", "จอห์นนี่เฝ้ามองกระบวนการทั้งหมดตั้งแต่ตอนที่เครื่องจักรบินได้เทคออฟจนถึงตอนลงจอด จากนั้นก็หันไปมองลินน์ด้วยความสงสัยใคร่รู้อย่างยิ่งว่าเขารู้ล่วงหน้าอย่างแม่นยำขนาดนี้ได้อย่างไร", "“การพึ่งพาแค่พลังงานไอน้ำนั้นไม่เพียงพอที่จะรักษาระดับการบินได้ และการออกแบบโครงสร้างทั้งหมดก็ยังผิดหลักอากาศพลศาสตร์อีกด้วย...การร่วงหล่นจึงเป็นเรื่องที่หลีกเลี่ยงไม่ได้อยู่แล้ว”", "ลินน์ส่ายหน้าและตอบกลับเสียงแผ่ว เขามองเห็นปัญหาของเครื่องจักรชิ้นนี้ทะลุปรุโปร่งได้ตั้งแต่แวบแรกแล้ว", "แต่เด็กสาวเผ่าฮาล์ฟลิงที่ชื่อลิเดียผู้นี้ สามารถสร้างเครื่องจักรบินได้ขึ้นมาจากวัสดุที่แสนจะพื้นๆ แถมยังทำให้มันทำงานได้ นางถือเป็นอัจฉริยะด้านวิศวกรรมอย่างไม่ต้องสงสัย", "การเลียนแบบนกที่กระพือปีกเพื่อสร้างแรงยกนั้นก็ไม่ใช่ไอเดียที่แย่ มันแค่เป็นการด่วนสรุปเกินไปหน่อย เพราะยังเป็นเพียงการลอกเลียนแบบรูปทรงพื้นฐาน โดยปราศจากความเข้าใจในหลักการทำงานที่แท้จริง", "โดยรวมแล้ว...ประวัติศาสตร์ได้พิสูจน์ให้เห็นแล้วว่าเครื่องบินพลังงานไอน้ำนั้นไม่มีอนาคต มันขาดกำลังขับเคลื่อนที่มากพอจะบินให้สูงหรือไกลได้...", "“เจ้ากำลังจะบอกว่า หากเปลี่ยนแหล่งพลังงานและออกแบบโครงสร้างใหม่...เออ...เครื่องจักรบินได้ลำนี้ ก็จะสามารถโบยบินข้ามท้องนภาได้อย่างอิสระโดยไม่ต้องพึ่งพาพลังเวทเลยอย่างนั้นหรือ?”", "ขณะที่ทั้งสองกำลังสนทนากัน จู่ๆ ก็มีน้ำเสียงนุ่มนวลดังขึ้นจากเบื้องหลัง", "ลินน์หันกลับไป และพบกับชายชราผู้หนึ่งสวมชุดคลุมสีดำและหมวกทรงกลม ดูเหมือนจะมีอายุราวหกสิบหรือเจ็ดสิบปี ไว้หนวดเคราที่ถูกตัดแต่งอย่างเป็นระเบียบ นัยน์ตาของเขาเป็นประกายวิบวับด้วยแววตาที่ยากจะคาดเดา", "ทันทีที่เห็นชายผู้นี้ ธีโอดอร์ก็รีบค้อมตัวทำความเคารพทันที", "“ท่านเฮลรัม!”", "ผู้มาใหม่ไม่ใช่ใครอื่น นอกจากผู้ปกครองแห่งท่าเรืออิเยตา...เฮลรัม!", "ในฐานะพ่อมดที่ได้รับการยกย่องอย่างสูง การแต่งกายของเขากลับดูเรียบง่ายเสียจนชาวเมืองที่อยู่รอบๆ จำเขาไม่ได้ในแวบแรก", "“เป็นเกียรติอย่างยิ่งที่ได้พบท่าน ท่านเฮลรัม”", "ลินน์ค้อมศีรษะลงด้วยความเคารพ ทำตามธรรมเนียมท้องถิ่นเพื่อแสดงความคารวะต่อจอมเวทผู้ยิ่งใหญ่ แต่แทนที่เขาจะตอบคำถามนั้นตรงๆ เขากลับถามสวนด้วยคำถามของตัวเอง", "“เรือเล่นแร่แปรธาตุที่ใช้ไอน้ำเป็นแหล่งพลังงาน ก็สามารถแล่นในทะเลได้โดยไม่ต้องพึ่งพาเวทมนตร์ไม่ใช่หรือขอรับ? แล้วทำไมการบินถึงจะเป็นแบบนั้นบ้างไม่ได้ล่ะ?”", "เฮลรัมเลิกคิ้วขึ้น เขารู้สึกว่าคำถามนี้น่าสนใจทีเดียว ในขณะที่ธีโอดอร์ซึ่งใจร้อนกว่า รีบพูดโพล่งขึ้นมา", "“ใครบอกเจ้าว่าเรือเล่นแร่แปรธาตุพวกนั้นไม่มีส่วนเกี่ยวข้องกับเวทมนตร์? ดูเหมือนว่าวิชาเล่นแร่แปรธาตุของเจ้าคงจะไม่ค่อยได้เรื่องสินะ...”", "ขณะที่พูด ธีโอดอร์ก็อธิบายให้ลินน์ ผู้เป็นเสมือนคนบ้านนอกที่มาจากโลกภายนอก ได้เบิกเนตรถึงวิธีการทำงานสองรูปแบบของเรือเล่นแร่แปรธาตุ", "ไม่ว่าจะเป็นการให้พ่อมดเต็มตัวเป็นคนควบคุมเครื่องยนต์เล่นแร่แปรธาตุ หรือการใช้หินเวทมนตร์เพื่อส่งพลังงานให้กับค่ายกลเล่นแร่แปรธาตุที่สอดคล้องกัน", "นี่หมายความว่าไอน้ำถูกสร้างขึ้นโดยใช้พลังเวทอย่างนั้นหรือ?", "ลินน์รู้สึกอับอายขายหน้า เขาไม่ได้เผื่อใจคิดเลยว่าเรือเล่นแร่แปรธาตุพวกนั้นไม่ได้ขับเคลื่อนด้วยการเผาถ่านหิน", "นี่มันตำนานร้อยกิโลเมตรต่อลิตรของการซด...พลังเวทของพ่อมดหรือยังไงกัน?", "อันที่จริง เฮลรัมมองลินน์ด้วยสายตาประหลาดใจเล็กน้อย เมื่อยี่สิบกว่าปีที่แล้ว ตอนที่เครื่องจักรไอน้ำเพิ่งถูกประดิษฐ์ขึ้น มันก็ไม่ได้ต้องการการสูญเสียพลังเวทใดๆ เลยจริงๆ หลังจากนั้น การใช้หินเวทมนตร์เป็นแหล่งพลังงานก็แค่ทำไปเพราะมันสะดวกกว่าเท่านั้น", "ในความเป็นจริง แม้แต่เครื่องจักรไอน้ำที่ติดตั้งอยู่บนเครื่องจักรบินได้ของลิเดียก็ไม่ได้ใช้เวทมนตร์เช่นกัน แต่ภายในท่าเรืออิเยตา มีพ่อมดรุ่นเยาว์น้อยคนนักที่จะยอมศึกษาเจาะลึกถึงหลักการพื้นฐานของสมการเล่นแร่แปรธาตุเหล่านี้", "“ท่านเฮลรัม”", "ขณะที่พวกเขากำลังคุยกัน ลิเดียที่ได้รับความช่วยเหลือจากฮาล์ฟลิงหลายคน ก็สามารถดึงตัวเองหลุดออกมาจากห้องนักบินที่บิดเบี้ยวได้แล้ว แขนเสื้อคลุมของนางฉีกขาด ทว่าเด็กสาวกลับไม่สนใจมันเลย นางรีบวิ่งหน้าตั้งเข้าไปหาเฮลรัม และเอ่ยถามอย่างกระตือรือร้น", "“ข้าทำสำเร็จไหม? เมื่อกี้ข้าบินได้จริงๆ นะ ท่านเห็นหรือเปล่า?”", "“นั่นคงจะนับว่าเป็นความสำเร็จไม่ได้หรอก มันก็แค่...”", "เฮลรัมหยุดชะงักไปครู่หนึ่ง ก่อนจะพูดย้อนคำพูดของลินน์อย่างหยอกล้อ", "“การบินได้แค่แป๊บเดียวเท่านั้นแหละ!”", "ใบหน้าของลิเดียสลดลงในทันที ราวกับนกกระจอกเทศที่พ่ายแพ้ จากนั้นนางก็รีบอ้างว่าครั้งนี้นางมีความคืบหน้าครั้งใหญ่แล้ว และถ้าปรับแต่งอีกแค่นิดเดียว เจ้านี่จะต้องบินได้อย่างสมบูรณ์แบบแน่ๆ", "เฮลรัมรับฟังคำอธิบายและคำตัดพ้อของลิเดียอย่างอดทน ก่อนจะหันกลับมาหาพวกลินน์อีกครั้ง", "“ดูเหมือนว่าพวกเจ้าจะมีเรื่องอยากจะคุยกับข้าสินะ เอาเป็นว่า ธีโอดอร์ ทำไมเจ้าไม่พาแขกของเราไปที่สถาบันก่อนล่ะ แล้วเดี๋ยวข้าจะตามไป!”", "ธีโอดอร์พยักหน้า เพราะที่นี่ไม่ใช่สถานที่ที่เหมาะจะคุยธุระจริงๆ นั่นแหละ แต่ก่อนที่เขาจะหันหลังเดินจากไป เสียงของเฮลรัมก็ดังขึ้นมาอีกครั้ง", "“นอกจากนี้ ธีโอดอร์ หากเจ้ามีปัญหาอะไรกับข้า เจ้าสามารถพูดออกมาตรงๆ ได้เลยนะ”", "เห็นได้ชัดว่า เฮลรัมไม่ได้ยินแค่คำวิจารณ์ของลินน์เกี่ยวกับเครื่องจักรบินได้เท่านั้น แต่ยังได้ยินเสียงบ่นอุบอิบของเขาอีกด้วย", "“ไม่ขอรับ ท่านปรมาจารย์ สิ่งที่ข้าหมายถึงก็คือ การที่ลิเดียมาทำการทดลองบินในจัตุรัสแบบนี้มันอันตรายเกินไป หากเกิดอุบัติเหตุขึ้นมา ไม่เพียงแต่จะทำอันตรายต่อชาวเมืองได้ง่ายๆ แต่ยัง...แต่ยัง...”", "สีหน้าของธีโอดอร์พลันแข็งค้าง เขาพยายามอธิบายอย่างลุกลี้ลุกลน ทว่าเฮลรัมกลับโบกมือตัดบท", "“เอาล่ะ ข้าเข้าใจความหมายของเจ้าแล้ว คราวหน้าข้าจะกางบาเรียเวทมนตร์ไว้ก็แล้วกัน ความกังวลของเจ้าก็ไม่ใช่เรื่องไร้สาระเสียทีเดียว”", "เมื่อเครื่องจักรบินได้ร่วงกระแทกพื้น ความวุ่นวายในจัตุรัสก็สิ้นสุดลง และชาวเมืองที่มารวมตัวกันด้วยความอยากรู้อยากเห็นก็เริ่มแยกย้ายกันไป ท่ามกลางเสียงพูดคุยซุบซิบ", "ธีโอดอร์ซึ่งรู้สึกหดหู่ใจอยู่บ้าง ก็ได้นำทางคณะเดินทางมุ่งหน้าไปยังสถาบันเวทมนตร์อิเยตาที่อยู่ใกล้เคียง", "มันเป็นกลุ่มอาคารขนาดใหญ่ที่ตั้งอยู่ใจกลางเมือง มียอดแหลมสูงตระหง่าน กำแพงสีดำทึบหนา และอาคารที่โดดเด่นสะดุดตาที่สุด ซึ่งสามารถมองเห็นได้แม้จะอยู่ภายนอกท่าเรือ", "“การจะมาเป็นพ่อมดฝึกหัดในท่าเรืออิเยตา มันยากลำบากถึงเพียงนี้เชียวหรือ?”", "เมื่อก้าวผ่านประตูสถาบันเข้ามา ลินน์ซึ่งเพิ่งจะได้เห็นการทดลองบินไปหมาดๆ ก็อดไม่ได้ที่จะเอ่ยถาม", "เขายังได้ยินมาด้วยว่า เด็กสาวที่ชื่อลิเดียต้องทำการทดลองนี้ให้สำเร็จ จึงจะมีคุณสมบัติผ่านเกณฑ์เข้าเรียนในสถาบันเวทมนตร์ได้ ซึ่งดูจะยากเกินไปสักหน่อย", "คงไม่ใช่ว่าทุกคนต้องผ่านความยากลำบากขนาดนี้ถึงจะเข้าเรียนได้หรอกมั้ง?", "“ไม่ใช่หรอก นั่นเป็นเพียงบททดสอบเฉพาะสำหรับลิเดียเท่านั้น”", "ธีโอดอร์อธิบาย", "“ความจริงแล้ว ท่านเฮลรัมมีความหวังดี เพราะพวกฮาล์ฟลิงนั้นไม่มีพรสวรรค์ด้านเวทมนตร์มากนัก และการรับนางเข้าสถาบันก็มีแต่จะเสียเวลาเปล่า...”"]}, {"t": "นามของข้าคือลินน์ และข้าคือนักวิชาการ", "c": ["ธีโอดอร์ดูเหมือนจะมีความปรารถนาที่จะโอ้อวดตัวเองอย่างผิดปกติ และเมื่อเห็นลินน์กับคนอื่น ๆ สนใจ เขาก็เริ่มบ่นกระปอดกระแปดออกมาเล็กน้อย", "ในช่วงไม่กี่ปีมานี้ ลิเดียกลายเป็นบุคคลที่มีชื่อเสียงโด่งดังไปทั่วท่าเรืออิเยตา เด็กสาวเผ่าฮาล์ฟลิงผู้นี้มีความกระตือรือร้นอย่างมากในการค้นคว้าและวิจัยสิ่งของแปลกประหลาดพิลึกพิลั่นบางอย่าง", "ยกตัวอย่างเช่น ปีที่แล้วนางได้ลอกเลียนแบบใบพัดจากเรือเล่นแร่แปรธาตุ แล้วสร้างสิ่งประดิษฐ์ชิ้นเล็ก ๆ ที่เรียกว่า พัดลม ซึ่งสามารถพัดพาเอาสายลมเย็น ๆ ออกมาได้ด้วยความช่วยเหลือของอุปกรณ์ไอน้ำเล่นแร่แปรธาตุ และมันก็ค่อนข้างจะมีประโยชน์มากในช่วงวันฤดูร้อนที่ร้อนระอุ", "แต่ใครเล่าจะยอมเก็บเครื่องจักรเล่นแร่แปรธาตุที่ทั้งใหญ่โตเทอะทะและราคาแพงหูฉี่ไว้ในบ้าน เพียงเพื่อแลกกับสายลมเย็น ๆ แค่นั้น?", "สำหรับพ่อมดแล้ว การร่ายเวทมนตร์ควบคุมสายลมนั้นย่อมสะดวกสบายกว่ากันมาก", "แน่นอนว่า มันก็ใช่ว่าจะเป็นไปไม่ได้ที่จะทำให้มันทำงานด้วยการใช้มือหมุน ดังนั้นจึงยังมีชาวเมืองบางคนที่ชอบแสวงหาความแปลกใหม่ยอมควักกระเป๋าซื้อสิ่งประดิษฐ์เหล่านี้ และนี่ก็คือแหล่งที่มาของเงินทุนสำหรับโครงการเครื่องจักรบินได้ของลิเดียนั่นเอง", "“ด้วยพรสวรรค์ของลิเดีย การเข้าร่วมกับเวิร์กช็อปเล่นแร่แปรธาตุแห่งใดแห่งหนึ่งในฐานะผู้ช่วย ก็เพียงพอที่จะทำให้นางหาเลี้ยงชีพได้อย่างสุขสบายแล้ว แต่นางก็ยังดึงดันที่จะเป็นพ่อมดให้ได้ ซึ่งนั่นมันก็แค่การหาเรื่องใส่ตัวชัดๆ....”", "ธีโอดอร์ส่ายหน้า แม้แต่ตัวเขาเองก็ต้องยอมรับว่าเด็กสาวเผ่าฮาล์ฟลิงผู้นี้มีไอเดียอันชาญฉลาดมากมาย แต่ทว่าในดินแดนพ่อมดนั้น ยังไม่เคยมีฮาล์ฟลิงคนใดประสบความสำเร็จในการก้าวขึ้นเป็นพ่อมดได้เลยแม้แต่คนเดียว", "เมื่อรับฟังเรื่องเล่าของธีโอดอร์ ลินน์ก็พอจะเข้าใจขึ้นมาบ้างแล้วว่าทำไม ผังต้นไม้แห่งเทคโนโลยี ของดินแดนพ่อมดถึงได้ดูยุ่งเหยิงสะเปะสะปะนัก นั่นก็เพราะเวทมนตร์นั้นสะดวกสบายเกินไป และหลายสิ่งหลายอย่างก็ไม่ใช่ว่าจะเป็นไปไม่ได้ที่จะสร้างขึ้นมา แต่บรรดาพ่อมดแค่รู้สึกว่าพวกมันไม่มีประโยชน์สำหรับพวกเขาก็เท่านั้นเอง", "ขณะที่พวกเขาเดินเข้าไปในโถงรับรองของสถาบัน ตลอดเส้นทางก็มีบรรดาศิษย์ฝึกหัดในชุดเรียบง่ายค้อมศีรษะทักทายธีโอดอร์", "ศิษย์ฝึกหัดเหล่านี้มีช่วงอายุที่หลากหลาย คนที่อายุน้อยที่สุดดูเหมือนจะมีอายุเพียงสิบเอ็ดหรือสิบสองปี และคนที่อายุมากที่สุดก็ไม่น่าจะเกินสามสิบปี หรือจะพูดให้ถูกก็คือ หากใครยังไม่สามารถก้าวขึ้นเป็นพ่อมดเต็มตัวได้ พวกเขาก็จะถูกประเมินว่าเป็นพวกไร้พรสวรรค์และถูกไล่ออกจากสถาบันในที่สุด", "“ถึงแล้ว ขอให้พวกท่านโปรดรออยู่ที่นี่สักครู่ ข้าจะไปแจ้งให้ท่านอาจารย์คนอื่น ๆ ในสถาบันทราบ”", "ธีโอดอร์กล่าวขณะจัดการให้ผู้มาเยือนพักคอยอยู่ในห้องรับรองขนาดใหญ่ โดยมีผู้ช่วยซึ่งเป็นศิษย์ฝึกหัดของเขานำน้ำชามาเสิร์ฟ จากนั้นเขาก็รีบเดินออกจากห้องไป", "ลินน์ทรุดตัวลงนั่งตรงที่นั่งด้านหลัง เบื้องหน้าของเขามีโต๊ะไม้ที่เต็มไปด้วยหนังสือเวทมนตร์สองสามเล่มวางระเกะระกะอยู่ ซึ่งน่าจะถูกทิ้งไว้โดยพ่อมดสักคนที่ไม่มีเวลาเก็บมันไปหลังจากอ่านเสร็จ นอกเหนือจากนี้ ก็ยังมีแผ่นกระดาษแผ่นหนึ่งถูกทิ้งขว้างไว้อย่างไม่ใส่ใจ", "ด้วยความอยากรู้อยากเห็น ลินน์จึงคลี่แผ่นกระดาษนั้นออก และต้องประหลาดใจเมื่อพบว่ามันคือ วารสารเวทมนตร์รายสัปดาห์ ฉบับหนึ่ง", "ใครจะไปรู้ล่ะว่าของแบบนี้ก็มีอยู่ในดินแดนพ่อมดด้วย", "หน้าแรกบรรจุเรื่องราวความบันเทิงและข่าวสารที่เกิดขึ้นภายในดินแดนพ่อมด ในขณะที่หน้าหลังเต็มไปด้วยทฤษฎีล่าสุดเกี่ยวกับเวทมนตร์ พร้อมระบุชื่อผู้เขียนไว้ด้านล่าง", "[ปฏิกิริยาทางเวทมนตร์ที่มีต่อไฟฟ้าและแม่เหล็กนั้นสอดคล้องกันหรือไม่?]", "[การทดลองกับ 24 ธาตุพื้นฐาน]", "[แรงคอเซียน พลังที่ค้ำจุนโลก]", "[ความสัมพันธ์ระหว่างการเคลื่อนที่ของวัตถุกับแรงโน้มถ่วง...]", "ลินน์พลิกเปิดดู วารสารเวทมนตร์รายสัปดาห์ อยู่ครู่หนึ่ง และดำดิ่งจดจ่ออยู่กับมันอย่างรวดเร็ว เขาพบว่ามุมมองอันเป็นเอกลักษณ์ในการตีความโลกผ่านเวทมนตร์นั้นค่อนข้างน่าสนใจทีเดียว", "ในขณะเดียวกัน จอห์นนี่กลับนั่งตัวตรงแหน่ว ดูมีท่าทีประหม่าอย่างหนัก ไม่ได้ผ่อนคลายเหมือนอย่างลินน์เลยแม้แต่น้อย", "เวลาผ่านไปไม่นาน เสียงเปิดประตูก็ดังขึ้นอีกครั้ง เมื่อเฮลรัมที่พวกเขาเพิ่งจะได้พบก่อนหน้านี้ เดินเข้ามาพร้อมกับอาจารย์ของสถาบันอีกหลายท่าน", "หลังจากทรุดตัวลงนั่งที่หัวโต๊ะ เฮลรัมก็ไม่ได้สนใจที่จะกล่าวทักทายปราศรัยใด ๆ ก็จ้องมองตรงไปที่ลอดด์แล้วเอ่ยถามอย่างตรงไปตรงมา", "“ธีโอดอร์บอกว่าเจ้ามีเรื่องด่วนที่จะต้องรายงานข้าเป็นการส่วนตัว เกิดอะไรขึ้นที่เมืองท่าอย่างนั้นหรือ?”", "“ข้าเกรงว่าสถานการณ์มันอาจจะเลวร้ายกว่าที่ท่านคิดไว้ขอรับ เพราะตอนนี้ท่าเรือทั้งหมดของเมืองท่าถูกทำลายจนพินาศย่อยยับ และแม้แต่สมาคมเดินเรือก็ยังถูกกวาดล้างจนสิ้นซาก...”", "ลอดด์เอ่ยด้วยความระมัดระวัง และก่อนที่เขาจะทันพูดจบ เสียงแหบพร่าเสียงหนึ่งก็ดังกังวานขึ้น", "“หรือว่าสมาคมเดินเรือดันทำพลาดตอนขนส่งเสบียง แล้วถูกพวกศาสนจักรจับได้คาหนังคาเขางั้นหรือ?”", "ผู้พูดไม่ใช่ใครอื่น นอกจากเควิน ศาสตราจารย์ภาควิชาแปรสภาพแห่งสถาบันเวทมนตร์อิเยตา ดูเหมือนเขาจะมีอายุราวสี่สิบปี รูปร่างผอมสูง สวมชุดคลุมสีเทาพร้อมป้ายตราสัญลักษณ์แวววาวประดับอยู่บนหน้าอก มันถูกสลักด้วยลวดลายเส้นสายอันลึกลับสามเส้น ซึ่งเป็นเครื่องหมายของพ่อมดระดับสามวงแหวน", "ลอดด์รีบส่ายหน้าเป็นพัลวัน เขาไม่ต้องการตกเป็นแพะรับบาป จึงรีบร้อนอธิบายในทันที", "แต่จากมุมมองของเขา ข้อมูลที่เขามีนั้นน้อยมาก เขารู้เพียงว่าเรื่องราวทั้งหมดเริ่มต้นขึ้นเมื่ออาร์ชบิชอปแอนล็อคเข้าจับกุมโคร ผู้ซึ่งพยายามจะลักพาตัวบุตรสาวของดยุกในอาณาเขตนอร์ดแลนด์ และการสืบสวนก็ลุกลามบานปลายแกะรอยตามเบาะแสมาจนถึงเมืองท่า", "“ข้าว่าแล้วเชียวว่าเจ้านั่นจะต้องก่อเรื่อง เราไม่ควรปล่อยให้โครออกจากดินแดนพ่อมดไปตั้งแต่แรก”", "ฟิลิป ศาสตราจารย์ภาควิชาธาตุพึมพำด้วยความรู้สึกไม่พอใจอย่างยิ่ง", "เขาย่อมรู้จักโครเป็นอย่างดี ชายผู้นั้นเคยเป็นถึงศาสตราจารย์ภาควิชาพลังจิตวิญญาณแห่งสถาบันเวทมนตร์อิเยตาก่อนที่จะจากดินแดนพ่อมดไป โครยังประสบความสำเร็จจนเป็นที่น่าเคารพยกย่องทั้งในด้านเวทมนตร์ธาตุ, การเล่นแร่แปรธาตุ, และเวทมนตร์แปรสภาพ", "หากเขายังคงอุทิศตนให้กับการศึกษาเวทมนตร์ต่อไป สักวันหนึ่งเขาอาจจะได้กลายเป็นจอมเวทผู้ยิ่งใหญ่ไปแล้วก็ได้", "อย่างไรก็ตาม เมื่อหลายปีก่อน ด้วยเหตุผลบางอย่างที่ไม่อาจอธิบายได้ จู่ๆ เขาก็ละทิ้งทุกสิ่งทุกอย่าง แล้วออกเดินทางข้ามทะเลหมอกมุ่งหน้าไปยังจักรวรรดิเซกัส", "นั่นมันเป็นการกระทำที่บ้าบิ่นสิ้นดี", "เมื่อเทียบกับการใช้ชีวิตอย่างสุขสบายในดินแดนพ่อมด ซึ่งสามารถศึกษาเวทมนตร์ได้อย่างอิสระเสรี จักรวรรดิดังกล่าวนั้นตรงกันข้ามอย่างสิ้นเชิง ว่ากันว่าผู้คนที่นั่นอาศัยอยู่ในบ้านไม้ที่เหม็นคลุ้ง และต้องตกอยู่ภายใต้การปกครองอันงมงายของศาสนจักร โดยที่ไม่รู้ด้วยซ้ำว่าธาตุคืออะไร", "ฟิลิปกำลังจะพูดต่อ แต่เพื่อนร่วมงานที่อยู่ข้าง ๆ ก็รีบห้ามเขาไว้เสียก่อน", "เพราะท้ายที่สุดแล้ว การเดินทางไปยังจักรวรรดิเซกัสของโคร ก็ได้รับการอนุมัติจากท่านเฮลรัมด้วยตัวของเขาเอง!", "เนื่องจากบรรดาพ่อมดเอาแต่พูดแทรกขึ้นมาซ้ำแล้วซ้ำเล่า ลอดด์จึงไม่กล้ามีปากมีเสียงหรือปริปากบ่นใด ๆ เขาได้แต่อาศัยช่วงจังหวะที่ไม่มีใครพูด รีบเล่าเหตุการณ์ทั้งหมดที่เกิดขึ้นให้รวดเร็วและแม่นยำที่สุดเท่าที่จะเป็นไปได้ โดยไม่กล้าละเว้นรายละเอียดใด ๆ ไปเลยแม้แต่น้อย", "เมื่อพวกเขาได้ยินว่าลินน์ใช้เวทมนตร์อันทรงพลังอย่างน่าเหลือเชื่อสังหารอาร์ชบิชอปไปหนึ่งคน, ทำลายล้างกองกำลังทหารยามชั้นยอดสวมเกราะกว่าสามพันนาย, และถึงขั้นถล่มเมืองครึ่งเมืองให้กลายเป็นซากปรักหักพัง สีหน้าของบรรดาศาสตราจารย์ต่างก็เต็มไปด้วยความเหลือเชื่อ และแม้แต่เฮลรัมก็ยังอดไม่ได้ที่จะหวั่นไหว", "ธีโอดอร์ถึงกับสงสัยว่าลอดด์ทำงานพลาด แล้วแต่งเรื่องขึ้นมาร่วมกับพ่อมดที่ชื่อลินน์คนนี้ เพื่อปกปิดความผิดพลาดของตัวเองหรือเปล่า", "ด้วยความคิดที่หลากหลายซึ่งผุดขึ้นมาในหัว บรรดาพ่อมดทุกคนที่อยู่ที่นั่นจึงหันเหสายตาไปจับจ้องยังสองคนที่ยังไม่ได้ปริปากพูดอะไรออกมาอย่างพร้อมเพรียงกัน", "พวกเขาจำจอห์นนี่ได้", "เมื่อสี่ปีที่แล้ว ตอนที่โครกลับมายังดินแดนพ่อมด จอห์นนี่ก็เดินตามหลังเขามาติด ๆ ทว่าพวกเขากลับไม่มีความทรงจำใด ๆ เกี่ยวกับลินน์เลยแม้แต่น้อย", "“ข้ายังไม่ได้แนะนำตัวเลยสินะ นามของข้าคือลินน์ เป็นนักวิชาการจากสมาคมเวทมนตร์เร้นลับภายในจักรวรรดิเซกัส และเป็นสหายสนิทของโคร”", "ลินน์กล่าวพลางวาง วารสารเวทมนตร์รายสัปดาห์ ในมือลงอย่างผ่อนคลาย ท่ามกลางสายตาของทุกคนที่จับจ้องมา", "นี่คือสถานะที่เขาตกลงกับจอห์นนี่เอาไว้ตั้งแต่ตอนที่อยู่บนเรือแล้ว"]}, {"t": "ตอนที่ 59", "c": ["บทที่ 59 : ขออภัยที่ต้องพูดตรงๆ แต่ทฤษฎีเวทมนตร์ของดินแดนพ่อมดมันล้าหลังไปแล้ว!", "สหายสนิทของโคร นักวิชาการแห่งสมาคมเวทมนตร์เร้นลับ และพ่อมดเต็มตัว...", "นี่คือสามสถานะที่ลินน์มอบหมายให้กับตนเอง ซึ่งสามารถคลี่คลายปัญหาที่อาจจะเกิดขึ้นส่วนใหญ่ให้กลายเป็นเรื่องเล็กน้อยไปได้", "มันไม่ใช่เรื่องง่ายเลยที่จะเปิดโปงคำโกหกเหล่านี้ สำหรับผู้คนในดินแดนพ่อมด ประสบการณ์ของโครหลังจากเดินทางไปยังจักรวรรดิเซกัสนั้นเป็นเรื่องที่ไม่มีใครล่วงรู้เลยแม้แต่น้อย ต่อให้มีเวทมนตร์สื่อสารก็ไม่มีทางครอบคลุมไปเสียทุกเรื่อง และการอ้างว่าเพิ่งจะรู้จักกันได้ไม่นานก็ดูสมเหตุสมผลอย่างสมบูรณ์แบบ", "ท้ายที่สุดแล้ว อาจารย์ของเขาก็ถูกศาสนจักรจับกุมตัวและส่งไปยังนครศักดิ์สิทธิ์แล้ว ป่านนี้เขาอาจจะกำลังถูกทรมานหรือเข้าสู่กระบวนการไต่สวน และยากจะบอกได้ว่าเขาจะมีชีวิตรอดไปได้อีกนานแค่ไหน แต่อย่างไรเสีย เขาก็ไม่อยู่ในสถานะที่จะมาแก้ต่างคำพูดของลินน์ได้อย่างแน่นอน", "ผู้รู้เห็นเพียงคนเดียวอย่างจอห์นนี่ ก็ได้รับการช่วยชีวิตจากลินน์ถึงสองครั้งซ้อน ซึ่งเรียกได้ว่าเป็นการสร้างสายใยผูกพันระหว่างกัน ยิ่งไปกว่านั้น ชะตากรรมของพวกเขาก็ผูกติดกันแล้ว ความสำเร็จหรือความล้มเหลวของอีกฝ่ายล้วนส่งผลกระทบต่อกัน แม้จะเป็นเพียงเพื่อหลีกเลี่ยงข้อกล่าวหา แต่อีกฝ่ายก็ไม่มีทางเลือกอื่นนอกจากต้องเก็บงำความลับนี้ไว้", "ตราบใดที่เขาสามารถสร้างความน่าเชื่อถือให้กับตัวตนของเขาในช่วงเวลานี้ได้ ใครล่ะจะไปให้ค่ากับคำพูดของพ่อมดฝึกหัดคนหนึ่งอย่างจริงจัง?", "บางครั้ง ความจริงก็ฟังดูน่าเชื่อถือน้อยกว่าคำโกหกเสียอีก", "ไม่มีใครเต็มใจเชื่อหรอกว่า ศิษย์ฝึกหัดที่เพิ่งจะสัมผัสกับเวทมนตร์มาได้แค่ครึ่งปี จะสามารถสังหารอาร์ชบิชอป ทำลายเมืองท่าไปครึ่งเมือง และมีความรู้ที่ลึกซึ้งอย่างหาตัวจับยากได้...", "หลังจากลินน์แนะนำตัวสั้นๆ บรรดาศาสตราจารย์ที่อยู่ที่นั่นต่างก็สบตากัน และธีโอดอร์ก็เป็นคนแรกที่เอ่ยถามขึ้นมาด้วยน้ำเสียงที่แฝงไปด้วยความเคลือบแคลงใจ", "“ท่านยังไม่ได้เป็นจอมเวทผู้ยิ่งใหญ่ใช่ไหม?”", "ในความคิดของธีโอดอร์ เวทมนตร์ที่สามารถสร้างความพินาศได้อย่างวงกว้างขนาดนั้น อย่างน้อยๆ ก็ต้องเป็นเวทมนตร์ระดับห้าวงแหวน และมีเพียงจอมเวทผู้ยิ่งใหญ่เท่านั้นที่จะสามารถต่อกรกับกองทัพได้เพียงลำพัง", "แต่ลินน์กลับดูเด็กเกินไปมาก น่าจะอายุราวๆ ยี่สิบปีเท่านั้น", "นั่นมันไม่สมเหตุสมผลเอาเสียเลย ท้ายที่สุดแล้ว แม้แต่พ่อมดที่มีพรสวรรค์สูงสุดในดินแดนพ่อมด ซึ่งเป็นที่รู้จักในนาม ดาวรุ่งแห่งเวทมนตร์ อย่างออกัสต์ ก็เพิ่งจะก้าวขึ้นเป็นจอมเวทผู้ยิ่งใหญ่เมื่ออายุยี่สิบสี่ปี และปัจจุบันเขาได้รับการยกย่องให้เป็นความหวังของโลกเวทมนตร์ เป็นผู้ที่มีโอกาสก้าวข้ามขอบเขตของพ่อมดระดับตำนานมากที่สุด!", "เขาไม่อยากจะเชื่อเลยว่าไอ้หนุ่มนิรนามที่โผล่มาจากไหนก็ไม่รู้คนนี้ จะมีพรสวรรค์เหนือกว่า ดาวรุ่งแห่งเวทมนตร์", "“แน่นอนว่าข้าย่อมไม่ใช่จอมเวทผู้ยิ่งใหญ่ การทำลายเมืองท่านั้นก็เป็นแค่กลอุบายเล็กๆ น้อยๆ เท่านั้น และความช่วยเหลือของท่านลอดด์ก็เป็นสิ่งสำคัญ”", "ลินน์อธิบายด้วยท่าทีสบายๆ น้ำเสียงของเขาไร้ซึ่งความตื่นตระหนกใดๆ", "“กลอุบายเล็กๆ น้อยๆ งั้นหรือ?”", "ธีโอดอร์ชะงักไป จากนั้นก็นึกขึ้นได้ว่าลอดด์เคยเล่าให้ฟังว่า ก่อนที่จะเกิดการปะทะกับศาสนจักรอย่างเต็มรูปแบบ ลินน์ได้สั่งให้เขารวบรวมวัตถุดิบพื้นฐานจำนวนมาก", "หรือว่ามันจะเป็นการเสริมพลังของค่ายกลเล่นแร่แปรธาตุอันทรงพลัง?", "บรรดาศาสตราจารย์จากสถาบันต่างๆ ต่างพากันเค้นสมอง แต่ก็คิดไม่ออกเลยว่ามีค่ายกลเล่นแร่แปรธาตุอันทรงพลังอันไหนที่ต้องใช้วัตถุดิบพื้นฐานเหล่านั้น ในท้ายที่สุด พวกเขาก็พร้อมใจกันหันไปหาจอมเวทผู้ยิ่งใหญ่เฮลรัม", "หลังจากครุ่นคิดอยู่ครู่หนึ่ง ในที่สุดเขาก็เอ่ยปาก", "“ข้าเคยได้ยินมาว่าเมื่อไม่กี่ปีที่ผ่านมา นักเล่นแร่แปรธาตุในนครพ่อมดได้ค้นพบสมการเล่นแร่แปรธาตุอันเป็นเอกลักษณ์ ซึ่งไม่จำเป็นต้องใช้พลังเวทเลยด้วยซ้ำ ตราบใดที่มีปริมาณมากพอ พลังทำลายล้างที่ปลดปล่อยออกมาก็สามารถเทียบเคียงได้กับเวทมนตร์ระดับสูงบางบทเลยทีเดียว”", "ความประหลาดใจปรากฏขึ้นบนใบหน้าของลินน์ นักเล่นแร่แปรธาตุแห่งดินแดนพ่อมดเข้าถึงเทคโนโลยีดินปืนดำแล้วอย่างนั้นหรือ?", "แต่จะว่าไปมันก็สมเหตุสมผล เพราะดินปืนดำก็ไม่ได้เป็นสิ่งประดิษฐ์ระดับสูงอะไรนัก มันถูกค้นพบในช่วงปลายศตวรรษที่ 9 ในชาติที่แล้วของเขา และพลังทำลายล้างของมันก็ถือว่าธรรมดามาก", "ย้อนกลับไปที่การระเบิดในเมืองท่า เหตุผลหลักที่ได้ผลลัพธ์อันยอดเยี่ยมขนาดนั้น ก็เป็นเพราะปริมาณอันมหาศาลบวกกับฟอสฟอรัสขาวที่เขาผสมลงไปเพื่อเพิ่มอานุภาพต่างหาก", "อันที่จริง หากไม่ได้มีเวลาจำกัดขนาดนั้น เขาคงจะมอบหมายงานชิ้นใหญ่ให้กับพวกคนพื้นเมืองเหล่านั้นทำอย่างแน่นอน", "หลังจากที่เฮลรัมแสดงความคิดเห็น ธีโอดอร์และคนอื่นๆ ก็อดไม่ได้ที่จะถอนหายใจด้วยความโล่งอก ปรากฏว่ามันคือผลิตภัณฑ์จากการเล่นแร่แปรธาตุบางอย่าง ที่ต้องจ้างคนกว่าพันคนและเตรียมการล่วงหน้าหลายวันจึงจะสามารถปลดปล่อยพลังออกมาได้ สิ่งประดิษฐ์นี้ทำได้เพียงแค่เป็นกับดักเท่านั้น และไม่ใช่สิ่งที่จะนำมาใช้ในการต่อสู้จริงได้อย่างแน่นอน", "โดยไม่สนใจว่าบรรดาศาสตราจารย์ของสถาบันเหล่านี้จะคิดอย่างไร ลินน์ยังคงเอ่ยต่อไป", "“อันที่จริง ครั้งนี้โครได้วางแผนที่จะไปพบกับนักวิชาการอีกคนหนึ่งจากสมาคมเวทมนตร์เร้นลับที่เมืองหลวงของอาณาเขตนอร์ดแลนด์ เพื่อตรวจสอบทฤษฎีเวทมนตร์ที่สำคัญมากๆ ทฤษฎีหนึ่ง ส่วนเรื่องการลักพาตัว...อะแฮ่ม...ส่วนเรื่องการรับศิษย์นั้น มันก็เป็นแค่ฉากบังหน้า นึกไม่ถึงว่าคนของศาสนจักรก็ยังอุตส่าห์สังเกตเห็นความผิดปกติเข้าจนได้...”", "“ก่อนออกเดินทาง โครได้ขอร้องให้ข้าช่วยเรียบเรียงต้นฉบับงานวิจัยจากสมาคมเวทมนตร์เร้นลับอย่างจริงจัง เขาคาดการณ์ไว้แล้วว่าการพบปะครั้งนี้อาจจะไม่ง่ายอย่างที่คิด และหากครั้งนี้เขาไม่ได้กลับมา เขาก็ต้องการให้ข้านำต้นฉบับงานวิจัยอันล้ำค่าเหล่านี้มาส่งที่ท่าเรืออิเยตาให้ได้ ไม่ว่าจะต้องแลกด้วยอะไรก็ตาม”", "เมื่อพูดถึงตรงนี้ ลินน์ก็ถอนหายใจออกมาเพื่อแสดงความเสียใจ เขากวาดสายตามองบรรดาศาสตราจารย์ของสถาบันที่อยู่รอบๆ แล้วเอ่ยด้วยน้ำเสียงทุ้มต่ำ", "“โครบอกข้าว่า ดินแดนพ่อมดนั้นโดดเดี่ยวตัดขาดจากโลกภายนอกมากเกินไป ทฤษฎีเวทมนตร์หลายๆ อย่างน่าจะล้าหลังไปแล้ว! ความรู้ใหม่ๆ เหล่านี้อาจจะนำมาซึ่งความเปลี่ยนแปลงให้กับดินแดนพ่อมดได้!”", "“เหลวไหล! เขากล้าพูดแบบนี้ออกมาได้อย่างไร!”", "เควินลุกพรวดขึ้นทันทีที่ได้ยิน เบิกตากว้าง แทบจะระเบิดอารมณ์โกรธออกมา", "ดินแดนพ่อมดคือสถานที่แบบไหนกัน?", "มันคือแหล่งกำเนิดของสำนักเวทชั้นนำนับไม่ถ้วน!", "มันคือศูนย์กลางแห่งการพัฒนาเวทมนตร์ และยังเป็นวิหารศักดิ์สิทธิ์ของเหล่าพ่อมดอีกด้วย!", "พวกเขาใช้เวลาหลายร้อยปีในการเปลี่ยนเกาะรกร้างแห่งนี้ให้กลายเป็นสวรรค์แห่งเวทมนตร์ ที่นี่ พ่อมดทุกคนล้วนมุ่งมั่นอยู่บนเส้นทางแห่งการแสวงหาความจริง มีการค้นพบธาตุใหม่ๆ หรือทฤษฎีเวทมนตร์ใหม่ๆ เกือบทุกสัปดาห์", "แต่ตอนนี้ อีกฝ่ายกลับกล้าพูดว่าดินแดนศักดิ์สิทธิ์แห่งเวทมนตร์ของพวกเขานั้นล้าหลังและตามยุคสมัยไม่ทันแล้ว...", "นี่มันบ้าไปแล้วชัดๆ!", "“โครคงจะจากดินแดนพ่อมดไปนานเกินไป เขาไม่เข้าใจทฤษฎีเวทมนตร์ในปัจจุบันอย่างถ่องแท้พอ...”", "เควินกล่าวอย่างประชดประชัน เขาเชื่อว่าความคิดของโครคงจะยังหยุดนิ่งอยู่ในช่วงเวลาที่เขาออกเดินทางไปยังจักรวรรดิเซกัสเป็นครั้งแรก ดังนั้นเพียงแค่ได้เห็นทฤษฎีใหม่ๆ หนึ่งหรือสองทฤษฎี ก็ทำให้เขารู้สึกทึ่งเกินจริงไปเสียแล้ว", "หารู้ไม่ว่าตลอดหลายปีที่ผ่านมา บรรดาจอมเวทผู้ยิ่งใหญ่และพ่อมดระดับตำนาน ได้พัฒนาทฤษฎีเวทมนตร์ออกมามากมายจนสามารถอัดแน่นเต็มชั้นหนังสือได้ทั้งชั้นเลยทีเดียว!", "ศาสตราจารย์คนอื่นๆ ก็พากันวิพากษ์วิจารณ์โครว่าพูดจาไร้สาระและทำให้ชื่อเสียงของดินแดนพ่อมดต้องมัวหมอง...", "ลินน์ไม่ได้อธิบายอะไรให้มากความ เขาเพียงแค่หยิบ ต้นฉบับงานวิจัย ที่เตรียมไว้ก่อนหน้านี้ออกมา แล้ววางลงบนโต๊ะ", "เควินเป็นคนแรกที่คว้าต้นฉบับไป กระตือรือร้นที่จะดูว่าทฤษฎีแปลกใหม่แบบไหนกัน ที่ดลใจให้โครมีความคิดอันเพ้อฝันเช่นนี้ได้", "“กฎของการตกอย่างอิสระงั้นหรือ? สูตรพลังงานจลน์? ฮะ ข้าว่าแล้วเชียว โครคงไม่เคยอ่านหนังสือเวทมนตร์ของท่านปรมาจารย์ยาเด ตอนที่เขาอยู่ที่สถาบันอิเยตาแน่ๆ เมื่อสองร้อยปีก่อน ท่านได้เสนอทฤษฎีไว้แล้วว่า ความเร็วในการตกของวัตถุจะแปรผันตรงกับน้ำหนักของมัน ซึ่งนี่ก็คือพื้นฐานของสูตรแรงโน้มถ่วง...”", "เควินเพิ่งจะเปิดอ่านหน้าแรกและเห็นแค่ชื่อเรื่อง ก็ส่ายหน้าและถอนหายใจออกมา แต่หลังจากพินิจดูเนื้อหาอย่างละเอียดอยู่ครู่หนึ่ง เขาก็ต้องตกตะลึงงันไปอย่างสมบูรณ์", "เพราะกฎของการตกอย่างอิสระในต้นฉบับนั้น ขัดแย้งกับทฤษฎีของท่านปรมาจารย์ยาเดอย่างสิ้นเชิง ผู้เขียนเชื่อว่าวัตถุสองชิ้นที่มีน้ำหนักต่างกัน เมื่อตกลงมาอย่างอิสระ จะมีความเร่งเท่ากันและจะตกถึงพื้นพร้อมกัน", "“ไร้สาระ ไร้สาระสิ้นดี!”", "เควินโกรธจนถึงกับแค่นเสียงหัวเราะออกมา", "“มันจะเป็นไปได้อย่างไร! หากมีคนโยนภูเขาโคกัลกับก้อนกรวดขึ้นไปบนท้องฟ้าพร้อมกัน แล้วพวกมันจะร่วงลงมากระทบพื้นในเวลาเดียวกันน่ะหรือ? ช่างน่าขันสิ้นดี!”"]}, {"t": "ลูกบอลน้ำในมือข้าก็คือทวีปแห่งนี้!", "c": ["คำพูดอันหงุดหงิดของเควิน ได้ดึงดูดความสนใจของทุกคนในทันที", "เมื่อต้องเผชิญกับสายตาอันตื่นตะลึงของฝูงชน เควินก็ไม่ได้พูดอะไรมาก เขาเพียงแค่ส่งต่อสิ่งที่เรียกว่า ต้นฉบับงานวิจัย ไปให้คนอื่นๆ ธีโอดอร์และศาสตราจารย์คนอื่นๆ รับมันไปเปิดอ่าน ใบหน้าของพวกเขาเผยให้เห็นถึงความเย้ยหยันและเยาะเย้ย", "ทว่าเมื่อต้นฉบับถูกส่งไปถึงมือของเฮลรัม จอมเวทผู้ยิ่งใหญ่กลับไม่ได้หัวเราะออกมา เพราะเขาค้นพบว่าในนั้นมีการกล่าวถึงสิ่งที่เรียกว่า แรงต้านของอากาศ...", "ลินน์เพียงแค่จิบน้ำชาเบาๆ เขาไม่รีบร้อนที่จะอธิบาย แต่รอคอยให้บรรดาศาสตราจารย์สถาบันเหล่านี้อ่าน ต้นฉบับงานวิจัย ของเขาให้จบเสียก่อน", "แม้ว่าเขาจะไม่มีความรู้เกี่ยวกับระดับวิชาการเวทมนตร์ในดินแดนพ่อมดมากนัก แต่โครก็ได้ทิ้งหนังสือพื้นฐานไว้ให้เขาสองเล่ม นั่นคือ การวิเคราะห์ธาตุ และ หนังสือทฤษฎีเวทมนตร์พื้นฐาน เขาเขียนต้นฉบับเหล่านี้ขึ้นโดยอาศัยทฤษฎีที่มีอยู่แล้วในดินแดนพ่อมดเป็นรากฐาน ซึ่งมันง่ายต่อการพิสูจน์ความจริงอย่างยิ่ง", "เพียงแค่ห้าหรือหกนาที ต้นฉบับความยาวกว่าสิบหน้าก็ถูกบรรดาพ่อมดอ่านจนจบ เมื่อพิจารณาว่าสิ่งที่เรียกว่ากฎของการตกอย่างอิสระนั้นดูไม่น่าเชื่อถือเอาเสียเลย พวกเขาจึงเพียงแค่อ่านผ่านๆ เนื้อหาที่เหลือไปอย่างลวกๆ ทว่าจากนั้น สิ่งที่ทำให้พวกเขาตกตะลึงยิ่งกว่าเดิมก็คือ พวกเขาได้ค้นพบสมมติฐานที่ไร้สาระยิ่งกว่าในต้นฉบับนั้น", "“ฟังนะ เจ้าชื่อลินน์ใช่ไหม? ข้าไม่รู้หรอกนะว่าโครกำลังคิดอะไรอยู่ ถึงได้ปล่อยให้เจ้านำต้นฉบับที่ไร้สาระแบบนี้มาที่ดินแดนพ่อมด แต่ข้าต้องขอบอกเลยว่า ทฤษฎีเวทมนตร์ของสมาคมเวทมนตร์เร้นลับนั้นเต็มไปด้วยช่องโหว่ชัดๆ...”", "เควินโยนกระดาษในมือลงบนโต๊ะอย่างไม่ใส่ใจ และเอ่ยด้วยน้ำเสียงระอาใจ", "“และเจ้าก็ยังเชื่ออย่างหน้ามืดตามัวอีกนะ ว่าทวีปที่เราเหยียบอยู่นี้เป็นทรงกลมน่ะ? ช่างน่าขันสิ้นดี!”", "“แล้วทำไมโลกใบนี้จะเป็นทรงกลมไม่ได้ล่ะ? น่าจะเป็นเพราะยังไม่มีใครเคยพิสูจน์มันมากกว่ากระมัง”", "ลินน์วางถ้วยชาลงอย่างใจเย็น", "แม้ว่าเขาจะถูกจำกัดด้วยความสามารถ ทำให้เขายังไม่สามารถบินขึ้นสู่อวกาศเพื่อพิสูจน์จุดนี้ได้อย่างสมบูรณ์ แต่การที่เขาสามารถยืนอยู่ตรงนี้ได้ มันก็อธิบายอะไรได้หลายอย่างแล้ว", "มวลและแรงโน้มถ่วงของดาวเคราะห์ที่อยู่ใต้ฝ่าเท้าของพวกเขา จะต้องมีความใกล้เคียงกับโลกในชาติก่อนมากอย่างแน่นอน เพราะแรงโน้มถ่วงที่เขาสัมผัสได้นั้นแทบจะไม่ต่างกันเลย", "การเปลี่ยนแปลงของฤดูกาล ตลอดจนดวงอาทิตย์และดวงจันทร์ สามารถนำมาใช้เป็นหลักฐานพิสูจน์การหมุนรอบตัวเองและการโคจรรอบดาวฤกษ์ของดาวเคราะห์ดวงนี้ได้ ยิ่งไปกว่านั้น หลังจากที่เขาเดินทางออกจากทะเลหมอก สิ่งแรกที่เขามองเห็นที่ท่าเรือก็คือยอดของหอคอย จากนั้นจึงค่อยเห็นตัวหอคอย!", "และหลักฐานชิ้นสำคัญที่สุดก็คือแผนที่ดูดาว เพียงแค่นำดาวฤกษ์มาวางไว้ตรงจุดศูนย์กลาง ก็จะสามารถสร้างแบบจำลองการเคลื่อนที่ของระบบดาวฤกษ์ที่สมบูรณ์แบบขึ้นมาได้ นี่แหละคือหลักฐานเชิงประจักษ์ที่สุด!", "หากไม่ใช่เพราะแผนที่ดูดาวระบุไว้ว่าดาวฤกษ์ดวงนี้มีดาวเคราะห์บริวารล้อมรอบเพียงแค่ห้าดวงล่ะก็ ลินน์คงจะเริ่มสงสัยไปแล้วว่า นี่อาจจะเป็นโลกอีกใบหนึ่งในจักรวาลคู่ขนานหรือไม่", "เพราะมันเหมือนกันมากเกินไป!", "“ในเมื่อท่าเรืออิเยตาตั้งอยู่ติดทะเล ข้าคิดว่าพวกท่านคงจะเคยสังเกตเห็นอะไรบางอย่างในวันธรรมดาทั่วไปบ้างสินะ เมื่อพวกท่านมองออกไปที่เรือใบจากบนฝั่ง สิ่งแรกที่พวกท่านมองเห็นก็ต้องเป็นใบเรือ จากนั้นถึงจะเห็นตัวเรืออย่างแน่นอน!”", "ขณะที่เอ่ยปาก ลินน์ก็แบมือออก และภายใต้การพวยพุ่งของพลังเวท ลูกบอลน้ำขนาดใหญ่และขุ่นมัวก็ปรากฏขึ้นตรงหน้าทุกคน จากนั้นเขาก็เสียบขนนกลงไปในน้ำที่กำลังไหลเวียนอยู่ตรงๆ", "ผิวน้ำเริ่มไหลเวียนในทันที และขนนกก็หมุนจากด้านล่างขึ้นมาสู่ด้านบนโดยตรง สิ่งแรกที่มองเห็นคือปลายขนนกจริงๆ ด้วย...", "บรรดาพ่อมดที่อยู่ที่นั่นเข้าใจประเด็นของลินน์ในทันที ลูกบอลน้ำขนาดยักษ์ก็เปรียบเสมือนทวีปที่อยู่ใต้ฝ่าเท้าของพวกเขา และขนนกก็เป็นตัวแทนของเรือ หากผืนแผ่นดินแบนราบ พวกเขาจะต้องมองเห็นตัวเรือทั้งลำจากระยะไกล", "มีเพียงบนพื้นผิวที่โค้งมนเท่านั้น ที่พวกเขาจะมองเห็นใบเรือเป็นอันดับแรก", "ธีโอดอร์และคนอื่นๆ สบตากัน ขมวดคิ้วแน่น ทฤษฎีนี้ดูเหมือนจะมีเหตุผลอยู่บ้าง แต่ก็รู้สึกแปลกๆ ทะแม่งๆ อย่างบอกไม่ถูก", "“แต่นี่ก็ไม่ได้พิสูจน์เสียหน่อยว่าทวีปเป็นทรงกลม มันอาจจะเป็นครึ่งวงกลมก็ได้ไม่ใช่หรือ....นั่นก็มีเหตุผลเหมือนกันไม่ใช่หรือไง?”", "ศาสตราจารย์สถาบันอีกคนรีบเอ่ยแย้งขึ้นมา", "“และถ้าอิงตามคำกล่าวอ้างของเจ้า ภายใต้ผลกระทบของแรงโน้มถ่วง น้ำที่อยู่ด้านบนก็ควรจะไหลตกลงมาตั้งนานแล้วสิ....”", "ขณะที่พูด ศาสตราจารย์สถาบันผู้นั้นก็เลียนแบบลินน์ด้วยการสร้างลูกบอลดินขึ้นมาเพื่อจำลองเป็นทวีป จากนั้นก็เคลือบมันด้วยชั้นน้ำ", "จากนั้นเขาก็คลาย หัตถ์เวท น้ำก็เริ่มไหลตกลงมาทันที มันแยกตัวออกจากลูกบอลดิน และกลายเป็นแอ่งน้ำกองอยู่บนโต๊ะ", "“เห็นไหมล่ะ เหมือนแบบนี้เป๊ะเลย...ทฤษฎีของเจ้ามันใช้ไม่ได้ผลเลยสักนิด!”", "ศาสตราจารย์สถาบันผู้นั้นกล่าวด้วยความภาคภูมิใจ และธีโอดอร์กับคนอื่นๆ ก็พยักหน้าเห็นด้วย", "“ดังนั้น ถ้าทวีปเป็นครึ่งวงกลม ท่านกำลังจะบอกว่าน้ำจะไม่ตกลงมางั้นหรือ?”", "ลินน์ถามกลับด้วยความไม่อยากจะเชื่อ", "กลุ่มศาสตราจารย์สถาบันถึงกับชะงักงันไปในทันที ปรากฏการณ์ของเรือที่มองเห็นจากระยะไกลในมหาสมุทรนั้น บ่งบอกเป็นนัยว่าน้ำทะเลน่าจะเกาะติดอยู่กับผืนแผ่นดินที่โค้งมน และด้วยเหตุนี้ มันก็ควรจะไหลตกลงมาด้วย ไม่ใช่อยู่กับที่ ซึ่งนี่มันขัดต่อสามัญสำนึกอย่างสิ้นเชิง!", "ก่อนที่พวกเขาจะทันได้เรียบเรียงความคิด ลินน์ก็เอ่ยต่อ", "“ยิ่งไปกว่านั้น เราจะระบุได้อย่างไรว่าฝั่งไหนคือด้านล่าง?”", "“มันยังไม่ชัดเจนอีกหรือ? ท้องฟ้าคือด้านบน และผืนแผ่นดินคือด้านล่าง ซึ่งถูกกำหนดโดยแรงโน้มถ่วงไงล่ะ!”", "ธีโอดอร์สวนกลับ คิ้วขมวดมุ่น สับสนกับคำถามที่ดูงี่เง่าเช่นนี้", "“อย่างนั้นหรือ? แล้วนี่ล่ะ?”", "ลินน์เลิกคิ้วขึ้น เขาสลายลูกบอลน้ำทิ้ง แล้ววางมือลงบนลูกบอลดินที่ศาสตราจารย์ผู้นั้นสร้างขึ้น เขาร่าย หัตถ์เวท และลูกบอลดินที่เคยหลวมร่วนก็ค่อยๆ บีบอัดเข้าหากัน ก่อนจะกลายเป็นลูกบอลทรงกลมที่อัดแน่น", "“หากเราถือว่าแรงที่เกิดจากหัตถ์เวทคือแรงโน้มถ่วง สำหรับจุดศูนย์กลางของลูกบอลดินพอดี ฝั่งไหนคือด้านบน และฝั่งไหนคือด้านล่าง?”", "ธีโอดอร์ถึงกับตกตะลึงงันไปอย่างสมบูรณ์ การเปรียบเทียบผืนแผ่นดินเป็นลูกบอลดินของลินน์นั้นตรงไปตรงมาและเข้าใจง่ายมาก และแน่นอนว่าเขาก็มองเห็นมันได้อย่างชัดเจน แต่ก็เป็นเพราะเขาเข้าใจนี่แหละ เขาจึงไม่อาจปิดบังความตกตะลึงในใจไว้ได้", "สำหรับจุดศูนย์กลางของทรงกลม แรงโน้มถ่วงจะมาจากทุกทิศทุกทาง ซึ่งหมายความว่าทุกทิศทางคือด้านบน ในขณะที่ด้านล่างจะอยู่ที่จุดศูนย์กลางของทรงกลม ดังนั้น น้ำจึงต้องเกาะติดอยู่กับทรงกลมอย่างหลีกเลี่ยงไม่ได้", "บรรดาศาสตราจารย์ที่อยู่ในเหตุการณ์ต่างก็ตระหนักถึงจุดนี้เช่นกัน และเริ่มถกเถียงกันอย่างดุเดือด เควินปฏิเสธที่จะเชื่อในสิ่งที่เรียกว่าทฤษฎีดาวเคราะห์นี้อย่างเด็ดขาด โดยยืนกรานว่าทวีปนั้นแบนราบ และปรากฏการณ์การมองเห็นเรือจากระยะไกลนั้นก็เป็นเพียงแค่เรื่องบังเอิญ ไม่ใช่หลักฐานเชิงประจักษ์", "ส่วนฟิลิปและคนอื่นๆ กลับมีความเห็นตรงกันข้าม โดยคิดว่าคำพูดของลินน์อาจจะไม่ใช่เรื่องไร้สาระเสียทีเดียว อย่างน้อยที่สุด มันก็เป็นทฤษฎีที่มีความเป็นไปได้ ซึ่งสามารถนำไปใช้เป็นข้อมูลอ้างอิงสำหรับการวิจัยเพิ่มเติมเพื่อยืนยันความถูกต้องได้อย่างแน่นอน", "ขณะที่ทุกคนถกเถียงกันรุนแรงขึ้นเรื่อยๆ จนเกือบจะลงไม้ลงมือกัน ธีโอดอร์ก็หันสายตากลับมาที่ลินน์และเอ่ยถามอีกครั้ง", "“เจ้ากำลังจะบอกว่า มีแรงบางอย่างที่บีบอัดทุกสิ่งทุกอย่างเข้าหาจุดศูนย์กลางของทวีปนี้ ซึ่งนั่นคือเหตุผลที่ทำให้น้ำสามารถเกาะอยู่บนพื้นผิวได้งั้นหรือ?”", "ก่อนที่ลินน์จะทันได้ตอบ เฮลรัมซึ่งเอาแต่อ่านต้นฉบับอยู่นาน ในที่สุดก็เอ่ยปากขึ้น", "“อันที่จริง มันน่าจะเป็นตรงกันข้ามต่างหาก จุดศูนย์กลางของทวีปมีแรงที่แผ่ขยายออกไปด้านนอก ก่อให้เกิดสนามแรงโน้มถ่วง...ซึ่งดึงดูดทุกสิ่งทุกอย่างเข้าหาตัวมันเอง นั่นคือสิ่งที่เจ้าพยายามจะบอกใช่หรือไม่?”"]}, {"t": "ความจริงทนทานต่อการพิสูจน์ทุกรูปแบบ!", "c": ["“นั่นคือสิ่งที่ข้าหมายถึงจริงๆ ขอรับ ท่านเฮลรัม”", "ลินน์พยักหน้า กวาดสายตามองไปรอบๆ กลุ่มคนที่มารวมตัวกัน จากนั้นก็หมุนหนังสือพิมพ์ที่อยู่ตรงหน้าไปครึ่งรอบ แล้วดันมันไปทางทุกคน", "“ข้าไม่รู้ว่าทุกท่านได้อ่าน วารสารเวทมนตร์รายสัปดาห์ ของสัปดาห์นี้หรือยัง แต่พ่อมดระดับตำนานฮาร์รอฟได้เสนอทฤษฎีไว้ว่า แรงโน้มถ่วงอาจดำรงอยู่อย่างกว้างขวางภายในวัตถุใดๆ ก็ตาม ไม่ใช่แค่บนผืนแผ่นดินใต้ฝ่าเท้าของเราเท่านั้น”", "เมื่อพูดถึงตรงนี้ ลินน์ก็รู้สึกสะเทือนอารมณ์อยู่บ้าง หลังจากอ่านบทความที่ตีพิมพ์ใน วารสารเวทมนตร์รายสัปดาห์ เขาก็ตระหนักได้ว่า แท้จริงแล้วนี่ก็คือแนวคิดพื้นฐานของกฎแรงดึงดูดระหว่างมวลนั่นเอง", "เพียงแต่ไม่รู้ว่าพ่อมดระดับตำนานผู้นี้ได้ทำการวิจัยไปไกลแค่ไหนแล้ว...เขาได้พัฒนากฎแรงดึงดูดระหว่างมวลขึ้นมาแล้วหรือไม่ หรือเขารู้แล้วหรือยังว่าแก่นแท้ของแรงโน้มถ่วงคืออะไร...", "แต่อย่างไรก็ตาม สิ่งนี้จะช่วยพิสูจน์ทฤษฎีของเขาได้อย่างแน่นอน เนื่องจากบทความนี้อธิบายว่าแรงโน้มถ่วงไม่ใช่เพียงแค่แรงที่ดึงดูดลงสู่เบื้องล่าง แต่ยังเป็นสิ่งที่สามารถส่งผลกระทบต่อสภาพแวดล้อมโดยรอบ และอาจถึงขั้นยืดขยายและบิดเบือนมิติอวกาศได้", "“ข้อโต้แย้งของท่านฮาร์รอฟนั้นช่างยอดเยี่ยมและไม่อาจหักล้างได้จริงๆ แต่การใช้เพียงเรื่องนี้เป็นหลักฐานเพื่อหักล้างทฤษฎีโลกแบนอย่างสมบูรณ์นั้น ก็ยังคงขาดน้ำหนักความน่าเชื่อถืออยู่บ้าง”", "เฮลรัมกล่าวอย่างครุ่นคิด อันที่จริง หลังจากอ่านต้นฉบับงานวิจัยแล้ว เขาก็มีแนวโน้มที่จะเชื่อว่าทฤษฎีโลกแบนนั้นเป็นเรื่องผิดพลาด", "แต่เฮลรัมก็รู้ดีเช่นกันว่า นี่คือทฤษฎีที่สามารถสั่นคลอนความเข้าใจต่อโลกทั้งใบของดินแดนพ่อมดได้ หากมันถูกตีพิมพ์ลงใน วารสารเวทมนตร์รายสัปดาห์ เมื่อใด มันจะก่อให้เกิดข้อพิพาทครั้งใหญ่ขึ้นอย่างไม่ต้องสงสัย ซึ่งนั่นทำให้เขาต้องระมัดระวัง", "“ข้าได้ดูแผนที่ดูดาวของเจ้าแล้ว ทฤษฎีการหมุนรอบตัวเองและการโคจรรอบดวงดาวที่เจ้าพูดถึงก็น่าสนใจมากทีเดียว ข้าจะส่งทฤษฎีนี้ไปให้จอมเวทผู้ยิ่งใหญ่สักสองสามท่านที่มีผลงานโดดเด่นในการศึกษาเรื่องแรงโน้มถ่วงพิจารณาดู หากพวกเขาเห็นพ้องต้องกัน การจะนำไปตีพิมพ์ลงใน วารสารเวทมนตร์รายสัปดาห์ ก็ยังไม่สายเกินไป”", "เฮลรัมกล่าวด้วยน้ำเสียงขึงขัง", "“เรื่องนั้นไม่มีปัญหาอย่างแน่นอนขอรับ ความจริงทนทานต่อการตรวจสอบทุกรูปแบบอยู่แล้ว!”", "ลินน์พยักหน้า ทุกสิ่งที่เขาเขียนลงในต้นฉบับนั้นคือทฤษฎีที่บริสุทธิ์ที่สุด และการให้ผู้เชี่ยวชาญมาช่วยยืนยันความถูกต้อง ก็ย่อมเป็นเรื่องที่ดียิ่งกว่าดีเสียอีก", "“เอาเป็นว่าเราพักเรื่องทฤษฎีโลกแบนกับทฤษฎีโลกกลมเอาไว้แค่นี้ก่อนก็แล้วกัน”", "เฮลรัมเปลี่ยนหัวข้อสนทนา จากนั้นก็หยิบกระดาษอีกแผ่นหนึ่งขึ้นมาแล้วพูดต่อ", "“กฎของการตกอย่างอิสระนี้ก็น่าสนใจมากเช่นกัน เจ้าช่วยอธิบายรายละเอียดให้ข้าฟังหน่อยได้ไหม? ถ้าข้าเดาไม่ผิด มันก็น่าจะเกี่ยวข้องกับแรงโน้มถ่วงด้วยใช่หรือไม่”", "“ข้าคิดว่าการทำการทดลองน่าจะอธิบายเรื่องนี้ได้ดีกว่านะขอรับ!”", "ลินน์ยักไหล่ เพราะการลงมือปฏิบัติคือเกณฑ์เดียวที่จะใช้ทดสอบความจริงได้", "\"ถ้าอย่างนั้น ตามกฎที่ว่านี้ ขนนกกับลูกบอลดินลูกนี้ ก็ควรจะตกลงมาด้วยความเร็วที่เท่ากันเป๊ะเลยสินะ!\"", "เควินซึ่งเอาแต่ฟังบทสนทนาของพวกเขาและหาจังหวะพูดแทรกไม่ได้มานาน รีบเอ่ยขึ้นมาอย่างกระตือรือร้น", "เขายอมรับว่าทฤษฎีดาวเคราะห์ที่สมาคมเวทมนตร์เร้นลับพัฒนาขึ้นมานั้นฟังดูมีเหตุผลอยู่บ้าง ทว่าสิ่งที่เรียกว่ากฎการตกของวัตถุอะไรนี่ มันเป็นเรื่องไร้สาระบริสุทธิ์ชัดๆ!", "เควินใช้ หัตถ์เวท ยกลูกบอลดินที่อัดแน่นขึ้นจากโต๊ะทันที และใช้วิธีเดียวกันนั้นยกปากกาขนนกขึ้นไปในอากาศจนสูงลิ่ว จากนั้นก็ยกเลิกเวทมนตร์ ทำให้ทั้งสองสิ่งร่วงหล่นลงมาจากระดับความสูงเดียวกัน", "ในเวลาเพียงสองวินาทีสั้นๆ ลูกบอลดินก็ร่วงกระแทกพื้นอย่างแรงจนแตกกระจายเป็นหลายเสี่ยง ในขณะที่ปากกาขนนกใช้เวลานานกว่าสิบวินาทีกว่าจะร่วงลงมาแตะพื้นอย่างนุ่มนวล", "เมื่อเห็นผลลัพธ์เช่นนี้ บรรดาพ่อมดที่อยู่ในเหตุการณ์ต่างก็หันไปมองลินน์ด้วยสีหน้าเย้ยหยันและขบขัน", "“นี่ก็เป็นแค่ผลกระทบจากแรงต้านของอากาศเท่านั้น ทำไมเราไม่ลองทำในสุญญากาศดูเล่า?”", "ลินน์กล่าวด้วยความเยือกเย็น เนื่องจากเขาได้ทำการทดลองลูกบอลในเวอร์ชันที่เรียบง่ายกว่านี้ไปแล้ว ในระหว่างช่วงเวลาครึ่งเดือนที่ลอยคว้างอยู่ในทะเลหมอก แน่นอนว่าเขาจึงไม่ได้กังวลเลยว่าจะเกิดข้อผิดพลาดใดๆ", "สุญญากาศงั้นหรือ?", "บรรดาศาสตราจารย์จากสถาบันต่างครุ่นคิดถึงคำศัพท์ใหม่นี้ และด้วยคำอธิบายของลินน์ พวกเขาก็เข้าใจความหมายของมันได้อย่างรวดเร็ว...", "เฮลรัมครุ่นคิดอยู่ครู่หนึ่ง ก่อนจะขอให้ทุกคนถอยห่างออกไป และค่อยๆ ยื่นมือออกไปแตะเบาๆ", "ลินน์สัมผัสได้ทันทีว่าธาตุที่อยู่เบื้องหน้าของเขากำลังถูกผลักออกไปอย่างรวดเร็วด้วยพลังลึกลับบางอย่าง และเพียงไม่กี่อึดใจต่อมา อาณาเขตสุญญากาศทรงสี่เหลี่ยมผืนผ้า กว้างสี่เมตรและสูงเจ็ดเมตร ก็ปรากฏขึ้นตรงหน้าทุกคน", "เมื่อเห็นว่าเฮลรัมสามารถสร้างและคงสภาพอาณาเขตสุญญากาศขนาดใหญ่เอาไว้ได้อย่างง่ายดาย ลินน์ก็อดไม่ได้ที่จะรู้สึกตื่นตะลึงอยู่บ้าง", "แม้เขาจะเคยสูบออกซิเจนรอบตัวตอนที่อยู่ในสลัม และสามารถหลอกนักล่าแม่มดคนนั้นได้สำเร็จ แต่ในความเป็นจริงแล้ว อากาศยังคงไหลเวียนอยู่อย่างต่อเนื่อง และเขาเพียงแค่สร้างพื้นที่ที่มีออกซิเจนต่ำขนาดเล็กๆ ขึ้นมาได้ชั่วคราวเท่านั้น", "พลังอำนาจของจอมเวทผู้ยิ่งใหญ่นั้นเหนือล้ำกว่าพ่อมดทั่วไปมากนัก ลินน์เพียงแค่ลองหยั่งเชิงดูเท่านั้น ไม่คิดเลยว่าอีกฝ่ายจะสามารถทำมันได้ง่ายดายถึงเพียงนี้", "เฮลรัมเรียกปากกาขนนกออกมา และใช้เวทมนตร์สร้างลูกบอลเหล็กขึ้นมาอีกลูกหนึ่ง ก่อนจะนำทั้งสองสิ่งเข้าไปไว้ในอาณาเขตสุญญากาศ", "วัตถุทั้งสองชิ้นซึ่งมีน้ำหนักแตกต่างกันนับพันเท่า ร่วงหล่นลงมาในเวลาเดียวกัน", "สีหน้าของธีโอดอร์และคนอื่นๆ ค่อยๆ เปลี่ยนจากท่าทีสบายๆ กลายเป็นความตื่นตระหนกตกใจ ดวงตาของพวกเขาเบิกกว้างขณะจ้องมองเหตุการณ์นั้นอย่างตาไม่กะพริบ เพราะปากกาขนนกและลูกบอลเหล็กตันร่วงลงมาด้วยความเร็วที่เท่ากันจริงๆ", "“มันเป็นความจริง มันคือความจริง....”", "ฟิลิปพึมพำด้วยความตื่นตะลึง", "“เป็นไปไม่ได้! ท่านเฮลรัม ท่านไม่ได้แอบเร่งความเร็วในการตกของปากกาขนนกใช่ไหม?”", "จู่ๆ เควินก็ลุกพรวดขึ้น จ้องมองไปทางเฮลรัม ไม่อาจระงับความสงสัยเอาไว้ได้จนต้องเอ่ยถามออกมา", "คำพูดนี้ค่อนข้างจะเป็นการล่วงเกินอยู่บ้างอย่างไม่ต้องสงสัย แต่เห็นได้ชัดว่าเควินไม่มีกะจิตกะใจจะมาสนเรื่องนั้นอีกต่อไปแล้ว", "เฮลรัมไม่ได้ใส่ใจเขาและทำการทดลองต่อไป โดยเปลี่ยนลูกบอลเหล็กกับขนนกเป็นวัสดุอื่นๆ ไม่ว่าจะเป็นไม้ หิน หยดน้ำ...ผลลัพธ์ที่ได้ล้วนเหมือนเดิมทุกประการ", "เมื่อเห็นดังนั้น ไม่ว่าบรรดาศาสตราจารย์จะรู้สึกอย่างไร พวกเขาก็ต้องยอมจำนนและยอมรับว่ากฎของการตกอย่างอิสระในต้นฉบับนั้นคือความจริง!", "“หรือว่าทฤษฎีของท่านปรมาจารย์ยาเดจะผิดพลาดไปทั้งหมดกัน?”", "ความสับสนยังคงฉายชัดอยู่บนใบหน้าของเควินตลอดเวลา", "“ไม่หรอก ทฤษฎีของเขาไม่ได้ผิด แต่มันคือการตีความเรื่องแรงต้านของอากาศต่างหาก”", "ลินน์ส่ายหน้าและกล่าวอย่างไหลลื่น", "ทฤษฎีของยาเดได้รับความนิยมและได้รับการยอมรับจากพ่อมดส่วนใหญ่ ก็เพราะมันสามารถใช้อธิบายปรากฏการณ์ทางธรรมชาติบางอย่างได้อย่างแม่นยำนั่นเอง", "ยกตัวอย่างเช่น ความรู้ด้านกลศาสตร์ของไหลที่อาจารย์โครของเขาใช้ในการปรับปรุง เวทใบมีดน้ำแข็ง ก็มีพื้นฐานมาจากการต่อยอดทฤษฎีของยาเด", "ในขณะที่เปิดดู วารสารเวทมนตร์รายสัปดาห์ ลินน์ยังพบว่ามีพ่อมดบางคนนำแรงต้านของอากาศมาบูรณาการเข้ากับผลกระทบของแรงโน้มถ่วง และเชื่อว่าอากาศและธาตุมีการเคลื่อนที่อย่างต่อเนื่องก็เป็นเพราะแรงโน้มถ่วง", "นี่เป็นสมมติฐานที่ชวนสับสนงุนงงอย่างไม่ต้องสงสัย", "อย่างไรก็ตาม ลินน์จะไม่มีวันเยาะเย้ยหรือดูถูกคนอื่นในเรื่องนี้ เพราะเส้นทางในการไขความลับแห่งความจริงของโลกนั้น มักจะถูกห้อมล้อมไปด้วยความผิดพลาดนับไม่ถ้วนอยู่เสมอ", "ไม่ว่าจะเป็นในประวัติศาสตร์หรือยุคสมัยใหม่ สำหรับปรากฏการณ์ทางฟิสิกส์เดียวกัน นักวิชาการจากหลากหลายสาขามักจะตั้งสมมติฐานที่แตกต่างกันมากมาย ซึ่งแต่ละทฤษฎีก็ฟังดูมีเหตุผลและสามารถใช้อธิบายปรากฏการณ์บางส่วนได้", "มีเพียงการตกตะกอนของกาลเวลาและการตรวจสอบอย่างต่อเนื่องเท่านั้น ที่จะทำให้ความจริงสามารถเอาชนะความผิดพลาดได้ในท้ายที่สุด", "เหตุผลที่เขาสามารถนั่งอยู่ตรงนี้และถกเถียงได้อย่างอิสระเสรี ไม่ใช่เพราะเขาฉลาดกว่าทุกคนที่อยู่ที่นี่ แต่เพียงเพราะเขากำลังยืนอยู่บนไหล่ของยักษ์ต่างหาก..."]}, {"t": "เวทมนตร์จิตวิญญาณต้องห้าม", "c": ["การทดลองการตกอย่างอิสระจบลงอย่างรวดเร็ว และหลังจากที่เฮลรัมคลายอาณาเขตสุญญากาศ บรรดาศาสตราจารย์ที่มารวมตัวกันจึงเริ่มหลุดพ้นจากความตื่นตะลึงก่อนหน้านี้", "“ดูเหมือนโครจะพูดถูก ทฤษฎีในดินแดนพ่อมดนั้นล้าหลังเมื่อเทียบกับโลกภายนอกจริงๆ”", "เฮลรัมกล่าวด้วยความรู้สึกประหลาดใจ", "นอกเหนือจากทฤษฎีดาวเคราะห์และสูตรพลังงานจลน์แล้ว ยังมีทฤษฎีอีกหลายอย่างที่ยังไม่ได้รับการพิสูจน์ในต้นฉบับงานวิจัยของลินน์ ซึ่งถูกพิสูจน์โดยสัญลักษณ์มากมายที่เขาไม่สามารถทำความเข้าใจได้เลย สิ่งเหล่านี้แตกต่างจากวิธีการคำนวณที่มีอยู่ในดินแดนพ่อมดอย่างเห็นได้ชัด", "เมื่อได้ยินเช่นนั้น ธีโอดอร์ เควิน และคนอื่นๆ ต่างก็มีสีหน้าอึดอัดใจ แต่ก็ไม่มีใครเอ่ยปากโต้แย้งเลยแม้แต่คนเดียว", "“ประชากรของดินแดนพ่อมดก็ยังน้อยเกินไปอยู่ดี!”", "ฟิลิปซึ่งยืนอยู่ด้านข้างอดไม่ได้ที่จะถอนหายใจเฮือกใหญ่", "แม้จะผ่านการพัฒนามาหลายร้อยปี สถานที่หลบภัยเล็กๆ ของเหล่าพ่อมดที่ลี้ภัยมาก็ได้เติบโตขึ้นจนกลายเป็นดินแดนศักดิ์สิทธิ์แห่งเวทมนตร์ในปัจจุบัน ทว่าถึงกระนั้น ดินแดนพ่อมดก็มีประชากรเพียงแค่หกแสนคน โดยมีพ่อมดเต็มตัวประมาณเจ็ดพันคน ส่วนจอมเวทผู้ยิ่งใหญ่ก็ยิ่งมีน้อย และพ่อมดระดับตำนานก็มีเพียงเจ็ดคนเท่านั้น", "ภายนอกดินแดนพ่อมด เพียงแค่จักรวรรดิเซกัสแห่งเดียวก็มีประชากรมากถึงยี่สิบล้านคนแล้ว แม้จะมีการไล่ล่าและปิดกั้นจากศาสนจักร แต่จำนวนพ่อมดเต็มตัวที่นั่นก็จะต้องมีมากกว่าที่นี่หลายเท่าตัวอย่างไม่ต้องสงสัย จึงไม่ใช่เรื่องที่เป็นไปไม่ได้เลยหากพวกเขาจะค้นคว้าวิจัยทฤษฎีบางอย่างได้ก่อนพวกตน", "“ท่านลินน์ ข้าต้องขอขอบคุณท่านที่ยอมเสี่ยงอันตรายนำต้นฉบับงานวิจัยอันล้ำค่านี้มายังดินแดนพ่อมด”", "เฮลรัมกล่าว ก่อนจะหยุดชะงักไปครู่หนึ่งแล้วพูดต่อ", "“ข้ามีคำขอร้องที่อาจจะดูเสียมารยาทไปสักหน่อย ข้าอยากจะว่าจ้างท่านให้เป็นศาสตราจารย์ที่สถาบันอิเยตา เพื่อเปิดสอนวิชาใหม่ที่เกี่ยวข้องกับความรู้แปลกใหม่บางส่วนจากสมาคมเวทมนตร์เร้นลับ”", "จากสัญลักษณ์ที่อ่านไม่ออกในต้นฉบับ เห็นได้ชัดว่าความรู้ของสมาคมเวทมนตร์เร้นลับนั้นเป็นระบบระเบียบ ซึ่งจำเป็นต้องมีการเรียนรู้เฉพาะทางเพื่อทำความเข้าใจความหมายของสัญลักษณ์เหล่านี้", "หากลินน์ตกลง ในอนาคตเมื่อทฤษฎีเหล่านี้ถูกตีพิมพ์เผยแพร่ออกไป สถาบันอิเยตาก็จะได้รับชื่อเสียงอันยิ่งใหญ่ตามไปด้วยอย่างแน่นอน", "เมื่อต้องเผชิญกับข้อเสนอที่เฮลรัมยื่นให้ ความคิดในหัวของลินน์ก็หมุนวนเป็นพายุ เขาก็เริ่มชั่งน้ำหนักข้อดีและข้อเสีย", "การเข้าร่วมกับสถาบันอิเยตานั้นมีข้อดีหลายประการ", "ประการแรก ปัญหาเรื่องสถานะทั้งหมดของเขาจะได้รับการแก้ไข และเขาจะมีผู้สนับสนุนที่พึ่งพาได้", "ประการที่สอง การใช้ตำแหน่งศาสตราจารย์จะทำให้เขาสามารถเข้าถึงหนังสือเวทมนตร์ของสถาบัน เพื่อนำมาเติมเต็มข้อบกพร่องด้านความรู้ทางเวทมนตร์ของเขาเองได้", "อย่างไรก็ตาม ข้อเสียก็คือ สถาบันอิเยตาไม่ใช่หนึ่งในสถาบันชั้นนำที่มีพ่อมดระดับตำนานประจำอยู่ และเขาก็ไม่แน่ใจว่าสถาบันแห่งนี้จะสามารถรับแรงกดดันได้มากน้อยแค่ไหน หากในครั้งหน้าเขาเสนอทฤษฎีที่ปฏิวัติวงการขึ้นมาอีก ก็มีความเป็นไปได้สูงที่เฮลรัมอาจจะไม่สามารถสนับสนุนเขาได้", "หลังจากพิจารณาอยู่นาน ลินน์ก็พยักหน้าและตอบรับข้อเสนอ", "นับตั้งแต่เข้าสู่ท่าเรือและได้พูดคุยกับจอมเวทผู้ยิ่งใหญ่ ลินน์ก็เห็นได้ชัดว่าเฮลรัมไม่ใช่คนที่หยิ่งยโสและดื้อรั้น การที่เขาสามารถทนดูฮาล์ฟลิงกลุ่มหนึ่งทำการทดลองบินในจัตุรัสได้ และไม่ได้ด่วนตั้งคำถามกับทฤษฎีต่างๆ ของเขาทันที นั่นก็บ่งชี้ได้ว กับวิธีการที่ชาวเมืองท่าสามารถเข้าเรียน และเลื่อนระดับในเวลาต่อมาให้ฟังด้วย", "โดยทั่วไปแล้ว ในช่วงต้นปีของทุกปี เด็กๆ ในเมืองท่าที่อายุครบสิบสองปี จะมีโอกาสได้ทดสอบพรสวรรค์ทางเวทมนตร์ของตน และหากพวกเขาสอบผ่านแล้วยอมจ่ายค่าเล่าเรียน พวกเขาก็จะได้รับการรับเข้าศึกษาในสถาบันอิเยตาในฐานะพ่อมดฝึกหัดอันทรงเกียรติ", "หลังจากศึกษาในระดับที่สูงขึ้นไปหลายปี เมื่อการเติบโตของพลังเวทของพวกเขามาถึงจุดอิ่มตัว พวกเขาจะต้องทำลายคอขวดขั้นสุดท้ายด้วยการดื่มโพชั่นที่เรียกว่า ต้นกำเนิดเวทมนตร์", "แน่นอนว่า โพชั่นเวทมนตร์ชนิดนี้ไม่ใช่ของที่จะหามาได้ง่ายๆ เนื่องจากมันถูกแจกจ่ายโดยตรงจากนครพ่อมด", "ตามกฎของสถาบันอิเยตา ศิษย์ฝึกหัดจำเป็นต้องสำเร็จการศึกษาในหนึ่งหรือสองวิชา จากนั้นจึงจะได้รับการรับรองและคำแนะนำจากศาสตราจารย์ของสถาบันที่เกี่ยวข้อง", "ลินน์มองออกในทันทีว่านี่คือกลอุบายของสถาบันหลักต่างๆ หรือแม้กระทั่งสภาพ่อมด ที่ต้องการผูกขาดสิทธิในการเลื่อนระดับของสามัญชนในการขึ้นเป็นพ่อมด", "แน่นอนว่า ในที่สาธารณะ เหตุผลที่สภาพ่อมดกล่าวอ้างนั้นฟังดูสูงส่งยิ่งนัก นั่นคือเพื่อป้องกันไม่ให้ศิษย์ฝึกหัดที่มีเจตนาร้าย ได้รับพลังเวทมนตร์ที่ทรงพลังยิ่งขึ้น", "ตอนนี้เขาได้รับสถานะเป็นศาสตราจารย์ของสถาบันแล้ว ในทางทฤษฎี เขาก็มีคุณสมบัติที่จะยื่นเรื่องต่อสภาเพื่อขอโพชั่นเลื่อนระดับให้กับศิษย์ฝึกหัดคนใดคนหนึ่งได้ อย่างไรก็ตาม การทำเช่นนั้นหมายความว่าเขาจะต้องแอบยักยอกโพชั่น ต้นกำเนิดเวทมนตร์ มาเป็นของตัวเอง ซึ่งไม่เพียงแต่จะต้องผ่านขั้นตอนที่ยุ่งยาก แต่ยังเสี่ยงต่อการถูกจับได้อีกด้วย", "ช่องทางที่สอง คือการข้ามสถาบันและสภาพ่อมดไป แล้วหาโพชั่นเวทมนตร์มาด้วยวิธีอื่น", "ยกตัวอย่างเช่น...การซื้อมันในตลาดมืด", "ที่ใดมีความต้องการ ที่นั่นย่อมมีการค้าขาย มันก็แค่ขึ้นอยู่กับว่าราคาจะเหมาะสมหรือไม่เท่านั้น", "หาก ต้นกำเนิดเวทมนตร์ คือโพชั่นเวทมนตร์ ดังนั้นมันก็ต้องมีปรมาจารย์นักปรุงยาที่รู้วิธีปรุงมันขึ้นมา และหากเขาสามารถหาวิธีที่ได้สูตรโพชั่นชนิดนี้มา แล้วนำมาปรุงมันด้วยตัวเอง นั่นย่อมเป็นทางเลือกที่ปลอดภัยที่สุดอย่างแน่นอน!", "เมื่อคิดได้เช่นนี้ ลินน์ก็รวบรวมสมาธิที่กระจัดกระจายและเริ่มทำกิจวัตรประจำวันด้วยการทำสมาธิ แล้วทะเลแห่งธาตุอันไร้ที่สิ้นสุดก็ได้ปรากฏขึ้นตรงหน้าเขาอีกครั้ง", "ไม่ว่าจะเกิดอะไรขึ้น ก่อนที่จะได้โพชั่นเวทมนตร์เลื่อนระดับมา เขาจะต้องพยายามอย่างเต็มที่เพื่อเพิ่มปริมาณพลังเวทและพลังจิตวิญญาณรวมของเขาให้สมบูรณ์แบบเสียก่อน", "คาร์ล เจ้าของร่างเดิม เป็นเพียงพ่อมดฝึกหัดธรรมดาๆ ที่เพิ่งจะสัมผัสกับเวทมนตร์มาได้แค่ครึ่งปีเท่านั้น", "โชคดีที่ตอนที่เขาทะลุมิติมา การหลอมรวมกันของจิตวิญญาณได้ทำให้พลังจิตวิญญาณของเขาเพิ่มขึ้นอย่างมหาศาล และความจุของพลังเวทก็พุ่งสูงขึ้นตามไปด้วย หากอ้างอิงตามทฤษฎีการเติบโตส่วนเพิ่มของพลังเวทใน หนังสือทฤษฎีเวทมนตร์พื้นฐาน ในเวลาอีกประมาณสองถึงสามเดือน เขาก็จะบรรลุถึงคอขวดนั้นแล้ว...", "จำนวนเงินที่อาจจะต้องใช้ในการซื้อ ต้นกำเนิดเวทมนตร์, ข้อมูลข่าวสารเกี่ยวกับโพชั่นเวทมนตร์, เวลาที่ต้องใช้ในการเพิ่มพลังเวท...ปัจจัยสามประการนี้ คืออุปสรรคที่ขัดขวางไม่ให้เขาก้าวขึ้นเป็นพ่อมดเต็มตัว!"]}, {"t": "คณิตศาสตร์โอลิมปิก", "c": ["เช้าวันรุ่งขึ้น หลังจากทำสมาธิมาตลอดทั้งคืน ลินน์ก็จัดการชำระล้างร่างกายอย่างง่ายๆ แล้วผลักประตูเดินออกไป แต่ก็บังเอิญไปชนเข้ากับศาสตราจารย์ฟิลิปแห่งภาควิชาธาตุที่กำลังจะออกไปข้างนอกพอดี", "“ศาสตราจารย์ลินน์ เมื่อคืนท่านพักผ่อนเต็มอิ่มหรือไม่?”", "ฟิลิปเอ่ยทักทายด้วยรอยยิ้ม", "“หลับสนิทเลยล่ะ สภาพความเป็นอยู่ที่นี่สุขสบายกว่าภายในจักรวรรดิเซคัสมากนัก”", "ลินน์ตอบกลับด้วยใบหน้าเปื้อนยิ้ม ตั้งแต่วันนี้เป็นต้นไป เขาไม่ต้องคอยหวาดระแวงภัยคุกคามจากศาสนจักรตลอดเวลาอีกต่อไปแล้ว", "“แน่นอน ข้าเคยได้ยินมาว่าคนยากไร้ที่นั่นต้องอาศัยอยู่ในบ้านที่สร้างจากหลังคามุงจากและอิฐหิน นั่นเรื่องจริงหรือเปล่า?”", "ฟิลิปถามด้วยความอยากรู้อยากเห็นอย่างยิ่ง", "สำหรับฟิลิปผู้ซึ่งมาจากดินแดนพ่อมด ความรู้อันน้อยนิดที่เขามีเกี่ยวกับจักรวรรดิเซคัสล้วนมาจากข่าวลือทั้งสิ้น เขาชอบไปนั่งที่โรงเตี๊ยมตรงท่าเรือในคืนวันแห่งแสงจันทร์ เพื่อฟังบรรดากะลาสีเรือเล่าเรื่องราวเกี่ยวกับโลกภายนอก", "“นั่นเป็นเรื่องจริงหากท่านพูดถึงแค่พวกคนยากจน แต่พวกขุนนางและนักบวชกลับใช้ชีวิตอย่างหรูหราฟู่ฟ่าสุดๆ ”", "ลินน์กล่าว เมื่อเห็นความสนใจของฟิลิป และอาศัยความทรงจำของคาร์ล เจ้าของร่างเดิม เขาจึงอธิบายเรื่องราวของจักรวรรดิและศาสนจักรให้ฟังคร่าวๆ", "“ในเมื่อท่านเคยต่อสู้กับอาร์ชบิชอปคนนั้นแล้ว ท่านรู้หรือไม่ว่าคนพวกนี้ใช้วิชาศักดิ์สิทธิ์ได้อย่างไร? พวกเขาต้องเรียนรู้เรื่องธาตุ การแปรสภาพ หรือการเล่นแร่แปรธาตุเหมือนพวกเราด้วยหรือไม่?”", "ฟิลิปถามอีกครั้ง", "“ข้าไม่คิดว่าพวกเขาจำเป็นต้องเรียนนะ”", "ลินน์ส่ายหน้า เมื่อพิจารณาจากขั้นตอนการคัดเลือกนักบวชในอาณาเขตนอร์ดแลนด์ นักบวชเหล่านั้นขอเพียงแค่ต่อสู้เป็นและมีความศรัทธาต่อเทพเจ้าอย่างแรงกล้าก็เพียงพอแล้ว", "นั่นเป็นสิ่งที่เขายังคงไม่เข้าใจมาโดยตลอด หรือว่านอกจากการแสวงหาความจริงแล้ว ยังมีวิธีอื่นในการได้รับพลังอำนาจอีกงั้นหรือ?", "ฟิลิปไม่ได้เจาะลึกในประเด็นนี้มากนัก และหลังจากที่ได้สนองความอยากรู้อยากเห็นของตนไปบ้างแล้ว เขาก็รับอาสาที่จะแนะนำทุกพื้นที่ของสถาบันอิเยตาให้ลินน์รู้จัก", "สถาบันอิเยตาครอบคลุมพื้นที่กว่าสองหมื่นตารางเมตร อาคารอันเป็นสัญลักษณ์อย่างหอคอยก็ตั้งตระหง่านอยู่ใจกลางสถาบัน ด้านหลังหอคอยคือที่พักของศิษย์ฝึกหัดและศาสตราจารย์ โดยมีร้านขายหนังสือเวทมนตร์และลานฝึกซ้อมการต่อสู้ตั้งอยู่ทางฝั่งขวาของสถาบัน ส่วนพื้นที่ที่เหลือถูกจัดสรรให้เป็นเขตพื้นที่การเรียนการสอนสำหรับแต่ละภาควิชา", "ธาตุ แปรสภาพ เล่นแร่แปรธาตุ โพชั่นเวทมนตร์...นี่คือสี่ภาควิชาหลักของสถาบันอิเยตาในปัจจุบัน", "นอกจากนี้ ที่นครพ่อมด สถาบันชั้นนำบางแห่งยังมีหลักสูตรพิเศษอย่างวิชาพยากรณ์และสนามพลังอีกด้วย", "“เมื่อก่อนที่นี่เคยมีภาควิชาพลังจิตวิญญาณด้วยนะ แต่มันถูกยกเลิกไปแล้ว และนั่นจะเป็นสถานที่ที่ท่านจะใช้สอนในอนาคต”", "ฟิลิปกล่าวพลางชี้ไปยังอาคารหลังหนึ่งที่ตั้งแยกออกมาข้างๆ หอคอย", "อาดารสถาบันพลังจิตวิญญาณทั้งหลังนั้นดูมืดมนและถูกปกคลุมด้วยกำแพงสีเทาทึบ คงเป็นเพราะขาดผู้มาเยือนเป็นเวลานาน กำแพงจึงถูกปกคลุมไปด้วยตะไคร่น้ำและดูทรุดโทรมไปบ้าง", "“เดี๋ยวข้าจะหาภูตรับใช้สักสองสามตนมาทำความสะอาดที่นี่ ช่วงบ่ายก็น่าจะพร้อมใช้งานได้แล้วล่ะ...พวกพ่อมดสายพลังจิตวิญญาณพวกนั้นชอบทำตัวลึกลับน่ากลัว ถ้าถามข้า ข้าว่ามันเป็นเรื่องดีแล้วล่ะที่สภาพ่อมดกำจัดพวกนั้นทิ้งไป”", "ฟิลิปกล่าวอย่างอารมณ์ดีเล็กน้อย จากนั้นก็เริ่มแจ้งตารางเรียนให้ลินน์ทราบ", "ในฐานะศาสตราจารย์ พวกเขาสามารถจัดสรรเวลาเรียนได้อย่างอิสระ แต่ทางที่ดีควรจัดให้เป็นเวลาประจำ และพยายามอย่าให้ชนกับเวลาสอนของศาสตราจารย์ท่านอื่น มิฉะนั้น ศิษย์ฝึกหัดจะต้องเลือกเรียนระหว่างสองวิชา", "อย่างไรก็ตาม ทันทีที่ฟิลิปร่ายตารางเรียนของสี่วิชาที่มีอยู่จนจบ ลินน์ก็ตระหนักได้ทันทีว่าสิ่งที่ฟิลิปพูดมาก่อนหน้านี้มันเปล่าประโยชน์สิ้นดี เพราะเกือบทุกวันล้วนอัดแน่นไปด้วยหลักสูตรต่างๆ และหลักสูตรใหม่ที่เขากำลังจะเปิดสอนก็หนีไม่พ้นที่จะต้องแย่งชิงเวลากับภาควิชาอื่นๆ", "“ภาควิชาธาตุเป็นวิชาที่มีผู้ลงทะเบียนเรียนมากที่สุดในสถาบันอิเยตา โดยปกติจะมีการเรียนการสอนตั้งแต่สิบโมงเช้าถึงเที่ยงวัน และหนึ่งทุ่มถึงสามทุ่ม...”", "ฟิลิปเอ่ยเตือนด้วยความหวังดี ซึ่งนั่นหมายความว่าลินน์ไม่ควรคาดหวังที่จะเปิดสอนหลักสูตรใหม่ของเขาในช่วงเวลาดังกล่าว เพราะจะต้องมีคนมาเรียนน้อยอย่างแน่นอน", "ลินน์พยักหน้ารับโดยไม่แสดงความเห็นใดๆ และฟิลิปก็เอ่ยถามขึ้นมาอีกครั้ง", "“ท่านคิดชื่อสำหรับภาควิชาใหม่ไว้หรือยัง?”", "“เอาเป็น...คณิตศาสตร์ลี้ลับ ดีไหม?”", "ลินน์พูดอย่างครุ่นคิด", "หลังจากตอบรับตำแหน่งศาสตราจารย์ ลินน์ก็เอาแต่ครุ่นคิดมาตลอดว่าจะสอนอะไรดี", "เวทมนตร์นั้นไม่ใช่ทางเลือกอย่างแน่นอน", "จนถึงตอนนี้ จำนวนเวทมนตร์ทั้งหมดที่เขาเชี่ยวชาญยังมีไม่ถึงสิบวิชาด้วยซ้ำ บางทีอาจจะน้อยกว่าศิษย์ฝึกหัดบางคนด้วย การสอนเวทมนตร์มีแต่จะทำให้เขากลายเป็นตัวตลก เว้นเสียแต่ว่าเขาจะยอมเปิดเผยวิธีการสร้างฟอสฟอรัสขาว", "แต่นั่นคือหนึ่งในไพ่ตายไม่กี่ใบที่เขาซ่อนไว้ และลินน์ก็ยังไม่พร้อมที่จะปล่อยให้ข้อมูลนั้นแพร่กระจายออกไป ดังนั้น เขาจึงต้องเลือกสอนจากวิชาในโลกเดิมของเขาแทน", "วิชาอย่างวรรณกรรม ภูมิศาสตร์ และชีววิทยานั้น ล้วนได้รับอิทธิพลจากโลกใบนั้น และไม่เหมาะที่จะนำมาใช้เป็นเนื้อหาการสอน", "เคมีก็ฟังดูเข้าท่า แต่มันดันไปทับซ้อนกับภาควิชาธาตุ มันคงไม่เหมาะนักที่จะเปิดศึกแย่งชิงลูกศิษย์กับฟิลิปตั้งแต่เพิ่งมาถึง และอีกอย่าง โลกใบใหม่ก็อาจจะมีธาตุแปลกใหม่ที่เขายังไม่รู้จัก ดังนั้นทางที่ดีก็อย่าเพิ่งสอนสุ่มสี่สุ่มห้าเลยจะดีกว่า", "แล้วฟิสิกส์ล่ะ?", "เขาคงต้องเขียนสูตรขึ้นมาแล้วให้คนอื่นทำความเข้าใจสัญลักษณ์การดำเนินการทางคณิตศาสตร์ที่เกี่ยวข้อง", "ดังนั้น ทางเลือกเดียวของเขาก็คือ คณิตศาสตร์!", "ในโลกใบนี้ วงกลมก็ยังคงเป็นวงกลม สี่เหลี่ยมก็ยังคงเป็นสี่เหลี่ยม และกฎพื้นฐานของการคำนวณก็เป็นสากล ยิ่งไปกว่านั้น คณิตศาสตร์ยังเป็นรากฐานของวิทยาศาสตร์และเทคโนโลยีทั้งหมด เป็นเครื่องมือสำคัญสำหรับมนุษยชาติในการทำความเข้าใจและพลิกโฉมโลก", "อาจกล่าวได้ว่า ทฤษฎีทางวิทยาศาสตร์ส่วนใหญ่ล้วนสามารถอธิบายได้ด้วยสูตรทางคณิตศาสตร์ และวิชานี้ก็จะก้าวล้ำนำยุคสมัยอยู่เสมอ ความสำเร็จทางวิทยาศาสตร์อันล้ำสมัยมากมายล้วนได้มาจากการอนุมานทางคณิตศาสตร์ทั้งสิ้น!", "เช่นเดียวกันกับทฤษฎีทางเวทมนตร์ก็น่าจะเป็นไปในทิศทางนั้น", "ยกตัวอย่างเช่น สูตรของเฮลรามที่เขาใช้ตอนที่เรียนเวทศรเวทมนตร์ และงานวิจัยเกี่ยวกับกลศาสตร์ของไหลของโคร ล้วนเกี่ยวข้องกับการคำนวณทางคณิตศาสตร์อย่างซับซ้อน ซึ่งบ่งชี้ว่าบรรดาพ่อมดได้เริ่มศึกษาคณิตศาสตร์กันมาตั้งแต่เนิ่นๆ แล้ว เพียงแต่ยังไม่ได้ก่อตั้งเป็นภาควิชาเฉพาะเท่านั้นเอง", "เหตุผลนั้นเรียบง่ายมาก เพราะพ่อมดไม่สามารถดึงพลังอำนาจจากคณิตศาสตร์ได้โดยตรง แต่ได้รับประโยชน์ในทางอ้อม จากการนำมันไปประยุกต์ใช้กับเวทมนตร์บางบท", "สิ่งนี้ส่งผลให้สูตรทางคณิตศาสตร์ทั้งหมดถูกนำไปผูกติดกับภาควิชาต่างๆ เพราะเวลาที่มีการหยิบยกขึ้นมาพูดคุย ในบางครั้งแม้แต่วิธีการคำนวณและสัญลักษณ์ก็ยังไม่เป็นอันหนึ่งอันเดียวกันด้วยซ้ำ", "หลังจากที่ลินน์อธิบายแนวคิดของวิชาคณิตศาสตร์ลี้ลับให้ฟังอย่างคร่าวๆ ฟิลิปก็มีสีหน้างุนงงเล็กน้อย เขาคิดว่าลินน์จะนำเอาทฤษฎีแปลกใหม่จากสมาคมเวทมนตร์เร้นลับมาสอนในหลักสูตรใหม่เสียอีก ไม่ใช่วิธีการทางคณิตศาสตร์ง่ายๆ แบบนี้", "ศิษย์ฝึกหัดจะอยากเรียนเรื่องพวกนี้จริงๆ หรือ?", "ฟิลิปอ้าปากคล้ายกับต้องการจะพูดอะไรบางอย่าง แต่แล้วก็ลังเล เพราะเขารู้สึกว่าหากลินน์สอนแต่เรื่องพวกนี้ เขาอาจจะดึงดูดศิษย์ฝึกหัดไม่ได้เลยแม้แต่คนเดียว", "แต่อย่างไรก็ตาม การจะสอนอะไรนั้นเป็นอิสระของศาสตราจารย์แต่ละคน และด้วยเหตุนี้ ฟิลิปจึงไม่มีสิทธิ์ที่จะไปแนะนำเป็นอย่างอื่น แต่เขาก็คิดในใจแล้วว่า เขาควรจะพูดเกริ่นถึงหลักสูตรใหม่ให้นักเรียนฟังในระหว่างคาบเรียนของเขา เพื่อที่ลินน์จะได้ไม่ต้องตกอยู่ในสถานการณ์ที่น่าอับอายเพราะไม่มีใครมาเข้าเรียนในหลักสูตรของเขาเลย"]}, {"t": "การแลกเปลี่ยนเงินตราและบทเรียน 1", "c": ["“นี่คือสถานที่แลกเปลี่ยนเงินตรา!”", "ทางฝั่งตะวันตกของท่าเรืออิเยตา ฟิลิปพาลินน์เดินเข้าไปในร้านที่ตกแต่งอย่างหรูหราตระการตา พื้นร้านปูด้วยหินอ่อนสีขาวบริสุทธิ์ เรียบเนียนราวกับกระจก หัวกริฟฟินอันสง่างามสองหัวแขวนประดับอยู่บนกำแพง นัยน์ตาเหยี่ยวอันแหลมคมของพวกมันจ้องมองลูกค้าทุกคนที่เดินเข้าออกอย่างใจจดใจจ่อ", "ใจกลางโถงมีโคมไฟเห็ดเรืองแสงขนาดใหญ่ส่องสว่างอยู่ พืชเวทมนตร์ที่สามารถเรืองแสงได้เองอย่างน่าประหลาดชนิดนี้ มักจะเติบโตอยู่แค่ในถ้ำที่มืดมิดที่สุด ปะปนอยู่กับพวกสัตว์ฟันแทะ ผีดิบ และสิ่งมีชีวิตที่สกปรกและอันตรายอื่นๆ โดยทั่วไปแล้วราคาของมันจะอยู่ที่ประมาณสิบสองถึงสามสิบเหรียญทองเวทมนตร์", "“นอกจากการแลกเปลี่ยนเงินตราแล้ว ท่านยังสามารถฝากเหรียญที่เหลือไว้ที่นี่ได้ด้วย เพียงแค่แสดงใบรับรอง ท่านก็จะสามารถนำไปแลกเป็นเหรียญทองเวทมนตร์ในจำนวนที่เท่ากันได้ในทุกเมืองทั่วดินแดนพ่อมด แต่ท่านจะต้องจ่ายค่าธรรมเนียมการฝากเพิ่มเติม”", "ฟิลิปอธิบายต่อ", "นี่มันต้นแบบของธนาคารไม่ใช่หรือไง?", "มันมีระบบรับฝากเงินแบบธนาคารแล้ว แต่ที่นี่ไม่เพียงแต่จะไม่มีดอกเบี้ยให้เท่านั้น แต่ยังมีการเก็บค่าธรรมเนียมเพิ่มเติมอีก...ในแง่นี้ มันดูเหมือนร้านรับแลกเงินมากกว่า", "ขณะที่ลินน์กำลังคิดเช่นนี้ เขาก็ค้นพบอย่างรวดเร็วว่าวันนี้สถานที่แลกเปลี่ยนเงินตราดูพลุกพล่านผิดปกติ ผู้คนนับร้อยยืนกระจายตัวกันอยู่ทั่วโถง ดูเหมือนกำลังถกเถียงเรื่องอะไรบางอย่างกันอยู่", "และเขาก็ดันจำคนเหล่านี้ได้ พวกเขาคือลอดด์และลูกเรือของเขานั่นเอง", "“เอาขยะของพวกเจ้ากลับไปซะ เราไม่รับแร่ดำ และเราก็ไม่ต้องการเหรียญทองแดงด้วย!”", "ชายวัยกลางคนในชุดคลุมสีเทาและมีป้ายตราทองแดงติดอยู่ที่หน้าอก กำลังตะคอกใส่พวกของลอดด์ด้วยความรำคาญใจ แต่เมื่อเห็นฟิลิปเดินเข้ามา ใบหน้าของเขาก็เปลี่ยนเป็นรอยยิ้มต้อนรับในทันที เขาผลักกะลาสีสองสามคนที่ยืนขวางทางออกไป แล้วเอ่ยทักทายอย่างอารมณ์ดี", "“อา...ศาสตราจารย์ฟิลิป หายากนะขอรับที่จะได้เห็นท่านที่นี่ วันนี้มีลมอะไรหอบท่านมาหรือ?”", "“ไม่ได้เจอกันนานเลยนะ อัลเบิร์ต ดูเหมือนว่าเจ้าจะได้งานที่ดีไม่เลวเลยหลังเรียนจบ”", "ฟิลิปกล่าวด้วยรอยยิ้มขณะแนะนำพวกเขาให้รู้จักกัน", "อัลเบิร์ต เป็นบัณฑิตรุ่นที่เก้าจากท่าเรืออิเยตา เป็นพ่อมดเต็มตัวที่เชี่ยวชาญด้านเวทมนตร์ธาตุและภาควิชาแปรสภาพ", "“ส่วนสุภาพบุรุษท่านนี้ คือศาสตราจารย์ประจำภาควิชาคณิตศาสตร์ลี้ลับคนใหม่ของสถาบันอิเยตา ท่านลินน์!”", "ฟิลิปกล่าวพลางผายมือไปทางลินน์", "“อรุณสวัสดิ์ขอรับ ศาสตราจารย์ลินน์ เมื่อคืนนี้ที่โรงเตี๊ยม ข้าได้ยินจากพวกลูกเรือว่าท่านเป็นผู้นำพาพวกเขาเอาชนะน้ำวน ดวงตามรณะ ในทะเลหมอกมาได้ มันจะต้องเป็นเวทมนตร์ขั้นสูงที่ล้ำลึกมากแน่ๆ”", "อัลเบิร์ตพูดยกยอ โดยไม่ได้แสดงท่าทีดูแคลนรูปลักษณ์ที่ดูอ่อนเยาว์ของลินน์เลยแม้แต่น้อย", "โดยปกติแล้ว ศาสตราจารย์ที่สถาบันอิเยตามักจะเป็นพ่อมดระดับสามวงแหวนที่มีความเชี่ยวชาญอย่างลึกซึ้งในสาขาวิชาใดวิชาหนึ่ง และยิ่งพวกเขาอายุน้อยเท่าไหร่ พรสวรรค์ด้านเวทมนตร์ก็ยิ่งสูงมากขึ้นเท่านั้น ซึ่งทำให้พวกเขามีโอกาสสูงที่จะได้กลายเป็นจอมเวทผู้ยิ่งใหญ่ที่น่านับถือในอนาคต", "“อรุณสวัสดิ์ ท่านอัลเบิร์ต ข้ามาที่นี่เพื่อแลกเปลี่ยนเงินตราเช่นกัน”", "ลินน์กล่าวอย่างสุภาพ จากนั้นก็หยิบเหรียญทองเซคัสสิบสองเหรียญ เหรียญเงินยี่สิบเจ็ดเหรียญ และเหรียญทองแดงอีกสิบเอ็ดเหรียญออกมา นี่คือทรัพย์สมบัติทั้งหมดของเขา ที่ยึดมาจากบิชอปสองคนที่ถูกสังหารในเมืองท่า", "“เหรียญทองแดงไม่สามารถแลกได้ ใช่หรือไม่?”", "ลินน์นึกถึงคำพูดก่อนหน้านี้ได้ จึงเตรียมจะเก็บเศษเหรียญทองแดงในมือกลับมา", "“อะแฮ่ม...ไม่ใช่อย่างนั้นหรอกขอรับ เพียงแต่การแปลงมูลค่าของเหรียญทองแดงนั้นค่อนข้างจะยุ่งยากนิดหน่อย”", "อัลเบิร์ตกล่าวด้วยความเก้อเขินเล็กน้อย เขาส่ายหน้าแล้วรีบใช้ หัตถ์เวท รวบรวมเหรียญทั้งหมดไปก่อนที่ลินน์จะทันได้ขยับตัว และส่งพวกมันให้ผู้ช่วยนำไปแลกเปลี่ยนเป็นเหรียญทองเวทมนตร์ตามจำนวนที่สอดคล้องกัน", "จากนั้นอัลเบิร์ตก็บ่นอุบอิบถึงเหรียญทองแดงจากจักรวรรดิเซคัสอีกสองสามคำ เพราะเหรียญจำนวนมากนี้มีขนาดแตกต่างกันและปริมาณทองแดงที่ผสมก็ยังไม่คงที่ เห็นได้ชัดว่าเป็นการลักลอบหลอมขึ้นเองเป็นการส่วนตัวของขุนนางจักรวรรดิบางคน ทำให้พวกมันค่อนข้างยากต่อการตีมูลค่า", "ผ่านไปราวสิบวินาที ผู้ช่วยที่เป็นศิษย์ฝึกหัดก็กลับมา พร้อมกับถือถุงเงินอันประณีตงดงามไว้ในมือ", "“โปรดรับไว้ด้วยขอรับ ศาสตราจารย์ลินน์”", "อัลเบิร์ตกล่าวด้วยรอยยิ้ม พลางวางถุงเงินลงในมือของลินน์", "ลินน์เปิดมันออกและมองดูข้างในด้วยความประหลาดใจเล็กน้อย เพราะจำนวนเงินในนั้นคือสิบสองเหรียญทอง ยี่สิบเจ็ดเหรียญเงิน และสิบเอ็ดเหรียญทองแดงพอดิบพอดี", "“ท่านไม่ได้บอกว่าอัตราแลกเปลี่ยนคือสองต่อหนึ่งหรอกหรือ?”", "ลินน์ถามพร้อมกับถือถุงเงินไว้ในมือด้วยความงุนงง", "“นั่นเป็นแค่ค่าธรรมเนียมสำหรับการหลอมใหม่น่ะขอรับ ในเมื่อท่านเป็นถึงศาสตราจารย์ของสถาบัน การจะมาเก็บค่าธรรมเนียมจากท่านก็ดูจะไม่เหมาะสมเท่าไหร่นัก”", "อัลเบิร์ตกล่าวด้วยน้ำเสียงประจบประแจงเล็กน้อย", "ลินน์ไม่ได้ตอบอะไร แต่เริ่มพิจารณาเหรียญทองเวทมนตร์แทน เมื่อเทียบกับเหรียญของจักรวรรดิ าคาอย่างน้อยหนึ่งร้อยเหรียญทองเวทมนตร์ นั่นทำให้เงินเดือนของเขาน้อยนิดเหลือเกินเมื่อเทียบกัน", "การรับศิษย์ฝึกหัดเพิ่มเป็นทางออกหนึ่ง ยิ่งเขามีนักเรียนในวิชาคณิตศาสตร์ลี้ลับมากเท่าไหร่ เขาก็ยิ่งมีข้ออ้างในการขอเบิกเงินทุนวิจัยต่างๆ จากเฮลรัมได้มากขึ้นเท่านั้น", "จากนั้นก็ทำการยักยอก...ไม่สิ พูดให้ถูกคือ การนำเงินทุนเพื่อการศึกษาเหล่านั้นไปใช้ให้เกิดประโยชน์อย่างสมเหตุสมผลมากขึ้นต่างหาก", "ท้ายที่สุดแล้ว ก็มีเพียงการพัฒนาความสามารถของตนเองในฐานะศาสตราจารย์ให้สูงขึ้นเท่านั้น เขาจึงจะสามารถปฏิบัติหน้าที่การสอนได้อย่างมีประสิทธิภาพ", "นอกจากนี้ การสร้างและขายสิ่งประดิษฐ์แปลกใหม่ก็เป็นตัวเลือกที่ดีเช่นกัน ทว่านั่นจำเป็นต้องหาใครสักคนมาเป็นลูกมือคอยทำงานให้เขา มิฉะนั้น มันรังแต่จะทำให้การค้นคว้าวิจัยทางเวทมนตร์ของเขาต้องล่าช้าออกไป", "พวกฮาล์ฟลิงอาจจะเป็นตัวเลือกที่ดีสำหรับเรื่องนี้", "ลินน์คิดในใจ เขาจำภาพการทดลองบินเหนือจัตุรัสเมืองเมื่อวานนี้ได้อย่างชัดเจน ความสามารถของเด็กสาวที่ชื่อลิเดีย ผู้ซึ่งสามารถสร้างเครื่องบินพลังไอน้ำขึ้นมาจากวัสดุพื้นๆ เช่นนั้นได้ แสดงให้เห็นถึงพรสวรรค์ด้านวิศวกรรมในระดับที่สูงส่งอย่างน่าทึ่ง ซึ่งตรงกับความต้องการของเขาอย่างสมบูรณ์แบบ", "การจะรับนางมาเป็นศิษย์และผู้ช่วยของเขาไม่น่าจะเป็นเรื่องยากจนเกินไปนัก แม้ว่าลิเดียจะไม่มีพรสวรรค์ด้านเวทมนตร์ แต่นางก็ได้รับคำสัญญาจากเฮลรัมไว้แล้ว", "การบินขึ้นสู่ท้องฟ้าโดยไม่พึ่งพาเวทมนตร์น่ะหรือ มันจะไปยากอะไรกันล่ะ?", "ขณะที่ขบคิดเรื่องนี้ ลินน์ก็หยิบปากกาขนนกขึ้นมา แล้วเริ่มร่างภาพลงบนกระดาษปาปิรุสที่กางอยู่ตรงหน้า", "เขาไม่ได้กำลังค้นคว้าหาวิธีบิน แต่กำลังเตรียมการสำหรับการสอนวิชาคณิตศาสตร์ลี้ลับในวันพรุ่งนี้ ซึ่งเป็นสิ่งจำเป็นอย่างยิ่งในการรักษาสถานะศาสตราจารย์ของเขา หากทำพลาดในบทเรียนแรกคงจะเป็นปัญหาใหญ่แน่", "การจัดการไปทีละเรื่องคือวิธีรับมือที่ดีที่สุด", "...", "แปดโมงตรงของวันรุ่งขึ้น ลินน์ในชุดเครื่องแบบที่เพิ่งได้รับมาใหม่ ก็มาถึงสถาบันพลังจิตวิญญาณอีกครั้ง มันถูกทำความสะอาดและจัดระเบียบเรียบร้อยแล้ว และป้ายชื่อหน้าอาคารก็ถูกเปลี่ยนเพื่อสะท้อนถึงหลักสูตรใหม่ในวิชาคณิตศาสตร์ลี้ลับแล้วด้วย เห็นได้ชัดว่าฟิลิปได้รายงานชื่อภาควิชาของเขาตามที่ตกลงกันไว้แล้ว", "ภูตรับใช้กว่าสิบตนที่มีความสูงเพียงสี่สิบเซนติเมตร กำลังขะมักเขม้นใช้ผ้าชุบน้ำหมาดๆ เช็ดทำความสะอาดไปตามแนวกำแพง", "ภูตรับใช้เหล่านี้ไม่ได้มีหน้าตางดงามเหมือนพวกเอลฟ์ในนิทานแฟนตาซีจากชาติก่อนของเขา รูปลักษณ์ของพวกมันค่อนข้างอัปลักษณ์ มีปีกที่ดูคล้ายค้างคาวงอกออกมาจากแผ่นหลัง ดูไปแล้วก็คล้ายกับปีศาจตัวน้อยๆ เสียมากกว่า ด้วยระดับสติปัญญาที่เทียบเท่ากับเด็กอายุห้าหรือหกขวบ พวกมันจึงสามารถเข้าใจคำสั่งง่ายๆ ได้ ภายใต้การชี้แนะของพลังเวท", "เมื่อลินน์เดินเข้าไปใกล้ ภูตรับใช้ตัวจ้อยเหล่านี้ต่างก็พากันหลบอยู่หลังกำแพง พวกมันทำเพียงแค่โผล่หัวออกมาแอบมองเขาด้วยดวงตาสีแดงราวกับทับทิม พลางส่งเสียงร้องหึ่งๆ ในลำคอ การเรียนรู้ภาษามนุษย์ยังคงเป็นเรื่องที่ยากเกินไปสำหรับสติปัญญาของพวกมัน", "อย่างไรก็ตาม ลินน์ไม่มีเวลาไปใส่ใจสิ่งมีชีวิตเวทมนตร์เหล่านี้ เมื่อเขาผลักประตูเข้าไป สายตานับสิบสิบคู่ก็จับจ้องมาที่เขาเป็นตาเดียว ภายในห้องเรียนอันกว้างขวาง มีพ่อมดฝึกหัดนั่งอยู่ประมาณยี่สิบคน", "เนื่องจากนี่เป็นหลักสูตรใหม่ที่ยังไม่มีเกณฑ์การให้คะแนนหรือการวัดระดับใดๆ จึงมีศิษย์ฝึกหัดทุกช่วงวัยปะปนกันอยู่ บางคนก็ดูอายุมากกว่าเขาเสียด้วยซ้ำ และจอห์นนี่เองก็อยู่ในหมู่พวกเขาด้วย", "แม้จำนวนศิษย์ฝึกหัดที่มาเข้าเรียนจะไม่มากนัก แต่ลินน์ก็ค่อนข้างพอใจแล้ว อันที่จริง เขายังเผื่อใจเตรียมรับมือกับสถานการณ์ที่ห้องเรียนจะว่างเปล่าไม่มีใครมาเลยไว้แล้วด้วยซ้ำ"]}, {"t": "เกมล้มละลายของลินน์", "c": ["“อรุณสวัสดิ์ทุกคน ข้าคือศาสตราจารย์วิชาคณิตศาสตร์ลี้ลับคนใหม่ของสถาบันเวทมนตร์อิเยตา พวกเจ้าจะเรียกข้าว่าลินน์ก็ได้...”", "ภายใต้สายตาของเหล่าพ่อมดฝึกหัดที่มีทั้งความประหลาดใจและเคลือบแคลงสงสัย", "ลินน์ที่ยืนอยู่หน้าแท่นบรรยาย ก็ได้ใช้มือเป็นพู่กันแล้วใช้พลังเวทบริสุทธิ์แทนน้ำหมึก ตวัดเขียนชื่อของตนเองลงบนอากาศ", "ห้องเรียนที่เคยเงียบสงบพลันมีเสียงอื้ออึงขึ้นมาทันที", "“ศาสตราจารย์ลินน์ ข้าได้ยินมาว่าท่านมาจากดินแดนโพ้นทะเลหมอก ท่านช่วยเล่าให้พวกเราฟังหน่อยได้ไหมว่าที่นั่นเป็นอย่างไรบ้าง?”", "“ศาสตราจารย์ฟิลิปบอกว่าท่านเชื่อว่าทวีปนี้มีรูปทรงเป็นทรงกลม ถ้าอย่างนั้นทำไมคนที่อยู่ข้างใต้ถึงไม่ร่วงหล่นลงไปล่ะ?”", "...", "อาจเป็นเพราะลินน์ดูยังหนุ่มแน่น อายุอานามคงไม่ได้มากกว่าพวกเขาสักเท่าไร เหล่าพ่อมดฝึกหัดจึงไม่ได้แสดงท่าทีสำรวมเหมือนเวลาอยู่ต่อหน้าศาสตราจารย์คนอื่นๆ และพากันซักถามคำถามต่างๆ นานา", "พวกเขาถามไถ่ว่าเขาข้ามทะเลหมอกมาได้อย่างไร เอาชนะวังน้ำวนขนาดยักษ์ด้วยวิธีใด ใช้เวทมนตร์แบบไหนถึงทำลายล้างเมืองชายฝั่งไปได้ตั้งครึ่งเมือง และถึงขั้นเอ่ยถามถึงการทดลองการตกอย่างอิสระของเขา", "เห็นได้ชัดเจนเลยว่าเพียงชั่วเวลาแค่วันครึ่ง เรื่องราวของเขาก็ถูกเล่าลือกันไปทั่วแล้ว และพ่อมดฝึกหัดเหล่านี้ก็ไม่ได้ตั้งตารอที่เรียนจริงๆ หรอก พวกเขาเพียงแค่อยากรู้อยากเห็นเกี่ยวกับศาสตราจารย์คนใหม่ผู้เดินทางมาจากโพ้นทะเลหมอกผู้นี้ต่างหาก", "เมื่อต้องเผชิญกับพายุคำถามที่ถาโถมเข้ามา ลินน์ก็ถึงกับไปไม่เป็น ไม่รู้ว่าจะตอบคำถามไหนก่อนดี และในจังหวะนั้นเอง จอห์นนี่ที่นั่งอยู่ด้านข้างก็โพล่งถามขึ้นมา", "“ศาสตราจารย์ลินน์ วิชาคณิตศาสตร์ลี้ลับคืออะไรหรอคะ?”", "ลินน์ลอบถอนหายใจด้วยความโล่งอกก่อนจะเริ่มอธิบาย", "“เป็นคำถามที่ดี คณิตศาสตร์ลี้ลับคือศาสตร์ที่ศึกษาเกี่ยวกับแนวคิดอันซับซ้อนอย่างเช่น ปริมาณ โครงสร้าง การเปลี่ยนแปลง และพื้นที่ โดยพวกเจ้าจะสามารถใช้มันคำนวณหาเส้นรอบวงของดวงดาวที่อยู่ใต้ฝ่าเท้าของเรา ตรวจสอบกฎการเคลื่อนที่ของดวงดาว และไขรหัสค่าคงที่แห่งจักรวาล...คณิตศาสตร์ลี้ลับนั้นครอบคลุมแทบจะทุกสรรพสิ่งที่พวกเจ้ามองเห็น และเป็นเครื่องมือที่สำคัญที่สุดในการทำความเข้าใจสัจธรรมและโลกที่อยู่รอบตัวเรา!”", "ในขณะที่เอ่ยปาก ลินน์ก็ใช้หลักการส่งผ่านคลื่นเสียงเพื่อขยายเสียงของตนเอง ทำให้แก้วหูของทุกคนดังอื้ออึง และนั่นก็ประสบความสำเร็จในการสยบห้องเรียนที่เคยเสียงดังให้เงียบสงบลงได้", "พ่อมดฝึกหัดทุกคนในห้อง เมื่อได้ยินคำศัพท์อันโอ่อ่าอลังการเหล่านี้หลุดออกมาจากปากของลินน์ ก็อดไม่ได้ที่จะรู้สึกโหยหา และหลายคนก็เริ่มตระหนักได้ว่าพวกเขากำลังนั่งเรียนวิชาเวทมนตร์ที่มีความพิเศษเอามากๆ", "ทว่า หลังจากที่วาดภาพวิสัยทัศน์อันยิ่งใหญ่ให้ดูแล้ว ลินน์ก็เปลี่ยนน้ำเสียงและพูดต่อ", "“แน่นอน แนวคิดอันลึกซึ้งของคณิตศาสตร์ลี้ลับเหล่านี้ยังเป็นเรื่องที่ไกลตัวพวกเจ้าเกินไปในตอนนี้ สำหรับตอนนี้ พวกเจ้าจะต้องเริ่มเรียนรู้จากการบวก ลบ คูณ และหารที่แสนจะเรียบง่ายเสียก่อน...”", "“นั่นมันก็แค่วิชาเลขคณิตไม่ใช่หรือ?”", "พ่อมดฝึกหัดคนหนึ่งที่นั่งอยู่แถวหน้าโพล่งแทรกขึ้นมาอย่างอดไม่ได้", "“พวกเราเรียนเรื่องนั้นในวิชาพื้นฐานไปหมดแล้วนะ”", "การรู้หนังสือและเข้าใจการคำนวณขั้นพื้นฐานถือเป็นข้อกำหนดเบื้องต้นสำหรับการเรียนรู้เวทมนตร์ ดังนั้น สถาบันอิเยตาจึงมักจะจัดช่วงเวลาสำหรับปูพื้นฐานการศึกษาให้กับเด็กๆ ที่เกิดในครอบครัวยากจน โดยสอนให้พวกเขาอ่านออกเขียนได้ คิดเลขเป็น และจดจำสัญลักษณ์ทางเวทมนตร์พื้นฐาน รวมถึงสิ่งอื่นๆ", "“ถ้าเราเรียนรู้การคูณและการหารแล้ว เราจะสามารถเชี่ยวชาญเวทมนตร์ที่ทรงพลังได้งั้นหรือ?”", "พ่อมดฝึกหัดอีกคนเอ่ยถามด้วยความอยากรู้อยากเห็น", "“ไม่หรอก”", "ลินน์ส่ายหน้า", "เมื่อเห็นเขาปฏิเสธ สีหน้าของเหล่าพ่อมดฝึกหัดก็เผยให้เห็นถึงความผิดหวังอย่างชัดเจน บางคนถึงกับเริ่มเคลือบแคลงว่าการที่ลินน์ยกย่องเชิดชูคณิตศาสตร์ลี้ลับเสียใหญ่โตนั้นเป็นแค่กลอุบายหลอกให้พวกเขามาเข้าเรียนหรือเปล่า", "“ถ้าอย่างนั้นวิชาคณิตศาสตร์ลี้ลับนี้ก็เหมือนกับวิชาพื้นฐานน่ะสิ? และเลขคณิตก็ไม่ได้ยากขนาดนั้นสักหน่อย เพราะข้าเรียนรู้มันจนแตกฉานในเวลาแค่เดือนกว่าๆ เอง...”", "เด็กหนุ่มหน้าตกกระที่ดูอายุราวๆ สิบห้าปีโอ้อวด", "“โอ้? อย่างนั้นหรือ? เจ้าแน่ใจนะ?”", "ลินน์ถามพร้อมกับรอยยิ้ม ก่อนจะปรบมือเพื่อดึงดูดความสนใจของทุกคน", "แม้ว่าเขาจะสามารถปลดปล่อย เวทห่าฝนศรเวท เพื่อแสดงให้คนเหล่านี้เห็นถึงอานุภาพอันน่าทึ่งของการผสานเวทมนตร์เข้ากับคณิตศาสตร์ลี้ลับได้ แต่ลินน์นั้นรู้ดีว่าเพื่อให้การเรียนการสอนดำเนินต่อไปได้ เขาจะต้องทำให้พวกเด็กๆ เข้าใจเสียก่อนว่าแม้แต่คณิตศาสตร์บริสุทธิ์ก็มีพลังที่ไม่อาจจินตนาการได้ซ่อนอยู่!", "“ถ้าอย่างนั้น เรามาพนันกันหน่อยดีไหม!”", "ลินน์กล่าวพร้อมกับรอยยิ้มเจ้าเล่ห์ เขาดีดนิ้วดังเป๊าะ และด้วยความช่วยเหลือจาก หัตถ์เวท โต๊ะเรียนทั้งสี่ตัวที่อยู่ตรงหน้าเขาก็ลอยขึ้นแล้วผสานเข้าด้วยกันจนกลายเป็นโต๊ะสี่เหลี่ยมจัตุรัสตัวใหญ่", "ปากกาขนนกที่วางอยู่บนแท่นบรรยายจุ่มตัวมันเองลงในน้ำหมึกโดยพลัน ก่อนจะลากเส้นแบ่งโต๊ะสี่เหลี่ยมจัตุรัสตัวใหญ่นั้นออกเป็นช่องตารางสี่เหลี่ยมเล็ก ๆ จำนวนสามสิบหกช่อง แบบหกคูณหก", "“กฎนั้นง่ายแสนง่าย เพียงแค่วางเหรียญทองแดงหนึ่งเหรียญลงในช่องแรก สองเหรียญในช่องที่สอง สี่เหรียญในช่องที่สาม และทวีคูณขึ้นไปเรื่อยๆ”", "ลินน์อธิบาย พลางกวาดสายตามองพ่อมดฝึกหัดแต่ละคนในห้องเรียนด้วยน้ำเสียงเชิญชวน", "“หากใครสามารถเติมเหรียญทองแดงลงในช่องตารางเหล่านี้ได้ครบตามจำนวนที่กำหนด ข้าจะเขียนใบคำร้องถึงสภาพ่อมดให้ทันที เพื่อรับร ่แหละคือผลกรรมของการไม่ยอมเรียนคณิตศาสตร์ขั้นสูง!", "“ศาสตราจารย์ลินน์...”", "เอล็อคหันไปหาลินน์พลางพูดตะกุกตะกัก ดวงตาของเขาเอ่อคลอไปด้วยหยาดน้ำตา และดูเหมือนว่าเขากำลังจะร้องไห้โฮออกมาอยู่รอมร่อ", "“เอล็อค เมื่อครู่นี้ข้าเพิ่งจะได้ยินเจ้าคุยโวว่าตัวเองเก่งเลขคณิตนักไม่ใช่หรือ?”", "ลินน์เอ่ยถาม", "‘ข้าเปล่านะ ข้าไม่ได้พูดเสียหน่อย อย่ามาใส่ความกันนะ...’", "เอล็อคส่ายหน้าเป็นพัลวันเพื่อพยายามปฏิเสธ แต่ลินน์เพียงแค่โบกมือและพูดต่อ", "“เอาอย่างนี้ก็แล้วกัน หากเจ้าสามารถคำนวณผลรวมของเหรียญทองแดงบนตารางทั้งสามสิบหกช่องได้อย่างแม่นยำก่อนที่จะถึงคาบเรียนในวันพรุ่งนี้ ข้าจะยอมยกเลิกเดิมพันนี้ให้!”", "“แน่นอนว่าเจ้ามีโอกาสตอบเพียงแค่ครั้งเดียวเท่านั้น!”", "ลินน์ปรายตามองกองเงินจำนวนมหาศาลที่สุมอยู่บนโต๊ะกลมด้วยความรู้สึกเสียดายเล็กน้อย แม้ว่าเขาจะไม่ได้แสดงท่าทีว่าอยากจะยึดมันไว้ก็ตาม", "ประการแรก มันเป็นไปไม่ได้เลยที่อีกฝ่ายจะหาเงินจำนวนมหาศาลขนาดนั้นมาจ่ายได้", "ประการที่สอง การยึดเงินเก็บทั้งหมดของเหล่าพ่อมดฝึกหัดไปตั้งแต่เกมแรกคงจะเป็นการทำให้พวกเด็กๆ หวาดกลัวจนเกินไป", "ขืนเป็นแบบนั้น แล้วใครที่ไหนจะกล้ามาเข้าเรียนวิชาคณิตศาสตร์ของเขาอีกล่ะ?", "เอล็อคจ้องมองแสงเวทมนตร์ที่ลอยอยู่ตรงหน้าด้วยสายตาว่างเปล่า เขาไม่สามารถทำความเข้าใจได้เลยว่าสัญลักษณ์ทางคณิตศาสตร์เหล่านี้คืออะไร...เขาถึงขั้นเริ่มสงสัยแล้วว่าตัวเองยังคิดเลขเป็นอยู่หรือเปล่า...", "เพียร์ซที่ก่อนหน้านี้เคยอิจฉาเอล็อค พลันรู้สึกสะใจกับสถานการณ์กลืนไม่เข้าคายไม่ออกของเด็กหนุ่ม เขานึกโชคดีที่ตัวเองมัวแต่ลังเล มิฉะนั้น คนที่ต้องมาทนอับอายขายหน้าในตอนนี้ก็คงจะเป็นเขาเอง", "ทว่า ลินน์ก็เปลี่ยนน้ำเสียง หันไปมองทุกคนที่อยู่ในห้อง แล้วเอ่ยต่อ", "“พวกเจ้าเองก็เช่นกัน!”", "“หากข้าจำไม่ผิด ตอนที่เอล็อคขอยืมเงินจากพวกเจ้า เขาบอกว่า ‘ถ้าเขาสามารถถมตารางทั้งหมดได้เต็ม เขาจะคืนเงินให้เป็นสองเท่า’ ใช่ไหม”", "“น่าเสียดายที่เอล็อคทำไม่สำเร็จ ดังนั้นคำสัญญาจึงถือเป็นโมฆะ พวกเจ้าไม่เพียงแต่จะไม่ได้เหรียญทองเพิ่มเท่านั้น แต่เงินที่พวกเจ้าลงเดิมพันมาก็ต้องตกเป็นของข้า!”", "ลินน์กล่าวขณะหยิบเหรียญสองสามเหรียญขึ้นมาจากโต๊ะกลม พลางเอ่ยด้วยน้ำเสียงสนุกสนาน", "เมื่อได้ยินเช่นนั้น ห้องเรียนวิชาคณิตศาสตร์ก็เต็มไปด้วยเสียงโอดครวญ เพียร์ซและคนอื่นๆ ที่กำลังเดือดดาล พากันเตะก้นเอล็อคที่หลอกลวงพวกตน!", "ลินน์เร่งเสียงให้ดังขึ้นเล็กน้อยแล้วชี้ไปยังสูตรหาผลรวมของเลขยกกำลังที่ลอยอยู่ด้านบน", "“มันมีทางลัดสำหรับการบวกเลขยกกำลังอยู่ หากเป็นข้าล่ะก็ ขอเพียงแค่รู้ตัวเลขตัวสุดท้าย ข้าก็สามารถคำนวณหาผลรวมของพวกมันได้ภายในเวลาไม่ถึงสิบวินาที!”", "“การบ้านของพวกเจ้าก็คือ จงค้นหารูปแบบและแก้สูตรสมการที่ข้าเขียนไว้นี้! เมื่อใดที่พวกเจ้าหาคำตอบได้ เมื่อนั้นพวกเจ้าจึงจะสามารถเอาเงินกลับคืนไปได้!”", "ลินน์กวาดสายตามองเหล่านักเรียนที่ต่างกำลังก้มหน้าก้มตาถือปากกาขนนกและคิดคำนวณกันอย่างหน้าดำคร่ำเครียด ก่อนจะพยักหน้าด้วยความพึงพอใจ มีเพียงการได้ลงมือสัมผัสด้วยประสบการณ์ตรงเช่นนี้เท่านั้น ที่จะทำให้พวกเขาซาบซึ้งถึงเสน่ห์ของคณิตศาสตร์ขั้นสูงได้อย่างแท้จริง!", "นอกจากนี้ เขายังใช้เกมนี้เพื่อประเมินความสามารถทางคณิตศาสตร์ของพ่อมดฝึกหัดเหล่านี้ไปในตัวด้วย", "ตัดสินจากผลงานของเอล็อคแล้ว พวกเขาต่างก็ได้เรียนรู้กฎเกณฑ์เลขคณิตพื้นฐานมาแล้ว และบางทีในครั้งหน้าก็เขาอาจจะเริ่มสอนด้วยสูตรสมการที่ท้าทายขึ้นมาอีกสักหน่อยก็คงได้!", "และคาบเรียนวิชาคณิตศาสตร์สองชั่วโมงก็ได้สิ้นสุดลงอย่างรวดเร็ว", "แม้ว่าพวกเขาจะไม่ได้เรียนรู้เวทมนตร์บทใหม่เลยก็ตาม แต่ด้วยแรงขับเคลื่อนจากความปรารถนาที่จะได้เงินเดิมพันคืน นักเรียนทุกคนจึงยังคงรักษาความกระตือรือร้นไว้ในระดับสูง ถึงขั้นอยากจะนำสิ่งที่เรียนรู้ในคาบนี้ไปแบ่งปันให้คนอื่นๆ ฟังด้วยซ้ำ", "เพียงแค่วันเดียว ชื่อเสียงของเกมตารางสี่เหลี่ยมของศาสตราจารย์ลินน์ก็เลื่องลือไปทั่วทุกสารทิศ", "เพื่อให้ผู้คนจำนวนมากขึ้นได้เข้าใจถึงเสน่ห์ของการเติบโตแบบทวีคูณ ลินน์จึงย้ายโต๊ะตารางสี่เหลี่ยมไปไว้ที่ทางเข้าของสถาบันอิเยตา และเปลี่ยนตารางบนกระดานให้มีขนาดสี่สิบเก้าช่อง โดยแบ่งเป็นเจ็ดแถวแนวนอนและเจ็ดแถวแนวตั้ง พร้อมกับตั้งป้ายประกาศ และแก้ไขกฎของเดิมพันเสียใหม่", "หากผู้ใดสามารถถมตารางเหล่านี้ด้วยเหรียญทองแดงตามจำนวนที่กำหนดได้ครบ เขาจะมอบสูตรการเล่นแร่แปรธาตุที่ใช้ทำลายเมืองท่าได้ให้เป็นรางวัล", "ถูกต้องแล้ว เพียงแค่เริ่มต้นด้วยเหรียญทองแดงหนึ่งเหรียญ และถมกระดานให้เต็มตามกฎที่ว่า โดยช่องถัดไปจะต้องใช้เหรียญทองแดงเป็นจำนวนสองเท่าของช่องก่อนหน้า หลังจากถมจนเต็มแล้ว คนผู้นั้นยังสามารถเอาเงินทั้งหมดกลับคืนไปได้อีกด้วย และเขาจะไม่ขอรับเงินเลยแม้แต่แดงเดียว!", "คราวนี้ ไม่เพียงแต่เหล่าพ่อมดฝึกหัดเท่านั้น แต่ศาสตราจารย์หลายคนของสถาบันก็ยังรู้สึกหวั่นไหว", "มีข้อเสนอที่ดีขนาดนี้เชียวหรือ?", "สูตรการเล่นแร่แปรธาตุประเภทนี้ ซึ่งจำเป็นต้องใช้เวลาเตรียมการอย่างมากเพื่อปลดปล่อยอานุภาพอันรุนแรงออกมา อาจดูยุ่งยากไปสักหน่อย แต่มันจะมีประสิทธิภาพอย่างมหาศาลในสถานการณ์พิเศษ", "จงจำไว้ว่า พลังทำลายล้างของสิ่งนี้สามารถเทียบเคียงได้กับเวทมนตร์ระดับห้าวงแหวน หรือแม้กระทั่งเวทมนตร์ระดับหกวงแหวนเลยทีเดียว!", "ในตอนเย็น ขณะที่นักเรียนกำลังทยอยกันเลิกเรียนหรือกลับหอพัก เควิน ศาสตราจารย์ประจำวิชาแปรสภาพ ได้ลอบเข้าไปใกล้โต๊ะตารางสี่เหลี่ยมที่ผสานติดกัน และเริ่มศึกษากฎของตารางกระดานนั้น", "จำนวนเหรียญในแต่ละช่องจะต้องเป็นสองเท่าของช่องก่อนหน้างั้นหรือ?", "เควินลูบคางพลางครุ่นคิดอยู่ในใจ ขณะที่เขากำลังใช้ความคิดอยู่นั้น เสียงที่คุ้นเคยก็ดังขึ้นจากด้านหลัง", "“อย่าเสียเวลาคำนวณเลย เป็นไปไม่ได้เด็ดขาดที่จะถมตารางพวกนี้ให้เต็มน่ะ!”", "“ท่านรู้ไหมว่าข้ามีเงินเก็บอยู่เท่าไร ศาสตราจารย์ฟิลิป?”", "เควินเอ่ยถามด้วยความขุ่นเคืองเล็กน้อย ท้ายที่สุดแล้วเขาก็มีเพื่อนฝูงอยู่มากมาย เงินพวกนี้ก็แค่เอามาวางถมตารางให้เต็ม แล้วค่อยเอาคืนทีหลังก็เท่านั้น และบางทีเขาอาจจะต้องหยิบยืมเงินมาเพิ่มอีกสักหน่อย"]}, {"t": "หลักการพื้นฐานทางเวทมนตร์และการวิเคราะห์ธาตุเวทมนตร์ 2", "c": ["หรือว่าตารางกระดานพวกนี้จะเป็นไปตามที่ข่าวลือเล่าอ้างจริงๆ ว่าต่อให้เอาทรัพย์สมบัติทั้งหมดของเมืองท่าอิเยตามาเทใส่ ก็ไม่อาจถมมันให้เต็มได้?", "เควินแค่นเสียงหัวเราะเยาะกับความคิดนั้น ข่าวลือพรรค์นั้นมันเหลวไหลสิ้นดี!", "“ท่านรู้หรือไม่ว่าต้องใช้เหรียญทองแดงกี่เหรียญ ถึงจะถมช่องสุดท้ายของตารางเจ็ดคูณเจ็ดนี้ให้เต็มได้?”", "ฟิลิปเอ่ยถามด้วยน้ำเสียงจนใจเล็กน้อย", "“สองร้อยแปดสิบเอ็ดล้านล้านเหรียญ!”", "“เหรียญทองแดงสองร้อยแปดสิบเอ็ดล้านล้านเหรียญ นั่นก็เยอะเอาเรื่องอยู่นะ...”", "เควินรู้สึกประหลาดใจเล็กน้อย แต่หลังจากชะงักไปครู่หนึ่ง เขาก็เพิ่งจะตระหนักได้ว่าหน่วยที่ฟิลิปพูดถึงเมื่อครู่นี้ดูเหมือนจะเป็น...ล้านล้านงั้นหรือ?", "“เดี๋ยวก่อนนะ ท่านแน่ใจนะว่าไม่ได้คิดเลขผิด?”", "เควินถึงกับมึนงงไปหมด", "นี่เป็นครั้งแรกในชีวิตที่เขาได้ยินหน่วย ล้านล้าน", "“ย่อ
