นน์ส่ายหน้า อุปกรณ์ชิ้นนี้สามารถนำไปใช้ทดน้ำเข้านา หรือแม้กระทั่งผลิตกระแสไฟฟ้าได้อย่างไม่มีปัญหา แต่ลิเดียกลับนึกถึงแค่การใช้มันเพื่อเป็นแหล่งพลังงานให้กับพัดลมเท่านั้น", "เมื่อเห็นลินน์ส่ายหน้าและลอบถอนหายใจ หัวใจของดาร์เรนก็เต้นระทึกจนแทบจะกระดอนออกมาจากอก แม้ว่าของเล่นของลิเดียจะน่าสนใจเอามากๆ แต่มันก็ย่อมเทียบไม่ได้กับอุปกรณ์เวทมนตร์ของพวกพ่อมดอย่างแน่นอน", "โชคดีที่ลินน์ไม่ได้มีความคิดที่จะปล่อยให้พวกเขาต้องคอยลุ้น จึงเอ่ยขึ้นมาตามตรง", "“ครั้งนี้ข้าไม่ได้มาที่นี่เพื่อซื้อของหรอกนะ แต่ข้าอยากจะให้พวกเจ้าช่วยสร้างของบางอย่างตามแบบแปลนให้ข้าหน่อยน่ะ”", "ขณะที่พูด ลินน์ก็หยิบโมเดลเรือกลไฟขึ้นมาพิจารณาดูสองสามครั้ง โมเดลชิ้นนี้ถูกสร้างขึ้นมาอย่างประณีตวิจิตร มันแทบจะเป็นแบบจำลองย่อส่วนที่สมบูรณ์แบบและใส่ใจในทุกรายละเอียด", "ตั้งแต่ปล่องไฟไปจนถึงห้องโดยสาร และตัวเรือ มันดูเหมือนกับเรือกลไฟที่เขาเคยเห็นในทะเลไม่มีผิดเพี้ยน เว้นเสียแต่ว่ามันมีเชือกเส้นหนึ่งโผล่ออกมาจากด้านหลังห้องโดยสาร ซึ่งเมื่อดึงเชือกเส้นนั้น ใบพัดที่อยู่ด้านล่างก็จะเริ่มหมุน", "เพียงชั่วพริบตา ลินน์ก็สามารถคาดเดาถึงกลไกการทำงานของมันได้ รอยยิ้มผุดขึ้นบนริมฝีปากของเขา ก่อนจะเอ่ยปากพูดอีกครั้ง", "“ข้าได้ยินมาว่าฝีมือช่างของลิเดียนั้นเชี่ยวชาญยิ่งนัก นางสามารถสร้างสิ่งของออกมาตามแบบแปลนได้โดยไม่มีข้อผิดพลาดเลยแม้แต่น้อย จริงหรือเปล่า?”", "“แน่นอนอยู่แล้วขอรับ ข้ากล้าพูดเลยว่าในเมืองท่าอิเยตาแห่งนี้ ไม่มีฝีมือช่างของใครจะเหนือไปกว่าลิเดียอีกแล้ว!”", "ดาร์เรนกล่าวด้วยความมั่นใจเต็มเปี่ยม แม้แต่จอมเวทผู้ยิ่งใหญ่หลายท่านก็ยังเอ่ยปากชื่นชมผลงานของลิเดียอย่างสูง จนทำให้นางได้รับฉายาว่า หัตถ์เทวะ เลยทีเดียว", "“ตอนนี้นางอยู่ในห้องปฏิบัติการหรือเปล่า?”", "ลินน์วางโมเดลลง", "“ข้าอยากจะเห็นด้วยตาตัวเองสักหน่อยว่านางจะสามารถทำตามความต้องการของข้าได้หรือไม่”", "“ไม่มีปัญหาขอรับ ตอนนี้ลิเดียกำลังยุ่งอยู่ในสวนหลังบ้าน...เดี๋ยวข้าจะพาท่านไปหานางเอง!”", "ดาร์เรนกระโดดลงจากม้านั่งอย่างรวดเร็ว แขวนป้ายพักผ่อนเอาไว้ แล้วจึงเปิดประตูหลังของห้องปฏิบัติการออก", "ลินน์เดินตามดาร์เรนเข้าไป และทันใดนั้นเขาก็เห็นเครื่องจักรบินได้ขนาดใหญ่ที่เคยเห็นมาก่อนหน้า เด็กสาวเผ่าฮาล์ฟลิงที่ชื่อลิเดียกำลังยืนอยู่ใต้เครื่องจักรนั้น ในมือถือค้อนที่มีความยาวถึงครึ่งหนึ่งของลำตัวนาง พลางตอกตะปูตัวหนาหลายตัวลงบนปีกของเครื่องจักร", "หลังจากทำสิ่งนี้เสร็จ ลิเดียก็ปาดเหงื่อบนหน้าผาก แล้วออกแรงดึงปีกอย่างแรง รอยต่อของมันค่อนข้างแน่นหนา แต่ก็ยังขาดความมั่นคงอยู่ดี ซึ่งนั่นคือเหตุผลว่าทำไมชิ้นส่วนบางชิ้นของเครื่องจักรบินได้ถึงหลุดร่วงลงมาทันทีหลังจากที่ลงจอด", "เด็กสาวเผ่าฮาล์ฟลิงไม่ได้สังเกตเห็นผู้มาเยือนทั้งสองคน นางขมวดคิ้วเล็กน้อย เสื้อคลุมของนางเปรอะเปื้อนไปด้วยฝุ่นและสิ่งสกปรก แต่นางก็ไม่ได้สนใจ จิตใจของนางจดจ่ออยู่กับวิธีการปรับปรุงเครื่องจักรบินได้เพียงอย่างเดียว", "และในตอนนั้นเอง เสียงของลินน์ก็ดังขึ้นอย่างกะทันหัน", "“หากโครงสร้างรูปสี่เหลี่ยมมันไม่มั่นคงพอ ทำไมไม่ลองเพิ่มคานขวางที่มุมทแยงตรงข้าม เพื่อเปลี่ยนให้มันกลายเป็นโครงสร้างรูปสามเหลี่ยมสองรูปล่ะ?”", "ลิเดียชะงักไปครู่หนึ่ง ก่อนจะหันขวับกลับมาและพบว่าดาร์เรนกับลินน์กำลังยืนอยู่ข้างๆ", "“ท่านพ่อมดหรือ?”", "เด็กสาวเผ่าฮาล์ฟลิงร้องทักอย่างไม่แน่ใจนัก แต่นางก็จำลินน์ที่เคยพบกันสั้นๆ ที่จัตุรัสก่อนหน้านี้ได้อย่างรวดเร็ว", "“เจ้าลองทำดูก่อนสิ!”", "ลินน์ชี้ไปที่ปีกของเครื่องจักรบินได้ พลางพูดด้วยรอยยิ้ม", "ลิเดียไม่ได้มีท่าทีหวาดหวั่นแต่อย่างใด นางรีบถกแขนเสื้อขึ้นทันที ใช้สองมือคว้าแผ่นไม้ขนาดกำลังดีมาวางไว้ที่ด้านทแยงมุมตรงข้ามของปีก จากนั้นก็หยิบค้อนและตะปูขึ้นมาตอกไม่หยุด", "‘ช่างเป็นพละกำลังที่มหาศาลจริงๆ...’", "ลินน์รู้สึกประหลาดใจไม่น้อยที่ได้เห็นลิเดีย เด็กสาวที่มีความสูงไม่เกิน 1.3 เมตร สามารถยกแผ่นไม้ที่อาจจะใหญ่กว่าตัวนางเสียอีกได้อย่างง่ายดาย ดูเหมือนว่าข่าวลือเกี่ยวกับพละกำลังโดยกำเนิดของพวกฮาล์ฟลิงจะไม่ได้พูดเกินจริงเลย", "‘นี่มันขัดกับหลักชีววิทยาโดยสิ้นเชิงเลยนะ...’", "ลินน์มองดูท่อนแขนของเด็กสาวเผ่าฮาล์ฟลิงที่อย่างมากก็เรียกได้ว่าบึกบึน แล้วก็อดไม่ได้ที่จะบ่นอุบอิบในใจ จากนั้นเขาก็สั่งให้นางเสริมโครงสร้างโดยรวมของเครื่องจักรบินได้ด้วยการสร้างคานค้ำยัน และถอดชิ้นส่วนที่ไม่จำเป็นออกไปมากมายเพื่อลดน้ำหนักของตัวเครื่องลง", "ดาร์เรนเองก็รีบวิ่งเข้ามาช่วยหยิบจับอย่างกระตือรือร้น หลังจากวุ่นวายกันอยู่พักใหญ่ เครื่องจักรบินได้ก็ดูราวกับได้ชีวิตใหม่ ปีกอันกว้างขวางของมันถูกเชื่อมต่อเข้ากับลำตัวของเครื่องในรูปแบบสามเหลี่ยม ลิเดียวางมือลงบนปีกแล้วออกแรงเขย่าอย่างแรงสองสามครั้ง จากนั้นก็ลองใช้ค้อนทุบดู แต่มันก็ไม่ทำให้เกิดการเสียรูปเลยแม้แต่น้อย", "“นี่มันช่าง...ยอดเยี่ยมไปเลย!”", "ความปิติยินดีบนใบหน้าของลิเดียแทบจะล้นทะลักออกมา ก่อนที่นางจะหันไปหาลินน์ด้วยสีหน้าที่เต็มไปด้วยความสับสน แล้วเอ่ยถาม", "“แต่ทำไมมันถึงเป็นแบบนี้ล่ะ?”", "ในขณะที่ทำโมเดลชิ้นอื่นๆ ในวันก่อนหน้านี้ นางก็สังเกตเห็นความแตกต่างในจุดนี้เช่นกัน แต่นางยังคิดไม่ออกว่าทำไมถึงเป็นเช่นนั้น", "“นั่นก็เพราะว่าด้านทั้งสามของรูปสามเหลี่ยมมันเชื่อมต่อเข้าด้วยกัน ทำให้เกิดเป็นโครงสร้างที่มั่นคงเอามากๆ เจ้าเพียงแค่ต้องทำการวิเคราะห์แรงก็จะเข้าใจแล้วล่ะ...”", "ระหว่างที่พูด ลินน์ก็หยิบท่อนไม้ขึ้นมาสองสามท่อน นำมาประกอบเป็นรูปสามเหลี่ยม รูปสี่เหลี่ยม และรูปห้าเหลี่ยม จากนั้นก็ดึงที่แต่ละด้านและแต่ละมุมเพื่อสาธิตให้เห็นถึงการเปลี่ยนแปลงของแรงที่กระทำต่อรูปหลายเหลี่ยมเหล่านี้", "ลิเดียนั่งอยู่บนปีกของเครื่องจักรบินได้ ดวงตาอันสดใสของนางจดจ่ออยู่กับท่อนไม้ในมือของลินน์ ราวกับนักเรียนที่กำลังตั้งใจฟังบรรยาย จนลืมไปชั่วขณะว่านี่เพิ่งจะเป็นการพบกันครั้งที่สองของพวกเขาเท่านั้น", "ทว่า บทเรียนที่ลินน์สอนนั้นไม่ได้เข้าใจได้ง่ายนัก และลิเดียก็พอจะเข้าใจได้บ้างในตอนที่เขาสาธิตด้วยท่อนไม้ แต่เมื่อเขาเริ่มอธิบายถึงแนวคิดเรื่องจุดศูนย์กลางมวล แรงต้านอากาศ และแรงเสียดทานในเวลาต่อมา นางก็เริ่มรู้สึกเหมือนกับว่าตัวเองกำลังหลงทางอยู่ในสายหมอก", "นางได้ข้อสรุปมาเพียงสองประการเท่านั้น", "ประการแรก พ่อมดที่อยู่ตรงหน้านางผู้นี้มีความรู้กว้างขวางและเข้าใจสิ่งต่างๆ มากมาย", "ประการที่สอง การที่เครื่องจักรบินได้จะสามารถบินขึ้นไปได้หรือไม่นั้น อาจจะมีความเกี่ยวข้องบางอย่างกับแรงพวกนี้...", "หลังจากที่พูดไปได้สักพัก ลินน์ก็เริ่มริมฝีปากแห้งผาก และเด็กสาวเผ่าฮาล์ฟลิงก็จับสังเกตได้ทันที นางกระโดดลงจากปีกแล้ววิ่งเข้าไปในห้อง ก่อนจะกลับออกมาพร้อมกับเหยือกน้ำ รินน้ำใส่แก้วแล้วยื่นให้ลินน์ จากนั้นนางก็เอ่ยถามด้วยดวงตาที่เป็นประกายเปี่ยมความหวัง", "“ถ้าอย่างนั้น ท่านพ่อมด เครื่องจักรบินได้ลำนี้ก็สามารถบินได้แล้วใช่ไหม?”", "“หากเจ้าเพียงแค่อยากจะลอยตัวอยู่กลางอากาศให้นานขึ้นอีกนิดล่ะก็ คงไม่มีปัญหาอะไรหรอก แต่ถ้าเจ้าหมายถึงการทะยานขึ้นไปบนท้องฟ้าได้อย่างอิสระเสรีล่ะก็ ข้าเกรงว่ามันจะเป็นไปไม่ได้นะ!”", "ลินน์ส่ายหน้า", "“พลังขับเคลื่อนของเครื่องจักรบินได้ลำนี้ยังอ่อนเกินไป และที่สำคัญ การออกแบบโครงสร้างของมันก็ยังไม่สอดคล้องกับหลักกลศาสตร์ของไหลเอาเสียเลย...”", "เด็กสาวเผ่าฮาล์ฟลิงมีสีหน้ามึนงงไปหมด นางพอจะเข้าใจคำว่า พลังขับเคลื่อน อยู่บ้าง แต่ไอ้สิ่งที่เรียกว่า กลศาสตร์ของไหล นี่มันคืออะไรกันล่ะ?", "ในเวลาเพียงแค่ครึ่งชั่วโมง นางก็ได้ยินคำศัพท์ระดับสูงแปลกๆ มากมาย ซึ่งนั่นทำให้ลิเดียรู้สึกเหมือนตัวเองเป็นลูกแมวตัวน้อยที่เห็นลูกบอลขนฟูแต่กลับตะครุบมันไม่ถึง มันดูน่าสงสารยิ่งนัก", "“ท่านพ่อมด?”", "ดาร์เรนที่อยู่ด้านข้างรู้สึกกังวลใจเล็กน้อยจึงอดไม่ได้ที่จะพูดแทรกขึ้นมา เขาเองก็อยากจะเรียนรู้สิ่งเหล่านี้เช่นกัน แต่เขาเข้าใจความจริงข้อหนึ่งดี นั่นคือ ในดินแดนพ่อมด ความรู้ทุกแขนงล้วนเป็นสิ่งล้ำค่า!", "ลินน์ดูเหมือนจะเพิ่งรู้ตัวในตอนนั้น รอยยิ้มผุดขึ้นบนริมฝีปากของเขา", "“ขออภัยด้วย มันเป็นนิสัยตามสายอาชีพน่ะ...”", "“ข้ายังไม่ได้แนะนำตัวเลย ข้าชื่อลินน์ เป็นศาสตราจารย์วิชาคณิตศาสตร์ลี้ลับคนใหม่ของสถาบันอิเยตา!”", "“ศาสตราจารย์วิชาคณิตศาสตร์ลี้ลับคนที่ทำให้นักเรียนตกใจจนเป็นลมตั้งแต่วันแรกของการสอนคนนั้นน่ะหรือ?”", "ดาร์เรนโพล่งออกมา", "มุมปากของลินน์กระตุกเล็กน้อย เขามองไปยังดาร์เรนด้วยสีหน้าที่แสนจะเป็นมิตร", "ถ้าพูดจาไม่เข้าหู ก็หัดรูดยิปปากซะบ้างเถอะ!"]}, {"t": "เครื่องจักรบินได้ของลินน์", "c": ["ภายใต้สายตาอันแสนดีของลินน์ ดาร์เรนลอบกลืนน้ำลายลงคออย่างยากลำบาก และรีบหุบปากฉับในทันที", "ทันใดนั้น ลิเดียก็เหมือนจะนึกอะไรบางอย่างขึ้นมาได้ นางเอ่ยถามอย่างกระตือรือร้นด้วยความประหลาดใจและยินดีปรีดา", "“ศาสตราจารย์ลินน์ ท่านจอมเวทเฮลรามส่งท่านมาที่นี่หรือเจ้าคะ? หรือว่าข้าผ่านการทดสอบแล้ว?”", "“จุดประสงค์ที่ข้ามาที่นี่ ไม่ได้มีส่วนเกี่ยวข้องอันใดกับท่านเฮลรามทั้งนั้น!”", "ลินน์ปฏิเสธข้อสันนิษฐานของเด็กสาว ก่อนจะเอ่ยต่อท่ามกลางสีหน้าผิดหวังของนาง", "“ข้าตั้งใจจะมาขอให้เจ้าช่วยสร้างของบางอย่างให้ข้าน่ะ”", "ขณะที่พูด ลินน์ก็หยิบกระดาษหนังแผ่นหนึ่งออกมาจากกระเป๋าแล้วยื่นส่งให้", "ลิเดียเอื้อมมือไปรับมา และอดไม่ได้ที่จะอุทานออกมาหลังจากที่ได้เห็นภาพบนนั้น", "“ช่างงดงามเหลือเกิน...”", "บนกระดาษหนังแผ่นนั้นคือแผนภาพของอุปกรณ์เล่นแร่แปรธาตุรูปร่างประหลาดขนาดมหึมา", "ส่วนบนของมันดูคล้ายกับทรงกลมรูปไข่คว่ำ ในขณะที่ส่วนล่างถูกเชื่อมต่อด้วยเชือก และมีลักษณะคล้ายคลึงกับตัวเรือ นอกจากนี้ โครงสร้างภายในยังถูกวาดรายละเอียดเอาไว้อย่างชัดเจน โครงสร้างโดยรวมนั้นแม้จะดูซับซ้อนแต่ก็ไม่ได้สับสนวุ่นวาย ซ้ำยังแผ่กลิ่นอายความงดงามที่แปลกตาออกมาอีกด้วย", "“นี่คืออะไรหรือเจ้าคะ? โมเดลเรือเล่นแร่แปรธาตุรุ่นใหม่หรือ?”", "ลิเดียเอ่ยถามด้วยความประหลาดใจ นางมองเห็นใบพัดและหางเสือบนนั้น ซึ่งล้วนเป็นลักษณะเฉพาะของเรือทั้งสิ้น", "“สิ่งนี้เรียกว่า เรือเหาะ ต่างหากล่ะ!”", "ลินน์ตอบกลับ", "อันที่จริง ในตอนแรกเขาคิดจะสร้างบอลลูนลมร้อน ซึ่งเป็นวิธีที่เรียบง่ายที่สุดในการโบยบินโดยไม่ต้องพึ่งพาเวทมนตร์ แต่หลังจากพิจารณาอย่างถี่ถ้วน เขาก็ล้มเลิกความคิดนั้น และตัดสินใจที่จะทุ่มเทอย่างเต็มที่ โดยวางแผนที่จะสร้างเรือเหาะที่สามารถเดินทางระยะไกลได้!", "เป้าหมายของเขาย่อมไม่ได้มีไว้เพื่อความสวยงามเพียงอย่างเดียว และเขาก็ได้ทำการสืบเสาะข้อมูลในช่วงหลายวันที่ผ่านมานี้เรียบร้อยแล้ว", "แม้ว่าพ่อมดบางคนที่เชี่ยวชาญในวิชาแปรสภาพธาตุ และอยู่ในระดับสามวงแหวนจะสามารถบินบนท้องฟ้าได้ แต่การทำเช่นนั้นก็ต้องเผาผลาญพลังเวทอย่างมหาศาล อีกทั้งระดับความสูงยังถูกจำกัด และความเร็วก็ไม่ได้ว่องไวนัก มีเพียงจอมเวทผู้ยิ่งใหญ่เท่านั้นที่สามารถลอยตัวอยู่กลางอากาศได้เป็นเวลานาน ซึ่งโดยทั่วไปแล้ว พวกเขาก็ไม่ได้ใช้มันเป็นวิธีการเดินทางแต่อย่างใด", "และเกาะที่พวกเขาอาศัยอยู่นี้ก็มีขนาดกว้างใหญ่ไพศาล ซ้ำยังมีเหมืองแร่อยู่มากมาย นครพ่อมดทั้งเมืองถึงกับถูกสร้างขึ้นติดกับเหมืองแร่อสูรขนาดยักษ์ใจกลางเกาะ ซึ่งนั่นทำให้การขนส่งทางบกค่อนข้างเป็นเรื่องท้าทาย", "ตัวอย่างเช่น การใช้สัตว์พาหนะเพื่อขนส่งสินค้าจากเมืองท่าอิเยตา ลัดเลาะไปตามเส้นทางภูเขาเพื่อมุ่งหน้าไปยังนครพ่อมด จะต้องใช้เวลาเจ็ดถึงแปดวัน และพวกเขาก็อาจจะต้องเผชิญหน้ากับสัตว์อสูรในระหว่างทางอีกด้วย", "แต่มันจะแตกต่างออกไปหากพวกเขาออกเดินทางจากบนท้องฟ้า อย่างน้อยที่สุด มันก็จะช่วยลดเวลาเดินทางลงได้ถึงครึ่งหนึ่ง แม้ว่าความจุในการบรรทุกของเรือเหาะจะมีจำกัด แต่การใช้มันขนส่งวัสดุสำคัญบางอย่าง หรือสิ่งของแปลกใหม่ที่หาไม่ได้ในนครพ่อมด ก็นับว่ายังคงคุ้มค่าและให้ผลกำไรที่สูงมากอยู่ดี", "นอกจากนี้ ตัวเรือเหาะพลังไอน้ำเองก็สามารถทำเงินได้เช่นกัน ขอเพียงแค่นำ ปืนใหญ่คริสตัลเวทมนตร์ สักสองสามกระบอกไปติดตั้งไว้บนนั้น และเสริมความแข็งแกร่งด้วยเวทมนตร์คุ้มกันสักหน่อย มันก็จะกลายเป็นป้อมปราการลอยฟ้าเคลื่อนที่ได้ในทันที!", "เรือเหาะแบบนี้สักลำ สามารถขายได้ในราคาหลายพันเหรียญทองอย่างง่ายดาย", "ส่วนเรื่องที่กังวลว่าเทคโนโลยีจะรั่วไหลนั้น ในระยะสั้นคงไม่ต้องกังวลอะไร ตราบใดที่เขาสามารถทำให้เรือเหาะพลังไอน้ำลำนี้โบยบินขึ้นสู่ท้องฟ้าได้สำเร็จสักครั้ง เขาก็สามารถยื่นเรื่องต่อสภาพ่อมดเพื่อขอรับความคุ้มครองสิทธิบัตรการเล่นแร่แปรธาตุได้", "แน่นอนว่าในดินแดนพ่อมดนั้น มีกลไกการให้ความคุ้มครองสำหรับสูตรการผลิตไอเทมเวทมนตร์ต่างๆ และด้วยเหตุนี้เอง พ่อมดทั้งหลายถึงอาจจะยอมเปิดเผยผลงานวิจัยที่พวกเขาอุตส่าห์ตรากตรำค้นคว้ามาอย่างยากลำบาก", "ในความเป็นจริง นอกเหนือจากไอเทมเล่นแร่แปรธาตุแล้ว กฎเดียวกันนี้ยังครอบคลุมไปถึงเวทมนตร์ระดับสูงอีกด้วย แม้ว่าเขาจะอยู่ในตำแหน่งศาสตราจารย์ของสถาบัน แต่เขาก็ยังคงสามารถเรียนรู้ได้เฉพาะเวทมนตร์ระดับต่ำโดยไม่ต้องเสียค่าตอบแทนเท่านั้น", "ส่วนในระยะยาวนั้นยิ่งไม่ต้องกังวลเข้าไปใหญ่ เพราะสิ่งที่เขานำมาสร้างนี้เป็นเพียงแค่ของเล่นระดับล่างเท่านั้น อีกสักสองสามปีให้หลัง เมื่อเขาคุ้นเคยกับสถานการณ์ในดินแดนพ่อมดมากขึ้น เขาก็จะสร้างเครื่องยนต์สันดาปภายในขึ้นมาโดยตรง และเมื่อถึงเวลานั้น สิ่งที่เรียกว่าเรือเหาะพลังไอน้ำ ก็จะกลายเป็นเพียงของล้าหลังที่เชื่องช้าเป็นเต่าคลานบนท้องฟ้าไปเลย", "“เรือเหาะ...เรือที่สามารถบินได้บนท้องฟ้างั้นหรือเจ้าคะ?”", "ลิเดียเอ่ยถามอย่างร้อนใจ", "“ใช่แล้ว ถูกต้องตามนั้นเลย”", "ลินน์พยักหน้า", "ลิเดียแสดงท่าทีราวกับว่านางได้ค้นพบขุมสมบัติในทันที ดวงตาของนางเป็นประกายวาววับด้วยความตื่นเต้น ทว่า ไม่นานนัก นางก็สังเกตเห็นว่าบนภาพแบบแปลนของเรือเหาะนั้น ไม่มีปีกเหมือนอย่างเครื่องบิน มีเพียงใบพัดขนาดเล็กเท่านั้น ซึ่งมันย่อมไม่เพียงพอที่จะยกเรือเหาะทั้งลำให้ลอยขึ้นไปได้อย่างแน่นอน มันน่าจะมีไว้เพื่อปรับทิศทางเสียมากกว่า", "“สิ่งนี้สามารถบินได้จริงๆ หรือเจ้าคะ?”", "ลิเดียถามด้วยความอยากรู้อยากเห็น", "“มันจำเป็นต้องร่ายเวทมนตร์บางอย่างใส่ด้วยหรือไม่?”", "“แน่นอนว่ามันบินได้สิ”", "ลินน์กล่าวด้วยความมั่นใจ จากนั้นก็เผยรอยยิ้มและพูดต่อ", "“เจ้ารู้ไหมล่ะว่าทำไมไม้ถึงลอยน้ำได้?”", "ลิเดียส่ายหน้าอย่างไม่เข้าใจ มันเป็นเรื่องความรู้พื้นฐานทั่วไปไม่ใช่หรือที่ว่าไม้สามารถลอยน้ำได้?", "“ก็เพราะว่าไม้ในปริมาตรที่เท่ากันนั้นมีน้ำหนักเบากว่าน้ำ ซึ่งหมายความว่ามันมีความหนาแน่นที่ต่ำกว่ายังไงล่ะ...เจ้าลองไปทดสอบดูก็ได้ ไม่ใช่แค่ไม้เท่านั้นนะ แต่สิ่งใดก็ตามที่มีคุณสมบัติคล้ายคลึงกันก็จะสามารถลอยน้ำได้ และในทางกลับกัน พวกมันก็จะจมลงไป”", "“เหตุผลที่เรือเหาะลำนี้สามารถบินบนท้องฟ้าได้ ก็เป็นเหตุผลเดียวกันกับที่ไม้ลอยน้ำนั่นแหละ! ตราบใดที่ก๊าซภายในถุงลมมีความหนาแน่นน้อยกว่าความหนาแน่นของชั้นบรรยากาศตามมาตรฐาน การโบยบินก็ย่อมเป็นไปได้อย่างเป็นธรรมชาติ”", "ลิเดียตั้งใจฟังอย่างจดจ่อ พลางพยักหน้ารับราวกับว่านางเข้าใจมันเป็นอย่างดี", "“ดังนั้น การนั่งอยู่ในเรือเหาะ ก็เหมือนกับการนั่งอยู่ในเรือที่ถูกยกให้ลอยขึ้นไปบนท้องฟ้าด้วยก๊าซที่เบามากๆ ใช่ไหมเจ้าคะ?”", "“ความเข้าใจของเจ้านั้นยอดเยี่ยมมาก แต่ความรู้ของเจ้านั้นช่างมีจำกัดเหลือเกิน หากเจ้ามาเข้าเรียนวิชาเลขคณิตของข้า บางทีเจ้าอาจจะสามารถออกแบบเครื่องจักรบินได้ด้วยตัวของเจ้าเองเลยก็ได้นะ!”", "ลินน์เอ่ยอย่างนึกเสียดาย", "เมื่อได้ยินคำพูดของลินน์ สีหน้าของลิเดียที่เดิมทีเคยเปี่ยมไปด้วยความสุขก็พลันแข็งทื่อไปในทันที ก่อนที่ใบหน้าของนางจะหมองคล้ำลง นางตระหนักได้ว่านางจะต้องเข้าร่วมกับสถาบันอิเยตาเพื่อที่จะได้เรียนวิชาเหล่านี้ แต่ประเด็นสำคัญก็คือ นางจะต้องบินให้ได้เสียก่อน เพื่อที่จะผ่านการทดสอบ...", "นี่มันดูเหมือนจะเป็นวงจรที่ไม่มีวันสิ้นสุดเอาเสียเลย...", "“ถ้าเจ้าสามารถสร้างเรือเหาะตามแบบแปลนออกมาได้อย่างสมบูรณ์แบบ สำหรับการบินเที่ยวในครั้งแรกล่ะก็ ข้าอาจจะพิจารณาให้เจ้าเป็นคนขับมันดูก็ได้นะ”", "ลินน์กล่าวด้วยรอยยิ้ม", "“ข้าจำได้ว่าข้อตกลงของเจ้ากับท่านเฮลรามก็คือ การบินบนท้องฟ้าโดยไม่พึ่งพาเวทมนตร์ ซึ่งสิ่งนี้ก็น่าจะเพียงพอที่จะผ่านเกณฑ์ได้แบบฉิวเฉียด”", "“ข้าสามารถขับมันได้จริงๆ หรือเจ้าคะ?”", "ลิเดียถามอย่างตื่นเต้น นางกระโดดตัวลอยด้วยความดีใจ แต่กลับเอาหัวไปโขกเข้ากับโครงปีกเครื่องบินเข้าอย่างจัง ความเจ็บปวดทำให้น้ำตาของนางรื้นขึ้นมา แต่กระนั้น นางก็ยังคงกุมหัวตัวเองและจ้องมองลินน์ด้วยสายตาอันเปี่ยมความหวัง", "“แน่นอนว่าเจ้าทำได้ แต่ขอบอกไว้ก่อนเลยนะ ว่าความต้องการของข้านั้นสูงเอามากๆ!”", "ลินน์เอ่ยอย่างสบายๆ", "แม้ว่าหนึ่งในเป้าหมายที่แท้จริงของเขาคือการ เกลี้ยกล่อม...อะแฮ่ม...ดึงตัวเด็กสาวเผ่าฮาล์ฟลิงผู้นี้มาเป็นผู้ช่วย เพื่อคอยช่วยเขาสร้างและขายสิ่งประดิษฐ์แปลกใหม่เหล่านั้น ซึ่งจะช่วยให้เขามีเวลาเหลือในการค้นคว้าวิจัยเวทมนตร์ได้มากขึ้นก็ตาม", "แต่วิธีการดำเนินการนั้นเป็นสิ่งสำคัญ หากเขาดุ่มๆ เข้าไปเชิญชวนนางให้มาช่วยงานแบบตรงไปตรงมา มันอาจจะกระตุ้นความสงสัยและไม่ส่งผลดีนัก", "มีเพียงการบีบให้อีกฝ่ายต้องดิ้นรนไขว่คว้าเพื่อโอกาสด้วยความพยายามของตนเองเท่านั้น พวกเขาจึงจะรู้จักเห็นคุณค่าของมัน และเมื่อถึงเวลาที่ต้องเรียนวิชาเลขคณิต พวกเขาก็จะตั้งใจเรียนมากยิ่งขึ้น"]}, {"t": "ความตื่นเต้นของเหล่าพ่อมดฝึกหัด", "c": ["เป็นไปตามที่ลินน์คาดคิด ความต้องการอันสูงส่งของเขาไม่ได้ทำให้ลิเดียหวาดกลัวจนหนีไป ในทางกลับกัน มันกลับไปจุดประกายจิตวิญญาณแห่งการต่อสู้ของเด็กสาวเผ่าฮาล์ฟลิงให้ลุกโชนขึ้นมา และนางก็เริ่มพิจารณาแบบแปลนอย่างจริงจัง", "เมื่อทราบว่าการสร้างเรือเหาะจำเป็นต้องใช้วัสดุที่มีน้ำหนักเบาแต่เหนียวทน ลิเดียก็เสนอให้นำหนังของสัตว์อสูรอูฐที่ผ่านการแช่น้ำและตากแห้งมาทำเป็นถุงลมของเรือเหาะทันที วัสดุชนิดนี้ตอบโจทย์ความต้องการได้อย่างดีเยี่ยม และโดยปกติแล้วมันมักจะถูกนำไปใช้ทำใบเรือของเรือรบขนาดใหญ่", "เมื่ออยู่บนเรือรบที่ล่องไปในทะเลหมอก โดยใช้ใบเรือที่ทำจากหนังสัตว์อสูรอูฐนั้นต่อให้ต้องเผชิญกับพายุโหมกระหน่ำสักแค่ไหนก็ไม่อาจถูกทำลายลงได้ มันทั้งทนทานและไว้ใจได้อย่างถึงที่สุด", "ส่วนโครงสร้างของถุงลมเรือเหาะนั้น สามารถใช้กิ่งสนเวทมนตร์มาทำได้ เนื่องจากมันมีความทนทานต่อแรงดึง แรงอัด และการดัดงอสูงมาก...", "ลิเดียนั้นเริ่มพูดไม่หยุด แม้ว่านางจะเทียบกับลินน์ไม่ได้เลยในเรื่องของการออกแบบเครื่องจักรบินได้ แต่นางก็รู้ลึกรู้จริงเกี่ยวกับคุณสมบัติของวัสดุต่างๆ ของโลกใบนี้", "ลินน์แอบคำนวณอยู่ในใจอย่างเงียบๆ และตระหนักได้ว่าหากพวกเขาใช้วัสดุทั้งหมดตามที่ลิเดียกล่าวมา ประสิทธิภาพของเรือเหาะย่อมต้องเพิ่มขึ้นอย่างมหาศาลแน่นอน แต่ต้นทุนก็คงจะพุ่งสูงปรี๊ดตามไปด้วยเช่นกัน", "อย่างน้อยก็ต้องใช้เหรียญทองเวทมนตร์เป็นร้อยเหรียญ...", "เมื่อนึกถึงเงินเก็บอันน้อยนิดของตัวเอง ลินน์ก็อดไม่ได้ที่จะกระแอมไอเบาๆ สองครั้ง เพื่อขัดจังหวะการพูดคนเดียวของเด็กสาว", "“อันที่จริง เรือเหาะลำนี้เป็นเพียงแค่เครื่องต้นแบบเท่านั้น เราไม่จำเป็นต้องใช้วัสดุชั้นเลิศขนาดนั้นหรอก เอาแบบธรรมดาๆ ก็พอแล้วล่ะ!”", "“จะเป็นแบบนั้นได้อย่างไรกันเจ้าคะ? นี่คือเรือเหาะลำแรกที่สามารถบินและบังคับทิศทางบนท้องฟ้าได้เลยนะ”", "ลิเดียกล่าวด้วยความโหยหา", "“ข้ามีให้เจ้าเป็นค่ามัดจำแค่สิบสองเหรียญทองเวทมนตร์เท่านั้นแหละ”", "ลินน์เอ่ยอย่างจนใจเล็กน้อย พลางดึงถุงเงินออกมา ซึ่งมันก็คือทรัพย์สินทั้งหมดที่เขาพอจะมีอยู่ ส่วนงบประมาณที่เหลือนั้น เขาคงต้องรอให้มีนักเรียนมาเข้าเรียนในวิชาคณิตศาสตร์มากกว่านี้เสียก่อน แล้วค่อยไปขอเบิกทุนการสอนจากท่านเฮลรามมาจ่ายส่วนที่เหลือเอา...", "ลิเดียส่ายหน้าปฏิเสธที่จะรับมัน เพราะแค่ความรู้แปลกใหม่ที่ลินน์ถ่ายทอดให้นางเมื่อครู่นี้ ก็มีมูลค่ามากกว่าเหรียญทองเวทมนตร์เป็นร้อยเหรียญแล้ว และนี่ยังไม่รวมถึงเรื่องที่ว่าเรือเหาะลำนี้มีความเกี่ยวข้องโดยตรงกับการที่นางจะได้เข้าเรียนในสถาบันเวทมนตร์อิเยตาหรือไม่ด้วยซ้ำ", "“ถือเสียว่าค่ามัดจำนั้นคือค่าเล่าเรียนสำหรับบทเรียนเมื่อครู่นี้ก็แล้วกันเจ้าค่ะ ข้าจะใช้วัสดุที่ดีที่สุดในการสร้างมัน และจะเริ่มลงมือทำตั้งแต่ตอนนี้เลย!”", "ลิเดียเช็ดคราบสกปรกบนใบหน้า แล้วขอให้ดาร์เรนไปเรียกพวกฮาล์ฟลิงที่เหลือในห้องปฏิบัติการมารวมตัวกัน นางต้องการที่จะสร้างเรือเหาะให้เสร็จภายในหนึ่งเดือน", "แม้ลินน์อยากจะเข้าไปช่วย แต่เมื่อเห็นพวกฮาล์ฟลิงกำลังง่วนอยู่กับการทำงานอย่างแข็งขัน เขาก็ถูกห้ามเอาไว้", "เพราะการใช้เวทมนตร์อาจจะทิ้งร่องรอยเอาไว้ได้ และมันคงจะไม่ดีแน่หากท่านเฮลรามเกิดสงสัยขึ้นมาว่าเรือเหาะลำนี้ถูกสร้างขึ้นด้วยเวทมนตร์ นอกจากนี้ ลินน์ก็ยังอยู่ในฐานะลูกค้า และมันก็คงไม่เหมาะนักที่จะให้ลูกค้าลงมือทำอะไรด้วยตัวเอง", "ดังนั้น เมื่อไม่มีอะไรให้ทำ ลินน์จึงรับหน้าที่คอยสั่งการและคอยยืนมองพวกฮาล์ฟลิง ซึ่งมีความสูงเพียงแค่ครึ่งหนึ่งของตัวเขา วิ่งวุ่นไปมาพร้อมกับแบกท่อนไม้ที่มีน้ำหนักมากกว่าตัวพวกเขา", "...", "ความคืบหน้าในการสร้างเรือเหาะนั้นรวดเร็วกว่าที่ลินน์คาดไว้เล็กน้อย หลังจากที่ลงแรงทำงานกันไปตลอดทั้งคืน โครงสร้างโดยรวมก็ถูกสร้างเสร็จไปแล้วถึงหนึ่งในหกส่วน หากไม่ใช่เพราะต้องใช้เวลาอย่างมากในการเตรียมการพิเศษสำหรับหนังสัตว์อสูรอูฐจำนวนมหาศาลที่จะนำมาใช้ทำถุงลมล่ะก็ พวกเขาอาจจะสร้างเรือเหาะให้เสร็จได้ภายในเวลาไม่ถึงเดือนเลยด้วยซ้ำ", "ทว่า การทำงานที่รวดเร็วเช่นนี้ก็ต้องแลกมาด้วยราคาที่ต้องจ่ายเช่นกัน พวกฮาล์ฟลิงแทบจะหมดเรี่ยวแรง เพราะพวกเขาทุ่มเทแรงกายแรงใจทั้งหมดให้กับการทำงาน", "ดาร์เรนนอนแผ่หลาอยู่บนแผ่นไม้กระดานหนาพลางกรนเสียงดังสนั่น ในขณะที่ลิเดียนั้นดูจะหนักกว่าใครเพื่อน นางถึงกับหลับคาโครงเรือเหาะโดยที่สองแขนยังคงกอดรัดคานไม้เอาไว้แน่น โดยมีน้ำลายไหลยืดที่มุมปาก และบ่นพึมพำอะไรบางอย่างออกมาเป็นระยะๆ", "ลินน์ส่ายหน้าและรีบสั่งให้พวกฮาล์ฟลิงที่ยังเตรียมตัวจะทำงานต่อหยุดมือทันที แล้วอุ้มลิเดียกับคนอื่นๆ ที่ผล็อยหลับไปด้วยความเหนื่อยล้าเข้าไปในบ้าน และสั่งให้พวกเขาพักผ่อนให้เพียงพอ", "หลังจากกลายเป็นพ่อมดฝึกหัด การอดหลับอดนอนทั้งคืนก็ไม่ได้ส่งผลกระทบใดๆ ต่อสภาพจิตใจของลินน์เลย ดังนั้น หลังจากที่จัดการให้ลิเดียที่เหน็ดเหนื่อยจนหลับไปได้นอนพักผ่อนแล้ว เขาก็รีบออกจากห้องปฏิบัติการไปทันที", "เวลาผ่านไปหนึ่งวันเต็มๆ ลินน์รู้สึกตื่นเต้นเล็กน้อยที่จะได้เห็นว่าเหล่าพ่อมดฝึกหัดจะสามารถไขสมการเลขชี้กำลังที่เขาทิ้งไว้ให้ได้หรือไม่", "เขาผลักประตูแล้วเดินเข้าไปในห้องเรียน ก่อนจะแปลกใจเมื่อเห็นว่าเหรียญที่ถูกรวบรวมมานั้นยังคงวางกองอยู่บนแท่นบรรยาย โดยไม่มีเหรียญไหนหายไปเลยแม้แต่เหรียญเดียว และสิ่งที่ทำให้เขาประหลาดใจยิ่งกว่าก็คือ ห้องเรียนที่เคยดูว่างเปล่าในคาบเรียนที่แล้ว บัดนี้กลับเนืองแน่นไปด้วยผู้คนจนแทบจะล้นทะลัก", "เมื่อกวาดสายตามองคร่าวๆ ก็พบว่ามีคนมารวมตัวกันอยู่ราวๆ หนึ่งร้อยห้าสิบถึงหนึ่งร้อยหกสิบคนเลยทีเดียว หากห้องเรียนไม่ใหญ่พอ ก็คงจะจุคนทั้งหมดนี่ไม่ไหวแน่ๆ", "แค่เกมตารางเลขชี้กำลังเกมเดียว มันจะได้ผลถึงขนาดนี้เชียวหรือ?", "“อรุณสวัสดิ์ทุกคน!”", "แม้ในใจของลินน์จะเต็มไปด้วยความสงสัย แต่เขาก็ไม่ได้แสดงอาการใดๆ ออกมาทางสีหน้า", "ทว่า ปฏิกิริยาของนักเรียนกลับกระตือรือร้นกว่าที่เขาคาดไว้เสียอีก", "“ศาสตราจารย์ลินน์ ยังมีปริศนาคณิตศาสตร์ข้ออื่นอีกไหมขอรับ?”", "“ข้าคำนวณตัวเลขสำหรับตารางแบบสามสิบหกช่องและสี่สิบเก้าช่องเสร็จแล้วนะ...”", "...", "เมื่อมองดูเหล่าพ่อมดฝึกหัดที่ตื่นเต้นกันสุดๆ ภายในห้องเรียน ลินน์ก็รู้สึกตกตะลึงจนพูดไม่ออก หรือว่านักเรียนของสถาบันเวทมนตร์อิเยตาทุกคนจะเป็นพวกชอบความเจ็บปวดกันหมดนะ?", "พวกเขาถึงได้มีความกระตือรือร้นในการทำโจทย์คณิตศาสตร์มากขนาดนี้...", "ไม่สิ มันต้องมีอะไรบางอย่างเกิดขึ้นโดยที่เขาไม่รู้แน่ๆ", "เมื่อคิดได้เช่นนี้ ลินน์ก็ไม่ได้รีบร้อนที่จะพิสูจน์หาความจริง แต่เขากลับหันไปหาเอล็อคและเอ่ยถาม", "“เวลาผ่านไปหนึ่งวันแล้ว ข้าเชื่อว่าป่านนี้เจ้าคงจะได้คำตอบแล้วใช่ไหม? เอล็อค?”", "“ศาสตราจารย์ขอรับ ผลรวมของตารางทั้งสามสิบหกช่องคือ หกหมื่นแปดพันเจ็ดร้อยสิบเก้าล้าน สี่แสนเจ็ดหมื่นหกพันเจ็ดร้อยสามสิบห้าขอรับ...”", "เอล็อครีบลุกขึ้นยืนตอบด้วยน้ำเสียงสั่นเครือ", "เขาตรวจสอบตัวเลขนี้ซ้ำแล้วซ้ำเล่าจนใช้กระดาษทดไปถึงยี่สิบแผ่นเต็มๆ แต่ตัวเลขมันก็มหาศาลมาก ซ้ำเขายังมีโอกาสตอบได้เพียงแค่ครั้งเดียวเท่านั้น หากเขาตอบผิดไปแม้แต่หลักเดียว เขาก็คงจะจบเห่แน่", "ภายใต้สายตาอันวิตกกังวลของเอล็อค ลินน์พยักหน้าเบาๆ", "“ดีมาก คำตอบถูกต้อง”", "\"แล้วเจ้าล่วงรู้ความหมายของสมการที่ข้าให้พวกเจ้าไปหรือยังล่ะ?\"\"", "ลินน์ถามอีกครั้ง", "“ข้าไขปริศนาได้แล้วขอรับ ผลรวมของตัวเลขในแต่ละช่องรวมกัน จะมีค่าเท่ากับสองเท่าของตัวเลขในช่องสุดท้ายลบด้วยหนึ่ง!”", "เอล็อคกล่าวด้วยความมั่นใจ ตอนนี้เขาหลุดพ้นจากหนี้สินนับแสนล้านแล้ว ความมั่นใจที่เคยสูญเสียไปจึงหวนกลับคืนมาอีกครั้ง", "เขาใช้เวลาตลอดทั้งคืนนั่งคำนวณเพื่อให้ได้ผลลัพธ์ที่ถูกต้อง และจากการยืนยันผลลัพธ์ซ้ำแล้วซ้ำเล่านี่เอง ที่ทำให้เขาค้นพบเคล็ดลับนี้", "ลินน์พยักหน้าอีกครั้ง เมื่อพิจารณาจากความรู้พื้นฐานทางคณิตศาสตร์ที่ยังไม่แข็งแรงนัก การค้นพบรูปแบบนี้ได้ภายในเวลาเพียงหนึ่งวัน ก็นับว่าเป็นผลงานที่พอจะยอมรับได้", "“ศาสตราจารย์ลินน์ ข้าขอรับรางวัลตอนนี้เลยได้ไหมขอรับ?”", "เอล็อคถามอย่างมีความหวัง", "เพียร์ซและคนอื่นๆ มองไปที่เอล็อคด้วยความอิจฉาริษยา นั่นมันเหรียญทองเวทมนตร์ตั้งยี่สิบเหรียญเชียวนะ เมื่อวานนี้พวกเขาก็ใช้เวลานานโขในการคำนวณเช่นกัน แต่พวกเขาไม่ได้สิ้นหวังเหมือนหมอนี่ ก็เลยไม่ได้เป็นคนแรกที่ค้นพบรูปแบบของมัน", "แน่นอนว่าลินน์รู้เรื่องเงินรางวัลที่ท่านเฮลรามตั้งไว้สำหรับคนที่ไขสมการของเขาได้ แต่ด้วยความเย่อหยิ่งในฐานะศาสตราจารย์ เขาจึงไม่สามารถฮุบเงินก้อนนั้นมาเป็นของตัวเองได้", "แต่แค่การค้นพบรูปแบบเพียงเล็กน้อยแค่นี้ มันยังห่างไกลจากคำว่าเพียงพอที่จะคว้าเงินก้อนนี้ไปได้หรอกนะ!", "“เอล็อค สูตรหาผลรวมของข้าไม่ได้เรียบง่ายขนาดนั้นหรอกนะ จะเกิดอะไรขึ้นถ้าข้าลองปรับเปลี่ยนกฎของเกมตารางดูสักหน่อย อย่างเช่น ให้ช่องถัดไปมีค่าเป็นสามเท่าของช่องก่อนหน้าล่ะ? ทฤษฎีของเจ้าจะยังนำมาใช้ได้อยู่หรือไม่?”", "ลินน์ถามด้วยรอยยิ้ม", "สีหน้าภาคภูมิใจของเอล็อคแข็งค้างไปในทันที เขาเริ่มคิดคำนวณในใจ ก่อนจะคว้าปากกาขนนกขึ้นมาและเริ่มเขียนขยุกขยิกบนกระดาษปาปิรุส...", "“แล้วถ้าข้าเพิ่มกฎเข้าไปอีกข้อล่ะ ว่าในช่องแรก เจ้าต้องวางเหรียญทองแดงลงไปสิบเจ็ดเหรียญ?”", "ลินน์ถามต่อ", "เอล็อคสติแตกไปอย่างสมบูรณ์ ในหัวของเขาเต็มไปด้วยตัวเลขจำนวนนับไม่ถ้วน...", "‘นี่มันยากเกินไปแล้ว!’", "เขาไม่สามารถคำนวณมันได้เลยสักนิด!"]}, {"t": "ตอนที่ 76", "c": ["บทที่ 76 : เจ้าต้องทำโจทย์คณิตศาสตร์ไปกี่ข้อกันถึงได้ประสบความสำเร็จอย่างทุกวันนี้", "คำพูดสั้นๆ เพียงสองประโยคของลินน์ ราวกับสายฟ้าที่ฟาดลงมาฉุดกระชากเอล็อคจากสรวงสวรรค์ให้ร่วงหล่นลงสู่ขุมนรก และยังส่งผลให้พ่อมดฝึกหัดทุกคนในที่นั้นถึงกับขนลุกซู่", "“คณิตศาสตร์ขั้นสูงเป็นวิชาที่ต้องการความแม่นยำอย่างถึงที่สุด เราจำเป็นต้องคัดกรองข้อมูลและปฏิบัติการทางคณิตศาสตร์อันซับซ้อนมากมาย เพื่อให้มองเห็นถึงรูปแบบที่ซ่อนอยู่ จากนั้นจึงสรุปพวกมันออกมาเป็นสูตรสมการที่สอดคล้องกัน ซึ่งจะช่วยลดทอนความซับซ้อน และยกระดับประสิทธิภาพการคำนวณโดยรวมให้ดียิ่งขึ้น”", "ลินน์กวาดสายตามองทุกคนในห้องเรียน เขาหยุดชะงักไปครู่หนึ่งแล้วจึงกล่าวต่อ", "“รูปแบบที่เอล็อคสรุปมานั้นไม่ได้ผิดหรอก แต่ความสามารถในการนำไปประยุกต์ใช้ของมันมีจำกัดจนเกินไป หากการเพิ่มขึ้นแบบทวีคูณภายในตารางสามารถเป็นสองเท่าได้ มันก็ย่อมสามารถเป็นสามเท่า ห้าเท่า หรือสิบเท่าได้เช่นกัน! และเมื่อเป็นเช่นนั้น รูปแบบของเจ้าก็จะไม่สามารถนำมาใช้งานได้อีกต่อไป...”", "“ทว่า สูตรหาผลรวมอนุกรมเรขาคณิตนี้ สามารถนำไปประยุกต์ใช้ได้กับการเพิ่มขึ้นแบบทวีคูณทุกรูปแบบที่เข้าเงื่อนไข!”", "ลินน์ดีดนิ้วดังเป๊าะ และภายใต้กระแสพลังเวทที่เอ่อล้น สูตรสมการอันซับซ้อนก็ปรากฏขึ้นเบื้องหน้าทุกคนอีกครั้ง", "เมื่อ q≠1, Sn=a1(1-q^n)/(1-q)", "จอห์นนี่ เพียร์ซ และคนอื่นๆ จ้องมองสิ่งที่เรียกว่าสูตรหาผลรวมอนุกรมเรขาคณิตพลางครุ่นคิดอย่างหนัก ไม่นานนัก พวกเขาก็หยิบปากกาขนนกขึ้นมาและเริ่มคำนวณ โดยแจกแจงลำดับสำหรับตัวคูณที่เป็นสองเท่า สามเท่า และสี่เท่า เพื่อค้นหารูปแบบ จากนั้นก็ลองนำพวกมันไปแทนค่าลงในสูตร", "จากข้อสรุปและการอนุมานของเอล็อคก่อนหน้านี้ผ่านเงื่อนไข q≠1 เพียร์ซก็ตระหนักได้อย่างรวดเร็วว่า สัญลักษณ์นี้น่าจะหมายถึงขนาดของตัวคูณ แต่ทำไมถึงต้องลบด้วยหนึ่งล่ะ?", "เพียร์ซกัดนิ้วโป้งของตนเอง เขาลองแทนค่าจากเกมตารางที่มีการเติบโตแบบสองเท่าในตอนแรก โดยละทิ้งส่วน (1-q) ในตอนท้ายไป และทำการคำนวณโดยตรง ซึ่งเขาก็พบว่ามันได้ผลลัพธ์ออกมาอย่างสมบูรณ์แบบ แม้ว่าผลลัพธ์นั้นจะออกมาตรงกันข้าม เป็นตัวเลขติดลบก็ตาม", "‘นั่นหมายความว่า จุดประสงค์ของสูตรส่วนหลังก็คือการเปลี่ยนตัวเลขติดลบให้กลายเป็นจำนวนบวกงั้นหรือ?’", "ทว่า เมื่อลองเปลี่ยนไปใช้การเติบโตแบบทวีคูณสามเท่า จำนวนที่ได้กลับผิดเพี้ยนไปโดยสิ้นเชิง...", "สมองของเพียร์ซหมุนติ้วอย่างรวดเร็ว เขาเกือบจะคว้าคำตอบนั้นมาได้แล้วเชียว อีกนิดเดียว แค่อีกนิดเดียวเท่านั้น!", "แต่มันคืออะไรกันล่ะ?", "ภายในห้องเรียน ยังมีคนอื่นๆ อีกมากมายที่มีสภาพไม่ต่างจากเพียร์ซ พวกเขากำลังหมกมุ่นอยู่กับการแก้โจทย์อย่างหนัก บางคนถึงกับทึ้งผมตัวเอง หรือไม่ก็เกาหัวแกรกๆ แต่กลับไม่มีใครเลยที่เลือกจะอู้หรือยอมแพ้", "‘บรรยากาศที่สถาบันเวทมนตร์อิเยตามันตึงเครียดแบบนี้ตลอดเลยหรือเปล่านะ?’", "ลินน์รู้สึกฉงนใจเล็กน้อย คนพวกนี้ช่างรักการเรียนกันเสียจริง...", "เมื่อเวลาของคาบเรียนใกล้จะสิ้นสุดลง และในจังหวะที่ลินน์กำลังคิดว่าคงไม่มีใครคิดอะไรออกไปได้มากกว่านี้อีกแล้วในวันนี้ จู่ๆ มือข้างหนึ่งก็ชูพรวดขึ้นมา", "“ศาสตราจารย์ลินน์ ข้าพอจะคิดอะไรออกบ้างแล้วเจ้าค่ะ!”", "ผู้ที่พูดขึ้นคือจอห์นนี่ หลังจากที่ได้รับอนุญาต นางก็ลุกขึ้นยืนแล้วกล่าวว่า", "“ในสูตรหาผลรวม a1 น่าจะหมายถึงจำนวนที่วางลงไปในช่องแรก q คือตัวคูณ และ n สอดคล้องกับจำนวนของช่องตาราง ถูกต้องไหมเจ้าคะ ศาสตราจารย์?”", "“ถูกต้องตามนั้นเลย หลังเลิกเรียน เจ้าไปรับรางวัลของเจ้าที่ทางเข้าสถาบันได้เลย!”", "ลินน์พยักหน้ารับ แม้ว่าคำอธิบายของจอห์นนี่จะค่อนข้างคลุมเครือ แต่มันก็ถูกต้องแม่นยำทีเดียว", "เพียร์ซอดไม่ได้ที่จะทุบอกตัวเองด้วยความหงุดหงิด ด้วยคำใบ้ของจอห์นนี่ เขาเองก็เข้าใจมันได้อย่างรวดเร็วเช่นกัน ทำไมเขาถึงคิดช้าไปแค่ก้าวเดียวกันนะ?", "เขาเกือบจะแก้โจทย์ได้อยู่แล้วเชียว!", "หลังจากส่งสัญญาณให้จอห์นนี่นั่งลง ลินน์ก็เริ่มอธิบายให้พ่อมดฝึกหัดทุกคนในที่นั้นฟังว่า ลำดับเรขาคณิตคืออะไร พร้อมทั้งอธิบายถึงพจน์ทั่วไปและสูตรหาผลรวม ไปจนถึงการอธิบายว่าสูตรแต่ละสูตรนั้นมีที่มาที่ , {"t": "รอยยิ้มของศาสตราจารย์คณิตศาสตร์", "c": ["ครึ่งเดือนผ่านไปอย่างรวดเร็ว และนับตั้งแต่ที่ลินน์เดินทางมาถึงโลกต่างมิติแห่งนี้ นี่คือช่วงเวลาที่เขาได้ใช้ชีวิตอย่างมีความสุขที่สุด", "ในช่วงเช้า เขาสอนวิชาคณิตศาสตร์ขั้นสูงสองสามคาบที่สถาบันเวทมนตร์อิเยตา ช่วงบ่ายก็ไปตรวจสอบความคืบหน้าในการสร้างเรือเหาะที่ห้องปฏิบัติการของพวกฮาล์ฟลิง และในตอนกลางคืน เขาก็จะมานั่งแก้โจทย์คณิตศาสตร์ขั้นสูง พร้อมกับฝึกฝนเวทมนตร์บทใหม่ที่เพิ่งพัฒนาขึ้นมาอย่าง ไนโตรเจนเหลว อาณาเขตน้ำแข็ง", "ต้องบอกเลยว่าการแก้โจทย์ปัญหาเหล่านี้ค่อนข้างมีประโยชน์ทีเดียว เพราะอัตราการเติบโตของพลังจิตวิญญาณของเขาเพิ่มขึ้นอย่างเห็นได้ชัดเมื่อเทียบกับก่อนหน้านี้ แต่ข้อเสียเพียงอย่างเดียวก็คือ ทุกๆ วันที่เขาเดินออกจากห้อง เขาจะรู้สึกประสาทเสียอยู่บ้าง", "จังหวะการสอนวิชาคณิตศาสตร์ขั้นสูงของเขาดำเนินไปอย่างรวดเร็วกว่าที่คาดไว้ และหลังจากผ่านไปเพียงสี่วัน เหล่านักเรียนซึ่งเป็นพ่อมดฝึกหัดก็ไม่พอใจกับแค่สูตรหาผลรวมอนุกรมเรขาคณิตอีกต่อไป", "และพวกเขาต่างก็ตั้งตารอคอยโจทย์ปัญหาคณิตศาสตร์ขั้นสูงที่ซับซ้อนยิ่งกว่าเดิม!", "ลินน์จึงไม่มีทางเลือกอื่นนอกจากต้องงัดอาวุธหนักชิ้นที่สองออกมาใช้...นั่นก็คือ", "การถอดรากที่สอง!", "หากการเติบโตแบบทวีคูณถือเป็นเรื่องยากสำหรับพ่อมดฝึกหัดเหล่านี้แล้วล่ะก็ การถอดรากที่สองก็คือฝันร้ายอันแสนบริสุทธิ์ดีๆ นี่เอง!", "เหล่านักเรียนผู้กระตือรือร้นที่ในตอนแรกต่างตั้งตารอคอยเนื้อหาใหม่ๆ พลันแปรสภาพกลายเป็นกลุ่มคนที่ร้องไห้คร่ำครวญ เมื่อใดก็ตามที่มีใครเดินผ่านห้องเรียนวิชาคณิตศาสตร์ขั้นสูง พวกเขาก็มักจะได้ยินเสียงอุทานแปลกๆ ดังเล็ดลอดออกมาจากข้างในเสมอ", "“ข้าทำไม่ได้ ข้าแก้โจทย์ข้อนี้ไม่ได้...”", "“เป็นไปไม่ได้ นี่ไม่ใช่ความผิดของข้าแน่ๆ สูตรมันต้องผิดพลาดตรงไหนสักที่สิ!”", "“โจทย์ข้อนี้มันไม่มีทางแก้ได้เลยต่างหาก!!!”", "...", "หลังจากเริ่มเรียนเนื้อหานี้ได้เพียงสองวัน เอล็อคและคนอื่นๆ ก็ร้องโอดครวญกันระงมว่ามันยากเกินไป พวกเขารับไม่ไหว พวกเขาถอดรากที่สองไม่ได้...", "วิธีการทั้งหมดเท่าที่พอจะนึกออก ไม่ว่าจะเป็นการหารยาว หรือเศษส่วนต่อเนื่อง พวกเขาลองนำมาใช้กันหมดแล้ว แต่ถึงกระนั้น นักเรียนกว่าครึ่งก็ยังคงมีพัฒนาการที่เชื่องช้า", "ถึงขั้นมีคำศัพท์ใหม่แพร่สะพัดไปทั่วสถาบันเวทมนตร์อิเยตา ซึ่งก็คือ รอยยิ้มของศาสตราจารย์วิชาคณิตศาสตร์ขั้นสูง โดยข่าวลือจะเล่าไว้ว่า เมื่อใดก็ตามที่ศาสตราจารย์ลินน์คลี่ยิ้มออกมา ก็จะไม่มีใครในห้องเรียนที่สามารถยิ้มออกได้อีกเลย!", "ลินน์รู้สึกจนใจกับเรื่องนี้อยู่ไม่น้อย หากพวกเขาต้องมาเจอกับปัญหาหนักอกหนักใจเพียงแค่การถอดรากที่สอง แล้วจะเกิดอะไรขึ้นเมื่อถึงเวลาที่ต้องเรียนแคลคูลัสล่ะ...เขากังวลว่าคนพวกนี้อาจจะเสียสติกันไปหมด", "ในช่วงวันต่อๆ มา เขาจึงทำได้เพียงแค่เริ่มต้นสอนจากเรื่องเรขาคณิต และเมื่อพิจารณาถึงจังหวะการเรียนรู้ที่แตกต่างกันของแต่ละคน เขาถึงกับต้องแบ่งชั้นเรียนออกเป็นกลุ่มหัวกะทิและกลุ่มธรรมดา...", "หลังจากสอนวิชาคณิตศาสตร์ขั้นสูงคาบใหม่เสร็จ ลินน์ก็เตรียมตัวจะกลับ แต่ฟิลิปก็เข้ามาดักหน้าเขาไว้พอดี", "“ศาสตราจารย์ลินน์ ในอีกสองวันข้างหน้า คนจากสภาพ่อมดและผู้สื่อข่าวของวารสารเวทมนตร์รายสัปดาห์จะเดินทางมาที่เมืองท่าอิเยตา และท่านก็ควรจะเตรียมตัวไว้ล่วงหน้าหน่อยก็ดีนะ!”", "ฟิลิปเอ่ยเตือน", "“เป็นเพราะเรื่องกฎการตกอย่างอิสระหรือ?”", "ในตอนแรกลินน์รู้สึกประหลาดใจ แต่ไม่นานก็เข้าใจได้", "“ถูกต้องขอรับ รวมถึงทฤษฎีดวงดาวของท่านด้วย ท่านเฮลรามได้รายงานทฤษฎีเหล่านี้ไปแล้ว แต่พวกมันจะได้รับการตีพิมพ์หรือไม่นั้น ก็ขึ้นอยู่กับผู้สื่อข่าวของวารสารเวทมนตร์รายสัปดาห์แล้วล่ะ”", "ฟิลิปพยักหน้า", "“แล้วสภาพ่อมดล่ะ? พวกเขาส่งคนมาทำไมกัน?”", "ลินน์ถามด้วยความอยากรู้อยากเห็น เพราะมันไม่น่าจะเป็นเรื่องเดียวกัน", "\"พวกเขามาเพื่อประเมินระดับพ่อมดของท่านอย่างไรล่ะขอรับ!\"", "ฟิลิปอธิบาย", "ในดินแดนพ่อมด ตำแหน่งพ่อมดเต็มตัวไม่ได้เป็นเพียงแค่สัญลักษณ์ของความแข็งแกร่งเท่านั้น แต่ยังเป็นสถานะและสิทธิพิเศษที่มีเพียงสภาพ่อมดเท่านั้นที่จะเป็นผู้มอบให้ได้", "โดยทั่วไปแล้ว หากได้รับการยืนยันว่าพ่อมดต่างถิ่นมีแผนที่จะพำนักอยู่ในดินแดนพ่อมดเป็นเวลานาน ทางสภาก็จะส่งคนมายืนยันตัวตนและระดับพ่อมดของพวกเขา นอกจากนี้ ยังมีช่วงเวลาแห่งการเฝ้าระวังเพื่อประเมินว่าพ่อมดต่างถิ่นผู้นั้นไม่ได้เป็นภัยคุกคามต่อสถานที่แห่งนี้ ก่อนที่จะทำการออกเข็มกลัดและเสื้อคลุมพ่อมดเต็มตัวให้อย่างเป็นทางการ", "เมื่อเห็นว่าสีหน้าของลินน์ดูมีความกังวลใจเล็กน้อย ฟิลิปก็รีบพูดให้ความมั่นใจกับเขา", "“ท่านไม่ต้องกังวลเรื่องนี้มากจนเกินไปหรอก ท่านสอนวิชาคณิตศาสตร์ขั้นสูงได้ดีเยี่ยมมาก การผ่านช่วงเฝ้าระวังไปได้ไม่น่าจะมีปัญหาอะไร”", "ลินน์พยักหน้ารับ ความกังวลของเขาไม่ได้อยู่ที่เรื่องของช่วงเฝ้าระวัง เพราะท้ายที่สุดแล้ว เขาก็ไม่ได้มีแผนที่จะก่อเรื่องเลวร้ายอะไรในดินแดนพ่อมดอยู่แล้ว", "แต่สิ่งที่ทำให้เขาหนักใจอย่างแท้จริงก็คือ การประเมินเพื่อเป็นพ่อมดเต็มตัวต่างหาก", "ตอนที่เขาเข้าร่วมกับสถาบันอิเยตา เฮลรามไม่ได้ทำการทดสอบระดับพ่อมดของเขา และลินน์ก็คิดเอาเองว่ามันน่าจะถูกกำหนดให้ผ่านโดยปริยายไปแล้ว และเขานั้นก็ไม่รู้เลยว่าแท้จริงแล้วสิ่งนี้จะถูกตัดสินโดยสภาพ่อมด", "แม้ว่าลินน์จะก้มหน้าก้มตาแก้โจทย์ปัญหาอย่างหนักหน่วงมาตลอดเกือบครึ่งเดือน แต่มันก็ยังต้องใช้เวลาอีกหลายวันกว่าที่อัตราการเติบโตของพลังเวทจะไปถึงขีดจำกัด ซึ่งนั่นเป็นเหตุผลว่าทำไมเขาถึงไม่ได้รีบร้อนที่จะหาวิธีครอบครองต้นกำเนิดเวทมนตร์", "“โดยปกติแล้ว ระดับพ่อมดในดินแดนพ่อมดจะถูกประเมินอย่างไรหรือ?”", "ลินน์ลองหยั่งเชิงถามดู", "“โดยทั่วไปแล้ว การทดสอบระดับพ่อมดตั้งแต่ระดับหนึ่งถึงสามวงแหวน จะกระทำผ่านลูกแก้วเวทมนตร์ ซึ่งแทบจะไม่เคยเกิดข้อผิดพลาดเลย แน่นอนว่าหากท่านเป็นจอมเวทผู้ยิ่งใหญ่ ของสิ่งนั้นก็ย่อมไร้ประโยชน์ไปโดยปริยาย”", "ฟิลิปพูดติดตลกอย่างอารมณ์ดี จากนั้นก็เอ่ยถามด้วยความอยากรู้อยากเห็นว่า การประเมินระดับในสมาคมเวทมนตร์เร้นลับนั้นทำกันอย่างไร", "“ในสมาคมเวทมนตร์เร้นลับ มีเพียงแค่การจัดอันดับนักปราชญ์เท่านั้น ไม่มีอันดับพลังอำนาจหรอก เพราะสถานะของคนๆ หนึ่งนั้นไม่สำคัญ มีเพียงความรู้เท่านั้นที่คู่ควรแก่การแลกเปลี่ยน”", "ลินน์ปั้นน้ำเป็นตัวแล้วพูดออกไปอย่างไหลลื่น", "เมื่อได้ยินเช่นนั้น ฟิลิปก็อดไม่ได้ที่จะรู้สึกโหยหาสถานที่แห่งนั้น บางทีอาจจะมีเพียงที่นั่นเท่านั้น ที่พ่อมดเต็มตัวอย่างเขาจะสามารถพูดคุยกับจอมเวทผู้ยิ่งใหญ่ หรือแม้กระทั่งพ่อมดระดับตำนานได้อย่างเท่าเทียม และได้แบ่งปันมุมมองรวมถึงข้อสันนิษฐานที่มีต่อโลกใบนี้ร่วมกัน...", "“การจะเข้าร่วมสมาคมเวทมนตร์เร้นลับ จำเป็นต้องมีเงื่อนไขอะไรหรือไม่?”", "ฟิลิปกระซิบถามด้วยความใคร่รู้ จากคำบอกเล่าของลินน์ สมาคมเวทมนตร์เร้นลับน่าจะเป็นเพียงแค่กลุ่มเล็กๆ สำหรับการแลกเปลี่ยนความรู้ โดยไม่มีการบังคับให้สมาชิกต้องทำในสิ่งที่พวกเขาไม่อยากทำ การเข้าร่วมสมาคมเช่นนี้ดูเหมือนจะมีแต่ข้อดีและไม่มีข้อเสียเลยแม้แต่น้อย", "“ประการแรก ท่านจะต้องนำเสนอความรู้ที่แปลกใหม่และไม่เหมือนใครเพื่อพิสูจน์ความสามารถของตนเองเสียก่อน และท่านก็ยังต้องการการรับรองจากผู้ที่มีตำแหน่งสูงกว่าด้วย”", "ลินน์พยายามแต่งเติมคำโกหกของตนอย่างใจเย็น และยังเสริมอีกว่า นับตั้งแต่ที่เขาเดินทางมาถึงดินแดนพ่อมด เขาก็ขาดการติดต่อกับสมาคมเวทมนตร์เร้นลับไปเป็นการชั่วคราว เพื่อดับความคิดของฟิลิปเสีย", "‘ท้ายที่สุดแล้ว ในจักรวรรดิเซคัสก็ไม่ได้มีสิ่งที่เรียกว่าสมาคมเวทมนตร์เร้นลับอยู่จริง แล้วจะเสกมันขึ้นมาดื้อๆ ได้อย่างไรกันล่ะ?’", "หลังจากที่ถูกเกลี้ยกล่อมจนเชื่อ ฟิลิปก็จากไปพร้อมกับความรู้สึกเสียดายเล็กน้อย ส่วนลินน์ก็ลอบถอนหายใจด้วยความโล่งอก คำโกหกที่ปั้นแต่งขึ้นมาเพื่อรับมือกับการจับผิดของเฮลรามนั้น ได้นำความสะดวกสบายมาให้เขาอย่างมากมาย แต่มันก็สร้างปัญหาแอบแฝงขึ้นมาไม่น้อยเช่นกัน", "ลินน์เดินไปพลางขบคิดถึงวิธีรับมือไปพลาง ขณะมุ่งหน้าไปยังห้องปฏิบัติการของพวกฮาล์ฟลิง เพื่อเตรียมตรวจสอบความคืบหน้าของเรือเหาะ", "ทันทีที่เขาก้าวผ่านประตูเข้าไป เขาก็ชนเข้ากับลิเดียที่กำลังวิ่งผลีผลามออกมาพอดี", "เมื่อมองดูจากความแตกต่างของส่วนสูงแล้ว มันราวกับว่าคนแคระตัวน้อยวิ่งชนเข้ากับยักษ์ ทว่าผลลัพธ์กลับตรงกันข้ามอย่างสิ้นเชิง ลินน์ถึงกับเซถอยหลังไปหลายก้าวเพื่อทรงตัวและป้องกันไม่ให้ตัวเองล้มลง", "ลิเดียดูเหมือนจะไม่เป็นอะไรเลยแม้แต่น้อย และนางก็รีบคว้าแขนของลินน์ด้วยความตื่นเต้น แล้วลากเขาเข้าไปข้างในทันที", "“ตามข้ามาเร็วเข้า ศาสตราจารย์ลินน์...”", "หลังจากที่ทำงานอย่างไม่รู้จักเหน็ดเหนื่อยหามรุ่งหามค่ำมานานกว่าครึ่งเดือน ในที่สุดเรือเหาะของพวกเขาก็สร้างเสร็จก่อนกำหนด!"]}, {"t": "ความลับ นี่มันเป็นความลับทั้งหมด!", "c": ["สองวันต่อมา ขบวนรถม้าที่ถูกลากจูงโดยสัตว์อสูรอูฐร่างกำยำหลายตัว ค่อยๆ เคลื่อนตัวไปตามถนนสายหลักของเมืองท่าอย่างเชื่องช้า", "ภายในรถม้าที่ตกแต่งอย่างหรูหราบริเวณหัวขบวน พ่อมดชราผู้หนึ่งกำลังทอดสายตามองออกไปนอกหน้าต่าง พลางพินิจพิเคราะห์แผนผังทางสถาปัตยกรรมของทั้งเมือง", "“ท่านทิค ท่านคิดว่ามันเป็นไปได้จริงๆ หรือที่ทวีปแห่งนี้จะมีทรงกลม?”", "ข้างกายเขา พ่อมดหนุ่มผู้แต่งกายภูมิฐานเอ่ยถามด้วยความอยากรู้อยากเห็น ขณะจ้องมองเหรียญทองและเหรียญทองแดงที่กำลังหมุนติ้วอยู่ในมือของตน", "“ลูโอร์เอ๋ย จนกว่าเราจะได้รับการยืนยันอย่างถี่ถ้วน ข้าเกรงว่าจะไม่มีผู้ใดสามารถยืนยันหรือหักล้างข้อสันนิษฐานนี้ได้อย่างแท้จริงหรอก...”", "ทิคใช้เวลานานโขกว่าจะละสายตาจากทิวทัศน์ของบ้านเรือนที่กว้างขวางและยาวเหยียดอย่างเป็นระเบียบ แล้วจึงเอ่ยต่อ", "“มีข่าวลือภายในสภาว่า พ่อมดระดับตำนานท่านหนึ่งซึ่งเชี่ยวชาญด้านเวทมนตร์ธาตุเป็นอย่างยิ่ง ทันทีที่ได้ยินข้อสันนิษฐานนี้ เขาก็เตรียมร่ายเวทบินทะยานขึ้นสู่ที่สูง เพื่อพิสูจน์ให้แน่ชัดว่าทวีปแห่งนี้มีทรงกลมหรือแบนราบกันแน่...”", "“แล้วเกิดอะไรขึ้นหรือขอรับ?”", "ลูโอร์ถามด้วยความอยากรู้อยากเห็นเป็นล้นพ้น", "“จนถึงตอนที่เราออกเดินทางมา ท่านผู้นั้นก็ยังไม่กลับมาเลยน่ะสิ!”", "ทิคกล่าวพลางส่ายหน้า", "‘มันก็ผ่านมาหลายวันแล้วไม่ใช่หรือ?’", "‘คงไม่ใช่อย่างที่คิดหรอกกระมัง...’", "ลูโอร์อดไม่ได้ที่จะขนลุกซู่ แต่แล้วก็ปัดความคิดนั้นทิ้งไป แม้เขาจะไม่เคยประจักษ์ถึงพลังของพ่อมดระดับตำนานด้วยตาตนเอง แต่เขาก็เข้าใจดีว่ามันจะต้องทรงพลังจนเกินจินตนาการอย่างแน่นอน", "ความปลอดภัยของบุคคลระดับสูงเหล่านั้น ไม่ใช่สิ่งที่คนที่มีสถานะต้อยต่ำอย่างเขาจะต้องไปกังวลเลยแม้แต่น้อย", "“อย่างไรก็ดี ทันทีที่ข่าวนี้ถูกเผยแพร่ออกไป พ่อมดแห่งสำนักพยากรณ์ทุกคนก็คงนั่งไม่ติดเก้าอี้เป็นแน่”", "ทิคกล่าวพร้อมกับถอนหายใจ", "พ่อมดแห่งสำนักพยากรณ์เหล่านั้น มักจะพยายามทำนายลางบอกเหตุแห่งโชคชะตาจากการเคลื่อนที่ของวัตถุท้องฟ้าอยู่เสมอ และแผนที่ดาวที่แพร่หลายไปทั่วดินแดนพ่อมดก็ล้วนมาจากน้ำมือของพวกเขาทั้งสิ้น ทฤษฎีดวงดาวของลินน์ย่อมหักล้างทฤษฎีนี้ไปอย่างสิ้นเชิง", "ซึ่งนี่เป็นสิ่งที่ทิคยินดีปรีดาเป็นอย่างยิ่ง", "ในมุมมองของเขา สำนักพยากรณ์เอาแต่ผลาญงบประมาณของสภาไปวันๆ เสนอแนวคิดที่ฟังดูคลุมเครือจับต้องไม่ได้ แล้วค่อยมานั่งตีความคำต่อคำตามข้อเท็จจริงหลังจากที่เหตุการณ์นั้นๆ เกิดขึ้นไปแล้ว ทำให้ไม่มีใครรู้แน่ชัดว่า นั่นคือคำทำนายที่แม่นยำ หรือเป็นเพียงการปั้นน้ำเป็นตัวอย่างหน้าไม่อายกันแน่", "ลูโอร์ไม่ได้ใส่ใจกับความคิดของพ่อมดแห่งสำนักพยากรณ์เหล่านั้นมากนัก แต่เขากลับเริ่มครุ่นคิดถึงอีกทฤษฎีหนึ่งที่พ่อมดนามว่าลินน์ได้กล่าวไว้ นั่นคือ กฎการตกอย่างอิสระ", "ความเร่งของวัตถุที่ตกลงมานั้นไม่ขึ้นอยู่กับน้ำหนักและมวลของมัน เมื่อปล่อยวัตถุสองชิ้นที่มีมวลต่างกันจากระดับความสูงเดียวกัน พวกมันจะตกลงสู่พื้นพร้อมกัน", "แม้ทฤษฎีนี้จะได้รับการยืนยันจากจอมเวทผู้ยิ่งใหญ่บางท่านแล้ว แต่มันก็ยังดูขัดกับสามัญสำนึกและยากที่จะเชื่ออยู่ดี", "‘นี่เราต้องเชื่อจริงๆ หรือว่า หากนำก้อนกรวดก้อนหนึ่งกับภูเขาทั้งลูกขึ้นไปบนท้องฟ้า พวกมันทั้งสองจะตกลงมากระทบพื้นในจังหวะเดียวกัน?’", "ลูโอร์ลองโยนเหรียญทองและเหรียญทองแดงในมือขึ้นไปบนอากาศ และก็เป็นไปตามคาด เหรียญทองที่มีน้ำหนักมากกว่าตกลงมาถึงมือเขาก่อนอย่างไม่ต้องสงสัย", "ขณะที่เขากำลังจมอยู่ในห้วงความคิด ขบวนรถม้าก็ค่อยๆ หยุดชะงักลง", "“เกิดอะไรขึ้น?”", "ลูโอร์ถามด้วยความไม่สบอารมณ์เล็กน้อย เพราะตามกำหนดการแล้ว พวกเขายังไม่ถึงสถาบันเวทมนตร์อิเยตาด้วยซ้ำ", "“ท่านพ่อมด ถนนข้างหน้าถูกปิดกั้นไว้ขอรับ”", "คนรับใช้ที่บังคับสัตว์อสูรอูฐรีบอธิบาย", "ลูโอร์เลิกผ้าม่านรถม้าขึ้น และทันใดนั้นเขาก็เห็นชาวเมืองจำนวนนับไม่ถ้วนรวมตัวกันอยู่ที่จัตุรัส ราวกับกำลังมุงดูและถกเถียงอะไรบางอย่างกันอยู่", "“เกิดอะไรขึ้นงั้นหรือ?”", "ทิคเอ่ยถามขึ้นมาบ้าง เนื่องจากเขาเองก็ได้ยินเสียงอึกทึกครึกโครมจากข้างนอกเช่นกัน", "ทิคมองตรงไปข้างหน้า และด้วยระดับความสูงของรถม้า เครื่องจักรเล่นแร่แปรธาตุรูปร่างประหลาดขนาดมหึมาที่ตั้งตระหง่านอยู่ใจกลางจัตุรัสก็ปรากฏสู่สายตาของพวกเขาทั้งสองอย่างรวดเร็ว", "อุปกรณ์ชิ้นนี้มีความสูงอย่างน้อยๆ ก็เทียบเท่ากับอาคารสองชั้น โดยแบ่งออกเป็นส่วนบนและส่วนล่าง", "ส่วนบนเป็นทรงกลมรูปไข่คว่ำ ซึ่งคาดว่ามีความยาวกว่ายี่สิบเมตร ในขณะที่ส่วนล่างดูคล้ายกับเรือ แม้ว่าเมื่อนำมาเทียบกันแล้วมันจะดูเล็กกว่ามาก โดยมีขนาดรวมแล้วไม่ถึงหนึ่งในสามของทรงกลมรูปไข่ด้วยซ้ำ และทั้งสองส่วนนั้นถูกผูกเข้าด้วยกันด้วยเชือกเส้นหนาหลายเส้น", "“นี่คือเครื่องจักรเล่นแร่แปรธาตุที่ท่านเฮลรามเพิ่งคิดค้นขึ้นมางั้นหรือ? มันใหญ่โตมโหฬารมาก!”", "ลูโอร์เอ่ยด้วยความตื่นตะลึง มันช่างดูใหญ่โตยิ่งกว่าโกเลมในนครพ่อมดเสียอีก", "“ไม่ใช่หรอก ข้าเกรงว่ามันจะไม่เกี่ยวอันใดกับท่านเฮลรามผู้ทรงเกียรติเลยแม้แต่น้อย...”", "ทิคเอ่ยขัด หลังจากที่เงี่ยหูฟังเสียงวิพากษ์วิจารณ์รอบๆ ตัวอยู่พักหนึ่ง", "ชื่อที่ชาวเมืองที่นี่กล่าวถึงมากที่สุดก็คือ ลินน์ ลิเดีย และสิ่งที่เรียกว่า เรือเหาะ", "‘เรือเหาะ...นั่นคือชื่อของเครื่องจักรเล่นแร่แปรธาตุชิ้นนี้งั้นหรือ?’", "“สรุปก็คือ มันเกี่ยวข้องกับพ่อมดจากจักรวรรดิเซคัสผู้นั้นอีกแล้วสินะ? ช่างน่าสนใจเสียจริง...เราลงไปเดินดูใกล้ๆ กันเถอะ!”", "ลูโอร์กระโดดลงจากรถม้า พลางเอ่ยด้วยความสนใจและกระตือรือร้น", "...", "ในอีกด้านหนึ่ง ณ ใจกลางจัตุรัสของเมือง ลิเดียและเรือเหาะที่นางสร้างขึ้นกำลังถูกห้อมล้อมไปด้วยชาวเมืองที่มามุงดูอย่างตื่นตาตื่นใจ ตั้งแต่เด็กน้อยวัยเจ็ดแปดขวบไปจนถึงชาวนาผู้แข็งแกร่ง ทุกคนล้วนอยากรู้อยากเห็นและปรารถนาที่จะได้สัมผัสโครงสร้างอันโอ่อ่าที่สูงตระหง่านยิ่งกว่าบ้านเรือนหลังนี้", "พวกฮาล์ฟลิงราวสิบคนยืนล้อมรอบเรือเหาะเอาไว้ไม่ต่างจากองครักษ์ โดยที่ใบหน้าของพวกเขาเปี่ยมไปด้วยความภาคภูมิใจ นี่คือสมบัติล้ำค่าที่พวกเขาทุ่มเทแรงกายแรงใจสร้างขึ้นมาตลอดครึ่งเดือนเต็ม!", "เด็กชายจอมซนคนหนึ่งแอบปีนขึ้นไปบนรูปปั้น พยายามยืดตัวขึ้นให้สูงที่สุด เอื้อมมือไปจิ้มที่ส่วนล่างของถุงลมเรือเหาะ และเมื่อสัมผัสได้ถึงพื้นผิวที่อ่อนนุ่ม แล้วตระหนักได้ว่าตนไม่สามารถเจาะทะลุเยื่อหุ้มที่ดูบอบบางนี้ได้ เขาก็ชักมือกลับมา โดยที่สายตายังคงจับจ้องไปที่เรือเหาะอันยิ่งใหญ่เบื้องหน้าอย่างไม่วางตา", "“อ๊ะฮ้า! มันนุ่มจริงๆ ด้วย~”", "เด็กซนอีกสองสามคนที่ถูกกระตุ้นด้วยความอยากรู้อยากเห็นเช่นกัน ต่างก็ปีนขึ้นไปและใช้มือหยาบกร้านสัมผัสกับเรือเหาะ พลางร้องตะโกนด้วยความตื่นเต้น", "ดาร์เรนตกใจสุดขีด เขารีบกระโดดโหยงๆ พยายามจะไล่เด็กพวกนั้นไป แต่ด้วยความที่ตัวเตี้ยเกินไป ต่อให้กระโดดสุดตัวก็ยังเอื้อมไม่ถึง เขาจึงทำได้เพียงยืนตีหน้าขรึมและตะคอกดุเอาเรื่อง", "“ลงมา ลงมาเดี๋ยวนี้นะ...อย่าได้ริอ่านทำมันพังเชียว ต่อให้เอาพวกเจ้าไปขายก็ยังชดใช้ค่าเสียหายไม่พอหรอกนะ!”", "แม้ว่าถุงลมที่ทำจากหนังสัตว์อสูรอูฐจะเหนียวทนทานเป็นอย่างมาก และยากที่จะเจาะทะลุได้แม้จะใช้มีดกรีดก็ตาม แต่พวกเขาก็ทุ่มเททั้งพลังงานและเงินเก็บทั้งหมดไปกับการทดลองบินครั้งนี้ จึงไม่อาจยอมให้เกิดข้อผิดพลาดหรือรอยตำหนิใดๆ ขึ้นได้แม้แต่นิดเดียว", "“ท่านลุงดาร์เรน พวกท่านขนของใหญ่โตขนาดนี้มาที่นี่ได้อย่างไรหรือ? สิ่งนี้เรียกว่าเรือเหาะ มันสามารถบินได้จริงๆ หรือ?”", "เด็กชายคนที่เป็นหัวโจกไม่ได้รู้สึกหวาดกลัวดาร์เรนที่ตัวสูงไม่ถึงตัวเขาด้วยซ้ำ ทั้งยังถามกลับด้วยรอยยิ้มทะเล้น", "ฝูงชนที่มุงดูอยู่ก็รู้สึกใคร่รู้เป็นอย่างยิ่งเช่นกัน เมื่อดูจากรูปลักษณ์ภายนอกแล้ว สิ่งที่เรียกว่าเรือเหาะนี้น่าจะมีน้ำหนักหลายหมื่นปอนด์ แต่ทว่าลิเดียและพรรคพวกกลับสามารถขนย้ายมันจากห้องปฏิบัติการฝั่งตะวันตกมาจนถึงจัตุรัสแห่งนี้ได้", "“พวกเจ้าไม่เข้าใจหรอก ของชิ้นนี้มันดูใหญ่โตก็จริง แต่มันไม่ได้หนักเลยสักนิด...เอ๊ะ ไม่สิ ไม่ค่อยถูกนัก ต้องบอกว่ามันไม่ได้หนักเวลาผลักต่างหากล่ะ ตามที่ท่านพ่อมดบอกมา นั่นก็เป็นเพราะแรงยกตัวมันช่วยหักล้างกับแรงโน้มถ่วงไปจนเกือบหมด แถมล้อที่อยู่ด้านล่างก็ยังช่วยให้เคลื่อนย้ายได้โดยไม่เหนื่อยเลยสักนิด...”", "ดาร์เรนโอ้อวดอย่างภาคภูมิใจ โดยที่หนวดเคราของเขากระดิกขึ้นลง แต่ก่อนที่เขาจะทันได้พูดจบ ลิเดียก็เหยียบลงบนเท้าของเขาอย่างแรง ทำให้เขาพลันเปลี่ยนสีหน้าทันที และจ้องมองทุกคนที่อยู่ในลานกว้างอย่างระแวดระวังราวกับกำลังป้องกันหัวขโมย ก่อนจะกล่าวด้วยน้ำเสียงจริงจัง", "“ความลับ นี่มันเป็นความลับทั้งหมด!”"]}, {"t": "ตอนที่ 79", "c": ["บทที่ 79 : นี่คือฉากที่สมควรได้รับการจดจำไปตลอดกาลในหน้าประวัติศาสตร์เวทมนตร์อย่างแน่นอน!", "คำพูดของดาร์เรนทำให้ชาวบ้านที่อยู่ในเหตุการณ์รู้สึกคันไม้คันมือด้วยความอยากรู้อยากเห็น ทว่าพวกเขาก็ไม่มีทางเลือกอื่นนอกจากต้องคาดเดากันไปต่างๆ นานาว่าสิ่งที่เรียกว่าเรือเหาะนี้จะสามารถบินได้จริงหรือไม่ มันจะลอยอยู่บนฟ้าได้นานแค่ไหน และมันจะร่วงหล่นลงมากระแทกพื้นก่อนที่จะขึ้นไปถึงระดับความสูงที่มากพอ เหมือนกับอุปกรณ์การบินชิ้นก่อนๆ หรือเปล่า...", "ในขณะเดียวกัน เหล่าศาสตราจารย์และนักเรียนของสถาบันเวทมนตร์อิเยตาก็มารวมตัวกันที่ใจกลางจัตุรัสเช่นกัน พวกเขาต่างจ้องมองไปยังเรือเหาะขนาดมหึมาที่จอดตระหง่านอยู่ตรงกลางลานกว้าง", "แม้แต่เฮลรามก็ยังอดไม่ได้ที่จะตื่นตาตื่นใจกับความใหญ่โตมโหฬารของมัน หลังจากหยุดชะงักไปครู่หนึ่ง เขาก็หันหน้าไปมองลินน์แล้วกล่าวขึ้น", "“นั่นนับว่าเป็นผลงานการเล่นแร่แปรธาตุที่ยอดเยี่ยมมากทีเดียว ข้าได้ยินมาว่ามันเป็นฝีมือของท่านหรือ ศาสตราจารย์ลินน์?”", "ลินน์อธิบายด้วยรอยยิ้ม", "“ข้าเพียงแค่มอบแบบแปลนให้เท่านั้น กระบวนการสร้างเรือเหาะทั้งหมดล้วนเป็นฝีมือของลิเดียและทีมงานของนาง และคงต้องบอกว่าเรือเหาะลำนี้คือผลงานจากความร่วมมือของพวกเรา”", "แม้ว่าลินน์จะพูดเช่นนั้น แต่เฮลรามและคนอื่นๆ ต่างก็ตระหนักดีว่าการสร้างนั้นเป็นเพียงเรื่องรอง หลักการออกแบบของอุปกรณ์เล่นแร่แปรธาตุใดๆ ต่างหากล่ะที่เป็นองค์ประกอบที่สำคัญที่สุด!", "“ศาสตราจารย์ลินน์ ในเมื่อท่านเรียกสิ่งนี้ว่าเรือเหาะ ท่านก็วางแผนที่จะทำให้มันบินได้จริงๆ หรือ? แล้วมันจะต้องเผาผลาญพลังเวทไปมากขนาดไหนกันล่ะ?”", "เควินเอ่ยถามด้วยความอยากรู้อยากเห็นเป็นล้นพ้น", "ยิ่งสิ่งของมีขนาดใหญ่และหนักมากเท่าไร มันก็ยิ่งบินได้ยากมากขึ้นเท่านั้น นี่แทบจะเรียกได้ว่าเป็นกฎเหล็กตายตัว และการขับเคลื่อนอุปกรณ์เล่นแร่แปรธาตุขนาดมหึมาเช่นนี้ให้ลอยขึ้นสู่ท้องฟ้าได้ ย่อมต้องใช้พลังเวทในปริมาณที่มหาศาลจนแทบจะนับไม่ถ้วนอย่างแน่นอน", "“ข้าคิดว่าท่านคงเข้าใจผิดแล้วล่ะ การจะทำให้สิ่งนี้บินได้นั้น ไม่ได้เกี่ยวกับเวทมนตร์เลยสักนิด!”", "ลินน์ส่ายหน้า", "ไม่ใช่เวทมนตร์งั้นหรือ?", "เมื่อได้ยินเช่นนี้ ทั้งศาสตราจารย์และนักเรียนที่อยู่ในเหตุการณ์ต่างก็ผงะไปตามๆ กัน เป็นไปได้หรือที่อุปกรณ์ชิ้นนี้จะสามารถบินได้ด้วยตัวของมันเอง?", "“นี่คืออุปกรณ์ที่ท่านเคยกล่าวถึงเมื่อคราวก่อน อุปกรณ์ที่มีแหล่งพลังงานแตกต่างออกไปและมีโครงสร้างที่ถูกออกแบบใหม่ใช่หรือไม่?”", "เฮลรามนึกถึงคำพูดที่ลินน์เคยกล่าวไว้เมื่อตอนที่เขาข้ามน้ำข้ามทะเลมายังดินแดนพ่อมดเป็นครั้งแรกขึ้นมาได้ในทันที และเขาก็ไม่สัมผัสได้ถึงความผันผวนของพลังเวทใดๆ แผ่ออกมาจากเรือเหาะเลยแม้แต่น้อยจริงๆ", "“ไม่หรอก หากให้พูดตามตรง เรือเหาะลำนี้ใช้วิธีการบินที่แตกต่างออกไปต่างหากล่ะ”", "ลินน์ครุ่นคิดอยู่ครู่หนึ่งก่อนจะตอบกลับ", "เฮลรามขมวดคิ้ว จมอยู่ในห้วงความคิดว่าวิธีการที่แตกต่างออกไปนั้นคืออะไรกันแน่ จากนั้นจึงถามด้วยความสนใจ", "“แล้วท่านคิดว่ามันจะสามารถลอยอยู่บนท้องฟ้าได้นานแค่ไหนล่ะ? สิบนาที? หรือหนึ่งชั่วโมง?”", "“ข้าเชื่อว่ามันสามารถลอยอยู่ในอากาศได้นานกว่าตัวเลขใดๆ ที่ท่านจะจินตนาการได้เลยล่ะ ระยะเวลาในการบินของมันขึ้นอยู่กับว่าลิเดียต้องการจะอยู่บนท้องฟ้านานแค่ไหนเท่านั้นเอง...”", "ลินน์ตอบกลับพร้อมกับรอยยิ้ม", "เมื่อได้ยินดังนั้น ฟิลิปและคนอื่นๆ ก็เริ่มนั่งไม่ติดในทันที นี่หมายความว่าลิเดียจะสามารถบินอยู่บนท้องฟ้าได้อย่างไม่มีที่สิ้นสุด หากนางไม่ต้องการจะลงมางั้นหรือ?", "นี่มันเป็นเรื่องที่ยากจะเชื่อจริงๆ เพราะการบินเป็นความสำเร็จที่มีเพียงพ่อมดไม่กี่คนเท่านั้นที่สามารถทำได้...", "ก่อนที่ใครจะทันได้เอ่ยคัดค้าน เสียงหนึ่งก็ดังขึ้นจากด้านหลังของพวกเขา", "“ท่านกำลังจะบอกว่าเรือเหาะลำนี้สามารถลอยตัวอยู่ในอากาศได้อย่างต่อเนื่องโดยไม่ต้องเผาผลาญพลังงานใดๆ เลยงั้นหรือ? ดแล้วล่ะก็ สำหรับชาวเมืองที่มารวมตัวกันอยู่ ณ ที่แห่งนี้ มันคือเรื่องที่น่าตกตะลึงจนแทบช็อก!", "ทุกคนต่างก็รู้จักลิเดีย ฮาล์ฟลิงจอมโวยวายที่มักจะชอบประดิษฐ์ของแปลกๆ อยู่เสมอ", "แต่สิ่งที่สำคัญที่สุดก็คือ นางก็เหมือนกับชาวเมืองธรรมดาทั่วไปที่อยู่ในเหตุการณ์ นางไม่รู้เรื่องเวทมนตร์เลยแม้แต่นิดเดียว", "แต่ตอนนี้ นางกลับปรากฏตัวอยู่เบื้องหน้าพวกเขา และกำลังบังคับสิ่งที่ใหญ่โตยิ่งกว่าบ้าน ขับเคลื่อนให้มันโบยบินขึ้นสู่ท้องฟ้าโดยตรง", "ความสำเร็จที่แม้แต่พ่อมดหลายคนก็ยังไม่สามารถทำได้!", "“ท่านพ่อ ข้าจะได้บินบนท้องฟ้าแบบนั้นบ้างไหมขอรับ ในสักวันหนึ่ง?”", "เด็กชายที่เพิ่งจะปีนขึ้นไปบนรูปปั้นเพื่อสัมผัสเรือเหาะ เอ่ยถามชายในชุดคลุมสีเทาด้วยสีหน้าที่เต็มไปด้วยความตื่นเต้น", "“เจ้ากำลังคิดอะไรอยู่กัน? ข้ามั่นใจเลยว่าต้องมีพ่อมดสักคนแอบร่ายเวทมนตร์ใส่เรือเหาะลำนั้นแน่ๆ...”", "ชายในชุดคลุมสีเทาไม่เชื่อเลยสักนิดว่าฮาล์ฟลิงจะสามารถบินได้ด้วยพลังของตนเอง ที่นี่คือดินแดนพ่อมด ปาฏิหาริย์ทั้งหมดล้วนเป็นของพลังอำนาจแห่งเวทมนตร์เท่านั้น", "“ใครบอกว่าเป็นเวทมนตร์กันล่ะ?”", "ดาร์เรนรู้สึกไม่พอใจขึ้นมาทันทีที่ได้ยินเช่นนั้น เขาเอ่ยแก้ความเข้าใจผิดด้วยความรู้สึกหงุดหงิดอยู่ไม่น้อย", "“ข้าขอรับรองกับพวกท่านทุกคนเลยนะว่า ทุกชิ้นส่วนของเรือเหาะลำนี้ล้วนถูกสร้างขึ้นด้วยน้ำมือของพวกฮาล์ฟลิงอย่างพวกเรา โดยไม่มีเวทมนตร์เข้ามาเกี่ยวข้องเลยแม้แต่น้อย!”", "“เมื่อลิเดียลงมาจากท้องฟ้า พวกท่านก็สามารถขึ้นไปดูเรือเหาะด้วยตาของพวกท่านเองได้เลย...”", "“เพียงแค่สิบเหรียญเงินเท่านั้น ใครๆ ก็สามารถขึ้นไปนั่งบนเรือเหาะและบินวนไปรอบๆ บนท้องฟ้าได้ ท่านลินน์บอกว่าของสิ่งนี้สามารถบินได้สูงมากๆ สูงเสียยิ่งกว่าเมฆหลายๆ ก้อนเสียอีก และหากท่านโชคดี ท่านอาจจะได้สัมผัสกับเมฆบนท้องฟ้าเลยก็ได้นะ”", "ดาร์เรนคุยโวอย่างภาคภูมิใจ", "บินได้สูงกว่าก้อนเมฆงั้นหรือ?", "เด็กๆ ในจัตุรัสอดไม่ได้ที่จะแหงนหน้ามองขึ้นไปบนท้องฟ้า จ้องมองเรือเหาะขนาดยักษ์ที่กำลังลอยห่างจากพวกเขาออกไปเรื่อยๆ พลางจินตนาการว่าการได้สัมผัสกับก้อนเมฆนั้นจะให้ความรู้สึกอย่างไร มันจะต้องนุ่มนิ่มเหมือนกับขนแกะอย่างแน่นอน ใช่ไหมนะ?", "ชาวเมืองคนอื่นๆ เองก็รู้สึกหวั่นไหวเช่นกัน เครื่องจักรเล่นแร่แปรธาตุที่ใหญ่โตขนาดนี้จะต้องมีราคาแพงลิบลิ่วเป็นแน่ และด้วยราคาเพียงสิบเหรียญเงินสำหรับการได้ขึ้นไปโบยบินบนท้องฟ้า มันก็ดูเหมือนจะไม่ได้แพงจนเกินไปนัก...", "แค่ลองจินตนาการดูสิ นั่นมันท้องฟ้าเลยนะ!", "ในขณะเดียวกัน ที่ระดับความสูงหลายร้อยเมตรเหนือพื้นดิน ลิเดียที่ยืนอยู่บนที่นั่งพิเศษ ได้ก้มมองดูฝูงชนที่เบียดเสียดกันแน่นขนัดอยู่ในลานจัตุรัส เฝ้าดูพวกเขากลายเป็นเพียงจุดเล็กๆ ขณะที่นางมองเห็นภาพรวมของเมืองท่าเบื้องล่างได้อย่างเต็มตา", "ทุกสิ่งทุกอย่างดูเล็กจ้อยไปถนัดตา ราวกับว่านางสามารถใช้เท้ากระทืบพวกมันให้แหลกละเอียดเป็นชิ้นๆ ได้ในการเหยียบเพียงครั้งเดียว เหมือนกับหุ่นจำลองไม้ที่นางเก็บไว้ในห้องปฏิบัติการไม่มีผิด", "“นี่หรือคือความรู้สึกของการได้โบยบินบนท้องฟ้า? มันช่างยอดเยี่ยมอะไรเช่นนี้!”", "ลิเดียมองไปรอบๆ ด้วยความตื่นเต้น สายตาของนางทอดยาวไปถึงภูเขาที่อยู่ห่างไกลและผืนทะเลอันกว้างใหญ่ไพศาล", "ถึงแม้ว่านางจะเคยลอยตัวขึ้นสู่ท้องฟ้าด้วยเครื่องจักรบินได้แบบหยาบๆ เมื่อสิบกว่าวันก่อน แต่นางก็ขึ้นไปได้เพียงความสูงประมาณร้อยเมตรเท่านั้น และนางก็ไม่กล้าที่จะเสียสมาธิเลยแม้แต่วินาทีเดียว", "แตกต่างจากตอนนี้อย่างสิ้นเชิง นางไม่จำเป็นต้องควบคุมอะไรเลย เรือเหาะสามารถลอยตัวอยู่กลางอากาศได้ด้วยตัวของมันเอง ทำให้นางสามารถทำอะไรก็ได้ตามใจชอบอยู่ที่นี่", "ทันใดนั้น ลมกระโชกแรงก็พัดมา ทำให้เรือเหาะที่ลอยตัวอยู่อย่างมั่นคงเริ่มส่ายไปมาเล็กน้อยตามแรงลม", "สำหรับผู้ที่เพิ่งเคยบินเป็นครั้งแรก ความหวาดกลัวที่อธิบายไม่ได้มักจะก่อตัวขึ้นในจิตใจ ทว่าลิเดียกลับไม่ได้รู้สึกกลัวเลยสักนิด ในทางกลับกัน นางกลับรู้สึกฮึกเหิม ปีนขึ้นไปที่ขอบของเรือเหาะ กางแขนออกกว้าง และเผชิญหน้ากับสายลมที่พัดโหมกระหน่ำ พลางส่งเสียงร้องฮูเล่ด้วยความตื่นเต้นดังลั่นเพื่อระบายความตื่นเต้นเร้าใจของนาง", "จนกระทั่งนางเห็นก้อนเมฆสีขาวบริสุทธิ์ลอยอยู่ไม่ไกลจากเรือเหาะ ลิเดียที่จู่ๆ ก็นึกไอเดียบ้าบิ่นขึ้นมาได้ ก็กระโดดกลับไปที่ที่นั่ง คว้าพวงมาลัยบังคับทิศทาง และหันหัวเรือเหาะพุ่งทะยานตรงดิ่งเข้าไปหาก้อนเมฆก้อนนั้นทันที!", "เรือเหาะขนาดมหึมาพุ่งชนเข้ากับก้อนเมฆอย่างจัง และเคลื่อนตัวทะลุผ่านมันไป วิสัยทัศน์ของลิเดียถูกปกคลุมไปด้วยสีขาวโพลน พวงแก้มและท่อนแขนของนางสัมผัสได้ถึงความชื้น มันเหมือนกับการได้ไปยืนอยู่ริมทะเลและถูกสายลมทะเลอันแสนอ่อนโยนลูบไล้", "“นี่จะต้องเป็นเมฆแห่งความสุขอย่างแน่นอน!”", "ลิเดียกล่าวพร้อมกับรอยยิ้มคิกคัก", "อย่างไรก็ตาม ท่ามกลางความสนุกสนาน เด็กสาวเผ่าฮาล์ฟลิงก็ไม่ได้ลืมภารกิจที่ลินน์มอบหมายให้นาง หลังจากที่ขับเรือเหาะร่อนไปมาอยู่พักหนึ่ง นางก็นำเรือเหาะกลับมาลอยนิ่งอยู่เหนือจัตุรัส จากนั้นก็ดึงคันโยกที่อยู่ข้างกาย", "แผ่นไม้ที่ด้านล่างของเรือเหาะเปิดออกในพริบตา ปลดปล่อยวัตถุทรงกลมสองชิ้นที่มีมวลแตกต่างกันอย่างสิ้นเชิงออกจากห้องโดยสาร พวกมันห้อยต่องแต่งอยู่กลางอากาศ แกว่งไกวไปมา ส่งผลให้เรือเหาะเอียงวูบไปเล็กน้อยเนื่องจากแรงดึงของเส้นเชือก", "ทันใดนั้น เด็กสาวเผ่าฮาล์ฟลิงก็ดึงแว่นตานักเล่นแร่แปรธาตุลงมาสวม ยื่นหน้าออกไป และเฝ้ารอคอยสัญญาณมือและคำสั่งจากลินน์", "แว่นตาชิ้นนี้คือไอเทมเวทมนตร์เพียงชิ้นเดียวที่นางพกติดตัวมาด้วย มันถูกสลักเวทมนตร์เสริมความแข็งแกร่งเนตรส่องไกล เอาไว้ ทำให้วิสัยทัศน์ของนางเฉียบคมราวกับกริฟฟอน แม้จะอยู่ห่างออกไปถึงสองพันเมตร นางก็ยังสามารถมองเห็นศาสตราจารย์ลินน์ท่ามกลางฝูงชนได้อย่างชัดเจน", "...", "“ดูเหมือนว่าวารสารเวทมนตร์รายสัปดาห์ฉบับหน้า จะต้องขายดีเป็นเทน้ำเทท่าอย่างแน่นอน!”", "เมื่อสิบนาทีก่อนหน้านี้ ลูโอร์ซึ่งยืนอยู่ในจัตุรัส ได้วาดภาพประกอบและเขียนบรรยายความรู้สึกของเขาลงไปที่ด้านล่างของภาพเสร็จเรียบร้อยแล้ว เขาสามารถคาดเดายอดขายของหนังสือพิมพ์ฉบับนี้ได้คร่าวๆ", "เมื่อมองดูใกล้ๆ ลินน์ก็เห็นภาพสามภาพถูกวาดเอาไว้บนกระดาษปาปิรุส ภาพเหตุการณ์ที่ลิเดียขึ้นไปบนเรือเหาะ ภาพตอนที่นางกำลังตัดเชือก และภาพตอนที่นางกำลังพุ่งทะยานขึ้นสู่ท้องฟ้า", "แม้ว่าจะมีเวลาจำกัดและรายละเอียดต่างๆ จะถูกร่างขึ้นมาอย่างหยาบๆ แต่ความมีชีวิตชีวาในภาพสเก็ตช์เหล่านั้นกลับโดดเด่นสะดุดตา เป็นการพิสูจน์ให้เห็นอย่างชัดเจนว่าเหตุใดจิตรกรผู้นี้จึงได้กลายมาเป็นผู้สื่อข่าวของวารสารเวทมนตร์รายสัปดาห์"]}, {"t": "สัมผัสเมฆบนท้องฟ้า! 2", "c": ["เวลาผ่านไปเพียงไม่นาน แต่เรือเหาะกลับลอยขึ้นไปถึงระดับความสูงที่มากจนน่าเหลือเชื่อ เมื่อมองจากจุดนี้ มันจึงดูเป็นเพียงแค่จุดเล็กๆ จุดหนึ่งเท่านั้น", "“มันสูงมากเลย!”", "ธีโอดอร์แหงนหน้ามองเรือเหาะที่ยังคงไต่ระดับสูงขึ้นไปเรื่อยๆ ด้วยความตื่นตะลึง ในตอนแรกเขาคิดว่าต่อให้มันบินได้ มันก็คงไปได้สูงสุดแค่ไม่กี่ร้อยเมตร แต่สิ่งที่ทำให้เขาประหลาดใจก็คือ เรือเหาะกลับลอยทะลุระดับสองพันเมตรไปแล้วในเวลาเพียงชั่วอึดใจ", "โชคดีที่การร่ายเวทเนตรส่องไกลนั้นไม่ใช่เรื่องยากเย็นอะไรนัก และพ่อมดส่วนใหญ่ที่อยู่ที่นี่ต่างก็เชี่ยวชาญเวทมนตร์บทนี้ พวกเขาจึงยังคงมองเห็นทุกอย่างได้อย่างชัดเจนแม้อยู่ห่างไกลกันมากก็ตาม", "หลังจากลอยขึ้นไปถึงระดับความสูงสองพันห้าร้อยเมตร เรือเหาะก็หยุดนิ่ง จากนั้นก็ค่อยๆ เคลื่อนตัวไปข้างหน้าด้วยแรงผลักดันจากไอน้ำที่ขับเคลื่อนใบพัดด้านหลัง", "มันไม่เพียงแต่บินได้เท่านั้น แต่มันยังเคลื่อนที่ได้อย่างมั่นคงอีกด้วย!", "“ความสูงระดับนี้น่าจะอยู่นอกเหนือระยะโจมตีของเวทมนตร์ส่วนใหญ่แล้วล่ะ”", "ทิคเฝ้ามองเรือเหาะที่ลอยนิ่งอยู่กลางอากาศ สีหน้าของเขาเริ่มเคร่งเครียดขึ้นมา", "ในแง่หนึ่ง สิ่งนี้คืออาวุธสงครามดีๆ นี่เอง หากนำปืนใหญ่คริสตัลเวทมนตร์สักสองกระบอกไปติดตั้งไว้บนนั้น มันก็จะสามารถใช้โจมตีระยะไกลได้ทันที", "หากมีเรือเหาะที่ติดตั้งปืนใหญ่คริสตัลเวทมนตร์สักยี่สิบลำบุกโจมตีเมืองท่าอิเยตา เมืองทั้งเมืองคงต้องกลายเป็นซากปรักหักพังอย่างมิต้องสงสัย หากปราศจากการแทรกแซงจากจอมเวทผู้ยิ่งใหญ่เฮลราม", "“ช่างเป็นการออกแบบที่ล้ำลึก สมบูรณ์แบบ แต่น่าสะพรึงกลัวยิ่งนัก...”", "เฮลรามตระหนักถึงเรื่องนี้เป็นอย่างดี เขาหันไปมองลินน์แล้วเอ่ยถามอีกครั้ง", "“แบบแปลนของเรือเหาะลำนี้คงไม่ได้เพิ่งออกแบบเสร็จเมื่อเร็วๆ นี้หรอกใช่ไหม?”", "หากเครื่องจักรบินได้แบบหยาบๆ ที่ลิเดียสร้างขึ้นเมื่อครึ่งเดือนก่อน สามารถดูออกได้ง่ายๆ ว่าเป็นเพียงชิ้นงานทดลองที่ทำขึ้นแบบลวกๆ เรือเหาะลำนี้ก็คือผลิตภัณฑ์ที่เสร็จสมบูรณ์แล้วอย่างไม่ต้องสงสัย", "กระบวนการทั้งหมดตั้งแต่การทะยานขึ้นสู่ท้องฟ้า การลอยตัวอยู่นิ่งๆ ไปจนถึงการขับเคลื่อนไปข้างหน้านั้นราบรื่นไร้ที่ติ และการออกแบบรูปลักษณ์ภายนอกก็ยังประณีตบรรจง บ่งบอกถึงเทคโนโลยีที่ล้ำหน้าเป็นอย่างมาก", "“ถูกต้องแล้วล่ะ แบบแปลนเรือเหาะลำนี้ ข้าได้ร่วมกันออกแบบกับสหายบางคนจากสมาคมเวทมนตร์เร้นลับน่ะ เพียงแต่ว่าในจักรวรรดิเซคัส การหาสถานที่ที่เหมาะสมสำหรับการทดลองบินนั้นเป็นเรื่องยากเอามากๆ”", "ลินน์อธิบาย พลางถือโอกาสนี้เยินยอดินแดนพ่อมดแฝงเข้าไปอย่างแนบเนียน", "บรรดาพ่อมดที่อยู่ในเหตุการณ์ต่างพยักหน้าเห็นด้วย เนื่องจากพ่อมดถูกกวาดล้างและประหัตประหารในจักรวรรดิเซคัส พวกเขาจึงไม่กล้าทำการทดลองบินอย่างเปิดเผยแน่นอน", "“ในเมื่อท่านไม่เคยทดสอบมันมาก่อน แล้วท่านมั่นใจได้อย่างไรว่ามันจะสามารถบินขึ้นไปได้จริงๆ?”", "ทิคเอ่ยถามด้วยความมึนงง", "“แน่นอน ก็เพราะข้าได้ใช้คณิตศาสตร์ลี้ลับคำนวณเอาไว้ล่วงหน้าหมดแล้วอย่างไรล่ะ!”", "ลินน์ยืนยันหนักแน่น", "“เมื่อทราบข้อมูลทั้งหมดและทำการคำนวณอย่างแม่นยำ มันย่อมไม่มีที่ว่างสำหรับข้อผิดพลาดหรอกนะ!”", "ก่อนการทดลองบินครั้งนี้ เขาได้ตรวจสอบคร่าวๆ แล้วว่าแรงโน้มถ่วงของดวงดาวดวงนี้แทบจะเหมือนกับโลกทุกประการ โดยการชั่งน้ำหนักวัตถุที่มีมวลต่างๆ กัน", "ระดับความสูงที่เรือเหาะขึ้นไปถึงในตอนนี้ ก็ตรงกับที่เขาคาดการณ์เอาไว้เช่นกัน และการคำนวณทั้งหมดนี้ล้วนสามารถอนุมานล่วงหน้าได้ผ่านคณิตศาสตร์ลี้ลับ", "“คณิตศาสตร์ลี้ลับงั้นหรือ...”", "ทิคพึมพำเบาๆ มันเป็นคำศัพท์ที่เขาไม่เคยได้ยินมาก่อน ดูเหมือนว่านอกเหนือจากการมอบเข็มกลัดพ่อมดเต็มตัวให้แล้ว เขาคงจำเป็นต้องทำความเข้าใจอย่างจริงจังเกี่ยวกับแนวคิดที่เรียกว่าคณิตศาสตร์ลี้ลับนี่เสียแล้ว เพราะเขารู้สึกได้ว่ามันน่าจะมีความสำคัญต่อแวดวงการเล่นแร่แปรธาตุเป็นอย่างมาก", "เควิน ฟิลิป และศาสตราจารย์คนอื่นๆ คิดว่าคำกล่าวอ้างของลินน์อาจจะดูโอเวอร์จนเกินไป สิ่งที่เรียกว่าคณิตศาสตร์ลี้ลับนี้ จะสามารถคำนวณทุกสรรพสิ่งได้จริงๆ งั้นหรือ?", "แต่ในตอนนี้พวกเขาก็ไม่อาจเอ่ยปากแสดงความกังขาออกมาได้ เพราะเรือเหาะที่กำลังทะยานอยู่เบื้องบนนั่น คือหลักฐานชิ้นเอกที่ยืนยันได้ดีที่สุด!", "ในขณะเดียวกัน ลูโอร์ก็หยิบปากกาขนนกออกมาอีกครั้ง เขาจดบันทึกคำพูดของลินน์เอาไว้ โดยกะว่าจะนำมันไปใช้เป็นพาดหัวข่าวตัวโตๆ ในหน้าใดหน้าหนึ่งของวารสารเวทมนตร์รายสัปดาห์", "“ท่านเฮลราม ข้าขอรบกวนให้ท่านช่วยร่ายเวทมนตร์เปลี่ยนจัตุรัสแห่งนี้ให้กลายเป็นพื้นที่ทรายชั่วคราวได้หรือไม่?”", "ลินน์แหงนหน้ามองท้องฟ้าอยู่พักหนึ่งก่อนจะเอ่ยขึ้นมาอย่างกะทันหัน", "“ย่อมได้อยู่แล้ว แต่ข้าขอถามเหตุผลหน่อยได้ไหมล่ะ?”", "เฮลรามเอ่ยถามด้วยความสงสัย", "“ระดับความสูงตอนนี้เพียงพอแล้วล่ะ ข้าก็เลยอยากจะถือโอกาสนี้ทำการทดลองสักหน่อย หากปล่อยให้ของตกกระทบพื้นราบโดยตรง ข้าเกรงว่ามันจะสร้างความเสียหายรุนแรงเอาการเลยล่ะ!”", "ลินน์อธิบายอย่างไหลลื่น", "“การทดลองงั้นหรือ?”", "เฮลรามชะงักไปครู่หนึ่ง แต่ก็เข้าใจความหมายของลินน์ได้อย่างรวดเร็ว เขาใช้เวทมนตร์ขยายเสียงสั่งให้ทุกคนในที่นั้นถอยร่นออกไปยี่สิบห้าเมตร เพื่อเปิดพื้นที่ว่างตรงกลางให้กว้างขึ้นทันที", "เมื่อจอมเวทผู้ยิ่งใหญ่เอ่ยปาก ย่อมไม่มีผู้ใดกล้าขัดขืน ชาวเมืองที่อยู่ในเหตุการณ์ต่างพากันถอยกรูไปด้านหลัง และในไม่ช้า พื้นที่วงกลมรัศมียี่สิบห้าเมตรก็ถูกเปิดโล่งท่ามกลางจัตุรัสที่แออัดไปด้วยผู้คน", "เฮลรามเริ่มจากการกางม่านพลังเวทขนาดใหญ่เพื่อป้องกันอุบัติเหตุที่อาจเกิดขึ้น จากนั้นจึงร่ายเวทมนตร์อีกบท กระเบื้องปูพื้นที่แข็งแกร่งเบื้องหน้าของเขาเริ่มแตกร้าวอย่างรวดเร็วภายใต้อิทธิพลของพลังเวท และท้ายที่สุดก็แหลกสลายกลายเป็นเม็ดทรายขนาดเล็กละเอียดนับไม่ถ้วน...", "ลินน์ถือโอกาสหันขวับไปหาฝูงชนที่ประกอบไปด้วยพ่อมดและชาวเมืองบนลานจัตุรัส เขาอาศัยหลักการแพร่กระจายของคลื่นเสียง เพื่อขยายระดับเสียงของตนเองให้ดังกระหึ่มขึ้น", "“ท่านสุภาพบุรุษและสุภาพสตรีทั้งหลาย ข้ามั่นใจว่าในช่วงครึ่งเดือนที่ผ่านมา พวกท่านทุกคนคงจะเคยได้ยินเกี่ยวกับทฤษฎีกฎการตกอย่างอิสระและทฤษฎีดวงดาวของข้ามาบ้าง ไม่มากก็น้อย", "ข้าเชื่อว่าในหมู่พวกท่าน จะต้องมีหลายคนที่เกิดความกังขาเกี่ยวกับเรื่องนี้ โดยคิดว่ามันเป็นเรื่องเพ้อเจ้อไร้สาระ เป็นเพียงคำโกหกหลอกลวงเพื่อเรียกร้องความสนใจ ทวีปแห่งนี้จะมีทรงกลมได้อย่างไรกัน และเศษเหล็กชิ้นหนึ่งจะตกลงมากระทบพื้นพร้อมกับก้อนกรวดได้อย่างไร", "แต่ข้าต้องขอบอกพวกท่านตรงนี้เลยว่า จงอย่าถูกหลอกด้วยรูปลักษณ์ภายนอกของสรรพสิ่ง ปรากฏการณ์ที่พวกท่านเห็นในชีวิตประจำวัน ล้วนเป็นเพียงผลกระทบที่เกิดจากแรงต้านอากาศเท่านั้น แท้จริงแล้ว หากตัดปัจจัยเรื่องแรงต้านอากาศออกไป ความเร็วของวัตถุที่ตกอย่างอิสระจะไม่มีความเกี่ยวข้องอันใดกับน้ำหนักหรือรูปทรงของมันเลยแม้แต่น้อย!”", "“นี่ท่านกำลังตั้งคำถามกับทฤษฎีของปรมาจารย์ยาเดอยู่หรือ?”", "พ่อมดหนุ่มคนหนึ่งในฝูงชนเอ่ยขัดขึ้นมา", "อัตราความเร็วในการตกของวัตถุที่แปรผันตามน้ำหนักและได้รับผลกระทบจากรูปทรงนั้น แทบจะเรียกได้ว่าเป็นความรู้ทั่วไปอยู่แล้ว และมีตัวอย่างในความเป็นจริงมากเกินพอที่จะพิสูจน์ได้ว่าข้อสรุปของปรมาจารย์ยาเดนั้นถูกต้อง", "“ถ้าเช่นนั้น เรามาพนันกันไหมล่ะ”", "ลินน์เร่งระดับเสียงขึ้นอีกขั้น", "“ในอีกสิบนาที ข้าจะให้ลิเดียลดระดับความสูงของเรือเหาะลงมาที่ประมาณสามร้อยเมตร จากนั้นก็ทิ้งทรงกลมไม้กลวงกับทรงกลมเหล็กลงมาจากท้องฟ้าพร้อมๆ กัน!", "น้ำหนักของพวกมันแตกต่างกันหลายสิบเท่า! แต่ข้าขอพนันเลยว่า ทรงกลมทั้ ทั้งผู้คนส่วนใหญ่ก็ยังคงเลือกที่จะเชื่อในสิ่งที่พวกเขามองเห็นอยู่ตรงหน้ามากกว่า", "ดังนั้น ลินน์จึงเตรียมตัวที่จะใช้ประโยชน์จากวันนี้ ทำการทดลองที่ไม่มีใครสามารถหักล้างได้ เพื่อพิสูจน์ทฤษฎีนี้ให้เป็นที่ประจักษ์อย่างสมบูรณ์!"]}, {"t": "ข้าและท่านเข้าใกล้ความจริงไปอีกก้าวหนึ่งแล้ว", "c": ["ภายใต้สายตาที่จับจ้องอย่างใจจดใจจ่อของฝูงชน เรือเหาะก็เริ่มลดระดับลงมาอย่างช้าๆ และในไม่ช้ามันก็ลอยนิ่งอยู่เหนือจัตุรัสที่ระดับความสูงประมาณสองถึงสามร้อยเมตร", "บรรดาพ่อมดในจัตุรัสและชาวเมืองผู้มีสายตาเฉียบคม ต่างก็สามารถมองเห็นวัตถุทรงกลมสองลูกห้อยต่องแต่งอยู่ใต้ท้องเรือเหาะได้อย่างชัดเจน", "ลูกแรกมีเส้นผ่านศูนย์กลางประมาณหนึ่งเมตร มันถูกสร้างขึ้นจากโลหะทั้งก้อน และถูกผูกรั้งไว้ด้วยเชือกหนังเส้นหนาที่ตึงเปรี๊ยะราวกับจะขาดผึงได้ทุกเมื่อ", "ส่วนทรงกลมอีกลูกหนึ่ง แม้จะมีขนาดเท่ากัน แต่มันกลับทำจากไม้กลวงที่มีน้ำหนักเบากว่าและถูกทาด้วยสีแดง ความแตกต่างของมวลที่มหาศาลระหว่างทรงกลมทั้งสองลูกนั้น สามารถสังเกตเห็นได้อย่างชัดเจนจากความตึงของเชือกหนัง", "ลินน์รอคอยจนกระทั่งสายลมทะเลที่พัดโหมกระหน่ำอ่อนกำลังลง และเรือเหาะก็ลอยตัวอยู่นิ่งๆ ได้อย่างมั่นคงอย่างแท้จริง จากนั้นเขาจึงหยิบธงสีแดงขึ้นมาโบกสะบัดสองสามครั้ง", "ลิเดียซึ่งเกาะอยู่บนม้านั่งริมหน้าต่างภายในเรือเหาะ ก็รีบโบกธงตอบกลับอย่างลุกลี้ลุกลน...", "“เริ่มได้!”", "ลินน์ป่าวประกาศ", "ในวินาทีนี้ ความสนใจของทุกคนล้วนพุ่งเป้าไปที่ทรงกลมสองลูกที่ลอยอยู่ใต้เรือเหาะ", "ทันทีที่ลิเดียดึงคันโยกอีกอัน เชือกทั้งสองเส้นก็ถูกตัดขาดในพริบตา...ทรงกลมเหล็กและทรงกลมไม้ร่วงหล่นลงมาในจังหวะเดียวกันพอดีเป๊ะ...", "“ลูกเหล็กเร็วกว่า ลูกเหล็กเร็วกว่า!”", "พ่อมดหนุ่มตะโกนขึ้นด้วยความตื่นเต้น ด้วยความช่วยเหลือจากเวทเนตรส่องไกล เขาก็สามารถมองเห็นได้อย่างชัดเจนและแม่นยำว่า ในเสี้ยววินาทีที่เชือกขาด เป็นทรงกลมเหล็กต่างหากที่ร่วงหล่นลงมาก่อน!", "แต่ทว่า ความตื่นเต้นของเขากลับแข็งค้างอยู่บนใบหน้าในวินาทีต่อมา เพราะผิดจากที่เขาคาดคิดไว้ ทรงกลมเหล็กไม่ได้พุ่งนำหน้าไปไกล แต่มันกลับรักษาระยะห่างกับทรงกลมไม้เอาไว้ได้อย่างสูสี", "หรือถ้าจะให้อธิบายให้ถูกก็คือ เชือกที่ผูกติดกับทรงกลมเหล็กนั้นตึงกว่า มันจึงทำให้ลูกเหล็กร่วงหล่นลงมาเร็วกว่าเล็กน้อยในเสี้ยววินาทีแรก ประกอบกับสายลมทะเลที่พัดโชยมาเบาๆ ส่งผลกระทบต่อการตกของทรงกลมไม้ ทำให้เกิดภาพลวงตาเช่นนี้ขึ้นมา", "ลินน์ไม่ได้รู้สึกกังวลใจมาตั้งแต่ต้นแล้ว เพราะเมื่อเทียบกับมวลของทรงกลมทั้งสองลูกเองแล้ว แรงต้านอากาศและสายลมที่พัดแผ่วเบานั้นแทบจะไม่มีผลอะไรเลย เว้นเสียแต่ว่าจะมีลมพายุกระโชกแรงระดับห้าขึ้นไปพัดมาอย่างกะทันหัน ผลลัพธ์ก็ย่อมไม่มีทางเปลี่ยนแปลงไปอย่างแน่นอน", "และก็เป็นไปตามนั้น เมื่อเข้าสู่วินาทีที่สาม ทั้งสองลูกก็ร่วงหล่นมาถึงระดับความเร็วปลาย และระดับความสูงของทรงกลมไม้ก็ยังคงอยู่ในระนาบเดียวกับทรงกลมเหล็กอย่างพอดิบพอดี", "“เป็นไปไม่ได้ นี่มันไม่ถูกต้อง!”", "เมื่อได้เห็นภาพเหตุการณ์นี้ เหล่าพ่อมดต่างก็มีสีหน้าที่เต็มไปด้วยความเหลือเชื่อ และบางคนก็ถึงกับสงสัยว่าลินน์อาจจะแอบร่ายเวทชะลอการร่วงหล่น ใส่ทรงกลมเหล็กอย่างลับๆ ซึ่งทำให้เกิดผลลัพธ์ที่น่าประหลาดใจเช่นนี้", "ความคิดนี้เพิ่งจะแล่นเข้ามาในหัวได้ไม่ทันไร หลังจากร่วงหล่นลงมานานกว่ายี่สิบวินาที ทรงกลมเหล็กขนาดมหึมาที่มีน้ำหนักถึงสองหรือสามตัน ก็พุ่งกระแทกเข้ากับพื้นจัตุรัสอย่างจัง", "ในพริบตานั้น จัตุรัสทั้งจัตุรัสราวกับจะสั่นสะเทือน แรงกระแทกอันมหาศาลทำให้ทรงกลมเหล็กฝังลึกลงไปในทรายในวินาทีที่ปะทะ ส่งผลให้ทรายที่อยู่รอบๆ สาดกระเซ็นออกไปทุกทิศทุกทางราวกับห่าฝนทรายและหินที่ตกกระหน่ำลงมาอย่างต่อเนื่อง", "ม่านพลังเวทที่มองไม่เห็นได้โอบล้อมพื้นที่ส่วนกลางของจัตุรัสเอาไว้ เมื่อทรายและก้อนหินพุ่งชนเข้ากับม่านพลัง ก็ก่อให้เกิดเสียงแตกปะทุดังสนั่นหวั่นไหวไปทั่วบริเวณ", "ด้วยความไว้วางใจในจอมเวทผู้ยิ่งใหญ่ จึงมีผู้คนเพียงไม่กี่คนเท่านั้นที่ให้ความสนใจกับทรายและหินที่ปลิวว่อน ทุกคนต่างเบิกตากว้าง จ้องมองทรงกลมสองลูกที่อยู่ใจกลางจัตุรัสอย่างไม่กะพริบตา", "ทรงกลมเหล็กขนาดมหึมาได้ฝังลึกลงไปในใจกลางจัตุรัส ทรายที่ถูกแทนที่ได้ก่อตัวเป็นหลุมขนาดเส้นผ่านศูนย์กลางประมาณสามเมตร ในขณะที่ทรายเม็ดละเอียดก็ยังคงไหลทะลักเข้าไปกองรวมกันในพื้นที่ส่วนกลางอย่างต่อเนื่อง", "ส่วนข้างใต้ทรงกลมไม้อีกลูกหนึ่งนั้น หลุมกลับมีความลึกเพียงแค่ครึ่งเมตร และถูกถมจนเต็มด้วยทรายอย่างรวดเร็ว", "เป็นไปตามที่ลินน์กล่าวไว้ทุกประการ ทรงกลมทั้งสองลูก ซึ่งมีมวลแตกต่างกันหลายสิบเท่า ได้พุ่งข้ามระยะทางสามร้อยเมตรในห้วงเวลาเดียวกัน และร่วงหล่นลงสู่พื้นพร้อมกันพอดี!", "“ศาสตราจารย์เฮลราม ข้าขอเข้าไปตรวจสอบดูหน่อยได้หรือไม่ขอรับ?”", "พ่อมดหนุ่มเอ่ยถามด้วยความร้อนรน", "จอมเวทผู้ยิ่งใหญ่ไม่ได้เอ่ยตอบสิ่งใด เขาเพียงแค่หันไปมองลินน์ และเมื่อเห็นอีกฝ่ายพยักหน้า เขาก็คลายม่านพลังเวทออก", "พ่อมดผู้นั้นรีบวิ่งเข้าไปในทันที โดยไม่สนใจเลยว่าข้อเท้าของเขาจะจมลงไปในทราย เขานั่งยองๆ ลงและใช้สองมือโอบกอดทรงกลมไม้กลวงเอาไว้ พลางออกแรงฮึดยกมันขึ้นมา", "เขาคิดว่าวัตถุชิ้นนี้จะต้องหนักมากเป็นแน่ แต่มันก็ผิดจากที่เขาคาดคะเนไว้ เขาสามารถโอบอุ้มทรงกลมไม้เอาไว้ในอ้อมแขนได้อย่างง่ายดายด้วยการออกแรงเพียงเล็กน้อยเท่านั้น", "“นี่มันเบาเกินไปแล้ว!”", "พ่อมดผู้นั้นอุทานออกมาด้วยความตกตะลึง และประเมินคร่าวๆ ว่าทรงกลมไม้นี้น่าจะมีน้ำหนักเพียงเจ็ดสิบปอนด์ และไม่มีร่องรอยของเวทมนตร์หลงเหลืออยู่บนนั้นเลย", "‘หรือว่าปัญหาจะอยู่ที่ทรงกลมเหล็กอีกลูกหนึ่งกันล่ะ?’", "ด้วยความแคลงใจ พ่อมดจึงวางทรงกลมไม้ลง เขานั่งยองๆ ลงอีกครั้ง และพยายามจะยกทรงกลมเหล็กขนาดเส้นผ่านศูนย์กลางหนึ่งเมตรลูกนั้นขึ้นมา แต่ไม่ว่าเขาจะออกแรงดึงมากแค่ไหน เขาก็ไม่สามารถขยับเขยื้อนวัตถุชิ้นนั้นให้หลุดพ้นจากทรายได้เลย และท้ายที่สุด เขาถึงกับต้องงัดเอา หัตถ์เวท ออกมาใช้ ทว่าทรงกลมเหล็กขนาดมหึมาก็ยังคงไม่ขยับเขยื้อนเลยแม้แต่น้อย", "‘ซี๊ด ของสิ่งนี้มันหนักขนาดไหนกันเนี่ย?’", "พ่อมดหนุ่มอดไม่ได้ที่จะตกตะลึง ในตอนนี้เขามั่นใจแล้วว่าการทดลองครั้งนี้ไม่มีการตุกติก หรือแอบลดทอนน้ำหนักอย่างแน่นอน", "“หากผู้ใดยังคงมีข้อกังขาอยู่ล่ะก็ เชิญขึ้นมาตรวจสอบด้วยตาของพวกท่านเองได้เลย”", "ลินน์เอ่ยด้วยน้ำเสียงเรียบเฉย", "เมื่อได้รับความยินยอมจากลินน์ บรรดาพ่อมด หรือแม้กระทั่งชาวเมืองที่ยังคงเคลือบแคลงใจเกี่ยวกับการทดลอง ต่างก็ก้าวเท้าเข้าไปในกองทราย เพื่อพิสูจน์ความแตกต่างของน้ำหนักระหว่างทรงกลมทั้งสองลูกด้วยสองมือของพวกเขาเอง", "ผู้ใหญ่ที่มีพละกำลังมากหน่อย ถึงกับสามารถชูทรงกลมไม้ขึ้นเหนือหัวได้สบายๆ แต่พวกเขากลับต้องยอมจำนนเมื่อเผชิญหน้ากับทรงกลมเหล็ก", "และในท้ายที่สุด ก็เป็นเฮลรามนั่นเอง ที่ใช้ หัตถ์เวท ดึงสิ่งนั้นขึ้นมาจากทราย และประเมินน้ำหนักของมันด้วยมือของเขาเอง", "“มันมีน้ำหนักประมาณสามตันเลยทีเดียว!”", "เฮลรามครุ่นคิดอยู่ครู่หนึ่ง ก่อนจะประเมินออกมาได้อย่างค่อนข้างแม่นยำ"]}, {"t": "ข้าและท่านเข้าใกล้ความจริงไปอีกก้าวหนึ่งแล้ว 2", "c": ["ฟิลิป เควิน ธีโอดอร์ และคนอื่นๆ หันมาสบตากัน พวกเขาไม่อาจปกปิดความตกตะลึงในใจได้เลย คำกล่าวอ้างของลินน์ที่ว่าวัตถุทั้งสองชิ้นมีมวลแตกต่างกันหลายสิบเท่านั้นถือว่าถ่อมตัวเกินไปมาก นี่มันแทบจะแตกต่างกันเกือบร้อยเท่าด้วยซ้ำ!", "“แต่มันประหลาดมาก ทำไมถึงเป็นเช่นนี้ไปได้?”", "ลูโอร์มองไปทางลินน์ด้วยความไม่เข้าใจ เขาไม่ได้ใส่ใจกับเหรียญทองสามเหรียญที่เพิ่งเสียไปเลยแม้แต่น้อย ทว่ากลับรู้สึกใคร่รู้อย่างลึกซึ้งเกี่ยวกับปรากฏการณ์ที่ขัดต่อสามัญสำนึกเช่นนี้", "เขาได้ประจักษ์ด้วยตาตนเองถึงพลังทำลายล้างอันน่าสะพรึงกลัวเมื่อตอนที่ทรงกลมเหล็กพุ่งกระแทกพื้น แต่ความเร็วในการร่วงหล่นของมันกลับเท่ากับทรงกลมไม้กลวงอย่างพอดิบพอดี", "นี่ไม่ใช่เวทมนตร์เลยสักนิด!", "“เรามาลองตั้งสมมติฐานเพื่อทำความเข้าใจกันเถอะ”", "ลินน์กล่าว พลางกวาดสายตามองใบหน้าที่เต็มไปด้วยความมึนงงรอบจัตุรัส และเพิ่มระดับเสียงขึ้นเล็กน้อย", "“ตามทฤษฎีของปรมาจารย์ยาเด ความเร็วในการร่วงหล่นของวัตถุจะแปรผันตรงกับน้ำหนักของมัน ข้าพูดถูกต้องใช่หรือไม่?”", "ลูโอร์และคนอื่นๆ พยักหน้ารับ จากนั้นลินน์ก็เปลี่ยนน้ำเสียงและชี้ไปที่ทรงกลมทั้งสองลูก", "“ทีนี้ หากข้าใช้เชือกผูกทรงกลมไม้และทรงกลมเหล็กเข้าด้วยกัน แล้วปล่อยให้พวกมันร่วงหล่นลงมาจากที่สูง พวกท่านคิดว่าความเร็วในการร่วงหล่นของพวกมันจะเร็วขึ้นหรือช้าลงกันล่ะ?”", "“ย่อมต้องเร็วขึ้นอย่างเห็นได้ชัดสิ เพราะน้ำหนักโดยรวมของมันเพิ่มขึ้น...”", "ลูโอร์ตอบกลับอย่างไม่ลังเล", "แต่วินาทีต่อมา พ่อมดหลายคนก็แย้งขึ้น", "“ไม่...มันควรจะช้าลงต่างหาก! มวลของทรงกลมไม้นั้นน้อยกว่าทรงกลมเหล็กมาก และความเร็วในการตกของมันก็ช้ากว่ามากเช่นกัน ดังนั้นมันย่อมต้องฉุดรั้งการร่วงหล่นของทรงกลมเหล็กให้ช้าลงอย่างหลีกเลี่ยงไม่ได้”", "“หากทรงกลมเหล็กลูกเดียวใช้เวลาสี่วินาทีในการตกถึงพื้น และทรงกลมไม้ใช้เวลาเก้าวินาที ดังนั้นหากนำทั้งสองมาผูกติดกันและปล่อยให้ตกลงมาพร้อมกัน เวลาที่ตกกระทบพื้นในท้ายที่สุดก็ควรจะอยู่ระหว่างสี่ถึงเก้าวินาที”", "ก่อนที่ลินน์จะทันได้ตอบกลับ เหล่าพ่อมดก็เริ่มถกเถียงกันเองเสียแล้ว จอห์นนี่ เอล็อค และคนอื่นๆ ที่ยืนฟังอยู่ต่างก็รู้สึกว่าเหตุผลของทั้งสองฝ่ายดูมีน้ำหนัก ทว่าพวกมันกลับขัดแย้งกันเอง...", "“คำตอบก็คือ...ไม่มีการเปลี่ยนแปลงใดๆ ทั้งสิ้น!”", "ลินน์เ ลึงของทุกคนในที่นั้น กระดาษแผ่นบางไม่ได้ลอยเคว้งอย่างที่พวกเขาวาดภาพไว้ แต่มันกลับแนบติดอยู่กับหน้าปกหนังสือ และร่วงหล่นลงสู่พื้นไปพร้อมๆ กับมัน", "กระบวนการทั้งหมดใช้เวลาเพียงแค่สามวินาทีเท่านั้น สำหรับการตกถึงพื้นพร้อมกันของทั้งกระดาษแผ่นบางและหนังสือที่หนักอึ้ง!", "ทั่วทั้งจัตุรัสตกอยู่ในความเงียบงันราวกับป่าช้า พวกเขาเค้นสมองคิดอย่างหนัก แต่ก็ไม่อาจหยั่งรู้ได้เลยว่าเหตุใดจึงเกิดเรื่องเช่นนี้ขึ้นได้", "ความเป็นจริงได้ทุบทำลายสัญชาตญาณของทุกคนจนแหลกละเอียดอีกครั้งอย่างไม่อาจปฏิเสธได้!", "เว้นเสียแต่ว่า...สิ่งที่ลินน์พูดจะเป็นความจริง ที่ว่าความเร็วในการตกอย่างอิสระนั้นไม่มีความเกี่ยวข้องกับน้ำหนักเลย!", "“เป็นเพราะการขจัดแรงต้านอากาศออกไปงั้นหรือ?”", "เฮลรามรำพึงรำพัน แน่นอนว่าเขามองออก เพราะลินน์นำกระดาษแผ่นนั้นไปวางแนบไว้กับหนังสือ กระดาษแผ่นบางจึงไม่ต้องเผชิญกับแรงต้านของอากาศ และย่อมต้องร่วงหล่นลงมาพร้อมกับหนังสืออย่างเป็นธรรมชาติ", "ลูโอร์ที่ยังคงไม่ปักใจเชื่อ ได้ลองทำตามวิธีการของลินน์และทดสอบดูอีกครั้ง แต่ผลลัพธ์ก็ยังคงไม่เปลี่ยนแปลง!", "แม้แต่บรรดาพ่อมดที่เคยส่งเสียงคัดค้านดังที่สุด ก็ยังต้องเริ่มพิจารณาถึงความเป็นไปได้ที่ว่า ทฤษฎีของปรมาจารย์ยาเดอาจจะมีข้อบกพร่องอยู่จริงๆ!", "“สติปัญญาของท่านช่างน่ายกย่องยิ่งนัก ท่านเฮลราม! เป็นเพราะหนังสือรับแรงต้านอากาศแทนกระดาษแผ่นนั้นพอดี พวกมันจึงร่วงหล่นลงมาพร้อมกัน!”", "ลินน์เอ่ยชมเฮลรามอย่างเป็นธรรมชาติในตอนแรก จากนั้นจึงหันไปหาเหล่าพ่อมดที่ยังคงไม่หายตกตะลึงจากการทดลองการตกอย่างอิสระทั้งสองครั้ง แล้วกล่าวขึ้นอีกครั้ง", "“เมื่อตอนที่ข้าอยู่ในสมาคมเวทมนตร์เร้นลับ ข้าเคยได้ยินปรมาจารย์ท่านหนึ่งกล่าวเอาไว้ว่า โลกใบนี้เต็มไปด้วยความมหัศจรรย์ และบางครั้งปรากฏการณ์บางอย่างก็อยู่เหนือความเข้าใจของเรา และการเดินทางของพ่อมดเพื่อค้นพบความจริงนั้น ก็เปรียบเสมือนคนตาบอดหลายคนที่พยายามจะทำความเข้าใจรูปร่างของมังกรด้วยการคลำสัมผัสมัน”", "ลินน์กล่าวต่อ", "“ผู้ที่คลำเจอขา ก็จะคิดว่ามังกรมีรูปร่างเหมือนกับเสา ผู้ที่คลำเจอปีกก็จะเชื่อว่ามังกรมีรูปร่างแบนและยาว...นั่นจึงไม่ใช่เรื่องที่น่าสงสัยเลยว่า ข้อสรุปเหล่านี้ล้วนเป็นเพียงการมองจากด้านเดียวเท่านั้น!”", "“บางทีในสักวันหนึ่ง อาจจะมีพ่อมดอีกคนมายืนอยู่บนจัตุรัสแห่งนี้ พร้อมกับการท จัง และกล่าวด้วยความภาคภูมิใจ", "“ไม่มีคำสั่งเพิ่มเติมในตอนนี้ วันนี้พอแค่นี้ก่อนก็แล้วกัน!”", "ลินน์ตอบกลับด้วยรอยยิ้ม", "ลิเดียสลัดคราบกัปตันผู้เคร่งขรึมทิ้งไปในทันที และเริ่มเล่าถึงประสบการณ์บนท้องฟ้าของนางด้วยความตื่นเต้น ไม่ว่าจะเป็นตอนที่นางบังคับเรือเหาะทะลุผ่านก้อนเมฆสีขาวบริสุทธิ์ หรือเห็นทิวเขาที่ทอดยาวสลับซับซ้อนอยู่ลิบๆ หรือผืนมหาสมุทรอันกว้างใหญ่ไพศาลสุดลูกหูลูกตา..."]}, {"t": "การประเมินระดับพ่อมด", "c": ["ลิเดียเล่าถึงประสบการณ์การบินของนางอย่างออกรสออกชาติ จนปลุกเร้าความรู้สึกตื่นเต้นและกระหายใคร่รู้ให้กับเหล่าพ่อมดฝึกหัดและชาวเมืองทั้งหลาย", "การได้พุ่งชนกับก้อนเมฆนั้นให้ความรู้สึกสดชื่นเหมือนกับถูกสายลมทะเลพัดผ่านจริงหรือ?", "ทุกคนต่างปรารถนาที่จะได้สัมผัสกับความรู้สึกอันแสนวิเศษนี้ด้วยตัวเอง...", "เงินสิบเหรียญเงินดูจะไม่ใช่ราคาที่แพงจนเกินไปนัก", "เด็กสาวเผ่าฮาล์ฟลิงพูดคุยไม่หยุด จนกระทั่งนางหันไปเห็นเฮลราม จึงได้นึกขึ้นมาได้ถึงจุดประสงค์ของการบินครั้งนี้ และเอ่ยถามด้วยความประหม่า", "“ท่านเฮลราม สิ่งนี้ถือว่าประสบความสำเร็จแล้วใช่ไหมเจ้าคะ? ข้าอยู่บนท้องฟ้ามานานมาก และไม่ได้ใช้พลังเวทแม้แต่นิดเดียวเลย!”", "เฮลรามมองดูลิเดียด้วยท่าทีลังเล และไม่ได้ตอบคำถามของนาง", "“วิชาเลขของข้าไม่จำเป็นต้องมีพรสวรรค์ทางเวทมนตร์หรอก ต่อให้เป็นคนธรรมดาทั่วไปก็สามารถเรียนรู้มันได้ไม่น้อยเลยทีเดียว”", "ลินน์กล่าวเสริมขึ้นในจังหวะนั้น", "“ถ้าเช่นนั้น เราก็มาลองดูกัน”", "เฮลรามกล่าวอย่างไม่แสดงความเห็นที่ชัดเจน", "“วิเศษไปเลย!”", "ลิเดียกระโดดโลดเต้นด้วยความดีใจ นางหันไปสวมกอดกับพวกฮาล์ฟลิงคนอื่นๆ จนดาร์เรนถึงกับร้องไห้ออกมาด้วยความตื้นตันใจ", "“ข้ารู้อยู่แล้วว่าเจ้าต้องทำได้ ลิเดีย!”", "“เยี่ยมไปเลย ในไม่ช้าพวกฮาล์ฟลิงก็จะมีพ่อมดเป็นของตัวเองแล้ว...”", "...", "ดาร์เรนและคนอื่นๆ ที่เต็มไปด้วยความตื่นเต้นตัดสินใจว่าจะฉลองกันให้สุดเหวี่ยงหลังจากกลับถึงบ้านในคืนนี้", "พ่อมดและพ่อมดฝึกหัดบางคนที่รวมตัวกันอยู่ ณ จัตุรัสต่างพากันขมวดคิ้วให้กับกลุ่มของลิเดียที่กำลังส่งเสียงดังอึกทึก การรับฮาล์ฟลิงที่ไม่มีพรสวรรค์ทางเวทมนตร์เข้าสู่วงการนั้นเป็นเรื่องที่ไม่เคยเกิดขึ้นมาก่อน และขัดต่อกฎระเบียบของสภาพ่อมดอย่างสิ้นเชิง", "ทว่า เมื่อเห็นผลลัพธ์อันน่าทึ่งของการทดลองบินและการให้การรับรองของเฮลราม จึงไม่มีใครกล้าที่จะคัดค้านออกมาอย่างเปิดเผย...", "หลังจากความวุ่นวายได้เบาบางลง เฮลรามก็ใช้เวทมนตร์ฟื้นฟูสภาพพื้นดินที่กลายเป็นทรายให้กลับสู่สภาพเดิม และกำชับให้พ่อมดบางคนช่วยรักษาความสงบในจัตุรัส จากนั้นเขาก็พากลุ่มศาสตราจารย์และพ่อมดฝึกหัดกลับไปยังสถาบันเวทมนตร์อิเยตา เพื่อเตรียมตัวต้อนรับแขกคนสำคัญสองท่านจากนครพ่อมด", "ในขณะที่ลิเดียและพรรคพวก แม้จะกำลังมีความสุข แต่ก็ไม่ลืมที่จะฉวยโอกาสนี้ขายตั๋วสำหรับเรือเหาะ", "ตามราคาที่ลินน์ตั้งไว้ก่อนหน้านี้ ค่าตั๋วเรือเหาะราคาใบละสิบเหรียญเงิน ซึ่งไม่ถือว่าแพงหรือถูกจนเกินไป เป็นจำนวนเงินที่ชาวเมืองส่วนใหญ่สามารถหามาจ่ายได้", "ผลที่ได้คือ ผู้คนจำนวนมากยินดีที่จะจ่ายเงินเพื่อสัมผัสประสบการณ์การนั่งบนเครื่องจักรเล่นแร่แปรธาตุที่สูงยิ่งกว่าตึก เพื่อลอยละล่องไปบนท้องฟ้าสักรอบ", "ภายในเวลาเพียงครึ่งชั่วโมง ลิเดียก็ขายตั๋วที่ว่านั้นไปได้กว่าหกร้อยใบ โดยยึดหลักมาก่อนได้ก่อนและจดบันทึกชื่อของทุกคนเอาไว้ ทำให้ไม่มีทางที่จะหลบเลี่ยงการจ่ายเงินได้เลย", "ภายในเรือเหาะนั้นกว้างขวางพอที่จะบรรทุกคนได้ครั้งละสิบคนโดยไม่มีปัญหา โดยเที่ยวบินแต่ละรอบจะใช้เวลาประมาณหนึ่งชั่วโมง ซึ่งสามารถบินได้วันละอย่างน้อยสิบเที่ยว แต่ถึงอย่างนั้น ก็ยังต้องใช้เวลาอีกหลายวันกว่าจะรองรับทุกคนได้หมด", "ในเวลาเพียงไม่นาน พวกเขาก็เก็บเงินได้มากกว่าหกสิบเหรียญทองเวทมนตร์ ดาร์เรนและคนอื่นๆ ยิ้มหน้าบานไม่หยุด เมื่อรู้ว่าลินน์ยินดีที่จะแบ่งกำไรจากการขายตั๋วหนึ่งในสิบส่วนให้เป็นค่าใช้จ่ายในการดำเนินงาน", "ด้วยความนิยมขนาดนี้ การหาเงินให้ได้เดือนละหลายสิบเหรียญทองเวทมนตร์จึงไม่ใช่เรื่องยาก...มันประหยัดกว่าการจ้างแรงงานในห้องปฏิบัติการเพื่อสร้างอุปกรณ์ชิ้นเล็กๆ เหล่านั้นเสียอีก", "ขณะที่ดาร์เรนและคนอื่นๆ กำลังจมดิ่งอยู่ในฝันหวานของชีวิตอันแสนสุข ภายในสถาบันเวทมนตร์อิเยตา เฮลราม ทิค ลูโอร์ และกลุ่มศาสตราจารย์ก็ได้มาถึงที่โถงหน้าเป็นที่เรียบร้อยแล้ว", "ฝูงแฟรี่บินกรูเข้ามาจากหน้าต่าง วางจานอาหารที่กำลังส่งกลิ่นหอมฉุยลงบนโต๊ะสี่เหลี่ยมเบื้องหน้าทุกคน", "มะเขือเทศย่าง มันบด ขนมปังขาว กระดูกหางของจิ้งจกหญ้า เนื้อหลังของอสูรอูฐ ขาหน้าของสิงโตไฟ และวัตถุดิบแปลกประหลาดมากมายที่ลินน์ไม่รู้จักเลยแม้แต่น้อย...", "ลินน์ค่อยๆ หั่นเนื้อขาหน้าชิ้นเล็กๆ เข้าปาก เขารู้สึกว่ามันเหนียวยิ่งกว่าเนื้อวัวเสียอีก แม้ว่าจะขาดเครื่องปรุงรสจนรสชาติไม่ค่อยน่าพิสมัยนัก แต่ในดินแดนพ่อมด สิ่งนี้ก็นับว่าเป็นอาหารที่หรูหรามากแล้ว", "“ศาสตราจารย์ลินน์ เรื่องหนึ่งที่ข้าต้องขอบคุณท่าน ก็คือการที่ทำให้ข้าได้เห็นเรือเหาะและได้ชมการทดลองการตกอย่างอิสระที่น่าหลงใหลเช่นนี้ ทันทีที่ข้าเดินทางมาถึงเมืองท่าอิเยตา ข้าเกรงว่าวารสารเวทมนตร์รายสัปดาห์คงจะไม่มีทางขาดแคลนข่าวสำหรับเดือนหน้าเป็นแน่”", "ลูโอร์ยกแก้วไวน์ขึ้นมองลินน์แล้วกล่าวหยอกเย้า", "“ท่านลูโอร์ ท่านกล่าวเกินไปแล้ว...ข้าคงต้องขอให้ท่านมีความเมตตาต่อข้าบ้างเวลาเขียนบทความ และพยายามแสดงความเห็นให้รอบคอบที่สุดเท่าที่จะเป็นไปได้”", "ลินน์ยกแก้วขึ้นดื่มจนหมดรวดเดียว และกล่าวด้วยความสุภาพ", "แน่นอนว่าเขาเข้าใจถึงอานุภาพของปลายปากกาเป็นอย่างดี เพียงแค่แสดงความเห็นในวารสารเวทมนตร์รายสัปดาห์อย่างดุเดือดขึ้นอีกนิด พวกเขาก็สามารถสร้างปัญหาให้เขาได้ไม่น้อยเลย", "“เห็นทีจะไม่ได้หรอก ข้าต้องนำเสนอทุกอย่างที่ข้าได้เห็นตามความเป็นจริง เพราะนั่นคือจรรยาบรรณพื้นฐานของบรรณาธิการวารสารเวทมนตร์รายสัปดาห์”", "ลูโอร์ส่ายหน้าและกล่าวตอบอย่างลื่นไหล", "ลินน์พูดไม่ออก เขาไม่เคยเชื่อเลยว่าสื่อมวลชนจะมีสิ่งที่เรียกว่าจรรยาบรรณอยู่จริงๆ มันไม่มีอยู่จริงหรอก ทว่าในเมื่ออีกฝ่ายไม่ยอมรับปาก เขาก็ทำอะไรไม่ได้เช่นกัน", "“จริงสิ ศาสตราจารย์ลินน์ ข้ามีคำถามหนึ่ง...”", "ลูโอร์หยุดแกว่งแก้วไวน์แล้วถามด้วยความใคร่รู้", "“ท่านเป็นพ่อมดระดับไหนกันแน่?”", "เมื่อสิ้นคำถาม ทุกคนที่อยู่ที่นั่นต่างหันมามองด้วยความสนใจเกี่ยวกับประเด็นนี้", "ผู้ที่รู้ข้อมูลวงในบ้างอย่างธีโอดอร์และเควิน ต่างคาดเดากันว่าลินน์น่าจะเป็นพ่อมดระดับสามวงแหวน เนื่องจากเขาสามารถสังหารอาร์ชบิชอป ทำลายเมืองไปครึ่งหนึ่ง และกำจัดกองกำลังรักษาการณ์สามพันคนได้สำเร็จ ต่อให้จะใช้ไอเทมเล่นแร่แปรธาตุที่เตรียมมาไว้ก่อนก็ตาม", "แต่สิ่งที่ทำให้พวกเขาสงสัยก็คือ ลินน์ดูหนุ่มเกินไปมาก เขาอาจจะยังไม่ถึงยี่สิบปีด้วยซ้ำ", "เป็นที่ทราบกันดีในดินแดนพ่อมดว่า อัจฉริยะผู้โด่งดังที่สุดอย่าง ดาวรุ่งแห่งเวทมนตร์ ออกัสต์ ก็เลื่อนระดับเป็นพ่อมดระดับสามวงแหวนตอนอายุประมาณยี่สิบปีเช่นกัน", "ภายใต้สายตานับไม่ถ้วน ลินน์ค่อยๆ ดื่มไวน์ในแก้วอย่างใจเย็น และกล่าวด้วยท่าทีที่สุขุมเป็นที่สุด", "“เรื่องนี้ เร
