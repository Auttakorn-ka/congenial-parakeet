<!DOCTYPE html>
<html lang="th"><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"><title>ฉันสร้างเวทมนตร์ด้วยวิทยาศาสตร์</title>
<style>
  :root{--bg:#f5f3ef;--card:#fff;--text:#2a2a2a;--muted:#6b6b6b;--accent:#a6543a;--border:#e3ddd3;--shadow:0 2px 10px rgba(0,0,0,.06)}
  html[data-theme="dark"]{--bg:#15171c;--card:#1e2128;--text:#dfe1e6;--muted:#8b90a0;--accent:#e0895f;--border:#2c3038;--shadow:0 2px 12px rgba(0,0,0,.4)}
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  body{font-family:'Segoe UI','Sarabun',Tahoma,sans-serif;background:var(--bg);color:var(--text);line-height:1.75;transition:background .25s,color .25s}
  header{position:sticky;top:0;z-index:10;background:var(--card);border-bottom:1px solid var(--border);box-shadow:var(--shadow)}
  .bar{max-width:800px;margin:0 auto;padding:12px 16px;display:flex;align-items:center;gap:8px}
  .title{font-size:16px;font-weight:700;color:var(--accent);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .btn{background:transparent;border:1px solid var(--border);color:var(--text);padding:8px 11px;border-radius:8px;cursor:pointer;font-size:14px;display:inline-flex;align-items:center;gap:5px;transition:.15s;white-space:nowrap}
  .btn:hover{border-color:var(--accent);color:var(--accent)}
  .btn:disabled{opacity:.4;cursor:not-allowed}
  main{max-width:760px;margin:0 auto;padding:26px 18px 70px}
  .chap-no{color:var(--muted);font-size:14px}
  h2.chap-title{font-size:23px;margin:4px 0 26px;line-height:1.35}
  .body{font-size:var(--reader-size,19px);transition:font-size .12s}
  .body p{margin-bottom:1.15em;text-indent:1.4em}
  .nav{display:flex;gap:10px;margin-top:44px}
  .nav .btn{flex:1;justify-content:center;padding:13px}
  .endnote{margin-top:44px;padding:20px;border:1px dashed var(--accent);border-radius:12px;text-align:center;color:var(--muted);font-size:15px;line-height:1.7}
  .endnote b{color:var(--accent)}
  .overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:20;display:none}
  .overlay.open{display:block}
  .drawer{position:absolute;top:0;left:0;height:100%;width:82%;max-width:340px;background:var(--card);box-shadow:var(--shadow);overflow-y:auto;padding:18px}
  .drawer h3{font-size:16px;margin-bottom:14px;color:var(--accent)}
  .toc{list-style:none}
  .toc li{padding:11px 12px;border-radius:8px;cursor:pointer;font-size:14.5px;border:1px solid transparent}
  .toc li:hover{background:var(--bg)}
  .toc li.active{border-color:var(--accent);color:var(--accent);font-weight:600}
  .toc .n{color:var(--muted);font-size:12px;margin-right:6px}
  footer{text-align:center;color:var(--muted);font-size:12px;padding:24px}
  @media(max-width:420px){.title{font-size:15px}.btn{padding:8px 9px;font-size:13px}main{padding:20px 14px 56px}.body{--reader-size:18px}.nav{flex-direction:column}}
</style></head><body>
<header><div class="bar">
  <button class="btn" onclick="toggleTOC()">☰ สารบัญ</button>
  <span class="title">ฉันสร้างเวทมนตร์ด้วยวิทยาศาสตร์</span>
  <button class="btn" onclick="changeFont(-1)">A−</button>
  <button class="btn" onclick="changeFont(1)">A+</button>
  <button class="btn" id="themeBtn" onclick="toggleTheme()">🌙</button>
</div></header>
<main id="reader"></main>
<footer>ฉันสร้างเวทมนตร์ด้วยวิทยาศาสตร์ · ชุดตอนที่ 1-100</footer>
<div class="overlay" id="overlay" onclick="if(event.target===this)toggleTOC()">
  <div class="drawer"><h3>สารบัญ (ชุด 1-100)</h3><ul class="toc" id="toc"></ul></div>
</div>
<script>
const CHAPTERS = [{"t": "พ่อมดฝึกหัดและเวทมนตร์", "c": ["ลำคอแห้งผาก ความร้อนที่อบอ้าว ความเหนื่อยล้า...", "ภายใต้ความรู้สึกไม่สบายตัวอย่างรุนแรง ลินน์ค่อยๆ ลืมตาขึ้น", "สิ่งแรกที่ปรากฏแก่สายตาคือเพดานที่เต็มไปด้วยหยักไย่ และสภาพแวดล้อมอันแปลกตาก็ทำให้สมองของลินน์ขาวโพลนไปชั่วขณะ", "ที่นี่คือห้องขนาดเล็กที่มีพื้นที่ไม่ถึงสามสิบตารางเมตร ผนังไม้ดูทรุดโทรมอย่างหนักซึ่งน่าจะเกิดจากการขาดการซ่อมแซมมานานหลายปี ทั้งยังปกคลุมไปด้วยฝุ่นหนาและร่องรอยการกัดกินของแมลง", "ภายในกระท่อมก็เละเทะไม่แพ้กัน ข้าวของจิปาถะและขยะก็กองพะเนินอยู่ตามมุมห้อง หนังสือที่ถูกเปิดทิ้งไว้นับสิบเล่มต่างก็ตกกระจัดกระจายอยู่บนพื้น เหลือเพียงทางเดินแคบๆ ให้พอสัญจรได้เท่านั้น", "ฉันอยู่ที่ไหนเนี่ย? หรือว่าฉันถูกลักพาตัวมา?", "ลินน์นวดคลึงศีรษะที่ยังคงวิงเวียนเล็กน้อยพลางพยุงตัวลุกขึ้นนั่งอย่างยากลำบาก ความรู้สึกกระวนกระวายก่อตัวขึ้นในใจ", "เขามั่นใจว่านี่ไม่ใช่สถานที่ที่เขารู้จัก ลินน์จึงต้องเตรียมใจรับมือกับสถานการณ์ที่เลวร้ายที่สุด นั่นคือมีโอกาสสูงมากที่เขาจะถูกลักพาตัว!", "‘071 แสดงตำแหน่งปัจจุบันของฉัน!’", "ลินน์เอ่ยสั่งการในใจตามสัญชาตญาณ ทว่าผ่านไปหลายวินาทีก็ยังคงไร้ซึ่งการตอบรับใดๆ", "แม้แต่ระบบปัญญาประดิษฐ์สนับสนุนก็ยังถูกบล็อกงั้นเหรอ?", "ใจของลินน์หล่นวูบลงทันที เขารีบพลิกตัวลงจากเตียงตามสัญชาตญาณเพื่อหาทางหนี ทว่ากลับพบดาบสั้นเล่มคมวางอยู่บนหัวเตียงอย่างไม่คาดคิด ซ้ำยังมีกระดาษหนังยับยู่ยี่แผ่นหนึ่งอยู่ในมือขวาของเขาด้วย", "ลินน์คว้าดาบสั้นมาถือไว้ในมือตามสัญชาตญาณ ทำให้ในที่สุดเขาก็รู้สึกปลอดภัยขึ้นมาบ้าง หลังจากลังเลอยู่ครู่หนึ่ง เขาก็คลี่กระดาษหนังที่ยับยู่ยี่แผ่นนั้นออก มันเต็มไปด้วยสัญลักษณ์ซับซ้อนที่ดูคล้ายรอยขีดเขียนมั่วๆ ทว่าสิ่งที่ทำให้เขาประหลาดใจยิ่งกว่าก็คือ เขากลับสามารถเข้าใจข้อความเหล่านั้นได้!", "[เวลาเหลือน้อยเต็มทีแล้ว พวกนักบวชจากศาลพิพากษาพบร่องรอยของเราแล้ว เราจะไปรวมตัวกันที่จุดนัดพบในเมืองอูเออร์ก่อนพระจันทร์ขึ้น นำเหรียญทองแดงเซคัสสิบเจ็ดเหรียญติดตัวมาด้วยและตามรอยเครื่องหมายไป... โปรดระวังตัวด้วย—จอห์นนี่]", "วินาทีที่เขาเข้าใจความหมายของข้อความ ความหวาดกลัวที่ไม่อาจอธิบายได้ก็พลุ่งพล่านขึ้นในใจ ตามมาด้วยภาพความทรงจำอันเลือนลางที่ผุดขึ้นมาในหัว", "ณ ลานกว้างอันโอ่อ่า ฝูงชนจำนวนมากมารวมตัวกันส่งเสียงเซ็งแซ่ สีหน้าของพวกเขาเปี่ยมไปด้วยความคลั่งไคล้และตื่นเต้น พลางตะโกนร้องอะไรบางอย่างไม่ขาดสาย", "ใจกลางลานกว้างมีแท่นประหารขนาดยักษ์ตั้งตระหง่านอยู่ เบื้องหน้าแท่นนั้นคือบิชอปในชุดคลุมผ้าไหมสีขาว ท่ามกลางเสียงโห่ร้องอย่างบ้าคลั่งของฝูงชน เขาก็ชูไม้เท้าขึ้นสูง", "วินาทีต่อมา เปลวเพลิงสีแดงฉานก็พวยพุ่งขึ้นสู่ท้องฟ้า แผดเผาร่างที่กำลังดิ้นรนอย่างสิ้นหวังอยู่ในทะเลเพลิง พร้อมกับเสียงกรีดร้องด้วยความเจ็บปวดที่ดังก้องกังวานอย่างไม่จบสิ้น...", "นี่มันอะไรกัน? ถ่ายทำภาพยนตร์กันอยู่หรือไง?", "ฉากอันโหดร้ายที่ปรากฏขึ้นในหัวทำให้ลินน์สั่นสะท้านขึ้นมาอย่างห้ามไม่ได้", "แต่ทำไมถึงมีความทรงจำที่อธิบายไม่ได้พวกนี้มาอยู่ในหัวของฉัน แล้วจอห์นนี่ที่ลงชื่อไว้ท้ายจดหมายนี่เป็นใครกัน?", "ทันใดนั้น ราวกับฉุกคิดอะไรบางอย่างได้ ลินน์จึงรีบพุ่งตัวไปที่โอ่งน้ำใบใหญ่ในห้องและจ้องมองเงาสะท้อนในน้ำ นั่นทำให้รูม่านตาของเขาหดเกร็งลงทันที", "นิ้วมือที่สั่นเทาเล็กน้อยของเขาทำให้ผิวน้ำเกิดระลอกคลื่น แต่ลินน์ก็ยังคงมองเห็นรูปลักษณ์ปัจจุบันของตัวเองได้อย่างชัดเจน", "มันคือภาพของเด็กหนุ่มอายุราวๆ สิบแปดหรือสิบเก้าปี สวมชุดคลุมผ้ากระสอบที่มีรอยปะชุน รูปร่างของเขาค่อนข้างผอมบาง ใบหน้าซีดเซียวเปื้อนไปด้วยคราบดิน เรือนผมสีน้ำตาลยุ่งเหยิง และดวงตาสีดำขลับที่เต็มไปด้วยความหวาดกลัว...", "หรือว่าฉันจะทะลุมิติมา?", "ลินน์สูดลมหายใจลึก ความคิดอันไร้สาระนี้ก่อตัวขึ้นในใจ ทว่านอกจากเหตุผลนี้ เขาก็หาคำอธิบายอื่นไม่ได้อีกแล้ว", "แม้ในยุคสมัยก่อนที่เขาจะทะลุมิติมา สหพันธรัฐจะมีความก้าวหน้าอย่างมากในการพัฒนาสมองและการวิจัยเซลล์ประสาท อีกทั้งเทคโนโลยีการฝังชิปในสมองก็ก้าวหน้าไปไกลมากแล้ว แต่ความคิดที่จะถ่ายโอนจิตสำนึกไปอีกร่างเพื่อเกิดใหม่นั้นยังคงเป็นเพียงแค่จินตนาการที่เพ้อฝัน", "เขายังไม่เชื่ออีกด้วยว่าจะมีใครยอมทุ่มเทความพยายามมากมายขนาดนั้นเพียงเพื่อมาสร้างเรื่องหลอกลวงเขา", "เมื่อตระหนักได้เช่นนี้ ลินน์ก็เลิกตั้งความหวังใดๆ เขาทิ้งตัวนั่งลงบนพื้นอย่างแรง ท่ามกลางความตกตะลึง ก็มีกระแสความทรงจำอันซับซ้อนหลั่งไหลเข้ามาในหัวของเขาอีกครั้ง", "หลังจากใช้เวลาครึ่งชั่วโมงในการเรียบเรียงความทรงจำที่โผล่มาอย่างกะทันหันเหล่านี้ ลินน์ก็พอจะทำความเข้าใจสถานการณ์ปัจจุบันของตัวเองได้ในที่สุด", "เขาทะลุมิติมายังสถานที่ที่ดูคล้ายกับยุโรปยุคกลาง ซึ่งเป็นโลกที่มีหลายประเทศกำลังทำสงครามกันอย่างต่อเนื่อง และประเทศที่ทรงอำนาจที่สุดก็คือ จักรวรรดิเซคัส ซึ่งเป็นที่ที่เขาอาศัยอยู่ในตอนนี้", "โดยเหนือระบอบกษัตริย์ขึ้นไป กลับมีองค์กรที่รู้จักกันในนาม ศาสนจักร ซึ่งเคารพบูชาเทพเจ้าที่ชื่อว่า เอลา อันเป็นศาสนาแบบเอกเทวนิยมดั้งเดิมที่มีหลักคำสอนเกี่ยวกับการสร้างโลก", "นอกจากการเผยแผ่ความเชื่อและล่อลวงผู้คนแล้ว เป้าหมายหลักอีกประการหนึ่งของศาสนจักรก็คือการตามล่าพ่อมด!", "และข่าวร้ายสำหรับลินน์ก็คือ เด็กหนุ่มที่เขาเข้ามาสิงร่างนี้ ดูเหมือนจะเป็นพ่อมด", "ไม่สิ พูดให้ถูกก็คือ เขาเป็น พ่อมดฝึกหัด ที่กำลังถูกออกหมายจับอยู่ต่างหาก!", "ลินน์มองกระดาษหนังที่ยับยู่ยี่ในมือด้วยความรู้สึกหงุดหงิดเล็กน้อย เรื่องบ้าอะไรกันเนี่ย การทะลุมิติมาอยู่ที่นี่โดยไม่ได้รับการต้อนรับที่ดีก็แย่พออยู่แล้ว นี่เขายังต้องมาตกอยู่ในสถานะผู้ถูกล่าและอาจถูกจับเผาทั้งเป็นได้ทุกเมื่ออีก", "จะว่าไปแล้ว เจ้าของร่างคนก่อนก็ค่อนข้างจะทำตัววู่วามเกินไปหน่อย", "เขาเป็นบุตรนอกสมรสของไวเคานต์แห่งจักรวรรดิเซคัส มีนามว่า คาร์ล ซิเดลัน", "แม้ว่าปกติแล้วเขาจะไม่เป็นที่ยอมรับนัก แต่อย่างน้อยเขาก็ไม่อดอยากขาดแคลนเสื้อผ้า ในโลกอันแสนวุ่นวายที่มีแต่สงครามแห่งนี้ การมีข้าวกินและมีเสื้อผ้าใส่ก็ถือเป็นพรประเสริฐแล้ว!", "ด้วยฐานะนี้และสภาพแวดล้อมที่ค่อนข้างมั่นคง เมื่อรวมกับความรู้จากโลกก่อนของเขา เขาคงจะสร้างตัวได้ภายในเวลาไม่กี่ปี และการจะเป็นผู้จุดประกายการปฏิวัติอุตสาหกรรมและโค่นล้มศาสนจักรก็คงไม่ใช่เรื่องที่เป็นไปไม่ได้", "แต่เด็กคนนี้กลับถูกพ่อมดที่ชื่อ โคร หลอกลวง เขาละทิ้งชีวิตอันสุขสบายเพื่อไปเป็นลูกศิษย์ของโคร ต้องร่อนเร่พเนจรไปเรื่อยๆ และมักจะต้องอดมื้อกินมื้ออยู่เสมอ", "จนเมื่อสี่วันก่อน โคร ผู้เป็นอาจารย์ของเขาพยายามจะลักพาตัวลูกสาวของดยุกแต่ทำไม่สำเร็จ ทำให้ในวันรุ่งขึ้น ศาลพิพากษาที่ได้รับข่าว ก็สามารถจับกุมตัวโครไว้ได้ก่อนที่เขาจะหลบหนี", "หลังจากได้ยินข่าวนี้ คาร์ลก็มาซ่อนตัวอยู่ในฐานลับแห่งนี้ โดยใช้ชีวิตอยู่ด้วยความหวาดผวาอยู่ตลอดเวลา", "ตลอดหกเดือนที่ผ่านมาของการติดตามโครผู้เป็นอาจารย์ คาร์ลได้เห็นพ่อมดฝึกหัดถูกจับเผาทั้งเป็นมานักต่อนัก เขาจึงหวาดกลัวว่าพวกนักบวชของศาลพิพากษาจะบุกเข้ามาจับกุมเขา ความกล บรวมน้ำให้เป็นเป้าหมายสำหรับเวทบทแรกของเขา", "ในฐานะหนึ่งในเวทระดับศูนย์วงแหวนที่จำเป็นไม่กี่บท หากเวทแยกแยะวัสดุพื้นฐานคือกุญแจสำคัญในการใช้วัสดุเวทมนตร์ และหัตถ์เวทคือผู้ช่วยที่ยอดเยี่ยมที่สุดของพ่อมด เวทรวบรวมน้ำก็คือบทเรียนปฐมนิเทศของพ่อมดฝึกหัด!", "เวทพื้นฐานนี้ ก็เหมือนกับเวทระดับสูงอย่างเวทใบมีดน้ำแข็ง ที่ไม่จำเป็นต้องเตรียมวัสดุเวทมนตร์ไว้ล่วงหน้า หรือพูดให้ถูกก็คือ วัสดุสำหรับการร่ายนั้นสามารถสกัดออกมาจากโลกแห่งธาตุได้โดยตรง!", "ลินน์หลับตาลงและทำสมาธิตามวิธีที่ปรากฏในความทรงจำ อาจเป็นเพราะรากฐานอันยอดเยี่ยมของคาร์ล เขาจึงสามารถเปิดประตูสู่โลกใบใหม่ได้สำเร็จภายในเวลาเพียงสองถึงสามวินาที!", "ทั้งที่ยังหลับตา เขากลับมองเห็นโลกที่เต็มไปด้วยเวทมนตร์อันน่าเหลือเชื่อ ภายใต้การรับรู้ทางพลังจิต ลินน์สามารถมองเห็น ธาตุเวทมนตร์นับไม่ถ้วนที่เปล่งแสงเรืองรองอ่อนๆ ลอยอบอวลอยู่เต็มห้องได้อย่างชัดเจน", "พันล้าน หมื่นล้าน หรือแสนล้านกัน?", "ไม่สิ จำนวนมหาศาลของพวกมันไม่สามารถประเมินได้ด้วยตัวเลข พวกมันส่องประกายระยิบระยับราวกับหมู่ดาวในจักรวาลอันมืดมิด", "ธาตุส่วนใหญ่นั้นตื่นตัวมากและเปลี่ยนตำแหน่งอยู่ตลอดเวลา โดยธาตุที่มีปริมาณมากที่สุดมีชื่อเรียกว่า เซรู ซึ่งคิดเป็นสัดส่วนประมาณเจ็ดสิบเปอร์เซ็นต์ของทั้งหมด และถูกโครผู้เป็นอาจารย์ของเขาขนานนามว่าเป็นธาตุไร้ประโยชน์", "ภาพอันตระการตานี้ทำให้ลินน์รู้สึกประทับใจอย่างสุดซึ้ง กว่าเขาจะนึกขึ้นได้ว่าต้องรวบรวมสมาธิไปที่การใช้เวทมนตร์ก็กินเวลาไปพักใหญ่", "ขั้นตอนการร่ายเวทรวบรวมน้ำนั้นเรียบง่ายมาก เขาเพียงแค่ต้องสกัดธาตุสองชนิดที่เกี่ยวข้องกับน้ำออกมา แล้วหลอมรวมพวกมันเข้าด้วยกันในอัตราส่วนสองต่อหนึ่ง", "ธาตุชนิดแรกมีสัดส่วนค่อนข้างสูงในโลกแห่งธาตุ คือประมาณยี่สิบถึงสามสิบเปอร์เซ็นต์ ในขณะที่ธาตุชนิดที่สองนั้นหายากกว่าและต้องใช้ความพยายามเป็นพิเศษในการค้นหา", "ด้วยความหลงใหลในเวทมนตร์ของคาร์ล เวทพื้นฐานเหล่านี้จึงถูกฝึกฝนมาแล้วนับร้อยครั้งในอดีต รากฐานของเขาจึงมั่นคงมาก และลินน์ก็สามารถจับจุดได้อย่างรวดเร็วหลังจากรู้สึกติดขัดในตอนแรก", "ทว่ากระบวนการร่ายเวทกลับทำให้เขารู้สึกคุ้นเคยอย่างน่าประหลาด", "เมื่อลินน์ลืมตาขึ้นอีกครั้ง ทรงกลมน้ำขนาดเท่าลูกแก้วก็ลอยอยู่เหนือฝ่ามือของเขา โดยมีหัตถ์เวทคอยรองรับไว้", "“เยี่ยมมาก สำเร็จแล้ว!”", "ริมฝีปากของลินน์ยกยิ้มขึ้นเล็กน้อย ทว่าการที่เขาสูญเสียสมาธิไปชั่วขณะ ทำให้ลูกบอลน้ำนั้นแตกสลายและหยดไหลทะลุร่องนิ้วของเขาไป", "ราวกับถูกน้ำเย็นสาดเข้าอย่างจัง ลินน์รีบดึงตัวเองออกจากความปีติยินดีที่ร่ายเวทสำเร็จอย่างรวดเร็ว", "ในฐานะพ่อมดฝึกหัด เขายังคงถูกศาสนจักรตามล่าอยู่ เขาจะมามัวหลงระเริงกับความสำเร็จเพียงเล็กน้อยแค่นี้ได้อย่างไรกัน?", "ยังไม่ต้องพูดถึงเรื่องที่ว่า ลูกบอลน้ำขนาดเท่าลูกแก้วนี้แทบจะไร้ประโยชน์โดยสิ้นเชิงในการต่อสู้...", "มันยังไม่พอที่จะดับกระหายให้ศัตรูได้ด้วยซ้ำ!", "อย่างไรก็ตาม เขาเคยเห็นโครผู้เป็นอาจารย์ ใช้เวทรวบรวมน้ำเป็นพื้นฐานในการร่ายเวทระดับสองวงแหวนอย่าง เวทพายุใบมีดน้ำแข็ง ในการต่อสู้มาแล้ว", "ลูกบอลน้ำขนาดเท่ากำปั้นหลายสิบลูกควบแน่นขึ้นในพริบตา จากนั้นจึงแปรสภาพเป็นใบมีดน้ำแข็งทรงข้าวหลามตัดอันแข็งแกร่ง มันพุ่งเข้าใส่พวกโจรที่เข้ามาโจมตีราวกับฝูงตั๊กแตน", "เพียงการโจมตีแค่ครั้งเดียว ศัตรูที่เข้ามาจู่โจมก็ถูกกำราบจนราบคาบ!", "เมื่อนึกถึงเรื่องนี้ ลินน์จึงตั้งใจที่จะสัมผัสถึงโลกแห่งธาตุแล้วลองร่ายเวทอีกครั้ง", "บางทีอาจเป็นเพราะการหลอมรวมของความทรงจำหลังจากข้ามมิติมา พลังจิตของลินน์จึงมีมากกว่าของคาร์ลหลายเท่านัก อีกทั้งเขายังสามารถดึงพลังเวทมนตร์มาใช้ได้มากกว่าด้วย", "การใช้เวทรวบรวมน้ำเมื่อครู่นี้ ทำให้เขาสูญเสียพลังงานไปเพียงน้อยนิดจนแทบไม่ต้องใส่ใจ เขามีลางสังหรณ์ว่าตนเองสามารถทำอะไรได้มากกว่านี้", "ลินน์หลับตาลงและเข้าสู่โลกแห่งธาตุอย่างรวดเร็วอีกครั้ง คราวนี้เขาไม่รีบร้อนที่จะร่ายเวทรวบรวมน้ำ แต่กลับพยายามใช้พลังจิตของตนเพื่อกระตุ้นธาตุทุกชนิดที่เขาสามารถค้นพบได้รอบตัว"]}, {"t": "เวทมนตร์คือวิทยาศาสตร์! 2", "c": ["รูปลักษณ์ของธาตุเหล่านี้มีความหลากหลาย ซึ่งทำให้ลินน์รู้สึกคุ้นเคยอย่างบอกไม่ถูก บางธาตุก็หนักอึ้งอย่างเหลือเชื่อ เพียงแค่ขยับมันเล็กน้อยก็ทำเอาเขารู้สึกเหนื่อยล้าทางจิตใจไปหมด", "ขณะที่กำลังดื่มด่ำอยู่นั้น ลินน์ก็สังเกตเห็นปรากฏการณ์ประหลาดขึ้นมาอย่างกะทันหัน", "ธาตุที่ลอยอยู่เบื้องหน้ากำลังถูกดูดซับเข้าสู่ร่างกายของเขาด้วยความถี่ที่แปลกประหลาด ก่อนจะถูกขับออกมาอีกครั้ง หมุนเวียนเช่นนี้ซ้ำแล้วซ้ำเล่า", "‘งั้นร่างกายของพ่อมดก็ต้องดูดซับธาตุพวกนี้บ่อยๆ งั้นเหรอ?’", "คำถามนี้ผุดขึ้นมาในหัวของลินน์ ทว่าเมื่อสังเกตดูให้ดี เขากลับค้นพบความจริงที่น่าตกตะลึง เพราะปรากฏการณ์ที่ว่านี้...ชัดเจนเลยว่ามันเกิดจากการหายใจของเขาเอง...", "‘เดี๋ยวนะ...นี่มันก็แค่ออกซิเจนไม่ใช่เหรอ?’", "ลินน์ถึงกับอึ้งไปชั่วขณะพลางสูดลมหายใจลึก ภาพลักษณ์อันสูงส่งและลึกลับของธาตุเวทมนตร์ในสายตาของเขาก็พังทลายลงในพริบตา", "ก่อนหน้านี้ เขาไม่สามารถจดจำพวกมันได้ในทันทีเพราะเขาไม่ได้มองเห็นธาตุเหล่านี้ด้วยตาเปล่า แต่กำลังใช้วิธีการอันลี้ลับเพื่อรับรู้ถึงพวกมันผ่านพลังจิต จากนั้นจึงควบคุมพวกมันด้วยพลังเวท...", "ยิ่งไปกว่านั้น สัดส่วนของธาตุทางเคมีในอากาศของโลกใบนี้ยังแตกต่างจากโลกก่อนของเขาเล็กน้อย ลินน์จึงไม่ได้ฉุกคิดไปในทิศทางนั้นตั้งแต่แรก", "ทว่าเมื่อพิจารณาจากทฤษฎีนี้ กระบวนการดึงธาตุมาสร้างน้ำเมื่อครู่ก็สามารถอธิบายได้ในอีกมุมมองหนึ่งเช่นกัน", "น้ำคืออะไรน่ะหรือ?", "มันก็คือสารประกอบอนินทรีย์ที่เกิดจากไฮโดรเจนและออกซิเจนยังไงล่ะ!", "‘งั้นเมื่อกี้ฉันไม่ได้กำลังร่ายเวท แต่กำลังทำการทดลองทางเคมีอยู่งั้นเหรอ?’", "‘หรือว่าแท้จริงแล้วพ่อมดก็คือกลุ่มนักเคมีกันแน่?’", "ข้อสรุปนี้ทำให้ลินน์ชะงักไปชั่วครู่ ก่อนที่เขาจะรีบส่ายหน้าปฏิเสธ โลกใบนี้มีตัวตนเหนือธรรมชาติที่เรียกว่าพลังเวทอยู่ และจากการร่ายเวทเมื่อครู่ ดูเหมือนว่าพลังเวทจะสามารถควบคุมสสารได้ลึกซึ้งถึงระดับจุลภาค!", "หากไม่มีข้อจำกัดใดๆ พ่อมดก็คงไม่ต่างอะไรกับพระเจ้า!", "ตามทฤษฎีทางวิทยาศาสตร์ในชีวิตก่อนของเขา สสารทุกชนิดบนโลกล้วนประกอบขึ้นจากอะตอม หากพลังเวทสามารถแทรกแซงสสารได้ถึงระดับนั้น มันย่อมสามารถสร้างหรือทำลายล้างทุกสรรพสิ่งได้อย่างแน่นอน", "ลินน์จมดิ่งลงสู่ห้วงความคิดอย่างรวดเร็ว เขาตระหนักได้อย่างเฉียบคมว่า ความรู้ด้านเคมีและฟิสิกส์จากชีวิตก่อนจะน่าสะพรึงกลัวเพียงใดหากนำมาผสานเข้ากับเวทมนตร์!", "หากทฤษฎีทางวิทยาศาสตร์ในชีวิตก่อนสามารถสร้างสรรค์เครื่องจักรกลต่างๆ เพื่อพลิกโฉมโลกใบนั้นได้ พ่อมดก็ย่อมสามารถเปลี่ยนทฤษฎีเหล่านั้นให้กลายเป็นเวทมนตร์ได้โดยตรง เพื่อปลดปล่อยพลังอำนาจอันมหาศาล!", "ลินน์ยื่นมือออกไปข้างหน้าอีกครั้ง ไฮโดรเจนและออกซิเจนในอากาศรอบตัวถูกสกัดแยกออกมา ก่อนจะควบแน่นกลายเป็นลูกบอลน้ำขนาดเล็กลอยอยู่เหนือฝ่ามือของเขา", "ทว่าคราวนี้ ลินน์ไม่ได้หยุดความพอใจไว้เพียงแค่นั้น หากสมมติฐานของเขาถูกต้อง กุญแจสำคัญของเวทระดับหนึ่งวงแหวนอย่างเวทใบมีดน้ำแข็ง ก็คือการเปลี่ยนสถานะของน้ำจากของเหลวให้กลายเป็นของแข็ง เพื่อเพิ่มอานุภาพในการสังหาร!", "และเพื่อที่จะทำเช่นนั้นได้ เขาจำเป็นต้องลดอุณหภูมิของน้ำลง...", "ลินน์หวนนึกถึงบทเรียนวิชาฟิสิกส์ในโลกก่อน ยิ่งโมเลกุลของวัตถุเคลื่อนที่เร็วเท่าใด อุณหภูมิของมันก็จะยิ่งสูงขึ้นเท่านั้น ในทางกลับกัน หากโมเลกุลเคลื่อนที่ช้าลง อุณหภูมิก็จะยิ่งลดต่ำลง...", "หรือพูดอีกอย่างก็คือ เขาจำเป็นต้องหน่วงการเคลื่อนที่ของโมเลกุลน้ำให้ช้าลง!", "เพียงแค่ปรายความคิด โมเลกุลของน้ำที่กำลังตื่นตัวอย่างหนักในฝ่ามือของลินน์ก็เริ่มเคลื่อนที่ช้าลงภายใต้อิทธิพลของพลังเวท พวกมันเกาะกลุ่มควบแน่นเข้าด้วยกันอย่างหนาแน่น และแทบจะในพริบตาเดียว ลูกบอลน้ำขนาดเล็กก็จับตัวแข็งกลายเป็นผลึกน้ำแข็งอันใสกระจ่าง", "ขณะที่ลินน์กำลังตื่นเต้นยินดีที่สมมติฐานของตนกลายเป็นความจริง จู่ๆ ก็มีเสียงแจ้งเตือนดังขึ้นในหัวของเขา", "“ตรวจพบพลังงานพิเศษ...ไม่ทราบแหล่งที่มา ไม่มีประวัติในฐานข้อมูล คุณต้องการสร้างแฟ้มข้อมูลที่เกี่ยวข้องหรือไม่?”", "ลินน์ชะงักงันไปในตอนแรก ก่อนที่ใบหน้าของเขาจะแปรเปลี่ยนเป็นความตื่นตะลึงอย่างไม่อยากจะเชื่อในวินาทีต่อมา", "เขาคุ้นเคยกับน้ำเสียงนี้เป็นอย่างดี", "‘แต่ฉันทะลุมิติมาไม่ใช่เหรอ? ในเมื่อร่างกายก็เปลี่ยนไปแล้ว ชิปปัญญาประดิษฐ์สนับสนุนที่เคยฝังไว้ก็ไม่น่าจะหลงเหลืออยู่อีกสิ...’", "“071 นายรู้ไหมว่าพวกเราทะลุมิติมาที่นี่ได้ยังไง? มีบันทึกเหตุการณ์อยู่ในระบบบ้างไหม?”", "ลินน์เอ่ยถามอย่างร้อนรน", "“ระบบหยุดทำงานและรีสตาร์ตใหม่ด้วยสาเหตุที่ไม่แน่ชัด ทำให้ไม่มีบันทึกข้อมูลดังกล่าว”", "ระบบตอบกลับ", "ลินน์ขมวดคิ้วด้วยความผิดหวังเล็กน้อย แต่เขาก็รีบดึงสติกลับมาและเอ่ยถามอีกครั้ง", "“พลังงานที่เหลืออยู่ของนายสามารถหล่อเลี้ยงการทำงานได้อีกนานแค่ไหน?”", "ในเมื่อเขาหลุดเข้ามายังต่างโลกแห่งนี้ และต้องเผชิญกับความเสี่ยงที่จะถูกตามล่าอยู่ตลอดเวลา ลินน์ก็มีเพียงต้องดิ้นรนหาวิธีเอาชีวิตรอดให้ได้", "การมีปัญญาประดิษฐ์สนับสนุนติดตัวมาด้วยถือเป็นเรื่องน่ายินดีอย่างคาดไม่ถึง แม้ว่าตามพระราชบัญญัติแก้ไขเพิ่มเติมของสหพันธรัฐ ชิปสนับสนุนส่วนบุคคลจะถูกจำกัดขีดความสามารถด้านสติปัญญาเอาไว้ แต่ด้วยความที่ในโลกก่อนเขาเป็นถึงผู้เชี่ยวชาญด้านการจัดเก็บข้อมูล 071 จึงบันทึกข้อมูลทางเทคโนโลยีจากโลกเก่าเอาไว้มากมาย...", " างรวดเร็วภายใต้การบีบอัดของพลังเวท", "หากสิ่งที่เขาคิดถูกต้อง นั่นก็หมายความว่าเขามีแนวโน้มที่จะสามารถใช้วัสดุไวไฟชนิดอื่นมาร่ายเวทบทนี้ได้...", "‘071 ค้นหาวิธีการผลิตและวิธีการใช้งานฟอสฟอรัสขาวที...’", "ลินน์สั่งการในใจเงียบๆ", "ฟอสฟอรัสขาวเป็นสารลักษณะคล้ายขี้ผึ้งกึ่งโปร่งใส ไม่มีสีหรือมีสีเหลืองอ่อน มีฤทธิ์ระคายเคืองรุนแรงและมีจุดวาบไฟต่ำ เมื่อใดที่สัมผัสกับออกซิเจน มันจะลุกไหม้อย่างรุนแรง โดยมีอุณหภูมิสูงกว่า 1,000 องศาเซลเซียส...", "สิ่งที่น่าสะพรึงกลัวยิ่งกว่านั้นก็คือ เปลวไฟจากฟอสฟอรัสขาวนั้นดับยากและมีความเหนียวติดแน่น หากมันสัมผัสกับร่างกายมนุษย์ มันจะลุกไหม้ทะลุผิวหนังและกล้ามเนื้อลึกลงไปถึงกระดูกอย่างรวดเร็ว อีกทั้งก๊าซที่เกิดจากการเผาไหม้ยังเป็นพิษร้ายแรงอีกด้วย", "ในชีวิตก่อน ขณะที่ทำหน้าที่เป็นเจ้าหน้าที่จัดเก็บข้อมูล ลินน์เคยเห็นภาพเหตุการณ์ที่สหพันธรัฐปล่อยระเบิดฟอสฟอรัสขาวรุ่นใหม่ มันเป็นฉากอันน่าสยดสยองที่จะตราตรึงอยู่ในความทรงจำของเขาไปตลอดกาล", "วินาทีที่ขีปนาวุธระเบิดกลางอากาศ ห่าฝนเพลิงก็สาดกระจายไปทั่วท้องฟ้า จุดชนวนทะเลเพลิงที่ไม่มีวันดับมอดกินอาณาเขตไกลหลายกิโลเมตร", "อุณหภูมิที่ร้อนระอุจนแผดเผาธรรมชาติที่ไม่อาจดับมอดได้ และความเป็นพิษอันน่าสะพรึงกลัว ทำให้แม้แต่ผู้ที่หลบซ่อนอยู่ในบังเกอร์ก็ยากที่จะรอดพ้นจากความตาย", "เนื่องจากระเบิดฟอสฟอรัสขาวนั้นน่ากลัวเกินไป พวกมันจึงถูกจัดประเภทให้เป็นอาวุธต่อต้านมนุษยชาติและถูกสั่งห้ามใช้มาตั้งแต่ศตวรรษที่แล้ว สหพันธรัฐทำได้เพียงลอบวิจัยพวกมันอย่างลับๆ เท่านั้น...", "อย่างไรก็ตาม กระบวนการผลิตฟอสฟอรัสขาวนั้นไม่ได้ซับซ้อนเลย ปัญญาประดิษฐ์สนับสนุนมีบันทึกรายละเอียดเอาไว้อย่างครบถ้วน ตราบใดที่เขาสามารถหาวัตถุดิบพบ ต่อให้ไม่มีเครื่องไม้เครื่องมือ เขาก็ยังมีวิธีสร้างมันขึ้นมาได้", "ขณะที่ลินน์กำลังครุ่นคิดถึงเรื่องนี้ เสียงทุบประตู ก็ดังมาจากเบื้องหลังอย่างกะทันหัน", "สีหน้าของลินน์แปรเปลี่ยนไปอย่างรุนแรง", "ตอนนี้เขากำลังซ่อนตัวอยู่ในสลัมของอาณาเขตนอร์ดแลนด์ ภายใต้สถานการณ์ปกติ ย่อมไม่มีใครเข้ามารบกวนเขาแน่", "เว้นเสียแต่ว่า...พวกนักล่าแม่มดแห่งศาลพิพากษาได้มาถึงแล้ว!"]}, {"t": "นักล่าแม่มดเบลน", "c": ["ยามเย็น ณ จักรวรรดิเซคัส บริเวณรอบนอกสลัมแห่งอาณาเขตนอร์ดแลนด์ ก็ได้มีแขกที่ไม่ได้รับเชิญสองคนมาเยือน", " ุดลอยออกจากร่าง เฝ้ามองดูโลกใบนี้ด้วยสภาวะอันแปลกประหลาด", "พลังจิตของลินน์ที่เคยกะจัดกระจาย มันกับแผ่ขยายออกไปราวกับระลอกคลื่น และการรับรู้ถึงธาตุต่างๆ ของเขาก็ชัดเจนยิ่งขึ้นเรื่อยๆ...", "...", "“ผมสีน้ำตาล ตาสีดำ ดูเหมือนว่าเราจะหาเจอถูกคนแล้วนะ”", "เมื่อเห็นว่าแอนเดรสามารถสยบเป้าหมายได้อย่างง่ายดาย เบลนก็คลายมือออกจากด้ามดาบ พลางปรายตามองลินน์อยู่สองสามครั้ง", "“เก่งใช้ได้เลยนี่ เจ้าหนูน้อย ในเมื่อแกซ่อนตัวเก่งนัก งั้นก็ขอตัดมือกับขาออกสักข้างละกัน...”", "แอนเดรกล่าวพร้อมกับรอยยิ้มเหี้ยมเกรียม พลางใช้มือซ้ายแตะคราบเลือดบนลำคอของตน", "ไม่รู้ว่าเป็นเพราะภาพลวงตาหรือไม่ แต่แอนเดรเริ่มรู้สึกว่าหายใจลำบากขึ้นเรื่อยๆ และความโกรธก็พลุ่งพล่านขึ้นมาอย่างต่อเนื่อง", "และถ้าไม่ใช่เพราะคิดว่าจับเป็นได้ราคาดีกว่าจับตาย แอนเดรคงฆ่าลินน์ทิ้งไปแล้ว", "สำหรับข้อเสนออันโหดเหี้ยมของคู่หู เบลนนั้นไม่ได้รู้สึกแปลกใจอะไร แต่ก็เอ่ยเตือนด้วยน้ำเสียงเรียบเฉย", "“ตัดแค่มือก็พอ ไม่งั้นนายต้องมานั่งคิดหาวิธีแบกมันกลับไปอีก แล้วก็ทำแผลให้สะอาดด้วยล่ะ อย่าให้มันเลือดหมดตัวตายระหว่างทางซะก่อน!”", "แอนเดรที่หันหลังให้เบลนไม่สามารถตอบสนองได้ ใบหน้าของเขาเปลี่ยนเป็นสีม่วงคล้ำ มีดดาบยาวในมือซ้ายร่วงหล่นลงพื้นเสียงดัง การหายใจที่เคยปั่นป่วนอยู่แล้วกลับยิ่งยากลำบากขึ้นไปอีก ตอนนี้เขาดูเหมือนปลาที่ขาดน้ำ รู้สึกราวกับว่าปอดกำลังจะระเบิด", "เมื่อสิบปีก่อน ตอนที่เขาถูกกระแสน้ำวนขนาดยักษ์กลืนกินในทะเลหมอก แอนเดรเคยสัมผัสกับความรู้สึกหอบหายใจไม่ออกและปรารถนาความตายเช่นนี้มาแล้ว การได้หายใจถือเป็นความหรูหรา หากไม่ใช่เพราะโชคช่วย เขาคงได้ไปนอนพักผ่อนอยู่ก้นทะเลแล้ว", "แต่ตอนนี้ เขาไม่ได้อยู่ใต้ทะเลลึกเสียหน่อย และการโจมตีเมื่อครู่ก็ไม่ได้ดูเหมือนว่าจะตัดหลอดลมของเขาเลยด้วยซ้ำ...", "แอนเดรอ้าปากฮุบอากาศ ทว่าอาการของเขากลับไม่ดีขึ้นเลยแม้แต่น้อย มิหนำซ้ำยังแย่ลงไปอีก ดวงตาสีเทาของเขาเบิกโพลงจนแทบจะถลนออกจากเบ้า", "นี่มันเวทมนตร์บ้าอะไรกัน?", "แอนเดรตระหนักได้ทันทีว่าพ่อมดฝึกหัดตรงหน้ากำลังเล่นตุกติก แต่ปฏิกิริยาขาดอากาศหายใจอย่างรุนแรงทำให้เขาหมดโอกาสที่จะตอบโต้ แรงบีบที่คอของลินน์เริ่มอ่อนลง", "ในเวลาเดียวกันนั้น ลินน์ที่กำลังก้มหน้าอยู่ก็ขยับตัวกะทันหัน ดวงตาที่หลับแน่นเบิกโพลงขึ้น และในวินาทีนั้น ดาบสั้นก็ องแล้ว", "“แล้วข้าก็ไม่เชื่อด้วยว่าศาสนจักรจะยอมให้พ่อมดไปเป็นนักล่าแม่มดแถมยังมอบอาวุธให้แบบนี้...”", "ลินน์สวนกลับโดยไม่รอให้คนเหล่านั้นดึงสติกลับมาได้", "บัคถึงกับพูดไม่ออก ศาสนจักรมักจะใช้นโยบาย", "‘ยอมฆ่าคนผิดดีกว่าปล่อยให้พ่อมดรอดไปได้’", "อยู่เสมอ การปล่อยให้พ่อมดที่ถูกปีศาจครอบงำ กลายมาเป็นนักล่าแม่มดนั้นถือเป็นการลบหลู่สิ่งศักดิ์สิทธิ์...", "พ่อมดฝึกหัดคนอื่นๆ ก็เห็นได้ชัดว่าเข้าใจในจุดนี้เช่นกัน ความเป็นปรปักษ์ที่มีต่อลินน์จึงลดน้อยลงไปบ้าง", "จอห์นนี่ยังคงไม่ลดการป้องกันตัวลง ทว่านางกลับหันไปมองหนึ่งในคนที่เหลือแล้วเอ่ยถาม", "“เจ้าลาดตระเวนดูรอบๆ หรือยัง ไป๋เก๋อ?”", "“ไม่มีใครล้อมพวกเรา...”", "คนพูดหดตัวกลับเข้าไปในชุดคลุมสีดำ พลางตอบกลับด้วยน้ำเสียงหวาดหวั่น", "เมื่อได้รับคำตอบที่ชัดเจน ในที่สุดจอห์นนี่ก็หันกลับมาขอโทษลินน์", "“ข้าขอโทษจริงๆ นะคาร์ล สถานการณ์มันกำลังตึงเครียด พวกเราจำเป็นต้องรอบคอบเอาไว้ก่อน”", "“งั้นเจ้ากำลังจะบอกว่า เจ้าแค่สงสัยข้า และเตรียมพร้อมจะลงมือทั้งที่ไม่มีหลักฐานอะไรเลยงั้นสิ?”", "ลินน์ตั้งคำถาม", "“ข้ารับรองได้ว่าเวทมนตร์นั่นเป็นแค่การทดสอบ ไม่มีใครตั้งใจจะทำร้ายสหายของตัวเองหรอกนะ!”", "จอห์นนี่อธิบายอย่างจริงจัง", "ลินน์จ้องมองลึกลงไปในดวงตาสีฟ้าของหญิงสาว เขาไม่เห็นความหลุกหลิกหรือคำโกหกซ่อนอยู่ในนั้นเลย แต่เขาสัมผัสได้ถึงอันตรายจริงๆ ในระหว่างการโจมตีก่อนหน้านี้", "เมื่อพิจารณาว่าความสงสัยในตัวเขายังไม่ถูกลบล้างไปจนหมดสิ้น และความรู้สึกส่วนตัวก็ไม่ใช่สิ่งที่จะพึ่งพาได้ร้อยเปอร์เซ็นต์ ลินน์จึงเลือกที่จะไม่เปิดเผยเรื่องนี้ออกมาตรงๆ", "ในบรรดาพ่อมดฝึกหัด เขาเป็นคนที่ติดตามโครมาสั้นที่สุด และเป็นคนที่น่าไว้วางใจน้อยที่สุด!", "หลังจากนิ่งเงียบไปครู่หนึ่ง ลินน์ก็ข่มความไม่พอใจเอาไว้แล้วเอ่ยถามอีกครั้ง", "“เกิดอะไรขึ้นงั้นหรือ? ข้าต้องการคำอธิบาย...”"]}, {"t": "ดินแดนพ่อมด – กรีนรีล 2", "c": ["“ตามข้ามาก่อน ที่นี่ไม่ใช่ที่สำหรับคุยกัน การต่อสู้เมื่อครู่อาจทำให้พวกเราถูกเปิดเผยตำแหน่งแล้ว”", "จอห์นนี่กล่าวด้วยน้ำเสียงรู้สึกผิดพลางปรายตามองลินน์ จากนั้นก็กวักมือเรียกให้ทุกคนกลับไปยังที่พักแรมภายใต้ความมืดมิดของยามราตรี", "เมื่อดวงจันทร์เต็มดวงลอยเด่นอยู่กลางฝากฟ้า หมู่บ้านร้างที่หลงเหลือเพียงซากปรักหักพังก็ปรากฏขึ้นเบื้องหน้าสายตาของลินน์", "“หมู่บ้านแห่งนี้ถูกสังหารหมู่และทำลายล้างโดยกลุ่มทหารรับจ้างที่ลอบเร้นเข้ามาในช่วงสงครามพิชิตดินแดนครั้งล่าสุด ซึ่งนำโดยดยุกแห่งนอร์ดแลนด์ ตอนนี้ นอกจากพวกเราแล้ว ที่นี่ก็เหลือเพียงสัตว์ป่าไม่กี่ตัวเท่านั้น”", "จอห์นนี่ถอนหายใจ ก่อนจะกระซิบสบถ", "“ขุนนางบัดซบ ศาสนจักรบัดซบ สงครามเฮงซวย!”", "ลินน์มองจอห์นนี่ด้วยแววตาประหลาดใจเล็กน้อย เขาไม่ได้แปลกใจกับสิ่งที่หญิงสาวพูด เขาแค่คิดว่าเกือบทุกคนที่นี่น่าจะสืบเชื้อสายมาจากชนชั้นขุนนางกันทั้งนั้น การพูดแบบนั้นออกมามันจะดีจริงๆ งั้นหรือ?", "แม้นางจะมีความคับแค้นใจต่อพวกขุนนางอย่างอธิบายไม่ได้ แต่จอห์นนี่ก็ยังคงเลือกที่จะตั้งฐานที่มั่นชั่วคราวของพวกเขากันในคฤหาสน์ของขุนนางอยู่ดี", "คฤหาสน์หลังใหญ่ที่ถูกทำลายย่อยยับด้วยภัยสงคราม ไม่หลงเหลือเค้าความรุ่งโรจน์ในอดีตอีกต่อไป ตัวคฤหาสน์หลักดูราวกับจะพังทลายลงมาได้ทุกเมื่อ รายล้อมไปด้วยซากปรักหักพังและกำแพงที่พังทลาย", "สภาพภายในก็ไม่ได้ดีไปกว่ากันนัก หยักไย่เกาะเต็มกำแพงที่หลุดร่อน เก้าอี้ที่ล้มระเนระนาดถูกปกคลุมไปด้วยฝุ่นหนาเตอะ และสถานที่แห่งนี้ก็เหม็นคลุ้งไปด้วยกลิ่นอายของความเสื่อมโทรม", "อย่างไรก็ตาม เนื่องจากที่นี่เคยเป็นที่อยู่อาศัยของขุนนาง คฤหาสน์หลักอันกว้างใหญ่จึงเปรียบเสมือนปราสาทขนาดย่อมที่ถูกออกแบบมาเพื่อรับมือกับสงคราม มันมีป้อมยามสองสามแห่ง และยังมีระบบระบายน้ำที่เป็นเอกเทศ ซึ่งหมายความว่าพวกเขาไม่จำเป็นต้องกังวลเรื่องแหล่งน้ำเลยหากหลบซ่อนตัวอยู่ที่นี่", "เมื่อก้าวเข้ามาในคฤหาสน์ ในไม่ช้าลินน์ก็มองเห็นพ่อมดฝึกหัดที่ประจำการอยู่ที่นั่น บาร์ตัน!", "เมื่อเทียบกับพี่ชายร่างบึกบึนอย่างบัคแล้ว บาร์ตันแทบจะเป็นขั้วตรงข้ามอย่างสิ้นเชิง เขามีรูปร่างผอมโซจนดูราวกับว่าจะปลิวไปตามสายลมได้ทุกเมื่อ", "หลังจากช่วยกันขนเศษซากสิ่งของไปขวางประตูและปิดผนึกมันอีกครั้ง จอห์นนี่ก็ชิงพูดขึ้นก่อนที่ลินน์จะทันได้เอ่ยถามคำถามใดๆ", "“เคนท์ตายแล้ว!”", "‘เคนท์คือใครกัน?’", "ลินน์ชะงักไปชั่วครู่ พลางค้นหาข้อมูลในความทรงจำ ก่อนจะนึกขึ้นได้ว่าเคนท์คือศิษย์คนที่สามของโคร และเป็นพ่อมดฝึกหัดเพียงคนเดียวที่ไม่ได้อยู่ที่นี่ เขาไม่คาดคิดมาก่อนเลยว่าหมอนั่นจะตายไปเสียแล้ว", "\"ในวันเดียวกันกับที่อาจารย์ของเราถูกศาสนจักรจับกุม ทหารยามของอาณาเขตนอร์ดแลนด์ก็บุกเข้าค้นแหล่งกบดานของเคนท์ หลังจากนั ลายปี เขาสร้างชื่อเสียงให้กับตัวเองได้อย่างมาก จนกระทั่งได้รับบาดเจ็บที่ขาจากการปล้นเรือสินค้า ทำให้เขาต้องแกล้งตายเพื่อเอาชีวิตรอด", "ทว่าเหตุการณ์ในครั้งนั้นกลับพลิกผันโชคชะตาของลอดด์ หลังจากการต่อสู้อันดุเดือดที่ผู้นำโจรสลัดส่วนใหญ่เสียชีวิตลง ลอดด์ก็ก้าวขึ้นเป็นผู้นำโจรสลัดคนใหม่อย่างส้มหล่น", "ทว่า แทนที่จะใช้ชีวิตปล้นสะดมต่อไป เขากลับหันมาทำธุรกิจที่ถูกกฎหมาย และปัจจุบันเขาก็ได้เข้าควบคุมการค้าสุราในเมืองอูเออร์และท่าเรือทั้งหมด นั่นทำให้เขากลายเป็นผู้มีอิทธิพลท้องถิ่นรายใหญ่ที่สุดในแถบตะวันตกของอาณาเขตนอร์ดแลนด์", "เมื่อนึกถึงข่าวลือต่างๆ ในเมือง ลินน์ก็ตระหนักได้ทันทีว่า ธุรกิจการค้าสุราของลอดด์เป็นเพียงแค่ฉากบังหน้า และธุรกิจที่แท้จริงของมันก็คือการเป็นตัวกลางคอยรักษาสายสัมพันธ์ระหว่างดินแดนพ่อมดและโลกภายนอกต่างหาก", "“สรุปก็คือ พวกเราต้องรีบกันหน่อย เพราะเส้นทางสู่ดินแดนพ่อมดจะเปิดออกเพียงชั่วครู่เฉพาะในวันแห่งแสงจันทร์เท่านั้น”", "จอห์นนี่ชักดาบยาวของนางออกมาอย่างรวดเร็ว และเริ่มร่างตำแหน่งของเมืองอูเออร์กับท่าเรือลงบนพื้น พร้อมกับขีดเขียนเส้นทางของพวกเขาด้วยปลายดาบ", "“พวกเราจะออกเดินทางกันในเช้าตรู่วันพรุ่งนี้ โดยใช้วิธีอ้อมผ่านภูเขาโคเดซัว และไม่น่าจะดึงดูดความสนใจมากนัก อิงจากตำแหน่งของดวงดาว วันแห่งแสงจันทร์ในปีนี้จะกินเวลาถึงห้าวัน เพราะฉะนั้นพวกเรามีเวลาเหลือเฟือ!”", "จอห์นนี่ร่างแผนการคร่าวๆ ออกมา เมื่อเห็นว่าลินน์และคนอื่นๆ จดจำมันได้แล้ว นางก็ร่ายเวทลูกไฟเพื่อเผาทำลายแผนที่ที่วาดไว้นั้นทิ้งเสีย", "“สำหรับคืนนี้ก็พอแค่นี้แหละ!”", "ท่ามกลางแสงไฟที่สว่างวาบ จอห์นนี่มองไปรอบๆ ทุกคนแล้วกล่าวเสริม", "“ไป๋เก๋อ คืนนี้เจ้าอยู่ยามนะ ส่วนพรุ่งนี้ คาร์ลจะเป็นคนแบกเจ้าเดินทางเอง”", "‘ทำไมต้องเป็นฉันด้วยเนี่ย?’", "ลินน์ลูบจมูกตัวเองพลางรู้สึกหงุดหงิดอย่างบอกไม่ถูก นี่พวกเขากำลังกลั่นแกล้งเด็กใหม่กันอยู่ชัดๆ เลยไม่ใช่หรือไง?"]}, {"t": "ลินน์: เรื่องนี้ฉันรู้!", "c": ["หลังจากต้องเร่งเดินทางมาตลอดทั้งคืน ทุกคนที่อยู่ที่นี่ต่างก็เหนื่อยล้าจนแทบหมดแรง ทันทีที่จอห์นนี่กล่าวจบ แต่ละคนก็แยกย้ายกันไปพักผ่อน", "แน่นอนว่าลินน์เองก็ไม่มีข้อยกเว้น เขาเลือกห้องที่ดูพอดูได้ห้องหนึ่ง ผลักบานประตูที่พังเสียหายให้ปิดลง แล้วล้มตัวลงนอนบนเตียงไม้ที่เต็มไปด้วยฝุ่นโดยไม่สนใจความสกปรกใดๆ", "ตลอดสัปดาห์ที่ผ่านมานับตั้งแต่ที่เขาทะลุมิติมา ประสาทสัมผัสของลินน์ก็ตึงเครียดมาโดยตลอด เขาแทบจะต้องนอนลืมตาข้างหนึ่งด้วยความหวาดระแวงว่าพวกทหารอาจจะบุกเข้ามาฆ่าเขาได้ทุกเมื่อ แต่ตอนนี้ ในที่สุดเขาก็สามารถผ่อนคลายลงได้บ้างแล้ว", "‘กรีนรีล...’", "ลินน์พึมพำถึงดินแดนพ่อมดที่จอห์นนี่พูดถึง แตกต่างจากวิลและคนอื่นๆ ที่มีท่าทีสงสัย เขาไม่ได้รู้สึกแปลกใจเลยที่กลุ่มพ่อมดผู้มีพลังเวทจะรวมตัวกันเพื่อยึดครองดินแดนสักแห่ง และหมกมุ่นอยู่กับการศึกษาเวทมนตร์", "อันที่จริง เขาคิดว่ามันเป็นเรื่องที่ปกติมากเสียด้วยซ้ำ ในทางกลับกัน ศาสนจักรและหลักเทววิทยาทางศาสนาของพวกมันต่างหาก ที่ดูแปลกประหลาดอย่างเหลือเชื่อสำหรับเขา", "สำหรับลินน์ การเดินทางไปยังดินแดนพ่อมดถือเป็นทางเลือกที่ยอดเยี่ยมอย่างไม่ต้องสงสัย ในสถานที่ที่ให้คุณค่ากับเวทมนตร์และความรู้ เขาจะสามารถใช้ประโยชน์จากข้อได้เปรียบของตนเองได้อย่างเต็มที่ โดยไม่ต้องกังวลว่าจะถูกจับกุมตัวในสักวันหนึ่ง", "ภายในจักรวรรดิเซคัสซึ่งถูกควบคุมโดยศาสนจักร เขาคงไม่สามารถหาสถานที่ที่สงบสุขเพื่อทำฟาร์มและพัฒนาเทคโนโลยีได้อย่างแน่นอน", "หากพระผู้เป็นเจ้าเสด็จลงมาจุติจริงๆ เขาคงไม่มีที่ไหนให้ไปร้องเรียน ต่อให้เขาสร้างอาวุธปฏิสสารขึ้นมาได้ก็อาจจะแก้ไขอะไรไม่ได้เลย...", "เมื่อชั่งน้ำหนักข้อดีและข้อเสียแล้ว ลินน์ก็ล้มเลิกความคิดที่จะเดินทางเพียงลำพังไปชั่วคราว ทว่าความกังวลบางอย่างก็ยังคงวนเวียนอยู่ในหัวของเขา", "เขาไม่คิดว่าสัมผัสแห่งอันตรายที่เขารู้สึกได้ในป่าทึบก่อนหน้านี้จะเป็นเพียงภาพลวงตา", "จอห์นนี่ ไป๋เก๋อ วิล บัค บาร์ตัน...ภาพของคนเหล่านี้ฉายวาบขึ้นมาในหัวของลินน์ทีละคน", "ในช่วงหกเดือนนับตั้งแต่ที่เขากลายมาเป็นพ่อมดฝึกหัด ความสัมพันธ์ของเขากับคนกลุ่มนี้ค่อนข้างตื้นเขิน และไม่เคยมีความบาดหมางใดๆ ต่อกัน ดังนั้นเขาจึงสามารถตัดความเป็นไปได้เรื่องความแค้นส่วนตัวออกไปได้เลย", "แล้วใครกันล่ะที่เป็นผู้ลงมือลอบโจมตี?", "ลินน์ครุ่นคิด และคนแรกที่เขาตัดออกก็คือจอห์นนี่", "ไม่ใช่เพราะความรู้สึกดีๆ ที่หลงเหลืออยู่จากเจ้าของร่างเดิมหรอกนะ แต่เป็นเพราะนางคือคนที่มีพิรุธน้อยที่สุดต่างหาก", "ในฐานะผู้นำอย่างไม่เป็นทางการของเหล่าพ่อมดฝึกหัด และเป็นผู้เสนอแผนการหลบหนี หากนางยอมจำนนต่อศาสนจักร เขาก็คงต้องรีบหนีเอาตัวรอดไปแล้ว", "คนต่อไปคือไป๋เก๋อ ควา ้กับลินน์ บนหน้าปกมีตัวอักษรเขียนหวัดๆ ด้วยภาษากลางว่า [หนังสือทฤษฎีเวทมนตร์พื้นฐาน]", "ลินน์รับมันมาด้วยความอยากรู้อยากเห็น หนังสือเล่มนี้ทำมาจากกระดาษปาปิรัสเนื้อหยาบ เมื่อเปิดไปที่หน้าแรก เวทมนตร์บทแรกที่ถูกบันทึกไว้ก็คือ เวทศรเวทมนตร์", "เช่นเดียวกับเวทแยกแยะวัสดุพื้นฐาน ศรเวทมนตร์ถูกจัดอยู่ในหมวดหมู่พิเศษของเวทระดับศูนย์วงแหวน ซึ่งมีอานุภาพน้อยกว่าเวทใบมีดน้ำแข็งและเวทลูกไฟ แต่ข้อดีของมันก็คือ ศรเวทมนตร์เป็นการก่อตัวของพลังเวทบริสุทธิ์ จึงไม่ต้องใช้วัสดุเวทมนตร์ที่เตรียมไว้ล่วงหน้า และไม่มีขีดจำกัดในการควบคุม", "ในทางทฤษฎี ตราบใดที่มีพลังเวทมากพอ การสร้างศรเวทมนตร์นับร้อยดอกในคราวเดียวก็ไม่ใช่เรื่องที่เป็นไปไม่ได้", "แน่นอนว่าปริมาณที่มากเกินไปก็ไร้ประโยชน์ สมาธิของพ่อมดทุกคนล้วนมีขีดจำกัด สำหรับพ่อมดฝึกหัด การสามารถสร้างและควบคุมศรเวทสักสองสามดอกเพื่อใช้โจมตีก็ถือเป็นขีดจำกัดสูงสุดของพวกเขาแล้ว มิฉะนั้นพวกเขาอาจจะเสียสมาธิได้ง่ายๆ ในระหว่างการต่อสู้", "แต่มันก็มีทางแก้ปัญหาอยู่", "เมื่อพลิกดูหนังสือ ลินน์ก็พบว่าหน้าที่สองของหนังสือทฤษฎีเวทมนตร์พื้นฐานนั้นเต็มไปด้วยแผนภาพเส้นโค้งมากมาย พร้อมกับสัญลักษณ์หลายตัวที่ดูคล้ายกับของเฮลรามอยู่ด้านล่าง", "หลังจากศึกษารายละเอียดอยู่ครู่หนึ่ง ลินน์ก็พอจะเข้าใจคร่าวๆ ถึงสิ่งที่มันพยายามจะสื่อ", "เพื่อทำลายขีดจำกัดในการควบคุมศรเวทมนตร์ ผู้ใช้จะต้องสร้างภาพสามมิติโดยมีตนเองเป็นศูนย์กลางขึ้นมาในหัว และกำหนดเส้นทางการบินของศรเวทมนตร์เอาไว้ล่วงหน้า", "เส้นทางการบินสามารถเป็นได้ทั้งเส้นตรงหรือเส้นโค้ง ซึ่งหมายความว่าผู้ร่ายเวทจะสามารถสร้างศรเวทมนตร์ได้จำนวนมาก เพื่อก่อตัวเป็นห่าฝนกระสุนเวทที่โหมกระหน่ำโจมตีจากหลากหลายทิศทางและมุมองศา จนยากที่จะต้านทานได้", "สิ่งนี้จำเป็นต้องใช้สมการเส้นตรงและเส้นโค้งในปริภูมิสามมิติ...", "ลินน์ลูบคางพลางคิด ปัญหานี้ดูเหมือนจะไม่ใช่เรื่องยากอะไรนัก...", "เนื่องจากศรเวทมนตร์คือสิ่งก่อสร้างจากพลังเวทบริสุทธิ์ มันจึงได้รับผลกระทบจากแรงโน้มถ่วงเพียงเล็กน้อย สิ่งที่ต้องนำมาคำนวณจึงมีเพียงแค่แรงเฉื่อยและความเร็วลมเท่านั้น", "เมื่อเห็นว่าลินน์ให้ความสนใจกับหน้ากระดาษเหล่านั้นอย่างจริงจัง จอห์นนี่ก็อดไม่ได้ที่จะเอ่ยเตือน", "“นี่คือสูตรสมการเวทมนตร์ที่ถูกคิดค้นขึ้นโดยจอมเวทผู้ยิ่งใหญ่เฮลราม ซึ่งช่วยเพิ่มอานุภาพให้กับศรเวทมนตร์ให้สูงขึ้นไปอีกขั้น อย่างไรก็ตาม ตอนนี้มันยังยากเกินไปสำหรับพวกเรา เจ้าไม่ควรเสียพลังงานไปกับมันมากนักหรอก”", "“ข้าจะระวัง”", "ลินน์ตอบกลับอย่างลื่นไหล พร้อมกับปิดหนังสือลงเมื่อแน่ใจแล้วว่าสิ่งที่ตนคิดนั้นถูกต้อง", "จอห์นนี่เห็นท่าทีไม่ค่อยใส่ใจของลินน์แล้วก็ได้แต่ส่ายหน้าอย่างอ่อนใจ เมื่อตอนที่นางได้สัมผัสกับเวทมนตร์เป็นครั้งแรก นางเองก็ชอบศึกษาหน้าสูตรสมการอันซับซ้อนเหล่านี้เช่นกัน จนกระทั่งได้ไปชนเข้ากับกำแพงความยากนั่นแหละ นางถึงได้เจียมตัวมากขึ้น..."]}, {"t": "เวลาลงมือคือคืนนี้!", "c": ["“คืนนี้เจ้าควรรีบพักผ่อนซะ กว่าเราจะนั่งเรือไปถึงนครพ่อมดก็ต้องใช้เวลาอีกหลายวัน ยังมีเวลาให้เรียนรู้เวทมนตร์บทใหม่อีกมาก”", "จอห์นนี่กล่าว เมื่อเห็นว่านางไม่อาจเกลี้ยกล่อมลินน์ได้ นางจึงเอ่ยเตือนเป็นครั้งสุดท้ายก่อนจะหันหลังกลับเพื่อเดินจากไป", "“เดี๋ยวก่อน...จอห์นนี่!”", "ลินน์ซุกหนังสือทฤษฎีเวทมนตร์พื้นฐานเข้าไปในเสื้อคลุม และเมื่อนึกถึงข้อสงสัยก่อนหน้านี้ของตน เขาก็เอ่ยรั้งนางไว้", "“มีอะไรหรือ? ยังมีเรื่องอื่นอีกงั้นรึ?”", "แม่มดเรือนผมสีเงินหยุดฝีเท้าลง", "“เจ้าแน่ใจหรือว่านอกจากพวกเราแล้ว ไม่มีใครอื่นล่วงรู้ถึงแหล่งกบดานนี้อีกจริงๆ?”", "ลินน์เอ่ยถามอีกครั้ง", "\"เจ้าสงสัยว่าอาจจะมีใครสักคนในหมู่พวกเราไปเข้าพวกกับศาสนจักรอย่างนั้นหรือ?\"", "สีหน้าของจอห์นนี่เคร่งเครียดขึ้น แน่นอนว่านางเข้าใจความหมายแฝงของลินน์ และนางเองก็มีความสงสัยเช่นเดียวกัน หลังจากลังเลอยู่ครู่หนึ่ง นางก็ส่ายหน้า", "“เป็นไปไม่ได้หรอก!”", "“ก่อนที่เจ้าจะมาถึงเมืองอูเออร์ พวกเราก็กบดานอยู่ในหมู่บ้านนี้มาเป็นอาทิตย์แล้ว...ส่วนงานเสี่ยงๆ อย่างการรวบรวมข่าวกรองและการออกไปซื้อเสบียง พวกเราก็ใช้วิธีจับฉลากกันทั้งนั้น”", "นางยังอาศัยโอกาสเหล่านี้ในการทดสอบทุกคนอีกด้วย การที่พวกเขายังไม่เผชิญกับการตามล่าจากศาสนจักรเลยจนถึงตอนนี้ ก็คือข้อพิสูจน์ที่ดีที่สุด!", "เรื่องนี้ไม่ได้ทำให้ลินน์รู้สึกประหลาดใจเลย เขาโต้กลับไปอย่างตรงไปตรงมาและชัดเจนว่า", "“เจ้าเคยคิดบ้างไหมว่า เป้าหมายหลักของศาสนจักรอาจจะไม่ใช่พวกเรา?”", "ลินน์รู้ดีว่าหากมีหนอนบ่อนไส้อยู่จริง เหตุผลเดียวที่พวกมันยังไม่ลงมือ ก็เพื่อรอเก็บเกี่ยวผลประโยชน์ที่ก้อนใหญ่กว่า...", "จอห์นนี่ชะงักไป ใบหน้าของนางเต็มไปด้วยความสับสน", "“ลอดด์ขาเป๋...รวมไปถึงเส้นทางสู่กรีนรีล นั่นต่างหากคือเป้าหมายที่แท้จริงของศาสนจักร!”", "ลินน์เน้นย้ำทีละคำอย่างหนักแน่น", "เขาไม่รู้หรอกว่าเฒ่ายอร์คแห่งโรงเตี๊ยมคนเมากับโครมีความสัมพันธ์ลึกซึ้งกันระดับไหน ถึงได้ทำให้พวกเขายินดีที่จะยื่นมือเข้าช่วยเหลือเหล่าพ่อมดฝึกหัดเช่นนี้ แต่มีสิ่งหนึ่งที่เขามั่นใจ!", "เส้นทางลับที่ทอดยาวออกไปนอกเมืองโดยตรงแบบนั้น ไม่มีทางถูกสร้างขึ้นมาเพื่อพวกเขากลุ่มนี้โดยเฉพาะอย่างแน่นอน!", "หรือพูดอีกนัยหนึ่งก็คือ มีความเป็นไปได้สูงมากที่เฒ่ายอร์คจะเป็นสายลับที่ดินแดนพ่อมดแฝงตัวเอาไว้ในอาณาเขตนอร์ดแลนด์ และสำหรับการช่วยเหลือพวกเขาในการออกเรือ ลอดด์ย่อมต้องเป็นบุคคลที่มีความสำคัญยิ่งกว่าอย่างไม่ต้องสงสัย", "ลินน์จินตนาการได้เลยว่า ตลอดหลายปีที่ผ่านมา มีพ่อมดกี่คนที่ลอบเข้ามาในจักรวรรดิเซคัสผ่านเส้นทางนี้ และมีเรือบรรทุกวัสดุเวทมนตร์กี่ลำที่แล่นออกจากท่าเรือของอาณาเขตนอร์ดแลนด์มุ่งหน้าสู่นครพ่อมด...", "เมื่อเทียบกันแล้ว การจับกุมพ่อมดฝึกหัดเพียงไม่กี่คนนี้แทบจะกลายเป็นเรื่องไร้สาระ มันเป็นเพียงการปลอบประโลมอารมณ์ของดยุกแห่งนอร์ดแลนด์เท่านั้น สิ่งนี้อาจจะช่วยอธิบายได้ว่า ทำไมพวกเขาถึงถูกศาสนจักรตามล่าอย่างหนักเมื่ออยู่ข้างนอก ทว่ากลับปลอดภัยไร้รอยขีดข่วนทันทีที่ก้าวเข้ามาในเมืองอูเออร์!", "เมื่อได้รับการชี้แนะจากลินน์ จอห์นนี่ก็เข้าใจถึงประเด็นนี้ในทันที นั่นทำให้สีหน้าของนางแปรเปลี่ยนไปอย่างรวดเร็ว", "หากเป็นเช่นนั้น ศาสนจักรก็คงจะรับรู้ความเคลื่อนไหวของพวกเขาอยู่ก่อนแล้ว เพียงแค่อดทนรอเวลาให้พวกเขาลงมือ เพื่อที่จะได้รวบตะครุบทุกคนได้ในคราวเดียว", "เมื่อคิดได้เช่นนี้ ความหนาวเยือกก็แล่นปราดไปตามกระดูกสันหลังของจอห์นนี่ ในเวลานี้ พวกเขาก็เปรียบเสมือนนกที่ก้าวหลงเข้าไปในกับดัก และรอเพียงให้นายพรานเงื้อมีดชำแหละขึ้นมาเท่านั้น", "จอห์นนี่ขบเม้มริมฝีปากและนิ่งเงียบไปพักใหญ่ นางไม่สามารถคิดหาทางออกใดๆ ได้เลย", "“แล้วพวกเราควรทำอย่างไรดี?”", "หลังจากเอ่ยถามออกไป หญิงสาวก็ไม่ได้คาดหวังคำตอบใดๆ จากลินน์ ในสถานการณ์ที่ถูกล้อมกรอบจากทุกทิศทางเช่นนี้ มันแทบจะสิ้นหวังไปแล้ว", "กลุ่มพ่อมดฝึกหัดที่แม้แต่จะเชื่อใจกันเองยังทำไม่ได้ จะสามารถรอดพ้นจากตาข่ายที่ศาสนจักรถักทอไว้อย่างรัดกุมได้อย่างไร?", "ทว่าลินน์กลับเอ่ยขึ้น", "“ง่ายนิดเดียว...ก็รอไงล่ะ!”", "“รออย่างนั้นห  "เด็กสาววัยสิบสามสิบสี่ปีส่ายหน้าอย่างเอาเป็นเอาตาย ใบหน้าของนางเต็มไปด้วยความหวาดผวา", "สถานการณ์อันวุ่นวายและเหล่าทหารแห่งศาสนจักรที่กำลังคืบคลานเข้ามาใกล้ ทำให้จอห์นนี่ซึ่งตึงเครียดอยู่แล้วรู้สึกหน้ามืดวิงเวียน นางขบเม้มริมฝีปาก บังคับตัวเองให้สงบสติอารมณ์ลง แล้วเอ่ยด้วยน้ำเสียงแผ่วเบา", "“ฟังนะ มันยังไม่เลวร้ายอย่างที่คิดหรอก ในห้องใต้ดินของคฤหาสน์หลังนี้มีช่องระบายน้ำขนาดใหญ่ที่เชื่อมต่อตรงไปยังแม่น้ำด้านนอก พวกเราสามารถหนีออกไปทางนั้นได้!”", "ขณะที่พูด จอห์นนี่ก็หันไปมองลินน์ด้วยสายตาวิงวอน เพื่อขอให้เขาช่วยจับตาดูไป๋เก๋อเอาไว้ ตอนนี้นางไม่รู้แล้วว่าจะสามารถเชื่อใจใครได้อีก", "...", "หนึ่งนาทีก่อนหน้านั้น ภายในป่าทึบนอกเมืองอูเออร์ กองทหารกว่าร้อยนายในเครื่องแบบเต็มยศกำลังเคลื่อนพลไปข้างหน้าอย่างช้าๆ ภายใต้การปกปิดของเงาไม้", "นักบวชแอรอนที่ร่วมเดินทางมาด้วย มองไปยังปราสาทที่อยู่ไกลออกไปพลางเอ่ยถามด้วยความงุนงง", "“ท่านบิชอปแอนล็อค ตามแผนการเดิม พวกเราไม่ได้จะรอจนกว่าพ่อมดฝึกหัดพวกนี้จะไปถึงเมืองท่าแล้วค่อยลงมือหรอกหรือขอรับ?”", "สำหรับแผนการวิหคในกรง พวกเขาได้ระดมกำลังคนจำนวนมากเพื่อจับตาดูเมืองอูเออร์ทั้งเมือง โดยตั้งใจที่จะใช้กลุ่มพ่อมดฝึกหัดเหล่านี้เป็นเหยื่อล่อ เพื่อถอนรากถอนโคนและส่งบรรดาผู้ที่ละทิ้งศรัทธาต่อองค์พระผู้เป็นเจ้าในอาณาเขตนอร์ดแลนด์ลงสู่นรกให้หมดสิ้น", "ทว่าการชิงลงมือในตอนนี้ ย่อมเป็นการทำลายความพยายามทั้งหมดที่ผ่านมาอย่างไม่ต้องสงสัย", "“แอรอนเอย นายพรานที่เก่งกาจไม่เพียงแต่ต้องเรียนรู้วิธีวางกับดักอันซับซ้อนเท่านั้น แต่ยังต้องเข้าใจถึงจังหวะเวลาในการรวบตาข่ายด้วย”", "แอนล็อคตอบกลับด้วยน้ำเสียงทุ้มลึก", "“กรงเหล็กที่แข็งแรงอาจสามารถกักขังนกกระจอกเทศที่งุ่มง่ามเอาไว้ได้ แต่ถ้าหากมีกริฟฟอนปะปนเข้าไป มันก็จะแหกกรงออกมาและฉีกร่างนายพรานจนเป็นชิ้นๆ...”", "“จำเอาไว้ ความโลภที่มากเกินไปมีแต่จะทำให้เจ้าสูญเสียทุกสิ่งที่อยู่ในมือไปจนหมดสิ้น”", "หัวใจสำคัญของแผนการวิหคในกรง คือการควบคุมอย่างเบ็ดเสร็จ ไม่ว่าพ่อมดฝึกหัดเหล่านี้จะดิ้นรนสักแค่ไหน พวกเขาก็ไม่มีทางหนีพ้นจากตาข่ายที่พวกตนขึงเอาไว้ได้", "อย่างไรก็ตาม การตายของเบลนทำให้แอนล็อคสัมผัสได้ถึงความไม่ชอบมาพากล ในหมู่ลูกศิษย์ของโคร กลับมีพ่อมดเต็มตัวซ่อนอยู่ด้วย ซึ่งนี่เป็นสิ่งที่ทำลายแผนการของเขาลงอย่างสิ้นเชิง", "ด้วยความที่ต้องรับมือกับพวกสาวกปีศาจเหล่านี้มานับครั้งไม่ถ้วน แอนล็อคย่อมตระหนักดีว่าพ่อมดเต็มตัวนั้นรับมือได้ยากเย็นเพียงใด เวทมนตร์ของพวกมันทั้งแปลกประหลาดและพลิกแพลงได้หลากหลาย หากไม่ระวังให้ดี ก็อาจจะตกตายอย่างคาดไม่ถึงเอาง่ายๆ", "ในช่วงการต่อสู้ครั้งใหญ่ที่อาณาเขตนอร์ดแลนด์ หากโครไม่เลือกที่จะรั้งท้ายไว้เพื่อคุ้มกันให้ลูกศิษย์หนีไป การจะจับกุมตัวหมอนั่นก็คงไม่ใช่เรื่องง่ายเลยแม้แต่น้อย"]}, {"t": "ศึกในปราสาท", "c": ["ในทางกลับกัน การชิงลงมือในขณะที่สถานการณ์ยังอยู่ภายใต้การควบคุม ย่อมเป็นทางเลือกที่ชาญฉลาดกว่าอย่างไม่ต้องสงสัย หากพวกเขาสามารถจับกุมตัวบุคคลสำคัญได้สักคนหรือสองคน ก็อาจจะสามารถรีดเค้นข้อมูลจากพวกมันได้", "“ขอบคุณสำหรับคำชี้แนะขอรับ ท่านบิชอปแอนล็อค”", "นักบวชแอรอนครุ่นคิดอย่างรอบคอบอยู่ครู่หนึ่ง ก่อนจะค้อมศีรษะลงด้วยความเคารพ", "“ทุกสิ่งล้วนเป็นพระประสงค์ของพระผู้เป็นเจ้า”", "แอนล็อคตอบกลับอย่างราบเรียบ ทันใดนั้น ราวกับสัมผัสได้ถึงบางสิ่ง ลูกศรแสงอันเจิดจ้าหลายดอกก็ปรากฏขึ้นกลางความว่างเปล่าโดยไร้ซึ่งการเคลื่อนไหวใดๆ พวกมันพุ่งตอกตรึงอีกาสีเทาสี่ตัวที่กำลังจะโผบินขึ้นสู่ยอดไม้ในชั่วพริบตา", "สามวินาทีต่อมา เวทลูกไฟอันสว่างไสวก็พุ่งออกมาจากคฤหาสน์ที่อยู่ห่างออกไปไม่ไกลนัก แรงระเบิดของมันสาดส่องท้องฟ้าจนสว่างจ้า", "แอนล็อคแหงนหน้าขึ้น วิสัยทัศน์ของเขาที่ถูกยกระดับด้วยพลังศักดิ์สิทธิ์สามารถทะลวงผ่านระยะทางหลายร้อยเมตร ผ่านหน้าต่างที่เปิดกว้างบนชั้นสาม เขามองเห็นลินน์และคนอื่นๆ กำลังมองลงมา", "เรือนผมสีน้ำตาล รูปร่างสันทัด ใบหน้าหล่อเหลา...นั่นคือพ่อมดที่ชื่อคาร์ล ผู้สังหารเบลน!", "“ทุกคน บุกเต็มกำลัง!”", "แอนล็อคออกคำสั่งโดยไม่ลังเล", "ในเมื่อถูกค้นพบแล้ว ก็ไม่มีความจำเป็นต้องหลบซ่อนอีกต่อไป เหล่าทหารยามที่เดิมทีเคลื่อนพลอย่างเชื่องช้าก็เปลี่ยนเป็นวิ่งตะบึงในทันที เสียงชุดเกราะกระทบกันดังกึกก้องอย่างต่อเนื่อง ราวกับเกลียวคลื่นที่ถาโถมเข้าหาป้อมปราการตรงกลางจากทุกสารทิศ...", "เจ็ดปีให้หลัง ประตูคฤหาสน์ก็ถูกพังทลายลงอย่างรุนแรงอีกครั้ง เหล่าทหารยามที่ถือดาบและโล่จัดกระบวนทัพเป็นกลุ่มละสิบคน และเข้าตีวงล้อมปราสาททั้งหลังอย่างเป็นระบบ", "แอรอนเป็นผู้นำการบุกทะลวง เขาสั่งการให้ทหารหลายหมู่มุ่งหน้าไปยังทิศทางที่ลินน์และคนอื่นๆ เคยอยู่ก่อนหน้านี้", "เมื่อเดินผ่านโถงทางเดินอันกว้างและยาวไกล ทหารยามแถวหน้าเพิ่งจะก้าวเข้ามาในโถงต้อนรับก็ต้องถอยกรูดด้วยความหวาดผวา", "น่าเสียดายที่พวกเขายังคงช้าไปก้าวหนึ่ง เวทลูกไฟที่ลุกโชนหลายลูกร่วงหล่นลงมาท่ามกลางพวกเขาดั่งห่าฝนดาวตก", "ตามมาด้วยเสียงระเบิดดังกึกก้องกัมปนาทต่อเนื่อง เวทลูกไฟขยายตัวอย่างรวดเร็วและปะทุออก แปรเปลี่ยนกระบวนทัพที่เคยเป็นระเบียบเรียบร้อยให้กลายเป็นทะเลมนุษย์อันแสนโกลาหล", "“อ๊าก”", "ท่ามกลางเสียงกรีดร้องโหยหวน เลือดสาดกระเซ็นไปทั่วทุกหนแห่ง ร่างของทหารกระเด็นปลิวว่อน และกลิ่นคาวเลือดคละคลุ้งไปทั่วบริเวณ", "แม้ว่าผู้เข้าร่วมการซุ่มโจมตีในครั้งนี้จะเป็นกองกำลังชั้นยอดที่ถูกคัดเลือกมาจากกองทัพของอาณาเขตนอร์ดแลนด์ ซึ่งทุกคนล้วนติดอาวุธครบมือ แต่พวกเขาก็ถูกทำให้แตกพ่ายในพริบตาเมื่อต้องเผชิญหน้ากับเวทมนตร์อันทรงพลัง", "“ทุกคนถอยกลับมา จัดกระบวนทัพ เตรียมหน้าไม้ให้พร้อม!”", "แอรอนซึ่งเป็นเพียงคนเดียวที่ยังคงความเยือกเย็นไว้ได้ ชูคทาขึ้นสูงและตะโกนสั่งการเสียงก้อง", "“อย่าตื่นตระหนก องค์เอลาสถิตอยู่กับพวกเรา!”", "กลุ่มคนที่กำลังแตกตื่นสงบลงและกลับมาเป็นระเบียบในทันที ดวงตาของทุกคนเรืองรองด้วยแสงสีขาว ขณะที่อารมณ์หวาดกลัวค่อยๆ มลายหายไป และความกล้าหาญอันลึกลับก็เข้ามาเติมเต็มในจิตใจของพวกเขา", "นี่คือพลังศักดิ์สิทธิ์ระดับหนึ่งวงแหวน พลังขจัดความกลัว!", "ภายใต้การสั่งการของแอรอน ทหารโล่ต่างยกโล่อันแข็งแกร่งขึ้นตั้งขวางไว้เบื้องหน้า แล้วก้าวเดินไปข้างหน้าด้วยก้าวย่างที่มั่นคง เบื้องหลังพวกเขา ทหารยามต่างหยิบหน้าไม้ออกมาอย่างพร้อมเพรียง", "การระดมยิงจากระยะไกล เป็นวิธีการรับมือกับพวกพ่อมดฝึกหัดที่ได้ผลเสมอมา!", "กระบวนทัพโล่ที่แน่นหนาราวกับกระดองเต่า ช่วยลดทอนอานุภาพของเวทมนตร์ทั่วไปได้อย่างมหาศาล ศรเวทมนตร์ไม่อาจเจาะทะลวงการป้องกันเข้ามาได้ และแม้แต่เวทลูกไฟอันทรงพลังก็ยังไม่สามารถสร้างผลลัพธ์ที่ดีได้", "ห่าฝนลูกศรที่ตกกระหน่ำบีบให้เหล่าพ่อมดฝึกหัดต้องล่าถอยครั้งแล้วครั้งเล่า จนต้องไปหลบซ่อนตัวอยู่หลังกำแพงเพื่อหลบหลีก ทว่าบาร์ตันที่ตอบสนองช้าที่สุด กลับถูกลูกศรหน้าไม้เสียบเข้าที่แผ่นหลัง จนล้มลุกคลุกคลานลงไปกองกับพื้นอย่างน่าเวทนา", "“บาร์ตัน!”", "บัคตะโกนเรียกชื่อน้องชายด้วยความร้อนรน แล้วพุ่งตัวเข้าไปช่วยพยุงบาร์ตันขึ้นมา", "เมื่อสบโอกาส แอรอนก็ออก ่ได้รับผลกระทบก็ยังมีจำกัด พลหน้าไม้ที่อยู่แนวหลังได้ยกหน้าไม้ขึ้นมาแล้ว ลูกศรหน้าไม้อันแหลมคมกว่าสี่สิบดอกสะท้อนแสงวาววับขณะที่พวกมันเล็งเป้าไปที่บัค...", "‘ได้โปรดล่ะ เร็วเข้าเถอะ ไป๋เก๋อ!’", "หยาดเหงื่อเย็นเยียบไหลซึมลงมาตามหน้าผาก ขณะที่บัคเฝ้าภาวนาในใจอย่างต่อเนื่อง วินาทีนี้คือเส้นแบ่งระหว่างความเป็นและความตาย!", "โชคดีที่ครั้งนี้ไป๋เก๋อไม่ทำให้เขาผิดหวัง ในจังหวะที่หน้าไม้กำลังจะถูกเหนี่ยวไก เสียงกรีดร้องอันแหลมแสบแก้วหูก็ดังกึกก้องไปทั่วทั้งปราสาท", "เวทเสียงกรีดร้องแห่งวิญญาณ!", "ทุกคนที่อยู่ที่นั่นรู้สึกราวกับว่าสมองของตนถูกทุบด้วยค้อนเหล็กอย่างแรง จนสูญเสียการควบคุมร่างกายไปชั่วขณะ", "ไม่เว้นแม้แต่มิตรหรือศัตรู ความน่าสะพรึงกลัวอันแปลกประหลาดของเวทมนตร์สายจิตวิญญาณได้ประจักษ์ชัดแจ้งแล้ว!", "ขอบเขตอิทธิพลของเวทเสียงกรีดร้องแห่งวิญญาณนั้นกว้างขวางมาก และการเผาผลาญพลังเวทก็รุนแรงอย่างยิ่งยวด มันจึงถูกบังคับให้หยุดลงหลังจากผ่านไปเพียงสองวินาที", "ไป๋เก๋อซวนเซและแทบจะล้มพับลงไปกับพื้น", "จอห์นนี่และคนอื่นๆ ต่างถูกความวิตกกังวลเข้าเกาะกุม พวกเขาได้ทำทุกวิถีทางเท่าที่ทำได้แล้ว ซึ่งกินเวลาทั้งหมดห้าวินาที และสามารถล่อให้ศัตรูทั้งหมดมารวมตัวกันได้สำเร็จ", "แค่นี้ก็เพียงพอแล้วสำหรับลินน์ ผงฟอสฟอรัสสีเหลืองซีดลอยอยู่เหนือฝ่ามือของเขา ก่อนจะก่อตัวเป็นเวทลูกไฟขนาดยักษ์ที่มีความสูงกว่าครึ่งเมตรอย่างรวดเร็ว", "เปลวไฟสีขาวอมเหลืองนั้นดูผิวเผินอาจจะไม่ได้มีอะไรพิเศษ ทว่าพ่อมดฝึกหัดและนักบวชทุกคนที่อยู่ที่นั่นกลับรู้สึกเย็นยะเยือกอยู่ในใจ", "อย่างไรก็ตาม เวทลูกไฟขนาดยักษ์ลูกนี้ไม่ได้พุ่งเป้าไปที่แอรอนและคนอื่นๆ แต่มันกลับพุ่งทะยานขึ้นสู่อากาศ ระเบิดออกเป็นประกายไฟที่ทิ้งควันสีขาวเป็นทางยาว ราวกับดอกไม้ไฟอันแสนงดงาม", "ใบหน้าของบัคซีดเผือด เขาเริ่มสงสัยว่าการแทรกแซงจากเวทเสียงกรีดร้องแห่งวิญญาณของไป๋เก๋อ ได้ไปขัดจังหวะการร่ายเวทของลินน์เข้าหรือไม่", "ก็ทุกคนต่างรู้ดีนี่นา ว่าเวทไฟนั้นจะต้องพุ่งเป้าหมายอย่างแม่นยำและควบแน่นเป็นจุดเดียวเสมอ!"]}, {"t": "นี่มันพลังปีศาจ! เปลวเพลิงจากขุมนรก!", "c": ["ความพยายามทั้งหมดของพวกเราสูญเปล่างั้นหรือ?", "ภายใต้สายตาของบัค ประกายไฟที่สว่างไสวเต็มท้องฟ้าก็ร่วงหล่นลงมาปกคลุมไปทั่วทั้งบริเวณอย่างรวดเร็ว!", "“วิชาคำศักดิ์สิทธิ์ โล่!”", "ทันทีที่หลุดพ้นจากอิทธิพลของเวทเสียงกรีดร้องแห่งวิญญาณ แอรอนก็ร่ายวิชาศักดิ์สิทธิ์สายป้องกันในทันที", "โล่แสงอันบริสุทธิ์ปรากฏขึ้นในรูปครึ่งวงกลมกลางอากาศ และเมื่อประกายไฟร่วงหล่นลงมากระทบ มันก็กัดกร่อนโล่นั้นจนเป็นรูพรุนนับไม่ถ้วนในพริบตา", "แม้แต่เวทมนตร์ที่หลงเหลือซึ่งถูกลดทอนอานุภาพลงไปเป็นร้อยเท่า ยังมีพลังทำลายล้างถึงเพียงนี้เลยงั้นรึ?", "หากเวทลูกไฟขนาดยักษ์ก่อนหน้านี้พุ่งเป้ามาที่เขาโดยตรง แอรอนมั่นใจเลยว่าเขาคงไม่มีทางป้องกันมันได้อย่างแน่นอน!", "ขณะที่เขายังคงตกตะลึง เสียงกรีดร้องอันน่าสะพรึงกลัวก็ดังกึกก้องไปทั่วทั้งปราสาท แอรอนหันขวับไปมองและต้องตกตะลึงกับภาพที่เห็น", "เมื่อเทียบกับเหล่านักบวชที่เชี่ยวชาญวิชาศักดิ์สิทธิ์แล้ว ทหารยามเหล่านั้นยังไม่ทันได้ฟื้นตัวจากผลกระทบของเวทเสียงกรีดร้องแห่งวิญญาณเลยด้วยซ้ำ ประกายไฟที่ร่วงหล่นลงมาก็เกาะติดหนึบเข้ากับชุดเกราะ โล่ คันธนู หน้าไม้ ตลอดจนผิวหนังและใบหน้าที่โผล่พ้นร่มผ้าของพวกมันไปเสียแล้ว", "ความน่าสะพรึงกลัวของไฟฟอสฟอรัสขาวก็ได้สำแดงฤทธิ์ในวินาทีต่อมา เปลวไฟที่ดูอ่อนแรงลุกลามอย่างรวดเร็วเมื่อสัมผัสกับสสาร แผ่นรองบ่าและถุงมือหนังถูกแผดเผาจนเป็นรูโหว่ขนาดใหญ่ และเปลวไฟสีขาวอมเหลืองก็ราวกับถูกดึงดูดด้วยเนื้อมนุษย์ มันซึมลึกทะลุลงไปถึงชั้นผิวหนังด้านล่างโดยตรง", "“อ๊ากกกก!”", "ทหารโล่นายหนึ่งตบหน้าอกตัวเองอย่างบ้าคลั่ง พยายามจะดับไฟฟอสฟอรัสขาวที่กำลังลุกลาม ทว่านั่นกลับส่งผลให้แขนของเขาลุกติดไฟไปด้วย ภายในไม่กี่ลมหายใจ ร่างกายครึ่งซีกของเขาก็ลุกโชนราวกับคบเพลิง", "แต่เพื่อนทหารของเขากลับมีสภาพที่เลวร้ายยิ่งกว่า ประกายไฟร่วงหล่นลงไปในรอยต่อชุดเกราะของมันโดยตรง ด้วยไม่อาจทนต่อความร้อนสุดขีดที่สูงกว่าพันองศาได้ มันกรีดร้องด้วยความเจ็บปวดแสนสาหัส กระชากชุดเกราะของตนออกอย่างแรง แล้วล้วงมือขวาเข้าไปในร่างกายของตัวเอง เพื่อควักเอาก้อนเนื้อที่ชุ่มเลือดและกำลังลุกไหม้ออกมา", "เลือดเนื้อและซากศพคือเชื้อเพลิงชั้นดีที่สุดสำหรับไฟฟอสฟอรัสขาว ส่งผลให้เปลวเพลิงลุกลามออกไปอย่างรวดเร็ว", "ทะเลเพลิงที่ลุกโชน ควันสีขาวที่พวยพุ่ง และเหล่าทหารที่กำลังดิ้นทุรนทุรายก่อนตายด้วยท่วงท่าอันบิดเบี้ยวสยดสยอง ทำให้ฉากเบื้องหน้าดูราวกับขุมนรกบนดิน", "“ปีศาจ! นี่มันต้องเป็นพลังของปีศาจแน่ๆ ไฟจากนรก!”", "ภาพอันน่าสะพรึงกลัวทำให้กองทหารชั้นยอดแห่งอาณาเขตนอร์ดแลนด์สติแตกโดยสมบูรณ์ วิชาศักดิ์สิทธิ์ระดับหนึ่งวงแหวนอย่างวิชาขจัดความกลัวสูญเสียประสิทธิภาพลงไปอย่างสิ้นเชิง นักบวชคนหนึ่งที่โชคดีหลบเปลวไฟมาได้กรีดร้องอย่างสิ้นหวัง เขาทิ้งคทาในมือแล้ววิ่งหนีไปโดยไม่หันหลังกลับมามอง", "จอห์นนี่และคนอื่นๆ ต่างก็ตกตะลึงไม่แพ้กัน จนแทบจะลืมคำสั่งของลินน์ที่ให้กลั้นหายใจและใช้พลังเวทสกัดออกซิเจนออกจากอากาศไปเสียสนิท", "“นี่มันเวทมนตร์บ้าอะไรกันเนี่ย?”", "บัคสั่นสะท้านไปทั้งตัว เพียงแค่อยู่ใกล้ๆ เขาก็สัมผัสได้ถึงความเจ็บปวดราวกับกระดูกถูกแผดเผา", "“นี่ก็คือเวทลูกไฟไง พวกเจ้าไม่รู้จักหรือ? ข้าก็แค่ดัดแปลงมันนิดหน่อยเองนะ!”", "ลินน์สังเกตเห็นสายตาตกตะลึงจากทุกคนจึงอธิบายสั้นๆ", "‘นี่เรียกว่านิดหน่อยงั้นรึ?’", "สีหน้าของบัคดูพิลึกพิลั่น เขาคิดว่าความเข้าใจต่อคำว่า นิดหน่อย ของลินน์น่าจะแตกต่างจากของเขาอย่างแน่นอน", "ในขณะที่จอห์นนี่กลับสงสัยว่า ลินน์อาจจะทะลวงผ่านกำแพงข้อจำกัดนั้น และกลายเป็นพ่อมดเต็มตัวไปแล้วก็เป็นได้", "อย่างไรก็ตาม ลินน์เพิ่งจะสัมผัสกับเวทมนตร์มาได้เพียงครึ่งปีเท่านั้น มันดูจะเกินจริงไปสักหน่อย ยิ่งไปกว่านั้น โครผู้เป็นอาจารย์ของพวกเขาก็ยากจนข้นแค้นมาโดยตลอด ไม่มีทางที่จะมีปัญญาซื้อหา แหล่งกำเนิดเวทมนตร์ มาได้หรอก", "เมื่อเทียบกับความคิดอันซับซ้อนของจอห์นนี่และบัคแล้ว ความคิดของบาร์ตันนั้นเรียบง่ายกว่ามาก เขาตระหนักได้ว่าแม้แต่พ่อมดฝึกหัดอย่างพวกเขา หากร่วมมือกันก็สามารถแข็งแกร่งได้ถึงเพียงนี้!", "บาร์ตันถึงกับคิดว่า ตราบใดที่พวกเขาร่วมมือกัน การรับมือกับการตามล่าของศาสนจักรก็อาจไม่ใช่เรื่องยากเย็นอะไรนัก", "ขณะที่เขากำลังครุ่นคิด แสงสีขาวเจิดจ้าก็ปรากฏขึ้นจากที่ไกลๆ มันทะลวงผ่านม่านเพลิงและพุ่งตรงเข้ามาหาเหล่าพ่อมดฝึกหัด", "ด้วยความเหม่อลอย บาร์ตันมองเห็นบัคพี่ชายของตนตะโกนเรียกเขาด้วยความร้อนรน จากนั้นเขาก็รู้สึกได้ถึงพลังอันรุนแรงที่พุ่งเข้ากระแทก ร่างอันบอบบางของเขาถูกฉีกกระชากกลางอากาศ หมุนคว้างไปหลายตลบก่อนจะร่วงกระแทกพื้นราวกับตุ๊กตาผ้าขี้ริ้ว แล้วแน่นิ่งไปในทันที", "การเปลี่ยนแปลงอย่างกะทันหันทำให้สีหน้าของจอห์นนี่และคนอื่นๆ แข็งค้าง ใบหน้าของบัคบิดเบี้ยวขณะที่เขากรีดร้องจนเสียงแหบพร่า", "“ไม่นะ บาร์ตัน!”", "วินาทีที่แสงสีขาวปรากฏขึ้น ลินน์ก็ลงมือในทันที ศรเวทมนตร์สิบสองดอกลอยวนรอบตัวเขา ก่อนจะตีวงโ พลังที่ถือครองพลังศักดิ์สิทธิ์ตรงหน้าได้", "จอห์นนี่และไป๋เก๋อเองก็ตระหนักดีถึงพลังอันน่าสะพรึงกลัวของแอนล็อค แม้จะโศกเศร้าอย่างสุดซึ้งกับการตายของบาร์ตัน แต่พวกเขาก็รู้ว่าการหนีคือความหวังเดียวที่จะเอาชีวิตรอด", "ทว่าในเวลานี้ บัคที่เพิ่งสูญเสียน้องชายไปได้สติแตกไปแล้ว เขาแผดเสียงคำรามด้วยความเกรี้ยวกราด คว้าร่างของทหารยามที่สภาพค่อนข้างสมบูรณ์มาใช้เป็นโล่กำบัง แล้วพุ่งชาร์จเข้าใส่แอนล็อคโดยตรง"]}, {"t": "บทสวดสรรเสริญแห่งเอลา แสงวิญญาณศักดิ์สิทธิ์", "c": ["“อย่าทำอะไรวู่วาม กลับมานะ บัค!”", "จอห์นนี่ตะโกนลั่น", "บัคไม่สนใจนาง และยังคงพุ่งทะยานไปข้างหน้า", "“สรรเสริญองค์เอลา คลื่นแสงศักดิ์สิทธิ์!”", "แอนล็อคเอ่ยอย่างเนิบนาบ ปลดปล่อยพลังศักดิ์สิทธิ์ระดับสองวงแหวนออกมา", "แสงสีขาวสว่างจ้าปะทุขึ้นอีกครั้ง แม้จะถูกปลดปล่อยออกมาทีหลัง แต่มันกลับพุ่งเข้าถึงตัวก่อน ซากศพที่ถูกใช้เป็นโล่กำบังเบื้องหน้าเขาแหลกสลายกลายเป็นหมอกเลือดในพริบตา และแรงกระแทกอันน่าสะพรึงกลัวจากคลื่นพลังที่หลงเหลือก็ซัดร่างของบัคให้ลอยละลิ่วไปอย่างง่ายดาย", "แอนล็อคชูคทาขึ้น เตรียมพร้อมที่จะร่ายพลังอีกบทเพื่อปลิดชีพเขา แต่ในวินาทีวิกฤตนั้น ไป๋เก๋อก็ยื่นมือเข้ามาแทรกแซงอีกครั้ง", "เสียงแหลมบาดแก้วหูดังกึกก้องราวกับเสียงระฆังมรณะจากขุมนรกนั้น ทำให้การเคลื่อนไหวของแอนล็อคหยุดชะงักไปชั่วครู่ แต่ก็เป็นเพียงแค่เสี้ยววินาทีเท่านั้น", "เวทสัมผัสเพลิง!", "เวทลูกไฟฟอสฟอรัสขาว!", "ลินน์และจอห์นนี่ซึ่งอุดหูเตรียมพร้อมไว้ล่วงหน้าแล้ว ก็ได้ฉวยโอกาสนี้โจมตีพร้อมกันด้วยเวทมนตร์ที่ทรงพลังที่สุดของพวกเขา คลื่นเพลิงอันร้อนระอุสองสายพุ่งทะยานเข้าหาแอนล็อค บีบให้อาร์ชบิชอปต้องเปลี่ยนไปใช้พลังสายป้องกันแทนที่จะสานต่อการโจมตี", "พลังศักดิ์สิทธิ์ระดับสามวงแหวน ปราการศักดิ์สิทธิ์!", "ปราการที่มองไม่เห็นก่อตัวขึ้นเบื้องหน้าแอนล็อค สกัดกั้นคลื่นเพลิงเอาไว้ได้อย่างง่ายดาย อย่างไรก็ตาม เปลวไฟฟอสฟอรัสขาวกลับเกาะติดหนึบอยู่บนนั้น และค่อยๆ กัดกร่อนพื้นผิวของมันอย่างช้าๆ อย่างมั่นคง", "โฮก!", "บัคที่เพิ่งจะได้รับบาดเจ็บสาหัสและถูกซัดจนล้มลง หยัดยืนขึ้นมาอีกครั้ง ดวงตาของเขาแดงก่ำไปด้วยเลือด และร่างกายก็ปรากฏร่องรอยของการกลายพันธุ์เป็นสัตว์ร้ายมากยิ่งขึ้น", "ในเวลานี้ บัคดูราวกับหมีขนาดยักษ์ที่ยืนสองขา เขาพุ่งทะยานฝ่าเข้าไปในทะเลเพลิงที่ลุกโชน ขนและเสื้อคลุมของเขาติดไฟฟอสฟอรัสขาวอย่างรวดเร็ว", "ความเจ็บปวดแสนสาหัสจากการถูกแผดเผาด้วยความร้อนนับพันองศามากพอที่จะทำให้ใครก็ตามสติแตก ทว่าบัคกลับไม่สนใจมันเลยแม้แต่น้อย เพราะนับตั้งแต่วินาทีที่เขาใช้เวทมนตร์ของพ่อมดฝึกหัดเพื่อกระตุ้นการกลายพันธุ์ทางเวทมนตร์", "กระบวนการเปลี่ยนร่างเป็นสัตว์ร้ายก็ไม่อาจหวนกลับได้อีกแล้ว และเพื่อที่จะทำลายพลังปราการศักดิ์สิทธิ์ของแอนล็อคให้แตกพ่าย การพึ่งพาเพียงพละกำลังของเขาเองนั้นเป็นเรื่องที่เป็นไปไม่ได้อย่างเด็ดขาด!", "“จอห์นนี่ คาร์ล พวกเจ้าไปก่อนเลย ข้าจะอยู่แก้แค้นให้บาร์ตัน!”", "บัคคำรามลั่น พลางฟาดฝ่ามือเข้าใส่พลังปราการศักดิ์สิทธิ์ที่อยู่เบื้องหน้าอย่างแรง", "ระลอกคลื่นกระเพื่อมไหวไปทั่วปราการที่มองไม่เห็น แต่เพียงแค่แอนล็อคตวัดมือร่ายพลังศักดิ์สิทธิ์อย่างลวกๆ ก็สามารถซัดร่างของบัคปลิวออกไปได้อีกครั้ง", "“พวกเราไปกันเถอะ!”", "ลินน์ปรายตามองบัคอย่างลึกซึ้ง และเอ่ยปากโดยไม่ลังเล การที่ร่างถูกปกคลุมไปด้วยไฟฟอสฟอรัสขาวเช่นนั้น บัคก็เกินกว่าที่จะเยียวยาได้แล้ว", "หลังจากซัดบัคกระเด็นออกไป แอนล็อคก็ตรงเข้าขวางทางออกเพียงทางเดียวเอาไว้ เมื่อสูญเสียกำลังพลไปมากมายขนาดนี้ เขาย่อมไม่มีทางปล่อยให้ลินน์และคนอื่นๆ หนีรอดไปได้ง่ายๆ แน่", "“จงสำนึกบาปต่อองค์พระผู้เป็นเจ้าที่ยิ่งใหญ่เถิด เหล่าสาวกของปีศาจร้าย...”", "แอนล็อคชูคทาบิชอปของตนขึ้นและสวดภาวนาเสียงดังก้อง", "“สรรเสริญองค์เอลา แสงวิญญาณศักดิ์สิทธิ์!”", "คลื่นแสงอันเจิดจ้าแผ่ขยายออกเป็นรูปครึ่งวงกลมจากยอดคทา พวกมันไม่อาจหยุดยั้งและไม่อาจหลบหลีกได้ เนื่องจากรัศมีของพลังศักดิ์สิทธิ์นั้นครอบคลุมพื้นที่ส่วนใหญ่ของโถงทางเดินด้านข้างเอาไว้หมดแล้ว!", "ทว่าลินน์ไม่ใช่คนประเภทที่จะไม่ทิ้งทางถอยให้ตัวเองหรอกนะ!", "อันที่จริง ก่อนที่จะก้าวเข้ามาในโถงทางเดินนี้ เขาได้เตรียมแผนการหลบหนีสำหรับสถานการณ์วิกฤตเอาไว้แล้ว!", "ลินน์ ไป๋เก๋อ และจอห์นนี่ ทาบฝ่ามือลงบนพื้นแทบจะพร้อมๆ กัน", "เวทระดับศูนย์วงแหวน เวทแยกแยะวัสดุพื้นฐาน!", "พื้นหินอันแข็งแกร่งก็ปริร้าวในทันที รอยแตกละเอียดสามสายแผ่ขยายออกไปราวกับใยแมงมุม และเชื่อมต่อเข้าหากันในที่สุด ก่อนที่แสงสีขาวอันน่าสะพรึงกลัวจะสาดส่องมาถึง พื้นดินใต้ฝ่าเท้าของพวกเขาก็ทรุดฮวบลงไป...", "พลังแสงวิญญาณศักดิ์สิทธิ์กวาดผ่านพื้นดินที่พังถล่ม พุ่งเข้ากระแทกกำแพงด้านหลัง ก่อให้เกิดเสียงระเบิดดังกึกก้องต่อเนื่องไปทั่วทั้งปราสาท", "หลังจากฝุ่นควันและเศษซากปรักหักพังจางลง สีหน้าของแอนล็อคก็เคร่งเครียดขึ้นขณะจ้องมองไปยังหลุมกว้างในโถงทางเดิน", "โฮก!", "เสียงคำรามแหบพร่าดังขึ้นจากด้านข้าง", "ด้วยความที่ถูกซัดปลิวออกไปก่อนหน้านี้ บัคจึงอยู่นอกเหนือรัศมีของพลังแสงวิญญาณศักดิ์สิทธิ์ แต่เขาก็สูญเสียรูปลักษณ์ความเป็นมนุษย์ไปแล้ว และกลายร่างเป็นหมีขนาดยักษ์โดยสมบูรณ์ ผิวหนังของเขายังคงลุกโชนไปด้วยไฟฟอสฟอรัสขาว และภายใต้ก้อนเนื้อที่ถูกแผดเผานั้น ก็เผยให้เห็นกระดูกสีขาวอันวาววับ", "ถึงกระนั้น ด้วยความกระหายในการล้างแค้นที่ผลักดัน บัคก็ยังคงพุ่งตัวไปข้างหน้า", "แอนล็อคขมวดคิ้ว เขาไม่มีเวลามาเสียให้กับพ่อมดฝึกหัดที่ใกล้ตายหรอกนะ เขายื่นมือออกไป รวบรวมเศษซากปรักหักพังและเศษชุดเกราะที่แตกหักให้ประกอบเข้าด้วยกันอย่างรวดเร็ว ก่อตัวเป็นก้อนหินรูปร่างมนุษย์ขนาดยักษ์สูงสามเมตรสองตน", "นี่คือพลังศักดิ์สิทธิ์ระดับสองวงแหวน พลังอัญเชิญผู้พิทักษ์แห่งแดนวิญญาณ", "ทันทีที่รูปสลักหินทั้งสองก่อตัวขึ้น พวกมันก็แยกย้ายกันไป ตนหนึ่งเหวี่ยงหมัดเข้าใส่ ซัดหมีร่างยักษ์อย่างบัคจนล้มกลิ้งลงไป ส่วนอีกตนก็กระโจนลงไปในหลุมพื้นดินที่พังถล่ม...", "...", "“โชคดีที่ตรงนี้ไม่ได้สูงมากนัก!”", "ด้วยการใช้เศษซากที่ร่วงหล่นลงมาเป็นตัวช่วยลดแรงกระแทก ลินน์สามารถเจาะทะลุพื้นลงมาได้อย่างราบรื่นด้วยความร่วมมือของทั้งสามคนที่ผสานทักษะแยกแยะวัสดุพื้นฐานเข้าด้วยกัน และร่อนลงจอดในห้องใต้ดินของปราสาทได้โดยตรง", "เมื่อกวาดสายตามองไปรอบๆ ลินน์ก็พบว่าสถานที่แห่งนี้ดูเหมือนจะเป็นคลังแสง อาวุธและดาบถูกกองสุมไว้บนชั้นวาง นอกจากนี้ยังมีหีบว่างเปล่าอีกหลายใบที่ครั้งหนึ่งคงเคยบรรจุสมบัติเอาไว้ ซึ่งเห็นได้ชัดว่าเจ้าของปราสาทคงจะขนพวกมันหนีไปด้วยตอนที่ลี้ภัย", "หลังจากตรวจสอบสภาพแวดล้อมจนแน่ใจแล้ว ลินน์ก็หันกลับมาให้ความสนใจกับเพื่อนร่วมทางทั้งสองของเขาทันที", "จอห์นนี่อยู่ในสภาพที่ค่อนข้างดี แม้ว่านางจะสูญเสียพลังเวทไปมากก็ตาม แต่ไป๋เก๋อกลับเป็นอีกเรื่องหนึ่งเลย หลังจากใช้เวทเสียงกรีดร้องแห่งวิญญาณไปถึงสองครั้ง นางก็แทบจะยืนไม่ไหว แม้ว่านางจะเป็นผู้ใช้เวทสายจิตวิญญาณที่หาได้ยากก็ตาม", "“จอห์นนี่ พวกเราอยู่ห่างจากช่องระบายน้ำใต้ดินอีกไกลแค่ไหน?”", "ลินน์เอ่ยถาม", "“เดินตามเส้นทางนี้ไป ไม่เกินสามนาทีก็ถึงแล้วล่ะ”", "จอห์นนี่ตอบพลางพยุงไป๋เก๋อขึ้นมา นางลังเลอยู่ครู่หนึ่ง ก่อนจะตัดสินใจอย่างรวดเร็ว", "“พวกเราแยกย้ายกันเถอะ เจ้าพาไป๋เก๋อหนีไป ส่วนข้าจะล่อแอนล็อคไปอีกทางเอง”", "จอห์นนี่รู้ดีว่าพวกเขาวิ่งหนีแอนล็อคไม่พ้นแน่ หากยังคงดันทุรังกันต่อไปแบบนี้ ท้ายที่สุดพวกเขาก็ต้องถูกจับตัวได้อยู่ดี", "แม้จะสูญเสียพลังเวทไปอย่างมหาศาลในการต่อสู้ก่อนหน้านี้ แต่หากพึ่งพาหัตถ์เวท นางก็ยังพอจะร่ายเวทระดับหนึ่งวงแหวนได้อีกสักสองบท ซึ่งน่าจะช่วยซื้อเวลาให้พวกเขาได้บ้าง...", "แม่มดเรือนผมสีเทาเงินก้มหน้าลง ริมฝีปากสีดอกกุหลาบของนางถูกขบเม้มจนห้อเลือด นางเคยให้สัญญากับท่านอาจารย์โครเอาไว้ว่าจะพาทุกคนกลับไปยังดินแดนพ่อมดอย่างปลอดภัย", "แต่ตอนนี้เคนท์ตายแล้ว วิลก็ตายแล้ว ส่วนบัคกับบาร์ตันก็นอนทอดร่างอยู่เบื้องหน้านาง มันทำให้นางรู้สึกสิ้นหวังจนถึงขีดสุด...", "“ข้อเสนอของเจ้าน่าจะสายเกินไปแล้วล่ะ!”", "ลินน์แหงนหน้ามองขึ้นไป", "ในช่วงเวลาสั้นๆ นั้นเอง เสียงระเบิดอันรุนแรงก็ปะทุขึ้นจากเบื้องบน จากนั้น ร่างหินสวมเกราะสูงสามเมตรก็ร่วงกระแทกลงมาผ่านรูโหว่นั้น", "“ไป!”", "ลินน์คว้าแขนของจอห์นนี่และไป๋เก๋อ แล้วกระชากพวกนางให้พ้นจากเศษหินที่ร่วงหล่นลงมาพร้อมกับตะโกนลั่น", "เขาใช้ไฟฟอสฟอรัสขาวที่เดิมทีตั้งใจจะเก็บไว้ใช้ตอนหลบหนีไปกับการช่วยเหลือบัคแล้ว และด้วยพลังเวทที่ถูกเผาผลาญไปกว่าครึ่ง เขาจึงไม่มีทางต่อกรกับอาร์ชบิชอปได้เลย", "ผู้พิทักษ์แห่งแดนวิญญาณอันหนักอึ้งและใหญ่โต ร่วงกระแทกพื้นจนแผ่นดินสะเทือนเลื่อนลั่น จากนั้นมันก็ยื่นแขนหินออกไปและพุ่งเข้าชาร์จใส่พวกเขาทั้งสามคน", "ใบหน้าของลินน์ตึงเครียด เขาเตรียมพร้อมที่จะหลบหลีก ทันใดนั้น เสียงแจ้งเตือนก็ดังก้องขึ้นในหัวของเขา", "“คำเตือน...ตรวจพบการกระทำผิดกฎหมายร้ายแรงโดยเป้าหมายแห่งพันธสัญญา เกี่ยวข้องกับการใช้อาวุธเคมีเพื่อการสังหารหมู่ พฤติการณ์มีความเลวร้ายอย่างถึงที่สุด! การกระทำความผิดทางอาญาได้รับการบันทึกไว้แล้ว ก่อนที่ตำรวจสหพันธรัฐจะมาถึง คุณจะได้รับโอกาสในการให้การผ่านระบบออนไลน์...”"]}, {"t": "ถึงเวลาจบเรื่องนี้เสียที!", "c": ["[คำเตือน...ไม่มีสัญญาณ...คำเตือน...ไม่สามารถเชื่อมต่อกับเครือข่ายได้...โปรดค้นหาแหล่งสัญญาณให้ทันเวลา...]", "ใบหน้าของลินน์ฉายแววประหลาดใจและยินดีขึ้นมาในทันที ทว่าเมื่อมองเห็นข้อค ารณ์ไว้ แอนล็อคที่หลบซ่อนตัวอยู่ในกระดองเต่า ก็เริ่มสัมผัสได้ถึงความอ่อนแรงที่แผ่ซ่านไปทั่วร่าง อาการวิงเวียนศีรษะ และวิสัยทัศน์ที่พร่ามัว พลังอันเปี่ยมล้นที่เคยมีดูเหมือนจะค่อยๆ ลอกหลุดออกไปจากร่างกายทีละน้อย", "‘นี่มันเวทมนตร์บ้าอะไรกัน?’", "ในชั่วพริบตา แอนล็อคก็นึกไปถึงเวทมนตร์ระดับสี่วงแหวนที่เรียกว่า เวทมฤตยูเก็บเกี่ยว เวทมนตร์อันน่าสะพรึงกลัวที่สามารถเปลี่ยนพื้นที่บริเวณหนึ่งให้กลายเป็นเขตแดนต้องห้ามสำหรับสิ่งมีชีวิตได้ภายในเวลาเพียงไม่กี่วินาที", "แต่ถ้าหากอีกฝ่ายเป็นจอมเวทผู้ยิ่งใหญ่ที่สามารถร่ายเวทระดับสี่วงแหวนได้จริง เขาก็คงตายไปตั้งแต่เสี้ยววินาทีแรกที่ปะทะกันแล้ว!", "‘ต้องเป็นยาพิษแน่ๆ’", "แอนล็อคนึกถึงความเป็นไปได้นี้ขึ้นมาทันที ยกตัวอย่างเช่น เวทมนตร์ระดับสามวงแหวนอย่าง เวทอาณาเขตพิษ ก็สามารถสร้างหมอกพิษสีเขียวอมเหลืองเป็นวงกว้างซึ่งมีเอกลักษณ์เฉพาะตัวอย่างเด่นชัด...", "ทว่าตอนนี้มันสายเกินกว่าจะร่ายพลังศักดิ์สิทธิ์เพื่อถอนพิษแล้ว ลินน์ไม่ยอมปล่อยให้ช่วงเวลาที่ศัตรูอ่อนแอที่สุดหลุดมือไป เขาเค้นพลังเวทที่เหลืออยู่ทั้งหมดออกมาในทันที!", "“เวทห่าฝนศรเวท!”", "ศรเวทมนตร์สามสิบหกดอกลอยคว้างอยู่กลางอากาศในพริบตา ลินน์ถึงขนาดยอมเปิดใช้งานโหมดโอเวอร์โหลดสามวินาทีอีกครั้ง เพื่อปรับเปลี่ยนเส้นทางการบินของพวกมันอย่างรวดเร็ว", "เมื่อต้องเผชิญหน้ากับยุทธวิธีซ่อนตัวในกระดองเต่าของแอนล็อค ลินน์ก็ไม่มีความตั้งใจที่จะปะทะด้วยตรงๆ เขาเลือกที่จะใช้ความพลิกแพลงของศรเวทมนตร์อ้อมผ่านพลังปราการศักดิ์สิทธิ์ที่แทบจะไร้เทียมทาน แล้วโจมตีเข้าที่จุดอ่อนเพื่อส่งบิชอปแห่งอาณาเขตนอร์ดแลนด์ผู้นี้ลงนรกไปเสีย!", "หลังจากผ่านมานานถึงยี่สิบห้าปี ในที่สุดแอนล็อคก็ได้ลิ้มรสความตายที่กำลังคืบคลานเข้ามาอีกครั้ง!", "ในวินาทีแห่งความเป็นความตายนี้ แอนล็อคกลับเยือกเย็นลงอย่างน่าเหลือเชื่อ เขาไม่สงสัยเลยว่าตนเองจะต้องจบชีวิตลงที่นี่ในวันนี้ แต่ก่อนหน้านั้น เขายังคงสามารถทำสิ่งหนึ่งได้ นั่นคือการลากไอ้พ่อมดหนุ่มที่สามารถร่ายเวทระดับสามวงแหวนได้คนนี้ลงนรกตามเขาไปด้วย!", "“ข้าแต่จ้าวแห่งดวงดาวอันยิ่งใหญ่ เทพีแห่งจันทรา พระผู้เนรมิตผืนดินและสรรพชีวิต ข้ารับใช้ผู้ต่ำต้อยขอสวดภาวนา ณ ที่แห่งนี้ และขออุทิศร่างกายอันอ่อนแอ เพื่อวิงวอนขอให้เงาฉายแห่งองค์พระผู้สูงสุดเสด็จลงมาจุติ ณ สถานที่แห่งนี้...”", "แอนล็อคสวดภาวนาด้วยความศรัทธา ทุกถ้อยคำที่เอื้อนเอ่ยนั้นทำให้เขาแก่ชราลง ผิวหนังของเขาเริ่มเหี่ยวย่น เส้นผมสีขาวร่วงหล่นจากหน้าผากลงมาถึงหางตา และน้ำเสียงของเขาก็แหบพร่าทุ้มต่ำลงเรื่อยๆ...", "ท่ามกลางความเลือนลาง ดูเหมือนจะมีบทสวดสรรเสริญอันศักดิ์สิทธิ์ดังกึกก้องขึ้นในพื้นที่ใต้ดินอันปิดตายนี้ มันค่อยๆ กลบเสียงของแอนล็อคไปจนหมดสิ้น ไม่นานนัก พื้นที่ทั้งบริเวณก็สั่นสะเทือนอย่างรุนแรง", "“พลัง...จุติศักดิ์สิทธิ์งั้นรึ?”", "วิญญาณของลินน์แทบจะหลุดออกจากร่าง พร้อมเค้นคำพูดลอดไรฟันออกมา", "หลังจากทะลุมิติมายังโลกใบนี้ และได้เรียนรู้ว่าเหล่านักบวชแห่งศาสนจักรสามารถครอบครองพลังศักดิ์สิทธิ์ของจริง สิ่งที่เขาหวาดกลัวและไม่อยากจะเผชิญหน้ามากที่สุดก็คือ", "พลังจุติศักดิ์สิทธิ์!", "สิ่งใดก็ตามที่ถูกขนานนามว่าเทพเจ้า ย่อมไม่อาจประเมินค่าได้ต่ำเกินไป ต่อให้เป็นเพียงแค่เงาฉายที่นำพาเศษเสี้ยวพลังมาเพียงหยิบมือ มันก็มากพอที่จะบดขยี้เขาให้แหลกสลายได้ด้วยปลายนิ้ว!", "‘สู้ไม่ได้ก็เรียกเทพมาช่วย... พวกนี้มันยังเป็นคนกันอยู่หรือเปล่าเนี่ย?’", "แม้จะสบถด่าอยู่ในใจ แต่ลินน์ก็ซัดศรเวทมนตร์ที่กำหนดเป้าหมายเอาไว้ออกไปโดยไม่ชักช้า เขาไม่กล้าแม้แต่จะรอดูว่าแอนล็อคตายหรือไม่ รีบกระโจนลงไปในแม่น้ำใต้ดินที่ไหลเชี่ยวเบื้องหลังโดยไม่ลังเลแม้แต่น้อย", "ศรเวทมนตร์กว่าสามสิบดอกพุ่งทะยานไปตามเส้นทางที่กำหนดไว้ล่วงหน้า พวกมันอ้อมผ่านพลังปราการศักดิ์สิทธิ์อันแข็งแกร่ง และพุ่งเข้ากระแทกแอนล็อค ก่อนจะปะทะเข้ากับขุมพลังอันลึกลับบางอย่าง", "เสียงระเบิดดังกึกก้องต่อเนื่องเปรียบเสมือนฟางเส้นสุดท้ายที่ทำให้อูฐหลังหัก พื้นที่ใต้ดินที่ต้องทนรับการโจมตีอย่างหนักหน่วงมานับไม่ถ้วน เริ่มพังทลายลงอย่างรวดเร็ว!", "ก้อนหินขนาดยักษ์หนักหลายตันร่วงหล่นลงมาจากเพดานอย่างต่อเนื่อง กระแทกลงบนพื้นดินและผืนน้ำ นำพาเอาควันและฝุ่นละอองหนาทึบที่กลืนกินทุกสิ่งทุกอย่างรอบตัว", "ในเวลานี้ ลินน์ได้ถูกกระแสน้ำอันเชี่ยวกรากพัดพาไปแล้ว...", "ในฐานะของคนที่ใช้ชีวิตส่วนใหญ่อยู่ในเขตตอนกลางอันแห้งแล้งของสหพันธรัฐ ลินน์จึงไม่มีประสบการณ์ในการว่ายน้ำเลย พลังเวทและพละกำลังที่เกือบจะหมดเกลี้ยงก็ได้พรากโอกาสในการดิ้นรนไปจากเขา ปล่อยให้เขาต้องตกอยู่ภายใต้ความเมตตาของกระแสน้ำอันรุนแรง...", "ทว่าบนใบหน้าของลินน์กลับไม่มีร่องรอยของความกังวลแม้แต่น้อย เพราะอาชีพเก่าของเขาในฐานะเสมียนจัดเก็บข้อมูลเมื่อชาติที่แล้ว ทำให้เขารู้ดีว่าคนที่ว่ายน้ำไม่เป็นจะสามารถเอาชีวิตรอดในกระแสน้ำเชี่ยวได้อย่างไร", "ประการแรก ต้องตั้งสติให้มั่น นี่คือรากฐานของทุกสิ่ง", "ประการที่สอง จงใช้ประโยชน์จากแรงพยุงของน้ำให้ได้อย่างเต็มที่", "อย่างที่ทุกคนรู้กันดี ความหนาแน่นของร่างกายมนุษย์นั้นมีมากกว่าน้ำ ซึ่งนั่นคือเหตุผลว่าทำไมคนเราถึงค่อยๆ จมลงหลังจากตกน้ำ", "อย่างไรก็ตาม ก่อนที่จะกระโจนลงมา ลินน์ได้สูดลมหายใจเข้าลึกๆ ไปแล้ว จากนั้นเขาก็ผ่อนคลายร่างกายทุกส่วนให้มากที่สุด ปรับจุดศูนย์ถ่วงของตัวเอง และจัดท่าทางให้อยู่ในท่านอนหงายเพื่อเพิ่มพื้นที่สัมผัสกับผิวน้ำ", "ด้วยวิธีนี้ ตราบใดที่เขากลั้นหายใจไว้จนกว่าจะลอยไปถึงบริเวณที่กระแสน้ำสงบลง เขาก็จะลอยขึ้นสู่ผิวน้ำได้เองตามธรรมชาติ", "อิงตามทฤษฎีนี้ ลินน์จึงจัดระเบียบร่างกายให้อยู่ในท่านอนหงายที่ได้มาตรฐานที่สุดด้วยความเยือกเย็น แม้ว่าร่างกายของเขาจะค่อยๆ จมลงอย่างช้าๆ แต่เขาก็ไม่ได้ใส่ใจ โดยคิดว่ามันเป็นเพียงผลกระทบจากกระแสน้ำ ทว่าเมื่อยิ่งจมลึกลงไป ความวิตกกังวลก็เริ่มคืบคลานเข้ามาในใจของเขา", "‘หรือว่าท่าลอยตัวกรรเชียงของเรามันยังไม่ได้มาตรฐานพอกันนะ?’", "‘071? นี่มันเกิดอะไรขึ้นเนี่ย?’", "ลินน์อดไม่ได้ที่จะร้องถามในใจ", "เสียงแจ้งเตือนจากปัญญาประดิษฐ์สนับสนุนดังก้องขึ้นในเวลาต่อมา", "[อ้างอิงจาก คู่มือความปลอดภัยในการดำน้ำแห่งสหพันธรัฐ มาตรา 7 หมวดที่ 32 มือใหม่ไม่ควรพกพาของหนักในขณะฝึกดำน้ำนะท่าน...]", "ลินน์ก้มลงมองดาบยาวเหล็กกล้าที่เหน็บอยู่ข้างเอว จากนั้นร่างของเขาก็จมดิ่งลงสู่ก้นแม่น้ำโดยตรง..."]}, {"t": "ขอโทษที มนุษย์ต่างดาวไม่มีสิทธิมนุษยชนหรอกนะ", "c": ["ยามเย็น เมื่อแสงสุดท้ายของดวงอาทิตย์อัสดงกำลังจะเลือนหายไป ลินน์ก็ลอยคออยู่กลางทะเลสาบมาเกือบหนึ่งวันเต็มแล้ว!", "เมื่อคิดได้ว่าดาบยาวที่เกะกะเล่มนี้เป็นของที่ยืมมาจากจอห์นนี่ ลินน์จึงลังเลอยู่นานและตัดสินใจที่จะไม่โยนมันทิ้งไป ทว่าภายใต้คำแนะนำจากการจำลองสถานการณ์ของปัญญาประดิษฐ์สนับสนุน เขาเลยต้องใช้เวลาถึงสองชั่วโมงเต็มในการเรียนรู้วิธีว่ายน้ำท่ากรรเชียงและท่าลูกหมาตกน้ำ", "“071 คราวหน้าถ้ามีเรื่องแบบนี้แกควรจะเตือนฉันล่วงหน้านะ”", "ลินน์กล่าว ขณะที่พยายามตะเกียกตะกายตีน้ำเพื่อหลบหลีกโขดหินที่ยื่นออกมาเบื้องหน้า", "[อ้างอิงจากค งจากผ่านการพูดคุยฉันมิตรช่วงสั้นๆ ความเข้าใจผิดเล็กๆ น้อยๆ ก็คลี่คลายลง ลอดด์เรียกให้ลูกน้องมาเก็บกวาดบ้าน จากนั้นก็เชิญลินน์ให้นั่งลง", "“มีอะไรให้ข้ารับใช้หรือ ท่านพ่อมด?”", "ลอดด์เอ่ยถามอย่างระมัดระวัง", "“ข้ามาเพื่อช่วยท่าน”", "ลินน์ตอบกลับโดยไม่ลังเล", "“จากที่ข้ารวบรวมข้อมูลมา ศาสนจักรได้ส่งทหารยามสามพันนายไปยังเมืองท่า ซึ่งเป็นไปได้สูงว่าเป้าหมายคือสมาคมเดินเรือ!”", "“อาจจะไม่ใช่แบบนั้นก็ได้นะ...”", "ลอดด์ส่ายหน้า เขาเองก็ได้รับข่าวสารมาเช่นเดียวกัน แต่ไม่เห็นด้วยกับการประเมินของลินน์", "“เมื่อสามวันก่อน อาร์ชบิชอปแอนล็อคแห่งอาณาเขตนอร์ดแลนด์ นำกองกำลังบุกจู่โจมเมืองอูเออร์ และปะทะเข้ากับพ่อมดผู้ทรงพลัง พวกเขาสามารถขับไล่พ่อมดผู้นั้นไปได้ก็จริง แต่ก็ต้องแลกมาด้วยความสูญเสียอย่างหนัก ทหารยามสามพันนายเหล่านี้น่าจะมีไว้เพื่อป้องกันพ่อมดผู้นั้นเสียมากกว่า”", "เมื่อพูดถึงตรงนี้ จู่ๆ ลอดด์ก็มองไปที่ลินน์ด้วยความสงสัยที่เริ่มก่อตัวขึ้นในใจ", "“ท่านเดาถูกแล้วล่ะ คนที่ต่อสู้กับท่านอาร์ชบิชอปก่อนหน้านี้คือข้าเอง”", "ลินน์พยักหน้ารับ โดยไม่ได้ปิดบังความจริง", "เมื่อได้ยินลินน์ยอมรับ ลอดด์ก็ถึงกับผงะไป จากข้อมูลที่เขามี แม้ว่าอาร์ชบิชอปแอนล็อคจะสามารถขับไล่พ่อมดไปได้ แต่ตัวเขาเองก็ได้รับบาดเจ็บสาหัสจนไม่อาจรักษาให้หายขาดได้", "ข่าวลือสะพัดไปทั่วว่าสมรภูมิแห่งนั้นถูกแผดเผาจนวอดวาย และเปลวเพลิงอันน่าสะพรึงกลัวเหล่านั้นก็ยังคงไม่ดับมอดลง...", "สิ่งนี้แสดงให้เห็นถึงพลังอันร้ายกาจและความพิลึกพิลั่นของเวทมนตร์บทนั้น...", "หรือว่าคนตรงหน้าเขาผู้นี้คือพ่อมดผู้ยิ่งใหญ่กัน?", "ไม่สิ ไม่น่าจะเป็นไปได้", "ลอดด์ปัดความคิดนั้นทิ้งไปอย่างรวดเร็ว เขาเคยประจักษ์ถึงพลังของจอมเวทผู้ยิ่งใหญ่มาก่อน เวทมนตร์ที่ถูกปลดปล่อยออกมาเต็มกำลังสามารถแช่แข็งวังน้ำวนขนาดยักษ์ที่รู้จักกันในนามของภัยพิบัติสวรรค์ ดวงตามรณะ ได้ชั่วคราว หากลินน์มีพลังระดับนั้น คนที่ต้องวิ่งหนีหัวซุกหัวซุนก็ควรจะเป็นอาร์ชบิชอปแอนล็อคต่างหาก", "เมื่อพิจารณาจากเรื่องนี้ ลอดด์จึงสรุปเอาเองว่าลินน์จะต้องเป็นพ่อมดระดับสามวงแหวนที่ทรงพลังอย่างแน่นอน!", "ลินน์ไม่รู้หรอกว่าลอดด์กำลังคิดอะไรอยู่ จึงอธิบายต่อไป", "“หากท่านคิดว่าการแสดงออกอย่างเอิกเกริกของศาสนจักรเป็นเพียงแค่การพุ่งเป้ามาที่ข้าล่ะก็ ท่านกำลังคิดผิดมหันต์ เป้าหมายที่แท้จริงของแอนล็อคคือการค้นหาเส้นทางที่มุ่งสู่ดินแดนพ่อมดต่างหาก มิฉะนั้น เขาคงไม่เดินทางไปที่เมืองอูเออร์ตั้งแต่แรกหรอก”", "“ยิ่งไปกว่านั้น ข้าเพิ่งได้ข่าวมาว่าแอนล็อคได้จับกุมพ่อมดฝึกหัดไปหลายคนในระหว่างที่เขาเดินทางกลับมาที่เมืองท่า”", "“พวกนางเป็นศิษย์ของอาจารย์โคร และรู้เรื่องเส้นทางรวมถึงความเกี่ยวข้องของสมาคมเดินเรือด้วย ที่ศาสนจักรยังไม่ลงมือ ก็เพราะพวกเขายังรีดเค้นข้อมูลจากพวกนางได้ไม่มากพอยังไงล่ะ”", "“และพวกเราก็มีเวลาไม่มากแล้ว!”", "ลินน์กล่าวด้วยน้ำเสียงขึงขัง"]}, {"t": "นอกเหนือจากนี้ เราไม่มีทางเลือกอื่นแล้ว!", "c": ["เมื่อได้ฟังคำพูดของลินน์ สีหน้าของลอดด์ก็แปรเปลี่ยนไปในทันที เขาสบถด่าโครอยู่ในใจที่เอาเรื่องสำคัญขนาดนี้ไปบอกกับพวกพ่อมดฝึกหัด จนทำให้เขาต้องพลอยติดร่างแหไปด้วย", "เขาไม่คิดว่าลินน์กำลังหลอกลวงเขา เพราะท้ายที่สุดแล้ว ความเคลื่อนไหวของศาสนจักรในช่วงไม่กี่วันที่ผ่านมาก็เป็นสัญญาณที่ชัดเจนมาก", "และก็เป็นเพราะความกังวลนี้นี่แหละ เขาจึงเลือกที่จะซ่อนตัวอยู่ในเงามืด เฝ้าดูสถานการณ์และเตรียมพร้อมที่จะหลบหนีได้ทุกเมื่อ", "แต่ถึงกระนั้นเขาก็ยังถูกจับตัวได้อยู่ดี", "“สมาคมเดินเรือดำเนินกิจการในเมืองท่ามาหลายปี และเครือข่ายข่าวกรองก็น่าจะแม่นยำพอสมควร เจ้ารู้ไหมว่ามีใครบ้างที่ถูกศาสนจักรจับตัวไป?”", "ลินน์เอ่ยถามด้วยความคาดหวัง", "ลอดด์ลังเลอยู่ครู่หนึ่ง ก่อนจะส่ายหน้าและตอบกลับอย่างจนปัญญา", "“ตอนนี้สมาคมเดินเรือถูกจับตามองอย่างเข้มงวด ข้ารู้เรื่องน้อยมาก เกรงว่าท่านอาร์ชบิชอปคงจะปิดข่าวเอาไว้ มีเพียงนักบวชในเมืองท่าเท่านั้นแหละที่จะมีสิทธิ์เข้าถึงข้อมูลลับระดับนี้ได้”", "การติดสินบนและควบคุมนักบวชไม่ใช่เรื่องง่ายเลย คนพวกนี้ครอบครองพลังศักดิ์สิทธิ์อันทรงพลัง มักจะมีความศรัทธาอันแรงกล้า แถมยังไม่ขัดสนเรื่องเงินทอง จัดว่าเป็นพวกที่รับมือได้ยากสุดๆ", "ดังนั้น แม้ว่าสมาคมเดินเรือจะทำธุรกิจในเมืองท่ามาหลายสิบปี เขาก็มักจะหลีกเลี่ยงคนพวกนี้ให้มากที่สุดเท่าที่จะทำได้ พยายามไม่เข้าไปพัวพันกับพวกนักบวชของศาสนจักร", "ลินน์อดไม่ได้ที่จะขมวดคิ้ว เขาหวังว่าจะรวบรวมข่าวกรองได้มากพอจากลอดด์ แต่ไม่คิดเลยว่าแม้แต่ตาเฒ่าคนนี้ก็ยังมืดแปดด้าน ซึ่งผิดไปจากที่เขาคาดคิดไว้อย่างสิ้นเชิง", "“ท่านพ่อมด ท่านตั้งใจจะไปช่วยพวกพ่อมดฝึกหัดที่ถูกจับตัวไปอย่างนั้นรึ?”", "ลอดด์เอ่ยถามหยั่งเชิง", "“ใช่แล้วล่ะ มันก็เป็นเรื่องสำคัญสำหรับเจ้าด้วยเหมือนกันไม่ใช่รึ?”", "ลินน์ตอบกลับอย่างไหลลื่น", "“นั่นคงจะเป็นเรื่องยาก เมืองท่าตอนนี้เต็มไปด้วยทหารยามเดินกันให้ขวักไขว่ และพวกนางก็อาจจะไม่ได้ถูกขังอยู่ที่ท่าเรือด้วยซ้ำ ต่อให้เกิดปาฏิหาริย์ทำให้ท่านช่วยพวกนางออกมาได้สำเร็จ ท่านก็ไม่มีทางหนีออกจากเมืองท่าได้หรอก”", "ลอดด์ส่ายหน้าและเอ่ยแย้ง", "“แทนที่จะไปเสี่ยงแบบนั้น สู้กำจัดพวกนางทิ้งไปเลยยังจะง่ายกว่า ความยากมันต่างกันเยอะเลยนะ!”", "ในเมื่ออีกฝ่ายล่วงรู้ความลับของสมาคมเดินเรือ การทำให้พวกนางหายตัวไปก็น่าจะเพียงพอแล้ว", "ปกติแล้ว การฆ่าคนมันง่ายกว่าการช่วยคนเสมอ!", "ลินน์ไม่ได้ประหลาดใจกับความโหดเหี้ยมของลอดด์ เพระาในต่างโลกที่มืดมนแห่งนี้ ชีวิตมนุษย์นั้นไร้ค่าอย่างแท้จริง โดยเฉพาะเมื่อมันไปเกี่ยวพันกับความลับของดินแดนพ่อมด", "ทว่าลินน์กลับไม่เห็นด้วยกับเขา เขาแค่นเสียงหยันขณะพูด", "“ท่านลอดด์ ท่านคงไม่ได้กำลังเพ้อฝันอยู่หรอกนะ ว่าพอกระแสลมสงบลงแล้ว สมาคมเดินเรือจะสามารถกลับมาดำเนินธุรกิจในเมืองท่าได้อย่างสงบสุขอีกครั้งน่ะ?”", "การที่แอนล็อคเลือกเมืองท่าเป็นฐานที่มั่น ย่อมแสดงให้เห็นว่าเขาพบเบาะแสบางอย่างแล้ว ต่อให้ไป๋เก๋อหรือจอห์นนี่ตายไป ไม่ช้าก็เร็วลอดด์ก็ต้องโดนร่างแหไปด้วยอยู่ดี", "ท้ายที่สุดแล้ว การขนส่งสินค้าส่วนใหญ่ในเมืองท่า ล้วนเชื่อมโยงกับสมาคมเดินเรือทั้งนั้น!", "สีหน้าของลอดด์แปรเปลี่ยนเป็นเคร่งเครียด เขาย่อมคิดถึงเรื่องนี้ได้อยู่แล้ว เพียงแต่ไม่อยากจะยอมรับมันก็เท่านั้น", "ตลอดยี่สิบปีในเมืองท่า ทุกสิ่งทุกอย่างที่เขาสร้างมาล้วนอยู่ที่นี่!", "“ท่านเป็นคนฉลาดนะ ท่านลอดด์ ทางรอดเดียวของพวกเราคือการข้ามทะเลหมอกไปยังดินแดนพ่อมดเท่านั้น มิฉะนั้นแล้ว ด้วยสิ่งที่ท่านทำลงไป ศาสนจักรจะตามล่าท่านไปจนสุดหล้าฟ้าเขียว ไม่ว่าท่านจะซ่อนตัวอยู่ที่ไหนก็ตาม!”", "ลินน์เอ่ยอย่างตรงไปตรงมา", "“หากท่านออกเรือตอนนี้ ท่านก็ยังพอจะเอาทรัพย์สมบัติบางส่วนติดตัวไปได้ แต่ถ้าท่านรอให้แอนล็อคลงมือแล้วละก็ ท่านอาจจะไม่รอดชีวิตเลยก็ได้!”", "ลอดด์จ้องมองลินน์อย่างลึกซึ้ง ดูเหมือนเขาอยากจะพูดอะไรบางอย่าง แต่สุดท้ายก็ทำเพียงถอนหายใจอย่างยอมจำนน", "“จะออกเรือตอนนี้มันสายเกินไปแล้วล่ะ! เมืองท่าเริ่มควบคุมเรือสินค้าอย่างเข้มงวด วันนี้เรือลำใหญ่สองลำที่มีจุดหมายปลายทางไปยังเมืองหลวงก็เพิ่งจะถูกกักตัวไว้”", "“เร็วขนาดนั้นเลยรึ?”", "ลินน์ชะงักไป และเริ่มตระหนักได้ว่าสถานการณ์นั้นเลวร้ายกว่าที่เขาคิด ทว่าเขาก็กลับมาเยือกเย็นได้อย่างรวดเร็ว และเอ่ยถามขึ้น", "“ท่านต้องมีวิธีแก้ปัญหานี้แน่ๆ ใช่ไหม?”", "ช่วงหลายวันที่อยู่ในเมืองท่า เขาแทบจะเวียนหัวกับข้อมูลทั้งจริงและเท็จมากมาย ในขณะที่พยายามตามหาตาเฒ่าเจ้าเล่ห์คนนี้", "หากไม่ใช่เพราะเวทจำแลงกายอันน่าสะพรึงกลัว ที่ช่วยให้เขาสามารถปลอมตัวเป็นหัวหน้าของสมาคมเดินเรือได้ เขาก็คงไม่มีทางจับตัวหมอนี่ได้หรอก", "คนที่มีความรอบคอบสูงเช่นนี้ ลินน์ไม่เชื่อหรอกว่าลอดด์จะไม่ได้เตรียมการรับมือสำหรับวันที่เขาอาจจะถูกขังอยู่ในเมืองเพราะการปิดอ่าว", "เมื่อนึกถึงข้อมูลข่าวกรองทั้งหมดที่เขารวบรวมมาได้ในช่วงหลายวันนี้...", "ในเมื่อท่าเรือถูกปิดแบบกึ่งเบ็ดเสร็จ เรือประเภทเดียวที่มีอิสระในการเข้าออก ก็ต้องเป็นเรือรบที่ทำหน้าที่ลาดตระเวนน่านน้ำเท่านั้น!", "“วิญญาณศักดิ์สิทธิ์ นภาลัย ผู้เฝ้ามอง...เรือลำไหนที่มีคนของท่านอยู่?”", "ลินน์เอ่ยถามด้วยความอยากรู้อยากเห็น", "ใบหน้าของลอดด์กระตุก เขาไม่คาดคิดเลยว่าลินน์จะเดาได้ถึงขนาดนี้ เขาแอบสงสัยว่าหนึ่งในลูกน้องคนสนิทของเขาต้องหักหลังเขาแน่ๆ แต่เขาก็จำต้องยอมรับความจริง", "“เรือนภาลัย!”", "ยอดเยี่ยม!", "ลินน์ทึ่งในวิธีการของลอดด์ ที่สามารถเข้าควบคุมเรือรบได้จริงๆ เพราะเขาแค่ลองหยั่งเชิงดูเท่านั้นเอง", "“มันไม่ได้ง่ายอย่างที่ท่านคิดหรอกนะ แม้ว่ากัปตันเรือนภาลัยจะเป็นคนของข้า แต่การเข้าออกทุกครั้งก็ต้องถูกตรวจสอบ หากมีการออกนอกเส้นทาง พวกเขาก็จะตรวจพบได้อย่างรวดเร็ว”", "ลอดด์เอ่ยแย้ง", "เมื่อออกไปกลางทะเลหมอก เรือรบของพวกเขาก็ต้องพึ่งพาการระดมยิงธนูระยะไกลหรือการพุ่งชน และอีกฝ่ายก็มีนักบวช เพียงพลังศักดิ์สิทธิ์ไม่กี่บทก็สามารถฉีกกระชากเรือที่แข็งแกร่งที่สุดให้แหลกเป็นชิ้นๆ ได้แล้ว", "นอกจากนี้ การเคลื่อนย้ายคนและเสบียงจำนวนมากก็ไม่ใช่เรื่องง่ายเลย", "“เรื่องนั้นท่านไม่ต้องกังวลไปหรอก ตอนที่เราข้ามทะเล พวกนั้นจะไม่มีเวลามาสนใจพวกเราหรอกนะ”", "ลินน์กล่าวด้วยความมั่นใจ", "“ข้ามีแผนแล้ว หากมันได้ผล ต่อให้กองกำลังจะมีขนาดใหญ่แค่ไหน พวกมันก็จะไม่เป็นภัยคุกคามอีกต่อไป แต่ข้าต้องการความช่วยเหลือจากสมาคมเดินเรือ...”", "ลินน์มองไปที่ลอดด์ รอคอยคำตอบของเขา สมาคมเดินเรือมีลูกเรือมากกว่า ะมันยังเป็นเวทมนตร์อันเป็นเอกลักษณ์ของเขาอีกด้วย", "เมื่อถึงเวลานั้น ไม่ว่าแอนล็อคจะลงมือดับไฟหรือตามจับลินน์ เขาก็มีแนวโน้มสูงมากที่จะต้องลงมือด้วยตัวเอง และอาจถึงขั้นต้องส่งกองกำลังชั้นยอดที่ซ่อนตัวอยู่ในเงามืดออกมา", "ยิ่งไปกว่านั้น สินค้าจำนวนมหาศาลที่กองอยู่เต็มท่าเรือ ก็ได้ถูกสมาคมเดินเรือแอบสับเปลี่ยนเป็นดินปืนดำชนิดพิเศษอย่างเงียบๆ ไปแล้ว ทันทีที่มันถูกจุดระเบิด เรือรบที่จอดเทียบท่าและกองทหารที่เข้ามาสนับสนุน ก็จะถูกพัดกระเด็นขึ้นฟ้าไปในชั่วพริบตา!", "หากแอนล็อคถูกระเบิดปลิวไปด้วยก็ยิ่งดี แต่ถึงจะไม่เป็นเช่นนั้น มันก็คงต้องใช้เวลาพักใหญ่กว่าอาร์ชบิชอปจะสามารถกลับมาได้", "ในระหว่างนั้น ลินน์สามารถสวมรอยเป็นเอเดรียนเพื่อบุกเข้าไปในสถานที่คุมขังจอห์นนี่และคนอื่นๆ โดยใช้ความโกลาหลในเมืองท่าเป็นข้ออ้าง และเขายังสามารถปลอมแปลงคำสั่งของอาร์ชบิชอปเพื่อเคลื่อนย้ายนักโทษไปยังสถานที่ที่ปลอดภัยกว่า", "และเมื่อออกมาด้านนอก เขาก็จะได้รับการต้อนรับจากลูกน้องคนสนิทของลอดด์", "แน่นอนว่าทั้งหมดนี้อยู่ภายใต้สมมติฐานที่ว่าทุกอย่างเป็นไปอย่างราบรื่น เพราะสถานการณ์ที่ไม่คาดฝันนับไม่ถ้วนอาจเกิดขึ้นได้ในระหว่างการลงมือ", "ยกตัวอย่างเช่น หากเขาถูกจับได้ในขณะที่ปลอมตัวเป็นเอเดรียนเพื่อเข้าไปในสถานที่คุมขัง หรือหากพวกทหารยามปฏิเสธที่จะทำตามคำสั่งของเขา เขาก็จำต้องพึ่งพาความแข็งแกร่งของตนเองเพื่อแก้ไขปัญหา!", "สถานการณ์ที่เลวร้ายที่สุดก็คือ หากแอนล็อคเลือกที่จะนิ่งเฉย ปล่อยให้เพลิงนรก ลุกลามอย่างรวดเร็วที่ท่าเรือ", "ถ้าเป็นเช่นนั้น ลินน์ก็ไม่มีทางเลือกอื่นนอกจากต้องลงมือดับไฟด้วยตัวเอง เพื่อป้องกันไม่ให้ผู้บริสุทธิ์จำนวนมากต้องมาเดือดร้อนไปด้วย", "หากปล่อยทิ้งไว้โดยไม่สนใจ เมืองท่าทั้งเมืองก็จะกลายเป็นทะเลเพลิง", "ลินน์จำลองสถานการณ์ความเป็นไปได้ต่างๆ ในหัวอย่างต่อเนื่อง จู่ๆ เสียงเอี๊ยดอ๊าดอันแหลมบาดหูก็ดังมาจากโถงทางเดินอันห่างไกล และค่อยๆ ขยับเข้าใกล้มาเรื่อยๆ", "ด้วยความระแวดระวัง ลินน์หยุดฝีเท้าลงทันทีและเงยหน้าขึ้นมอง ไม่นานนักเขาก็สังเกตเห็นร่างๆ หนึ่งอยู่ที่ปลายสุดของโถงทางเดิน", "เด็กสาวผมสีน้ำตาลยืนอยู่ท่ามกลางเงามืด ในมือกุมดาบเรียวยาวที่ลากครูดไปกับพื้น ขณะที่นางก้าวเดิน ชุดสีแดงสลับดำของนางก็ดูน่าขนลุกเป็นพิเศษภายใต้แสงจันทร์สีเงิน", "“ไอวีน่า เจ้ามาทำอะไรที่นี่?”", "ลินน์ ได้”", "“องค์พระผู้เป็นเจ้าผู้เปี่ยมด้วยความเมตตา จะทรงประทานอภัยให้แก่บาปกรรมของพวกเรา...”", "แอนล็อคหันกลับไปมองแสงเพลิงเหนือเมืองท่า และสวดภาวนาด้วยน้ำเสียงแหบพร่า", "“ขอให้ดวงวิญญาณของพวกเขาจงไปสู่สุคติ ณ ดินแดนศักดิ์สิทธิ์ ได้รับการคุ้มครองชั่วนิรันดร์ ขอให้จิตวิญญาณที่แท้จริงของพวกเขาอย่าได้ร่วงหล่นลงสู่ห้วงลึกของเหล่าปีศาจ...”", "เหล่านักบวชภายในโบสถ์ต่างก็แสดงสีหน้าเวทนา และเริ่มสวดบทสรรเสริญอันกลมกลืนกัน สวดภาวนาขอให้ผู้ที่ต้องตกตายในความขัดแย้งครั้งนี้และผู้ที่ต้องทนทุกข์ทรมานอย่างไม่มีที่สิ้นสุดในชีวิต ได้ไปเกิดใหม่ในดินแดนศักดิ์สิทธิ์ขององค์พระผู้เป็นเจ้า..."]}, {"t": "การพลิกผันระหว่างรุกและรับ", "c": ["บทสวดสรรเสริญอันไพเราะดังก้องกังวานอยู่เหนือโบสถ์ สอดประสานไปกับภาพความโกลาหลวุ่นวายภายในเมืองท่า ก่อให้เกิดบรรยากาศอันชวนขนลุก", "เอเดรียนซึ่งยืนอยู่ท่ามกลางเหตุการณ์ทั้งหมด สัมผัสได้ราวกับว่าจิตวิญญาณของตนกำลังถูกชำระล้างด้วยบทสวดสรรเสริญ มันทำให้เขาหวนนึกถึงคำสอนในคัมภีร์ไบเบิล", "ชีวิตและความตายล้วนเป็นสิ่งไร้ความหมาย ทุกหนแห่งคือทุ่งหญ้าขององค์พระผู้เป็นเจ้า ชาวเมืองที่ต้องสละชีพเหล่านี้ก็เพียงแค่ได้กลับคืนสู่อ้อมกอดของพระองค์เร็วขึ้นเท่านั้น", "หลังจากบทสวดสรรเสริญจบลง แอนล็อคก็กวาดสายตามองฝูงชนและเอ่ยด้วยน้ำเสียงแผ่วเบา", "“องค์เอลา พระผู้เป็นเจ้านิรันดร์อันยิ่งใหญ่ จะสถิตอยู่กับพวกเจ้าและข้า!”", "บางทีอาจเป็นเพราะคำพูดของท่านอาร์ชบิชอปสัมฤทธิ์ผล หรืออาจเป็นแสงสว่างแห่งองค์เอลาที่สาดส่องลงมายังเมืองเล็กๆ อันห่างไกลแห่งนี้ ภายนอกโบสถ์ ภาพความโกลาหลจึงเริ่มสงบลงอย่างรวดเร็ว", "แอนล็อคประหลาดใจเล็กน้อย เขาเดินไปที่หน้าต่างและทอดสายตามองลงไปยังพื้นที่ฝั่งตะวันตกเฉียงเหนือของเมืองท่า เปลวเพลิงที่เคยลุกไหม้เหนือยุ้งฉางมอดดับลงแล้ว และชาวเมืองก็กำลังถูกอพยพออกจากพื้นที่ปะทะอย่างเป็นระเบียบ", "เขาไม่เห็นร่างของแม่มดฝึกหัดทั้งสองโดยตรง ทว่าเมื่อประเมินจากวิถีการบินของฝูงอีกาสีเทาบนท้องฟ้า แอนล็อคก็อนุมานได้อย่างรวดเร็วว่าพวกนางทั้งสองกำลังตกที่นั่งลำบาก และกำลังถูกไล่ต้อนออกจากพื้นที่ที่มีผู้คนพลุกพล่าน", "ดูเหมือนจุดหมายปลายทางของพวกนางคือท่าเรือของเมืองงั้นหรือ?", "“ตอนนี้ใครเป็นคนสั่งการอยู่ที่แนวหน้า?”", "แอนล็อคเอ่ยถามด้วยความประหลาดใจ", "“น่าจะเป็นนักบวชแดนนี่กับอัลเบิร์ตขอรับ”", "เอเดรียนตอบกลับ", "ท่านอาร์ชบิชอปครุ่นคิดถึงผลงานที่ผ่านมาของนักบวชทั้งสองรูป เขาจำไม่ได้เลยว่าพวกเขามีความสามารถในการสั่งการที่โดดเด่นถึงเพียงนี้ หรือว่านี่จะเป็นการประเมินสถานการณ์จากหัวหน้าทหารยามของเมืองกันแน่?", "เมื่อคิดได้เช่นนี้ แอนล็อคก็อดไม่ได้ที่จะรู้สึกชื่นชมในพรสวรรค์ เขาจึงส่งทหารยามเฝ้าประตูไปสืบดู", "ไม่กี่นาทีต่อมา ทหารยามนายหนึ่งก็ผลักประตูเข้ามา เขาลอบปรายตามองเอเดรียนที่อยู่ด้านข้างด้วยสีหน้าพิลึกพิลั่น ก่อนจะรายงาน", "“เรียนท่านอาร์ชบิชอป จากคำบอกเล่าของกองกำลังอาสาสมัครที่รับผิดชอบการอพยพ ตอนนี้ผู้ที่สั่งการอยู่คือ...”", "“คือท่านนักบวชเอเดรียนขอรับ!”", "เมื่อได้ยินเช่นนั้น ทุกคนที่อยู่ตรงนั้นก็หันขวับไปมองเอเดรียนเป็นตาเดียว ฝ่ายที่ถูกมองก็งุนงงไม่แพ้กัน เพราะเขาอยู่ในโบสถ์มาตลอดและไม่ได้ออกไปไหนเลย", "ใบหน้าของแอนล็อคมืดครึ้มลงในทันที ตลอดระยะเวลากว่าทศวรรษในฐานะบิชอปแห่งอาณาเขตนอร์ดแลนด์ เขาไม่เคยเผชิญหน้ากับพ่อมดที่เชี่ยวชาญเวทจำแลงกายมาก่อน และเขาก็รู้ดีว่าคนพวกนี้สามารถสร้างปัญหาได้มากแค่ไหน", "ภายใต้สายตาเคลือบแคลงสงสัยของฝูงชน เอเดรียนดูเหมือนจะลุกลี้ลุกลนเล็กน้อยและก้าวถอยหลังไปหนึ่งก้าว ทว่าเขาก็ตั้งสติได้อย่างรวดเร็วและยื่นมือออกไปร่ายพลังศักดิ์สิทธิ์ระดับหนึ่งวงแหวน", "“พลังคำศักดิ์สิทธิ์ โล่”", "เมื่อได้ประจักษ์ถึงโล่ศักดิ์สิทธิ์ที่ส่องประกายแสงศักดิ์สิทธิ์และก่อตัวขึ้นกลางอากาศ เหล่านักบวชที่อยู่ที่นั่นก็คลายความสงสัยลงในทันที", "แต่แล้วความรู้สึกหนาวเหน็บก็แล่นปราดจากปลายเท้าขึ้นสู่สมอง", "หากเอเดรียนตัวจริงอยู่ที่นี่ แล้วใครกันล่ะที่กำลังสั่งการอยู่แนวหน้าในตอนนี้?", "...", "ผู้บัญชาการที่เหล่านักบวชกำลังนึกถึง ในเวลานี้กำลังนั่งอยู่ภายในฐานที่มั่นชั่วคราวทางตอนเหนือของเมืองท่า พร้อมกำลังจิบชาอย่างสบายอารมณ์พลางรับฟังรายงานจากผู้ใต้บังคับบัญชา", "“ท่านเอเดรียน ตามคำสั่งของท่าน กลุ่มอาสาสมัครที่เพิ่งจัดตั้งขึ้นได้ทำการอพยพชาวเมืองเรียบร้อยแล้ว อีกไม่นานพื้นที่ปะทะก็จะถูกเคลียร์จนโล่ง นอกจากนี้ ไฟที่ยุ้งฉางก็ถูกควบคุมไว้ได้แล้ว วิธีการสกัดกั้นเชื้อเพลิงที่ท่านสอนพวกเรานั้นได้ผลดีเยี่ยมจริงๆ ขอรับ...”", "นักบวชแดนนี่อธิบายสถานการณ์ปัจจุบันในเมืองท่าอย่างรวดเร็ว พลางมองลินน์ด้วยสายตาที่เปี่ยมไปด้วยควา
