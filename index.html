<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>นิยายออนไลน์ — อ่านนิยายฟรี</title>
<style>
  :root{
    --bg:#f5f3ef; --card:#ffffff; --text:#2a2a2a; --muted:#6b6b6b;
    --accent:#a6543a; --border:#e3ddd3; --shadow:0 2px 10px rgba(0,0,0,.06);
  }
  html[data-theme="dark"]{
    --bg:#15171c; --card:#1e2128; --text:#dfe1e6; --muted:#8b90a0;
    --accent:#e0895f; --border:#2c3038; --shadow:0 2px 12px rgba(0,0,0,.4);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    font-family:'Segoe UI','Sarabun',Tahoma,sans-serif;
    background:var(--bg); color:var(--text);
    line-height:1.7; transition:background .25s,color .25s;
  }
  header{
    position:sticky; top:0; z-index:10;
    background:var(--card); border-bottom:1px solid var(--border);
    box-shadow:var(--shadow);
  }
  .bar{
    max-width:820px; margin:0 auto; padding:14px 18px;
    display:flex; align-items:center; gap:12px;
  }
  .logo{font-size:20px; font-weight:700; color:var(--accent); cursor:pointer; white-space:nowrap}
  .spacer{flex:1}
  .btn{
    background:transparent; border:1px solid var(--border); color:var(--text);
    padding:7px 12px; border-radius:8px; cursor:pointer; font-size:14px;
    display:inline-flex; align-items:center; gap:6px; transition:.15s;
  }
  .btn:hover{border-color:var(--accent); color:var(--accent)}
  main{max-width:820px; margin:0 auto; padding:24px 18px 60px}
  /* list */
  .intro{color:var(--muted); margin-bottom:22px; font-size:15px}
  .grid{display:grid; grid-template-columns:1fr 1fr; gap:16px}
  @media(max-width:600px){.grid{grid-template-columns:1fr}}
  .novel{
    background:var(--card); border:1px solid var(--border); border-radius:14px;
    padding:18px; cursor:pointer; box-shadow:var(--shadow); transition:transform .15s;
  }
  .novel:hover{transform:translateY(-3px)}
  .cover{
    height:120px; border-radius:10px; margin-bottom:14px;
    display:flex; align-items:center; justify-content:center;
    font-size:40px; color:#fff;
  }
  .novel h3{font-size:17px; margin-bottom:6px}
  .tag{
    display:inline-block; font-size:12px; color:var(--accent);
    background:color-mix(in srgb,var(--accent) 12%,transparent);
    padding:2px 9px; border-radius:20px; margin-bottom:8px;
  }
  .novel p{font-size:13.5px; color:var(--muted)}
  .meta{font-size:12px; color:var(--muted); margin-top:10px}
  /* detail */
  .back{color:var(--accent); cursor:pointer; font-size:14px; margin-bottom:18px; display:inline-block}
  .detail-head{display:flex; gap:18px; margin-bottom:24px; flex-wrap:wrap}
  .detail-head .cover{width:120px; height:160px; flex-shrink:0; font-size:52px}
  .detail-info h2{font-size:22px; margin-bottom:8px}
  .detail-info .desc{color:var(--muted); font-size:14.5px; margin-top:10px}
  .chapters{list-style:none}
  .chapters li{
    padding:14px 16px; border:1px solid var(--border); border-radius:10px;
    margin-bottom:10px; cursor:pointer; background:var(--card);
    display:flex; justify-content:space-between; align-items:center; transition:.15s;
  }
  .chapters li:hover{border-color:var(--accent)}
  .chapters .num{color:var(--muted); font-size:13px}
  /* reader */
  .reader h2{font-size:24px; margin-bottom:4px}
  .reader .chap-title{color:var(--muted); margin-bottom:24px; font-size:15px}
  .reader-body{font-size:var(--reader-size,18px); transition:font-size .12s}
  .reader-body p{margin-bottom:1.1em}
  .toolbar{
    display:flex; gap:8px; align-items:center; flex-wrap:wrap;
    background:var(--card); border:1px solid var(--border); border-radius:12px;
    padding:10px 14px; margin-bottom:24px; box-shadow:var(--shadow);
  }
  .toolbar span{font-size:13px; color:var(--muted); margin-right:2px}
  .nav-chap{display:flex; gap:10px; margin-top:36px}
  .nav-chap .btn{flex:1; justify-content:center}
  .nav-chap .btn:disabled{opacity:.4; cursor:not-allowed}
  footer{text-align:center; color:var(--muted); font-size:13px; padding:30px 0}

  /* ===== Responsive: แท็บเล็ต ===== */
  @media(max-width:600px){
    .grid{grid-template-columns:1fr}
    .bar{padding:12px 14px; gap:8px}
    .logo{font-size:18px}
    main{padding:18px 14px 48px}
    .btn{padding:9px 12px}                 /* ปุ่มใหญ่ขึ้น กดบนจอสัมผัสง่าย */
    .detail-head{gap:14px}
    .detail-head .cover{width:90px; height:130px; font-size:40px}
    .detail-info h2{font-size:19px}
    .reader h2{font-size:20px}
    .reader-body{--reader-size:17px}
  }

  /* ===== Responsive: มือถือจอเล็ก ===== */
  @media(max-width:400px){
    .logo{font-size:16px}
    #themeBtn{padding:8px 10px; font-size:13px}
    main{padding:16px 12px 40px}
    .novel{padding:15px}
    .cover{height:100px; font-size:34px}
    /* ปกกับข้อมูลเรื่องวางเป็นแนวตั้งกลางจอ */
    .detail-head{flex-direction:column; align-items:center; text-align:center}
    .detail-head .cover{width:110px; height:150px}
    .chapters li{padding:13px 14px}
    /* ปุ่มเปลี่ยนตอนเรียงลงมาแทนเรียงข้าง */
    .nav-chap{flex-direction:column}
    .toolbar{justify-content:center}
  }

  /* ไม่ให้ไฮไลต์สีฟ้าเวลาแตะบนมือถือ + ปกไม่ถูกลากเลือก */
  .novel,.chapters li,.btn,.logo,.back{-webkit-tap-highlight-color:transparent}
</style>
</head>
<body>
<header>
  <div class="bar">
    <div class="logo" onclick="showList()">📖 นิยายออนไลน์</div>
    <div class="spacer"></div>
    <button class="btn" id="themeBtn" onclick="toggleTheme()">🌙 กลางคืน</button>
  </div>
</header>
<main id="app"></main>
<footer>เว็บตัวอย่างสำหรับอ่านนิยาย · สร้างด้วย HTML ไฟล์เดียว</footer>

// ---------- สถานะ ----------
const app = document.getElementById('app');

// โหมดกลางคืน
function toggleTheme(){
  const html = document.documentElement;
  const dark = html.getAttribute('data-theme') === 'dark';
  html.setAttribute('data-theme', dark ? 'light' : 'dark');
  document.getElementById('themeBtn').textContent = dark ? '🌙 กลางคืน' : '☀️ กลางวัน';
}

// ขนาดฟอนต์
let fontSize = 18;
function changeFont(delta){
  fontSize = Math.min(30, Math.max(14, fontSize + delta));
  document.documentElement.style.setProperty('--reader-size', fontSize + 'px');
  const lbl = document.getElementById('fontLabel');
  if(lbl) lbl.textContent = fontSize + 'px';
}

// ---------- หน้ารายชื่อ ----------
function showList(){
  window.scrollTo(0,0);
  let html = '<p class="intro">เลือกนิยายที่อยากอ่าน มีทั้งหมด '+NOVELS.length+' เรื่อง 📚</p><div class="grid">';
  NOVELS.forEach(n=>{
    html += `<div class="novel" onclick="showNovel('${n.id}')">
      <div class="cover" style="background:${n.color}">${n.emoji}</div>
      <span class="tag">${n.genre}</span>
      <h3>${n.title}</h3>
      <p>${n.desc.slice(0,70)}...</p>
      <div class="meta">${n.chapters.length} ตอน</div>
    </div>`;
  });
  html += '</div>';
  app.innerHTML = html;
}

// ---------- หน้ารายละเอียด ----------
function showNovel(id){
  window.scrollTo(0,0);
  const n = NOVELS.find(x=>x.id===id);
  let html = `<span class="back" onclick="showList()">← กลับหน้าหลัก</span>
    <div class="detail-head">
      <div class="cover" style="background:${n.color}">${n.emoji}</div>
      <div class="detail-info">
        <span class="tag">${n.genre}</span>
        <h2>${n.title}</h2>
        <div class="meta">${n.chapters.length} ตอน</div>
        <p class="desc">${n.desc}</p>
      </div>
    </div>
    <h3 style="margin-bottom:14px">รายชื่อตอน</h3>
    <ul class="chapters">`;
  n.chapters.forEach((c,i)=>{
    html += `<li onclick="readChapter('${id}',${i})">
      <span>ตอนที่ ${i+1}: ${c.title}</span>
      <span class="num">อ่าน →</span>
    </li>`;
  });
  html += '</ul>';
  app.innerHTML = html;
}

// ---------- หน้าอ่าน ----------
function readChapter(id, idx){
  window.scrollTo(0,0);
  const n = NOVELS.find(x=>x.id===id);
  const c = n.chapters[idx];
  const paras = c.body.map(p=>`<p>${p}</p>`).join('');
  let html = `<div class="reader">
    <span class="back" onclick="showNovel('${id}')">← กลับไปหน้าเรื่อง</span>
    <div class="toolbar">
      <span>ขนาดตัวอักษร</span>
      <button class="btn" onclick="changeFont(-2)">A−</button>
      <span id="fontLabel">${fontSize}px</span>
      <button class="btn" onclick="changeFont(2)">A+</button>
    </div>
    <h2>${n.title}</h2>
    <div class="chap-title">ตอนที่ ${idx+1}: ${c.title}</div>
    <div class="reader-body">${paras}</div>
    <div class="nav-chap">
      <button class="btn" onclick="readChapter('${id}',${idx-1})" ${idx===0?'disabled':''}>← ตอนก่อนหน้า</button>
      <button class="btn" onclick="readChapter('${id}',${idx+1})" ${idx===n.chapters.length-1?'disabled':''}>ตอนถัดไป →</button>
    </div>
  </div>`;
  app.innerHTML = html;
}

// เริ่มต้น
showList();
</script>
</body>
