เล่ห์อีกบทหนึ่ง และจากนี้ไปมันย่อมตกเป็นของเขา!", "คำชื่นชมของลินน์ทำให้ลูโอร์ไม่แน่ใจว่าเขากำลังถูกหยอกเย้าอยู่หรือไม่", "ท้ายที่สุดแล้ว การต่อสู้ครั้งนี้จบลงด้วยความพ่ายแพ้ของเขาอย่างหมดรูป เริ่มตั้งแต่การถูกบีบให้ตกที่นั่งลำบากด้วย ศรเวท ระดับศูนย์วงแหวน จนถึงการที่ สังหารด้วยไอร้อนอุณหภูมิสูง ของเขาถูกแก้ทางได้อย่างง่ายดายหลังจากที่เพิ่งจะได้เปรียบด้วยไอเทมเวทมนตร์เพียงเล็กน้อย...", "เขาแทบจะไร้ซึ่งความสามารถในการโต้กลับเลย!", "ทว่าลูโอร์ไม่รู้เลยว่า คำชื่นชมของลินน์นั้นเปี่ยมไปด้วยความจริงใจ!", "หากไม่ใช่เพราะช่วงหลายวันที่ผ่านมา เขาสามารถจารึกช่องเก็บเวทสำหรับ ไนโตรเจนเหลว อาณาเขตน้ำแข็ง ได้สำเร็จ การประลองครั้งนี้ก็อาจจะมีพลิกโผไปแล้วก็ได้", "เพียงแค่พ่อมดระดับสองวงแหวนที่สามารถทำได้ถึงขนาดนี้ สัญญาณเตือนภัยในใจของลินน์ก็ดังขึ้นมาทันที เขารู้สึกว่าตนเองประมาทเกินไปเมื่อเลือกใช้เวทมนตร์พื้นฐานเพื่อปกปิด เปลวเพลิงฟอสฟอรัสขาว", "ขณะที่ลินน์กำลังทบทวนตัวเอง เฮลรามก็ได้ประกาศผลการประลองเป็นที่เรียบร้อย และเหล่านักเรียนกับศาสตราจารย์ที่อยู่โดยรอบต่างก็รีบพากันกรูเข้ามามุงดู", "“หนาวจัง!”", "ธีโอดอร์เพิ่งก้าวเข้ามาในสนามฝึกซ้อมและเดินไปได้ไม่กี่ก้าว เขาก็ตัวสั่นโดยไม่ตั้งใจ ความเร็วในการเคลื่อนไหวของธาตุทั้งหลายในสายตาของเขาลดต่ำลงจนเหลือเพียงน้อยนิด", "นี่ยังเป็นช่วงเวลาหลังจากที่มีคนหยุดร่ายเวทไปเพื่อป้องกันไม่ให้ข้อมูลรั่วไหล แต่ไอเย็นบางส่วนก็ยังคงตกค้างอยู่ ณ ที่แห่งนั้น...", "นักเรียนที่ขี้สงสัยบางคนถึงกับนั่งยองๆ ลงกับพื้น และสัมผัสเข้ากับแผ่นกระเบื้องที่เคยถูกปกคลุมไปด้วยน้ำแข็ง", "“พื้นดูไม่ค่อยจะเย็นเท่าไรเลยนะ?”", "เพียร์ซกล่าวด้วยความแปลกใจ แต่เมื่อเขาพยายามจะดึงนิ้วกลับมา เขากลับต้องตกใจสุดขีดที่พบว่านิ้วของเขาติดหนึบอยู่กับแผ่นกระเบื้อง!", "ในตอนนั้นเอง เพียร์ซถึงได้ตระหนักว่าไม่ใช่เพราะกระเบื้องที่ไม่เย็น แต่เป็นเพราะเขาเสียความรู้สึกสัมผัสที่นิ้วไปแล้วในเสี้ยววินาทีที่สัมผัสกับแผ่นกระเบื้องนั้น!", "พ่อมดฝึกหัดคนอื่นๆ ที่ใจร้อนต่างพากันร้องโอดโอยเรียกหาพ่อแม่ เมื่อพบว่ามือของตนติดหนึบอยู่กับแผ่นกระเบื้องและไม่สามารถดึงออกได้", "สภาพอันน่าเวทนาของคนกลุ่มหนึ่งทำให้คนที่สงสัยพอๆ กันอย่างเอล็อค ต้องตัวสั่นสะท้านอย่างควบคุมไม่ได้ และรีบถอยห่างจากแผ่นกระเบื้องที่ลินน์เพิ่งก้าวผ่านไป", "“พวกเจ้ามันโง่เง่า เวทมนตร์ทุกบทล้วนมีอันตรายถึงชีวิต และไม่ควรจะไปสัมผัสพลังเวทที่ตกค้างอยู่โดยประมาท!”", "ศาสตราจารย์สาขาวิชาแปรสภาพอย่างเควิน ตะโกนขึ้นเมื่อเห็นเหตุการณ์เช่นนั้น ก่อนที่เขาจะรีบร่ายเวทเปลี่ยนหินเป็นโคลน เพื่อทำลายแผ่นกระเบื้องที่เต็มไปด้วยไอเย็นนั้น", "เมื่อเป็นเช่นนั้น เพียร์ซและคนอื่นๆ จึงสามารถดึงนิ้วของตนออกมาได้ แต่ทว่าผิวหนังบริเวณนั้นกลับยังคงไร้ความรู้สึก และใบหน้าของพวกเขาก็ซีดเผือดลง", "หลังจากตรวจสอบดูแล้ว เควินก็อดไม่ได้ที่จะรู้สึกตกใจ ภายในเวลาเพียงไม่กี่วินาที ผิวหนังบริเวณที่สัมผัสได้ตายลงอย่างสมบูรณ์ไปเสียแล้ว...", "การที่เวทมนตร์เพียงเศษเสี้ยวจะสามารถหลงเหลือพลังถึงเพียงนี้ได้เชียวหรือ?", "หากใครคนใดคนหนึ่งถูกโจมตีเข้าเต็มๆ พวกเขาจะไม่ถูกแช่แข็งจนกลายเป็นน้ำแข็งในทันทีเลยหรือ?", "เควินมองดูลินน์ด้วยความทึ่ง พลางรู้สึกขอบคุณที่เพียร์ซและคนอื่นๆ แม้จะซุกซนไปบ้าง แต่ก็สัมผัสเพียงแค่ปลายนิ้วเท่านั้น ทำให้พื้นที่สัมผัสมีจำกัด และอย่างมากที่สุดก็เพียงแค่สูญเสียผิวหนังไปชั้นหนึ่งเท่านั้น ยังไม่ถือว่าเป็นอาการบาดเจ็บที่ร้ายแรงจนเกินไปนัก..."]}, {"t": "ตอนที่ 88", "c": ["บทที่ 88 : ไอ้คำว่าอัจฉริยะนั่นน่ะ มันก็แค่ชื่อที่ว่างเปล่าเท่านั้นแหละ!", "“ศาสตราจารย์ลินน์ ข้าเคยเชื่อว่าพวกที่เรียกตัวเองว่าเป็นอัจฉริยะทางเวทมนตร์ก็ไม่ได้มีอะไรพิเศษไปกว่าคนอื่นหรอก อย่างดีที่สุดก็แค่ขยันกว่าหรือมีโอกาสพบเจอสิ่งที่ดีกว่าเท่านั้น”", "เควินจ้องมองลินน์ด้วยสายตาที่ซับซ้อนอย่างยิ่ง", "“แต่จนกระทั่งวันนี้ ข้าถึงได้เข้าใจอย่างถ่องแท้ว่าความคิดนั้นมันน่าขันเพียงใด!”", "เดิมทีเขาตั้งใจจะมาเป็นพยานให้กับ เพลิงอมตะ ที่ลอดด์ขาเป๋เคยกล่าวถึง แต่เขากลับไม่คาดคิดว่าลินน์จะร่ายเวทมนตร์ที่ทรงพลังและแปลกใหม่ขึ้นมาอีกบทหนึ่งได้ในชั่วพริบตา", "ฟิลิป ทิค และคนอื่นๆ ต่างก็มีสีหน้าที่เปี่ยมไปด้วยอารมณ์ความรู้สึก ในเมื่อโอกาสที่พวกเขาจะพัฒนาพรสวรรค์นั้นแทบจะเป็นศูนย์ แต่สำหรับลินน์แล้ว การก้าวขึ้นเป็นจอมเวทผู้ยิ่งใหญ่หรือกระทั่งจอมเวทระดับตำนานนั้น ก็เป็นเพียงแค่เรื่องของเวลาเท่านั้น", "“ขอบคุณสำหรับคำชมขอรับ ศาสตราจารย์เควิน!”", "ลินน์พยักหน้ารับคำชมนั้นก่อนจะกล่าวต่อ", "“อย่างไรก็ตาม มีสิ่งหนึ่งที่ท่านน่าจะเข้าใจผิด พรสวรรค์ทางเวทมนตร์ของข้านั้นยังห่างไกลจากคำว่าทัดเทียมกับอัจฉริยะเหล่านั้นนัก โดยเฉพาะเมื่อเทียบกับปรมาจารย์ออกัสต์ ผู้ที่ได้รับการยกย่องว่าเป็น ดาวรุ่งแห่งเวทมนตร์”", "“เวทมนตร์ที่ถูกปรับปรุงขึ้นมากมายเหล่านี้ ล้วนตั้งอยู่บนทฤษฎีของนักปราชญ์บางท่านภายในสมาคมเวทมนตร์เร้นลับ ส่วนเรื่องการเลื่อนระดับพ่อมดที่รวดเร็วเกินไปหน่อยนั้น ก็เป็นเพียงเพราะข้าได้สัมผัสกับความลับของคณิตศาสตร์ลี้ลับมานานกว่าพวกท่านทุกคนก็เท่านั้น”", "“และข้าเองก็ไม่มีความมั่นใจเลยสักนิดว่าจะสามารถก้าวเข้าสู่ขอบเขตของจอมเวทผู้ยิ่งใหญ่ได้ภายในสี่ปี”", "ลินน์ส่ายหน้าขณะตอบกลับ", "เพียงแค่ดูเฮลรามที่เคราเปลี่ยนเป็นสีขาวโพลนก่อนจะก้าวขึ้นมาเป็นจอมเวทผู้ยิ่งใหญ่ระดับห้าวงแหวนได้ ก็รู้แล้วว่าปรมาจารย์ออกัสต์นั้นจะต้องเปี่ยมไปด้วยพรสวรรค์ที่วิเศษเลิศเลอเพียงใด ถึงสามารถทะลวงผ่านขอบเขตนี้ไปได้ตั้งแต่อายุเพียงยี่สิบสี่ปี", "ลินน์จะไม่หลงระเริงไปกับคำเยินยอเพียงไม่กี่คำเหล่านั้น", "ฉายาอย่าง อัจฉริยะอันดับหนึ่งแห่งดินแดนพ่อมด มันก็เป็นเพียงแค่ชื่อที่ว่างเปล่าเท่านั้น!", "การแบกฉายาเช่นนี้ไว้อาจเป็นความโอหังที่เกินควร และอีกอย่างเขาก็ไม่มีความสามารถที่คู่ควรกับมันเลยสักนิด เพราะวันใดวันหนึ่งความลับของเขาก็อาจถูกเปิดโปงได้ทุกเมื่อ...", "ความถ่อมตน ของลินน์ทำให้เหล่านักเรียนและศาสตราจารย์ถึงกับพูดไม่ออก หากแม้แต่คนระดับนี้ยังไม่ถือว่าเป็นอัจฉริยะ แล้วพวกเขาเหล่านี้ล่ะคืออะไร?", "ลูโอร์เองก็ตระหนักได้ว่าสิ่งที่ลินน์เพิ่งกล่าวกับเขานั้นน่าจะเป็นความจริง โดยไม่มีความประชดประชันแฝงอยู่เลยแม้แต่น้อย", "นี่เป็นครั้งแรกที่เขาได้พบเจอผู้ที่มีความอ่อนน้อมถ่อมตนเช่นนี้", "ส่วนเรื่องการประลองที่พ่ายแพ้ไป ลูโอร์ไม่ได้ใส่ใจนัก เพราะท้ายที่สุด คู่ต่อสู้ก็เป็นถึงพ่อมดระดับสามวงแหวน การพ่ายแพ้ให้กับผู้ที่เหนือกว่าย่อมไม่ใช่เรื่องน่าแปลกใจ", "แม้จะไม่มีความแตกต่างเชิงคุณภาพระหว่างพ่อมดเต็มตัวด้วยกัน แต่โดยทั่วไป เว้นเสียแต่ว่าอีกฝ่ายจะมีไอเทมเวทมนตร์ราคาแพงไว้ในครอบครอง โอกาสที่จะชนะการต่อสู้ข้ามระดับนั้นมักจะมีน้อยจนน่าเวทนา", "“เอาล่ะ ในเมื่อการประลองสิ้นสุดลงแล้ว ข้าคิดว่าคงไม่มีผู้ใดตั้งข้อกังขาต่อผลการประเมินระดับพ่อมดของศาสตราจารย์ลินน์อีกแล้วกระมัง...”", "ทิคกวาดสายตามองไปรอบๆ เหล่านักเรียนและศาสตราจารย์ที่รวมตัวกันอยู่ที่สนามฝึกซ้อม เมื่อเห็นว่าไม่มีใครคัดค้าน เขาจึงสั่งให้ผู้ช่วยนำกล่องสองใบออกมา", "ภายใต้สายตาของผู้คน ทิคเปิดกล่องใบแรกซึ่งบรรจุเข็มกลัดที่ทำจากทองคำบริสุทธิ์สามอัน สลักด้วยอักขระเวทมนตร์อันซับซ้อนที่สื่อถึงสภาพ่อมดอย่างประณีต", "รูปทรงของเข็มกลัดทั้งสามนั้นคล้ายคลึงกันมาก และข้อแตกต่างเพียงอย่างเดียวคือตรงกลางของเข็มกลัดได้รับการฝังอัญมณีล้ำค่าไว้หนึ่งถึงสามเม็ด", "“ในนามของสภาพ่อมด และต่อหน้าปรมาจารย์เฮลราม ข้าขอแต่งตั้งให้ท่านเป็นพ่อมดระดับสามวงแหวนอย่างเป็นทางการ!”", "ทิคนำเข็มกลัดอันสุดท้ายออกมาและก้าวไปข้างหน้าอย่างเคร่งขรึม เพื่อติดเข็มกลัดนั้นลงบนเสื้อคลุมบริเวณหน้าอกของลินน์", "“ขอบคุณขอรับ ท่านทิค!”", "ลินน์พยักหน้ารับ", "เสียงปรบมืออันอบอุ่นดังระงมไปทั่วสนามฝึกซ้อม เพื่อเป็นการแสดงความยินดีกับสถานะใหม่ของลินน์ และเป็นการยกย่องที่เขาเพิ่งมอบการต่อสู้อันน่าทึ่งให้ได้ชม", "“ข้าไม่นึกเลยว่าศาสตราจารย์ลินน์จะเป็นพ่อมดระดับสามวงแหวน...”", "เอล็อคกล่าวด้วยความตื่นเต้น แม้ว่าศาสตราจารย์จะดูมีอายุไล่เลี่ยกับพวกเขาก็ตาม", "“ข้าบอกพวกเจ้าแล้วอย่างไรล่ะ มีเพียงพ่อมดระดับสามวงแหวนเท่านั้นที่จะมีคุณสมบัติเป็นศาสตราจารย์ที่สถาบันอิเยตาได้...”", "แม่มดฝึกหัดที่ชื่อเดบร้าประกาศอย่างภาคภูมิใจ ก่อนจะเริ่มจับกลุ่มนินทากับเพื่อนๆ คาดเดาถึงอายุของศาสตราจารย์ในปีนี้ว่าเขาจะมีคนรักหรือยัง และเวทมนตร์บทใดกันที่เขาใช้เอาชนะลูโอร์", "“ขอแค่เขาอายุไม่เกินสามสิบปี ข้าก็ไม่ขัดข้องหรอกนะ...”", "แม่มดผมแดงที่อยู่ใกล้ๆ เอ่ยขึ้นอย่างกล้าหาญ", "“ข้าไม่เหมือนเจ้า ข้าไม่สนหรอกว่าศาสตราจารย์จะอายุเท่าไร...”", "เดบร้าเผลอพูดออกมาโดยไม่รู้ตัว ก่อนจะรีบปิดปากเงียบ แต่ก็มีแม่มดฝึกหัดหญิงหลายคนที่ได้ยินเช่นนั้น ต่างก็หน้าแดงก่ำ ก่อนจะเริ่มหัวเราะคิกคักและล้อเลียนกันเอง", "ทว่าจอห์นนี่กลับทำหน้ามึนงงและไม่ได้เข้าร่วมวงสนทนาด้วย เพราะนางจำได้ว่าลินน์เพิ่งจะเริ่มเรียนเวทมนตร์ได้เพียงครึ่งปีเท่านั้น และตอนนี้เขากลับกลายเป็นพ่อมดระดับสามวงแหวนไปเสียแล้ว", "นับตั้งแต่การพบกันครั้งนั้นที่เมืองอูเออร์ นางก็รู้สึกว่าตนเองยิ่งไม่เข้าใจเพื่อนเก่าคนนี้เข้าไปทุกที", "“นี่คือเสื้อคลุมของท่านขอรับ ศาสตราจารย์ลินน์!”", "บนสนามฝึกซ้อม หลังจากติดเข็มกลัดให้ลินน์แล้ว ทิคก็เปิดกล่องอีกใบและหยิบเสื้อคลุมที่ตกแต่งไว้อย่างประณีตออกมา", "เสื้อคลุมตัวนี้เป็นสัญลักษณ์บ่งบอกถึงสถานะและยังเป็นไอเทมเวทมนตร์อีกด้วย โดยมันมีคุณสมบัติในการต้านทานเวทมนตร์เล็กน้อยและสามารถร่ายเวททำความสะอาด ได้วันละหนึ่งครั้ง", "ลินน์ยื่นมือออกไปรับ มองดูเสื้อคลุมและเข็มกลัดที่ดูฉูดฉาดเล็กน้อยนั้น แล้วพลันรู้สึกว่าเหรียญตราและชุดยูนิฟอร์มของศาสตราจารย์ที่สถาบันอิเยตาออกให้ดูจะน่ามองกว่ากันมาก โดยกุญแจสำคัญคือมันดูจริงใจกว่ากันเยอะเลย!", "ทิคส่งมอบของทั้งสองให้ลินน์ จากนั้นจึงหยิบม้วนกระดาษปาปิรุสยาวเหยียดออกมาและเริ่มอ่านกฎระเบียบของดินแดนพ่อมด", "นอกเหนือจากกฎระเบียบที่น่าเบื่อหน่ายซึ่งมีอยู่เดิมในจักรวรรดิเซคัส สิ่งที่ถูกกล่าวถึงมากที่สุดคือบทลงโทษสำหรับพ่อมดที่ทำร้ายพลเรือน ซึ่งมีการระบุรายละเอียดไว้ในทุกข้อ", "ตัวอย่างเช่น หากพ่อมดเต็มตัวทำร้ายคนธรรมดาที่ไม่รู้เรื่องเวทมนตร์โดยไม่มีเหตุผล หรือทำการทดลองเวทมนตร์ต้องห้ามเป็นการส่วนตัวจนส่งผลให้พลเรือนเสียชีวิต พวกเขาจะต้องเผชิญกับบทลงโทษโดยการใช้แรงงานหรือจำคุกเป็นเวลาอย่างน้อยหลายปี", "และหากความผิดร้ายแรงจริงๆ พวกเขาอาจถึงขั้นถูกถอนสถานะพ่อมดและได้รับโทษประหารชีวิต", "การทำร้ายพ่อมดเต็มตัวด้วยกันนั้นจะมีผลลัพธ์ที่รุนแรงยิ่งกว่า ทั้งอาจถูกส่งไปขุดเหมืองหินเวทมนตร์ตลอดชีวิต จำคุกตลอดชีวิต หรือถูกประหารชีวิต", "“ข้าต้องขอถามหน่อยว่า ท่านเป็นพ่อมดสายจิตวิญญาณหรือไม่ ศาสตราจารย์ลินน์?”", "หลังจากอ่านกฎข้อที่หนึ่งร้อยจบ ทิคก็มองไปที่ลินน์และสอบถาม", "“ไม่ใช่ขอรับ”", "ลินน์ส่ายหน้า เขายังไม่ได้ศึกษาเวทมนตร์สายจิตวิญญาณที่ว่านั่นเลยแม้แต่น้อย", "“ในเมื่อเป็นเช่นนั้น ก็ไม่จำเป็นต้องกล่าวถึงกฎระเบียบเรื่องการใช้เวทมนตร์สายจิตวิญญาณหรอก แต่แค่จงจำสิ่งหนึ่งเอาไว้ ว่าสภาพ่อมดสั่งห้ามการวิจัยเวทมนตร์สายจิตวิญญาณเป็นการส่วนตัว และหากท่านสนใจจริงๆ ท่านก็สามารถมุ่งหน้าไปยังสถาบันพลังจิตวิญญาณในกรีนรีลเพื่อเข้าเรียนอย่างเป็นระบบได้”", "ทิคเตือนเขาด้วยน้ำเสียงจริงจัง", "ลินน์ค่อนข้างประหลาดใจ แม้ว่าเขาจะเคยเรียนรู้เกี่ยวกับแนวทางอันระมัดระวังของดินแดนพ่อมดที่มีต่อเวทมนตร์สายจิตวิญญาณจากฟิลิปมาก่อนหน้านี้แล้ว แต่นึกไม่ถึงเลยว่าถึงขั้นจะมีกฎระเบียบทางกฎหมายที่เฉพาะเจาะจงแม้กระทั่งสำหรับการใช้เวทมนตร์สายจิตวิญญาณ..."]}, {"t": "มือยักษ์ที่ยื่นขึ้นสู่ท้องฟ้า", "c": ["เมื่อเห็นว่าลินน์จดจำกฎระเบียบเหล่านี้ได้แล้ว สีหน้าของทิคก็ผ่อนคลายลง และบรรยากาศอันเคร่งเครียดก่อนหน้านี้ก็มลายหายไป", "ในตอนนั้นเอง ลินน์ที่ยังคงสงสัยเล็กน้อยก็เอ่ยถามขึ้น", "“ท่านทิคขอรับ ข้าเคยได้ยินมาว่าพ่อมดต่างถิ่นมักจะต้องผ่านช่วงเวลาสังเกตการณ์ก่อน จึงจะได้รับการแต่งตั้งให้เป็นพ่อมดเต็มตัวไม่ใช่หรือขอรับ?”", "“โดยส่วนตัวแล้วข้าเชื่อว่าช่วงเวลาสังเกตการณ์นั้นไม่จำเป็นอีกต่อไปแล้ว แต่ตามขั้นตอนแล้ว ข้าก็ยังคงต้องพักอยู่ที่เมืองท่าอิเยตาเป็นเวลาหนึ่งเดือน และข้าก็อยากจะถือโอกาสนี้ขอคำปรึกษาจากท่านเกี่ยวกับองค์ความรู้ของคณิตศาสตร์ลี้ลับบางอย่างด้วย”", "ทิคกล่าวด้วยรอยยิ้ม", "ในเมื่ออีกฝ่ายได้เข้าร่วมกับสถาบันเวทมนตร์อิเยตาแล้ว มันก็เทียบเท่ากับการได้รับการรับรองจากจอมเวทผู้ยิ่งใหญ่เฮลราม เขาจึงไม่รังเกียจที่จะรวบรัดขั้นตอนเพื่อเป็นการเอาอกเอาใจ", "“แน่นอนขอรับ ไม่มีปัญหาเลย ข้าเองก็สนใจในการเล่นแร่แปรธาตุอยู่มากเช่นกัน และเมื่อถึงเวลานั้น ข้าคงต้องขอความกรุณาให้ท่านทิคช่วยถ่ายทอดความรู้ให้ข้าบ้างแล้ว”", "ลินน์ตอบกลับอย่างลื่นไหล", "เขาตระหนักดีว่าในโลกใบนี้ ความรักและความเกลียดชังไม่เคยเกิดขึ้นโดยไร้สาเหตุ นับตั้งแต่ที่เขามาถึงดินแดนพ่อมด การปฏิบัติเป็นพิเศษทั้งหมดที่เขาได้รับ ล้วนเป็นเพราะเขาสามารถนำผลประโยชน์มาให้ผู้อื่นได้ทั้งสิ้น", "เฮลรามตั้งตารอคอยองค์ความรู้แปลกใหม่ที่เขามี โดยหวังว่ามันจะนำชื่อเสียงมาสู่สถาบันเวทมนตร์อิเยตา ในขณะที่คนอื่นๆ ต่างก็เชื่อว่าเขาแข็งแกร่งและเปี่ยมไปด้วยพรสวรรค์ เป็นบุคคลที่ไม่ควรล่วงเกินและคุ้มค่าที่จะผูกมิตรด้วย", "ดังนั้น ลินน์จึงไม่ขัดข้องที่จะใช้ความรู้ทางวิทยาศาสตร์พื้นฐานบางอย่างเพื่อแลกกับตัวตน สถานะ เงินทอง และความรู้ทางเวทมนตร์ มันก็คือการแลกเปลี่ยนทรัพยากร ซึ่งมีความมั่นคงมากกว่าความสัมพันธ์ส่วนใหญ่เสียอีก", "หลังจากพิธีมอบสถานะสิ้นสุดลง ลินน์ก็ถูกรายล้อมไปด้วยกลุ่มศาสตราจารย์และนักเรียนที่กระตือรือร้นแล้วถูกพาตัวไปฉลองในทันที", "ล่วงเข้าสู่เวลาบ่ายสามโมง ลินน์ที่อยู่ในอาการมึนเมาก็ปฏิเสธการประคองจากธีโอดอร์ และเดินกลับไปที่ห้องของตนเองเพียงลำพัง", "ทว่าในวินาทีที่เขาปิดประตูห้อง อาการมึนเมาของเขาก็มลายหายไปจนแทบจะหมดสิ้น", "เห็นได้ชัดว่าอาการเมามายที่แสดงออกมานั้น เป็นเพียงข้ออ้างเพื่อจะได้ดื่มน้อยลงเท่านั้น นักปราชญ์ที่แท้จริงย่อมไม่ปล่อยให้ตนเองตกอยู่ในสภาวะที่สติสัมปชัญญะพร่ามัวอย่างง่ายดาย", "ลินน์นั่งขัดสมาธิลงบนเตียง และเริ่มต้นการทำสมาธิตามกิจวัตรประจำวัน พลังจิตวิญญาณของเขาแผ่ขยายออกไป โอบล้อมทุกธาตุที่เขาสามารถสัมผัสได้ และเขาก็รักษารูปแบบการเคลื่อนไหวอย่างสม่ำเสมอ เพื่อผลักดันตัวเองให้ก้าวข้ามขีดจำกัดไปทีละน้อย", "จากการต่อสู้กับลูโอร์ ลินน์ก็ตระหนักได้ว่าตัวเขานั้นมีพลังโจมตีที่รุนแรง แต่กลับเปราะบางมากในด้านการป้องกัน เขาสามารถสังหารศัตรูส่วนใหญ่ได้อย่างง่ายดาย แต่ในขณะเดียวกัน เขาก็อาจถูกสังหารได้ด้วยเวทมนตร์ระดับต่ำเพียงบทเดียวหากป้องกันได้ไม่ดีพอ", "การจะเปลี่ยนแปลงสถานการณ์ที่กลืนไม่เข้าคายไม่ออกนี้ มีวิธีการหลักๆ อยู่สองวิธี  คือการเรียนรู้การเล่นแร่แปรธาตุ หรือไม่ก็ซื้อไอเทมเล่นแร่แปรธาตุมาใช้ เหมือนกับลูโอร์ที่พึ่งพาเครื่องมือในการต่อสู้เพื่อร่ายเวทป้องกันระดับสูง แต่วิธีนี้ทั้งเสียเวลาและมีราคาแพง มันเป็นเพียงการแก้ปัญหาที่ปลายเหตุเท่านั้น", "แน่นอนว่า ทางออกที่ดีที่สุดคือการกลายเป็นพ่อมดเต็มตัวให้เร็วที่สุด เพื่อที่เขาจะได้สามารถสร้างช่องเก็บเวทอย่าง โล่เวทมนตร์ และ เวทคุ้มกันขั้นต้น ไว้ปกป้องตนเองได้อย่างสมบูรณ์", "ในช่วงไม่กี่วันที่ผ่านมา ลินน์สังเกตเห็นว่าการเติบโตของพลังเวทของเขานั้นช้าลง และมันน่าจะหยุดนิ่งภายในเวลาประมาณหนึ่งสัปดาห์ ซึ่งหมายถึงการทะลุขีดจำกัดถึงจุดสูงสุด", "ด้วยเหตุนี้ วิธีการได้มาซึ่ง ต้นกำเนิดเวทมนตร์ สักขวดจึงกลายเป็นปัญหาหลักที่เขาต้องพิจารณา", "การยื่นเรื่องขอ ต้นกำเนิดเวทมนตร์ ในฐานะศาสตราจารย์เพื่อนำมามอบให้นักเรียนก็เป็นวิธีหนึ่ง แต่มันก็มีปัญหาตามมา", "ประการแรก การเพิ่งเริ่มสอนวิชาคณิตศาสตร์ลี้ลับมาได้เพียงครึ่งเดือน จู่ๆ จะมาประกาศว่านักเรียนพร้อมที่จะสำเร็จการศึกษาแล้ว มันดูจะเร่งรีบและเชิญชวนให้เกิดความสงสัยมากเกินไป ยิ่งไปกว่านั้น เขาเพิ่งจะได้รับสถานะพ่อมดเต็มตัว สภาพ่อมดก็คงไม่มีทางอนุมัติคำขอที่ดูไร้เหตุผลเช่นนั้นเป็นแน่", "ดังนั้น วิธีนี้จึงใช้ได้เป็นเพียงทางเลือกสุดท้ายเท่านั้น ทุกอย่างคงจะราบรื่นกว่านี้มากหากเขายินดีที่จะรอไปอีกสักสองสามเดือน", "ประการที่สอง การหาซื้อผ่านตลาดมืดที่อาจจะมีอยู่ และเป็นอีกทางเลือกหนึ่ง", "การทดลองการตกอย่างอิสระเมื่อเช้านี้ทำให้เขาได้รับเหรียญทองเวทมนตร์มาถึงหกสิบเก้าเหรียญในคราวเดียว ส่วนเรือเหาะเองก็จะนำรายได้จำน "เอล็อครู้สึกว่านี่คงจะเป็นช่วงเวลาที่รุ่งโรจน์ที่สุดในชีวิตของเขาแล้ว!", "“กำลังสองคืออะไรหรือ?”", "ทิคเอ่ยถามต่อ คำศัพท์เหล่านี้ล้วนเป็นสิ่งที่แปลกใหม่สำหรับเขา", "“กำลังสองคือผลคูณของตัวเลขสองตัวที่เหมือนกันคูณกันขอรับ...”", "เอล็อคตอบด้วยความมั่นใจเต็มเปี่ยมโดยไม่ต้องเหลือบมองสูตรในสมุดจดเลยด้วยซ้ำ จากนั้นเขาก็อธิบายสูตรการหาพื้นที่ของวงกลมและรูปหลายเหลี่ยมให้ปรมาจารย์นักเล่นแร่แปรธาตุฟัง"]}, {"t": "ข่าวการตายอย่างกะทันหัน 2", "c": ["สีหน้าของทิคฉายแววแห่งความเข้าใจ เมื่อตอนที่เขาเริ่มศึกษาการวาดลวดลายของวงเวท เขาก็สังเกตกฎเกณฑ์ที่คล้ายคลึงกันนี้เช่นกัน แต่ก็เขาไม่ได้นำกฎเกณฑ์ของรูปทรงแต่ละแบบมาจัดเป็นระบบอย่างที่ลินน์ทำ และไม่ได้สร้างให้มันกลายเป็นศาสตร์อีกแขนงหนึ่งโดยอิสระ", "ในนครพ่อมด มีนักเล่นแร่แปรธาตุบางคนที่ชื่นชอบการขบคิดเรื่องพวกนี้ ว่ากันว่ามีใครบางคนสามารถคำนวณค่าพาย (pi) ได้ถึงทศนิยมตำแหน่งที่เก้า ซึ่งนั่นก็นับว่าแม่นยำที่สุดเท่าที่จะเป็นไปได้แล้ว...", "เอล็อคเหลือบมองลินน์ที่อยู่บนหน้าชั้นเรียน พลางเดาว่าการบ้านของเขาน่าจะยังตรวจไม่ถึง ด้วยความคิดนี้ ความคิดอันกล้าหาญก็ผุดขึ้นมาในหัวของเขา เขามองไปที่ทิคและเอ่ยด้วยความประหม่า", "“ท่านทิคขอรับ เมื่อไม่นานมานี้ ศาสตราจารย์ลินน์ได้คิดค้นเกมที่น่าสนใจขึ้นมาเกมหนึ่ง ไม่ทราบว่าท่านสนใจจะลองเล่นดูไหมขอรับ?”", "“เกมอะไรหรือ?”", "ทิครู้สึกใคร่รู้ขึ้นมาเล็กน้อย", "เอล็อคกระปรี้กระเปร่าขึ้นมาทันที เขาหยิบปากกาขนนกขึ้นมาและวาดตารางขนาดสามคูณหกลงบนกระดาษปาปิรุสอย่างลวกๆ หลังจากครุ่นคิดอยู่ครู่หนึ่ง เขาก็กากบาททับช่องสุดท้าย แล้วจึงอธิบายกติกาของเกม", "“เริ่มต้นด้วยเหรียญทองแดงหนึ่งเหรียญ และจำนวนในช่องถัดไปจะต้องเพิ่มขึ้นเป็นสองเท่าของช่องก่อนหน้าอย่างนั้นหรือ?”", "ทิคทวนคำ จากนั้นเขาก็สงสัยว่าเหตุใดเอล็อคถึงต้องจงใจกากบาททับช่องหนึ่งช่องด้วย", "“ถูกต้องแล้วขอรับ และถ้าหากท่านสามารถเติมตัวเลขลงในช่องได้ครบทั้งหมด เหรียญทองทั้งสิบเหรียญนี้ก็จะเป็นของท่าน!”", "เอล็อครีบนำเงินเก็บทั้งหมดของเขาออกมา จากนั้นก็พูดต่อว่า", "“แต่เงินเดิมพันที่ท่านวางลงมาก็ต้องตกเป็นของข้าเช่นกันนะขอรับ!”", "ความแตกต่างระหว่างเหรียญทองแดงหนึ่งเหรียญกับเหรียญทองสิบเหรียญนั้น มากถึงหนึ่งแสนเท่าเลยทีเดียว...", "เกมนี้ยิ่งทำให้ทิครู้สึกสนใจมากขึ้น เขาคิดเลขในใจอย่างรวดเร็ว จากนั้นก็หยิบปากกาและเริ่มเติมตัวเลขลงในช่องว่าง", "เมื่อเขาเขียนตัวเลขตัวสุดท้ายลงไป ทิคก็อุทานออกมาด้วยความประหลาดใจ พลางกล่าวอย่างสนใจว่า", "“น่าหลงใหล ช่างน่าหลงใหลจริงๆ!”", "ค่าในช่องที่สิบเจ็ดคือหกหมื่นห้าพันห้าร้อยสามสิบหก ดังนั้นผลรวมของค่าทั้งหมดก็คือ...", "“ทั้งหมดหนึ่งแสนสามหมื่นหนึ่งพันเจ็ดสิบเอ็ดเหรียญทองแดงขอรับ!”", "เอล็อครีบตอบกลับทันที", "ทิคใช้เวลาเพียงไม่กี่วินาทีในการบวกตัวเลขเหล่านั้นเข้าด้วยกันอย่างรวดเร็ว และมันก็ถูกต้องตรงเป๊ะจริงๆ", "เขารู้ตั้งแต่แรกแล้วว่าเขาจะเป็นฝ่ายแพ้ เพราะท้ายที่สุด พ่อมดฝึกหัดผู้นี้คงไม่มีทางยอมเสียเงินให้ใครเปล่าๆ แน่ แต่เขาก็ไม่คาดคิดเลยว่า เมื่อนำผลรวมของตารางเล็กๆ ทั้งสิบเจ็ดช่องมารวมกัน มันจะทวีคูณมูลค่าเริ่มต้นขึ้นไปถึงหนึ่งแสนสามหมื่นเท่า", "นั่นหมายความว่าอีกฝ่ายกากบาททับไปหนึ่งช่องเพราะกลัวว่าจำนวนเงินจะมากเกินไปจนทำให้เขาขอถอนตัวอย่างนั้นหรือ?", "ทิคถึงกับอึ้งไปชั่วขณะ และในเมื่อเขาไม่ได้พกเหรียญเงินหรือเหรียญทองแดงติดตัวมาเลย เขาจึงหยิบเหรียญทองเวทมนตร์สี่เหรียญออกมาวางลงบนโต๊ะโดยตรง ในเมื่อเขาเป็นคนที่รักษาคำพูดในเรื่องการพนันเสมอ!", "“แค่สามเหรียญทองก็พอแล้วขอรับ!”", "เอล็อคไม่กล้าเรียกร้องอะไรมากไปกว่านั้น เขารีบดันเหรียญทองกลับไปให้หนึ่งเหรียญ", "นักเล่นแร่แปรธาตุผู้นี้ไม่ใช่คนแรกที่เขาใช้ลูกไม้นี้หลอกเอาเงิน หลังจากที่โดนศาสตราจารย์ลินน์ซ้อนแผน เขาก็ตรงกลับบ้านและนำเกมตารางนี้ไปเล่นกับอัลเบิร์ตผู้เป็นพ่อของเขา", "ในท้ายที่สุด ตามทฤษฎีแล้วเขากวาดทรัพย์สมบัติทั้งหมดของตระกูลมาได้ และว่ากันว่าอัลเบิร์ตถึงกับเป็นหนี้เขาถึงหลักหมื่นเหรียญทอง...แต่ในความเป็นจริง เขานั้นไม่ได้เงินเลยแม้แต่แดงเดียว แถมยังโดนซ้อมจนอ่วมอีกต่างหาก!", "จากเหตุการณ์นี้ เขาได้เรียนรู้บทเรียนว่า การโลภมากเกินไปจะนำมาซึ่งการลงโทษ...", "โชคดีที่นักเล่นแร่แปรธาตุผู้นี้เป็นคนรักษาคำพูด!", "เอล็อคเก็บเหรียญทองทั้งสามเหรียญเข้ากระเป๋าอย่างมีความสุข แต่วินาทีต่อมา เขาก็ได้ยินเสียงที่คุ้นเคยดังมาจากหน้าชั้นเรียน", "“เอล็อค ในเมื่อเจ้ามีความเข้าใจในสูตรคณิตศาสตร์อย่างถ่องแท้ถึงเพียงนี้ ทำไมเจ้าไม่ขึ้นมาอธิบายให้ทุกคนฟังหน้าชั้นเรียนเสียหน่อยล่ะ?”", "รอยยิ้มเบิกบานบนใบหน้าของเด็กหนุ่มวัยสิบห้าสิบหกปีแข็งค้างไปในทันที ร่างของเขาสั่นสะท้านอย่างไม่อาจควบคุมได้ขณะที่ค่อยๆ ลุกขึ้นยืนอย่างกล้าๆ กลัวๆ", "ลินน์มองเขาอย่างอ่อนโยน", "เด็กฉลาด รู้จักเอาความรู้ที่ข้าสอนไปหลอกคนอื่น นับว่าเจ้ามีลูกไม้แพรวพราวไม่เบาเลยนะ!", "ภายใต้สายตาที่เปี่ยมไปด้วยความสะใจของเพื่อนร่วมชั้น เอล็อคที่ไม่มีทางเลือกอื่นนอกจากต้องเดินตัวแข็งทื่อขึ้นไปบนโพเดียม หยิบกระดาษปาปิรุสขึ้นมา และเริ่มต้นการบรรยายอย่างตะกุกตะกักโดยใช้ความรู้ตื้นเขินเกี่ยวกับคณิตศาสตร์ลี้ลับที่เขามี...", "เอล็อคไม่เคยรู้สึกเลยว่าเวลาจะผ่านไปอย่างยาวนานและทรมานถึงเพียงนี้ในชีวิตของเขา ความประหม่าทำให้เขาลืมเลือนเนื้อหาไปจนหมดสิ้น ท่ามกลางเสียงหัวเราะที่ดังขึ้นเป็นระยะๆ จากผู้ฟังเบื้องล่าง จนกระทั่งในที่สุด เขาก็ถูกเชิญลงจากเวทีหลังจากผ่านไปเพียงสิบกว่านาที", "เมื่อพิจารณาถึงความก้าวหน้าในการเรียนของทิคและลิเดีย ลินน์จึงใช้เวลาในชั้นเรียนที่เหลือเพื่อทบทวนสูตรทางเรขาคณิตบางส่วนที่เขาเคยสอนไปก่อนหน้านี้", "หลังเลิกเรียน ทิคได้มอบของขวัญตอบแทน เป็นหนังสือที่มีความหนาขนาดสี่นิ้วมือ", "[อักขระเวทและการเล่นแร่แปรธาตุ]", "แม้จะมีตำราเกี่ยวกับการเล่นแร่แปรธาตุพื้นฐานอยู่บ้างในสถาบันเวทมนตร์อิเยตา ทว่าก็ไม่มีเล่มใดที่จะสามารถนำมาเทียบชั้นกับของขวัญจากปรมาจารย์นักเล่นแร่แปรธาตุได้เลย", "หลังจากพลิกดูได้สองสามหน้า ลินน์ก็สังเกตเห็นว่านอกจากบทวิเคราะห์เกี่ยวกับอักขระเวทพื้นฐานในการเล่นแร่แปรธาตุแล้ว หนังสือเล่มนี้ยังมีบันทึกย่อเขียนไว้ที่ด้านล่างของทุกหน้าอีกด้วย", "คำอธิบายประกอบที่มากมายเช่นนี้ย่อมไม่ใช่สิ่งที่ถูกเขียนขึ้นอย่างลวกๆ พวกมันน่าจะมาจากตำราเรียน ที่เคยใช้สอนพ่อมดฝึกหัดระดับหัวกะทิมาก่อน", "ถึงกระนั้น มันก็ยังนับว่าเป็นของขวัญที่ล้ำค่าอย่างยิ่ง ซึ่งแสดงให้เห็นว่าหากต้องเรียนรู้เรื่องการเล่นแร่แปรธาตุ เขาจะสามารถหลีกเลี่ยงการลองผิดลองถูกไปได้มาก", "ลินน์กล่าวคำขอบคุณตามมารยาทเล็กน้อยแล้วจึงเก็บตำราการเล่นแร่แปรธาตุเล่มนั้นไว้", "ทิคซึ่งเพิ่งจะเรียนวิชาคณิตศาสตร์ลี้ลับเสร็จ ในหัวของเขาเต็มไปด้วยคำถามมากมายที่ต้องการคำอธิบายจากลินน์ อย่างไรก็ตาม เมื่อเขาเหลือบไปเห็นเด็กสาวเผ่าฮาล์ฟลิงที่ยังคงป้วนเปี้ยนอยู่ใกล้ๆ ตั้งแต่เลิกเรียน เขาก็ขอตัวลากลับไปอย่างรู้มารยาท", "“ศาสตราจารย์ลินน์!”", "ลิเดียรีบปรี่เข้ามาหันที นางเขย่งปลายเท้าเพื่อวางถุงเงินที่โป่งพองลงบนโพเดียม ยืนเท้าสะเอวและกล่าวด้วยความภาคภูมิใจ", "“เมื่อวานนี้ตลอดทั้งวัน พวกเราขายตั๋วเรือเหาะไปได้แปดร้อยสามสิบเจ็ดใบ รวมเป็นเงินแปดสิบสามเหรียญทองกับอีกเจ็ดสิบเหรียญเงิน ทั้งหมดอยู่ที่นี่แล้วเจ้าค่ะ...”", "เด็กสาวเผ่าฮาล์ฟลิงพูดไม่หยุดถึงบรรยากาศอันคึกคักในจัตุรัสเมื่อช่วงบ่ายวานนี้ โดยมีคนรอคิวขึ้นเรือเหาะทอดยาวไปจนถึงท่าเรือ ทุกคนต่างกระตือรือร้นที่จะคว้าโอกาสในการโบยบินขึ้นสู่ท้องฟ้า...", "การขายตั๋วได้มากมายขนาดนี้ภายในวันเดียวเป็นเรื่องที่ค่อนข้างเหนือความคาดหมายของลินน์ ดูเหมือนว่าความเย้ายวนของการโบยบินนั้นจะมีมากกว่าที่เขาคิดไว้เสียอีก", "“อ้อ แล้วนี่ก็คือสมุดบัญชี ลุงดาร์เรนฝากมาให้ท่านด้วยเจ้าค่ะ!”", "ลิเดียหยิบสมุดเล่มเล็กๆ ออกมาจากด้านข้างและยื่นให้ลินน์ ในนั้นมีรายชื่อของผู้ซื้อตั๋วทั้งหมด และยังระบุรายละเอียดด้วยว่าลูกค้ารอบไหนขึ้นเรือเหาะลำใด", "ลินน์สั่งให้ปัญญาประดิษฐ์สนับสนุนบันทึกข้อมูลทั้งหมดนี้ไว้ จากนั้นเขาก็หยิบส่วนแบ่งของพวกฮาล์ฟลิงจำนวนแปดเหรียญทองกับอีกสามสิบเจ็ดเหรียญเงินออกมาจากถุง และส่งคืนให้ลิเดียพร้อมกับสมุดบัญชี", "“กลับไปบอกดาร์เรนด้วยว่าเขาไม่จำเป็นต้องเอาสมุดนี่มาส่งทุกวันหรอก แค่เอามาให้ข้าดูเป็นระยะๆ ก็พอ”", "เด็กสาวเผ่าฮาล์ฟลิงมีสีหน้างุนงงเล็กน้อย เพราะปฏิกิริยาของลินน์ไม่ได้เป็นไปตามที่ดาร์เรนและคนอื่นๆ คาดการณ์เอาไว้ เมื่อต้องเผชิญหน้ากับเงินก้อนโตขนาดนี้ พวกเขาคิดว่าลินน์จะต้องยืนกรานให้มีการตรวจสอบรายรับรายจ่ายแบบวันต่อวันอย่างแน่นอน", "ลินน์ไม่ได้อธิบายอะไร แต่เขาจงใจลดความเข้มงวดในการควบคุมเรื่องการเงินลง เพื่อดูว่าพวกฮาล์ฟลิงเหล่านี้จะแอบเล่นตุกติกอะไรหรือไม่", "เรือเหาะนั้นเป็นเพียงจุดเริ่มต้นเท่านั้น ยังมีโอกาสอีกมากมายที่จะกอบโกยเหรียญทองเวทมนตร์ในภายหลัง เช่น การนำกระดาษปาปิรุสและกระดาษหนังที่ล้าสมัยซึ่งยังคงใช้กันอยู่ในดินแดนพ่อมดมาปรับปรุงใหม่ เพียงแค่ขายกระดาษ เขาก็สามารถทำกำไรเป็นกอบเป็นกำได้แล้ว", "ทว่าเขาไม่สามารถจัดการเรื่องพวกนี้ด้วยตัวเองได้ทั้งหมด เขาจะต้องจ้างคนที่ไว้ใจได้อย่างแน่นอน", "ทุกอย่างขึ้นอยู่กับว่าพวกฮาล์ฟลิงเหล่านี้จะสามารถต้านทานความโลภของตนเองได้หรือไม่", "ขณะที่ทั้งสองกำลังพูดคุยกัน เสียงฝีเท้าอันเร่งรีบก็ดังมาจากข้างนอก และจากนั้นประตูห้องเรียนก็ถูกผลักเปิดออกอย่างแรง ลินน์หันไปมองและไม่เห็นใครในแวบแรก จนกระทั่งเขาก้มสายตาลงจึงเห็นดาร์เรนพุ่งพรวดเข้ามา", "เพียงแค่วันเดียว ฮาล์ฟลิงที่มีสภาพซอมซ่อผู้นี้ก็ดูอิดโรยลงกว่าเดิมมาก ทันทีที่เข้ามา เขากวาดสายตามองไปรอบๆ อย่างรวดเร็ว และเมื่อเห็นลินน์ เขาก็มีสีหน้าราวกับเห็นผู้ช่วยชีวิต และรีบเดินเข้ามาบอกว่า", "“เกิดเรื่องใหญ่แล้ว ศาสตราจารย์ลินน์ ราล์ฟ...ราล์ฟตายแล้ว!”", "ราล์ฟ? ใครกันล่ะนั่น?", "ลินน์ชะงักไปครู่หนึ่ง ทว่าก่อนที่เขาจะทันได้นึกออก เขาก็ถูกดาร์เรนที่กำลังร้อนรนลากตัวออกไปอย่างเร่งรีบ"]}, {"t": "หมอกนิทราและเวทกัดกร่อน", "c": ["เมื่อลินน์มาถึงที่ท่าเรือของเมืองท่าอิเยตา ฝูงชนกลุ่มหนึ่งก็รวมตัวกันอยู่ในตรอกสลัวข้างโรงเตี๊ยมขวานบิ่น ทันทีที่เขาเบียดตัวแทรกเข้าไป เขาก็เห็นร่างเตี้ยร่างหนึ่งนอนจมกองเลือดอยู่บนพื้น", "ราล์ฟมีความสูงเพียงราวๆ หนึ่งเมตรสามสิบเซนติเมตร และเขาดูค่อนข้างจะแข็งแรงบึกบึน แต่ทว่าร่างกายท่อนบนทั้งหมดของเขากลับกลายเป็นก้อนเนื้อที่เละเทะและอาบไปด้วยเลือด ลำคอหายไปครึ่งหนึ่ง ดวงตาเบิกกว้างด้วยความหวาดกลัว และใบหน้าก็เต็มไปด้วยความสยดสยอง เขายังคงกำประแจเหล็กในมือไว้แน่น", "“โอ้ สวรรค์ ราล์ฟผู้น่าสงสาร ใครกันที่ทำเรื่องโหดร้ายกับเขาถึงเพียงนี้? ดิมิน้อยจะทำอย่างไรหากไม่มีเขาแล้ว?”", "ฮาล์ฟลิงหญิงนางหนึ่งสะอื้นไห้อย่างต่อเนื่อง น้ำเสียงของนางขาดห้วงขณะที่พูด", "“ไอ้สารเลวเอ๊ย ถ้าข้ารู้ว่าใครเป็นคนทำ ข้าจะเอาค้อนทุบหัวมันให้แหลกเลย”", "พวกฮาล์ฟลิงที่อยู่ที่นั่นต่างก็เต็มไปด้วยความโกรธแค้นและเจ็บปวด พวกเขากำหมัดที่หยาบกร้านและเต็มไปด้วยรอยด้าน ทุบลงบนกำแพงเปื้อนฝุ่นของถนนอย่างเกรี้ยวกราด", "แม้แต่ลิเดียที่ปกติมักจะร่าเริงและสดใสอยู่เสมอ ตอนนี้ก็กำลังกำหมัดแน่นด้วยความโกรธแค้นเช่นกัน...", "ทันใดนั้น ลินน์ก็ขมวดคิ้ว และนั่งยองๆ ลงแล้ววางมือไว้เหนือเสื้อคลุมของราล์ฟ ด้วยผลของ หัตถ์เวท ผงสีขาวเล็กน้อยที่ติดอยู่บนตัวของอีกฝ่ายก็ถูกดึงขึ้นมา", "หลังจากทำการแยกส่วนประกอบด้วย เวทแยกแยะวัสดุพื้นฐาน ลินน์ก็ค้นพบว่ามันไม่ใช่สสารทใดๆที่รู้จัก ที่บันทึกไว้ในฐานข้อมูลของระบบเลย...", "“นี่คือผงที่ทำจากรากหญ้าแห้ง มักจะใช้เป็นตัวช่วยในการร่ายเวทระดับหนึ่งวงแหวนอย่างหมอกนิทรา...”", "เสียงหนึ่งดังขึ้นจากเบื้องหลังของเขา ลินน์หันหน้าไปและเห็นว่าเป็นเสียงของพ่อมดชายวัยกลางคนผู้หนึ่ง", "ชายผู้นี้สวมชุดคลุมอย่างเป็นทางการ และประดับด้วยเข็มกลัดที่หน้าอกซึ่งฝังอัญมณีส่องประกายสามเม็ด และมีตราสัญลักษณ์รูปนกอินทรีสีเงินอยู่บนนั้น", "โดยไม่ต้องรอให้ลินน์เอ่ยถาม ชายผู้นั้นก็แนะนำตัวเอง", "“ข้าคือหัวหน้าหน่วยรักษาความปลอดภัยแห่งเมืองท่าอิเยตา ท่านเรียกข้าว่าลีอาก็ได้!”", "ลินน์พยักหน้ารับรู้และเอ่ยถาม", "“สวัสดีท่านลีอา ข้าสงสัยว่าเหตุใดราล์ฟถึงมาตายอยู่ที่นี่ ท่านค้นพบสิ่งอื่นใดอีกหรือไม่?”", "“ข้าเพิ่งจะสอบถามพนักงานของ โรงเตี๊ยมขวานบิ่น มา ฮาล์ฟลิงผู้นี้มาที่นี่ตั้งแต่เช้าตรู่เพื่อดื่มอย่างหนัก จากนั้นเขาก็เดินออกไปตามลำพัง ราวสิบนาทีต่อมา ผู้คนก็ได้ยินเสียงการต่อสู้และเสียงร้องขอความช่วยเหลือดังมาจากในตรอกนี้ กว่าที่พวกเราจะมาถึง ร่างกายของฮาล์ฟลิงผู้นี้ก็ถูกกัดกร่อนอย่างรุนแรง และไม่อาจช่วยชีวิตไว้ได้แล้ว”", "ลีอาเล่าเหตุการณ์สั้นๆ ก่อนจะหยุดชะงักไปครู่หนึ่ง แล้วกล่าวต่อ", "“ข้าคิดว่ามีความเป็นไปได้สูงที่พ่อมดฝึกหัดจะมีส่วนเกี่ยวข้องกับเรื่องนี้ แต่ข้าก็ยังไม่แน่ใจเรื่องแรงจูงใจ แต่อย่างไรก็ตาม ข้าก็ได้ส่งทีมรักษาความปลอดภัยออกไปสืบสวนแล้ว...”", "ลินน์พยักหน้า ยอมรับข้อสันนิษฐานของลีอา หากเป็นพ่อมดเต็มตัว ราล์ฟคงไม่มีโอกาสแม้แต่จะสู้กลับเลยด้วยซ้ำ", "มีเพียงพ่อมดฝึกหัดเท่านั้นที่ต้องพึ่งพาวัสดุเวทมนตร์เมื่อร่ายเวทระดับต่ำ", "ลินน์ก้มลงมองผงสีออกเหลืองที่ลอยอยู่บนฝ่ามือของเขา ผู้ลงมือจะต้องใช้ หมอกนิทรา ก่อนเป็นแน่", "ดังนั้น พวกเขาตั้งใจจะจับราล์ฟทั้งเป็นอย่างนั้นหรือ?", "อย่างไรก็ตาม เห็นได้ชัดว่าพ่อมดฝึกหัดผู้นี้ประเมินสภาพร่างกายของฮาล์ฟลิงต่ำเกินไป หมอกนิทรา จึงไม่ได้ผลตามที่คาดหวัง และยังไปกระตุ้นให้ราล์ฟขัดขืนอีกด้วย...", "ด้วยพละกำลังของราล์ฟ หากเขาสามารถใช้ประแจฟาดเข้าที่ส่วนใดส่วนหนึ่งของคู่ต่อสู้ได้ มันย่อมสร้างความเสียหายอย่างหนักอย่างหลีกเลี่ยงไม่ได้", "ส่วนใครที่เป็นคนจัดการกับราล์ฟในท้ายที่สุด ก็คงจะเป็นเวทกัดกร่อน...", "“มีใครรู้บ้างว่าช่วงหลายวันที่ผ่านมาราล์ฟไปทำอะไรมาบ้าง? เขามีเรื่องบาดหมางกับใคร หรือเผลอหลุดปากพูดอะไรที่ไม่ควรพูดออกไปบ้างหรือไม่?”", "ลินน์มองไปทางพวกฮาล์ฟลิงและเอ่ยถาม", "“ราล์ฟมักจะอยู่ในห้องปฏิบัติการ และสร้างเรือเหาะกับพวกเรามาตลอด เขาไม่ได้ไปไหนเลย...และเมื่อบ่ายวานนี้เขาก็ยังมาช่วยลิเดียขับเรือเหาะอยู่เลย...”", "ดาร์เรนกล่าวด้วยน้ำเสียงสั่นเครือ", "“เมื่อคืนนี้ มีแค่เมื่อคืนนี้เท่านั้น ที่พวกเราออกไปดื่มฉลองกัน และปล่อยให้ราล์ฟอยู่เฝ้าเรือเหาะ เผื่อว่าจะมีใครแอบเข้ามาทำลายมัน...”", "“มันเป็นความผิดของข้าเองที่ทำให้เขาต้องตาย...หากไม่ใช่เพราะข้าจัดการให้เขาต้องอยู่จนดึกดื่น เขาก็คงไม่ต้องไปดื่มเหล้าอย่างหนักที่โรงเตี๊ยมตั้งแต่เช้าตรู่แบบนี้...”", "ดาร์เรนกล่าว พร้อมน้ำตาไหลพราก", "ลินน์ครุ่นคิดอยู่ครู่หนึ่ง และจำได้ว่าเขาเคยเห็นราล์ฟอยู่สองสามครั้งเมื่อตอนที่เขาไปที่ห้องปฏิบัติการ ราล์ฟเป็นหนึ่งในฮาล์ฟลิงที่รับผิดชอบเรื่องการสร้างห้องโดยสารของเรือเหาะ", "ดังนั้น มันเกี่ยวกับแบบแปลนการสร้างเรือเหาะงั้นหรือ?", "ลินน์อดไม่ได้ที่จะพิจารณาถึงความเป็นไปได้นี้ เพราะช่วงเวลาการตายของราล์ฟนั้นช่างประจวบเหมาะเกินไป", "เมื่อเช้าวานนี้ เขาเพิ่งจะทำการทดลองบินที่จัตุรัส และมาวันนี้ หนึ่งในผู้สร้างหลักของเรือเหาะกลับต้องมาตาย ยิ่งไปกว่านั้น ผู้ลงมือยังเริ่มต้นด้วยการใช้หมอกนิทรา ซึ่งเป็นเวทมนตร์ที่ไม่หวังผลถึงชีวิต เห็นได้ชัดว่าเตรียมการมาเพื่อลักพาตัวและรีดเค้นข้อมูลจากเหยื่อ", "แม้จะเป็นเพียงข้อสันนิษฐาน แต่ลินน์ก็ยังคงไต่ถามตามระเบียบว่าราล์ฟมีพฤติกรรมผิดปกติใดๆ เมื่อเร็วๆ นี้หรือไม่ จากนั้นก็เรียกตัวผู้คนหลายคนที่ได้ยินเสียงร้องขอความช่วยเหลือเป็นกลุ่มแรกๆ เข้ามา เพื่อให้พวกเขาเล่าถึงประสบการณ์ตั้งแต่ตอนที่ได้ยินเสียงตะโกนไปจนถึงตอนที่พบศพในตรอกอย่างละเอียด", "น่าเสียดายที่หลังจากไต่ถามไปหลายคำถาม ลินน์ก็พบอย่างว่าเบาะแสนั้นมีน้อยเกินไป เนื่องจากปฏิกิริยาแรกของชาวเมืองเมื่อได้ยินเสียงเอะอะโวยวายในตรอกนั้นไม่ใช่การเข้าไปตรวจสอบ แต่เป็นการวิ่งหนี และการแจ้งหน่วยรักษาความปลอดภัยกับหัวหน้าลีอาก็เป็นสิ่งที่ดีสุดที่พวกเขาสามารถทำได้แล้ว", "ไม่มีใครเลยที่ได้เห็นว่าคนร้ายมีหน้าตาเป็นอย่างไร...", "ลินน์เข้าใจพฤติกรรมนี้เป็นอย่างดี เพราะแม้แต่พ่อมดฝึกหัดก็สามารถสร้างความเสียหายอันน่าสะพรึงกลัวด้วยเวทลูกไฟได้ ภายใต้สถานการณ์เช่นนั้น คงไม่มีใครยินดีที่จะเดินเข้าหาอันตรายอย่างแน่นอน", "เมื่อคิดได้ดังนั้น ลินน์จึงมองไปทางหัวหน้าลีอาด้วยความรู้สึกจนใจและกล่าวขึ้น", "“ท่านลีอา โปรดคอยสังเกตดูในช่วงนี้ด้วย และตามหาคนที่มีความสูงประมาณ 1.7 ถึง 1.75 เมตร ที่อาจจะมีบาดแผลตามขา แขน หรือลำตัว...”", "“ข้าพอจะเข้าใจเรื่องการตามหาคนที่มีบาดแผล แต่ทำไมต้องเจาะจงว่าสูงประมาณ 1.7 เมตรด้วยล่ะ ศาสตราจารย์ลินน์เคยเห็นหน้าคนร้ายมาหรือ?”", "ลีอาเอ่ยถามด้วยความมึนงง", "“ขนาดรองเท้า!”", "ลินน์ชี้ตรงไปยังพื้นดินเบื้องหน้าร่างของราล์ฟและตอบกลับอย่างตรงไปตรงมา", "ดาร์เรนและลิเดียรีบมองตามทิศทางที่ลินน์ชี้ไปทันที แต่สีหน้าของพวกเขากลับกลายเป็นว่างเปล่าเพราะไม่เห็นสิ่งใดเลย", "อย่างไรก็ตาม ลีอากลับทำในสิ่งที่แตกต่างออกไป เขาก้าวเข้าไปยังจุดที่ลินน์ยืนอยู่ และเมื่อมองผ่านการรับรู้ทางจิต เขาก็สามารถมองเห็นรอยเท้าที่ก่อตัวขึ้นจากฝุ่นละอองที่หลงเหลืออยู่บนพื้นได้", "“โดยทั่วไปแล้ว ความยาวของเท้ามักจะสั้นกว่าส่วนสูงประมาณเจ็ดเท่า แน่นอนว่าข้าหมายถึงในกรณีที่คนร้ายเป็นมนุษย์ปกติน่ะนะ!”", "ลินน์อธิบาย พลางสังเกตว่าสัดส่วนความสูงและความยาวเท้าของเขาเองก็ตรงกับมาตรฐานนี้ อย่างไรก็ตาม หากคนร้ายเป็นพวกออร์ค เอลฟ์ หรือสิ่งมีชีวิตประหลาดอื่นๆ มันก็อาจจะไม่เป็นเช่นนั้น", "แต่อย่างน้อย มันก็สามารถใช้เป็นเบาะแสที่เป็นประโยชน์ได้", "ส่วนเรื่องการสะกดรอยตามรอยเท้าไปน่ะหรือ?", "นั่นมันก็ไม่ต่างอะไรกับการงมเข็มในมหาสมุทรเลย", "ตรอกทั้งตรอกถูกฝูงชนที่มุงดูเหยียบย่ำจนเละเทะไปหมดแล้ว มีเพียงบริเวณใกล้ๆ กับศพเท่านั้นที่ยังคงสะอาดพอที่จะหลงเหลือร่องรอยเอาไว้ได้บ้าง"]}, {"t": "อีกด้านหนึ่งของโลก", "c": ["“เป็นเช่นนี้เองหรือ? ข้าได้รับความรู้ใหม่แล้วจริงๆ”", "สายตาของลีอาที่มองลินน์เริ่มแปลกไปเล็กน้อย และเริ่มสงสัยว่าอีกฝ่ายเคยเป็นหัวหน้าหน่วยรักษาความปลอดภัยมาก่อนที่จะข้ามทะเลมายังดินแดนพ่อมดหรือไม่ มิฉะนั้นเหตุใดเขาถึงเชี่ยวชาญการสืบสวนหาเบาะแสยิ่งกว่าตัวเขาเองเสียอีก?", "“นี่คือเหรียญทองเวทมนตร์ห้าเหรียญ นำไปมอบให้ครอบครัวของราล์ฟเถอะ”", "ลินน์หยิบเหรียญทองเวทมนตร์ออกมาจากกระเป๋าและยื่นให้ดาร์เรน", "ในเมื่อมีความเป็นไปได้สูงที่ราล์ฟจะถูกโจมตีเพราะเรื่องเรือเหาะ เขาย่อมต้องแสดงความรับผิดชอบอะไรบ้าง มิฉะนั้นในวันข้างหน้าจะมีใครยินดีช่วยเหลือเขาอีกเล่า?", "อย่างไรก็ตาม ท้ายที่สุดแล้ว เรื่องการสืบสวนก็ทำได้เพียงฝากฝังให้เป็นหน้าที่ของลีอาซึ่งเป็นหัวหน้าหน่วยรักษาความปลอดภัยเท่านั้น", "ท้ายที่สุดแล้ว เขาไม่ได้มีสายลับเป็นของตัวเอง เขาไม่รู้ว่ามีพ่อมดฝึกหัดคนใดบ้างที่ตรงกับเกณฑ์ที่ระบุไว้ และแน่นอนว่าเขาไม่สามารถตามสืบสวนทีละคนด้วยตัวเองได้", "จนถึงตอนนี้ลินน์ถึงเพิ่งจะตระหนักได้ว่า แม้ในช่วงครึ่งเดือนที่ผ่านมาเขาจะมีชื่อเสียงขึ้นมาพอสมควร แต่ในความเป็นจริงเขากลับมีคนให้เรียกใช้งานน้อยมาก ทำให้การรวบรวมข่าวกรองเป็นเรื่องค่อนข้างยากลำบาก", "ด้วยเหตุนี้ ลินน์จึงทำได้เพียงกำชับดาร์เรน ลิเดีย และคนอื่นๆ อย่างจนใจ ให้ระมัดระวังตัวเป็นพิเศษในช่วงนี้ และห้ามไปไหนมาไหนตามลำพังโดยเด็ดขาด", "ในเมื่อความพยายามที่จะลักพาตัวราล์ฟล้มเหลว ก็มีความเป็นไปได้ที่จะมีการลงมือครั้งต่อไป และพ่อมดฝึกหัดผู้นั้นก็น่าจะเป็นเพียงแค่หมากตัวหนึ่งเท่านั้น", "หลังจากรั้งอยู่ในตรอกจนถึงเที่ยงวันโดยไม่พบเบาะแสใดๆ เพิ่มเติม กลุ่มคนก็ไม่มีทางเลือกอื่นนอกจากต้องแยกย้ายกันไป ส่วนศพนั้น ลีอาก็ได้นำกลับไปยังสำนักงานรักษาความปลอดภัย โดยหวังว่าจะพบเบาะแสเพิ่มเติมที่เขาอาจพลาดไปก่อนหน้านี้", "ระหว่างทางกลับไปที่ห้องปฏิบัติการ ลิเดียและคนอื่นๆ นั้นมีท่าทีหดหู่เป็นอย่างมาก ความยินดีที่ได้รับจากการสร้างเรือเหาะและทำเงินเหรียญทองเวทมนตร์ได้อย่างมหาศาลได้มลายหายไปจนสิ้น ถึงกระนั้น พวกเขาก็ยังคงทำตามคำสั่งของลินน์ในการปล่อยก๊าซออกจากถุงลมบรรจุก๊าซของเรือเหาะ", "จากนั้นลินน์ก็ลงมือเปลี่ยนก๊าซไฮโดรเจนที่บรรจุอยู่ในถุงลมเป็นก๊าซฮีเลียมด้วยตัวเอง", "ก๊าซทั้งสองชนิดสามารถให้แรงยกที่เพียงพอแก่เรือเหาะได้ อย่างไรก็ตาม ก๊าซไฮโดรเจนนั้นหาได้ง่าย แต่กลับติดไฟและระเบิดได้ง่ายมาก ดังนั้น มันจึงถูกเลือกใช้เพียงเพื่อช่วยให้ลิเดียผ่านการทดสอบของเฮลรามเท่านั้น", "นอกเหนือจากนั้น เขายังมีความกังวลเล็กๆ อีกประการหนึ่งว่า หากแบบแปลนของเรือเหาะหลุดรอดออกไปและมีใครบางคนสร้างเรือเหาะอีกลำด้วยวิธีการเดียวกัน มันก็จะทิ้งจุดอ่อนที่ร้ายแรงถึงชีวิตเอาไว้", "เพียงแค่เจาะถุงลมบรรจุก๊าซให้เป็นรูและทำให้เกิดประกายไฟแม้เพียงเล็กน้อย สิ่งประดิษฐ์นั้นก็จะกลายเป็นลูกไฟยักษ์กลางเวหาในทันที", "ด้วยความคิดเหล่านี้ในหัว ลินน์จึงก้าวเท้าออกจากห้องปฏิบัติการ มุ่งหน้ากลับไปยังสถาบันอิเยตา แต่เขากลับเห็นใครบางคนที่เขาไม่คาดคิดกำลังยืนรออยู่ที่ประตู", "“คุณลอดด์ มีธุระอะไรกับข้าหรือ?”", "ลินน์หยุดฝีเท้าและมองไปยังบุคคลที่รออยู่หน้าประตู พลางเอ่ยถาม", "“ข้ามีข่าวบางอย่างที่ท่านอาจจะสนใจขอรับ ท่านลินน์ ท่านพอจะสละเวลาฟังหรือไม่?”", "ลอดด์ขาเป๋ค้อมหลังพูดด้ว ่าวด้วยความจนใจเล็กน้อยพลางส่ายหน้า", "“ถ้าอย่างนั้น คำถามสุดท้าย เหตุใดท่านถึงตั้งใจมาบอกข้อมูลนี้กับข้าโดยเฉพาะ? ท่านหวังจะได้สิ่งใดตอบแทนงั้นหรือ?”", "ลินน์ลุกขึ้นยืนและจ้องมองลอดด์ขาเป๋ที่อยู่เบื้องหน้าพลางเอ่ยถาม", "สีหน้าของลอดด์ขาเป๋เปลี่ยนแปลงไปมาหลายครั้ง เขากลืนคำพูดนับไม่ถ้วนลงคอ ก่อนจะตอบกลับด้วยรอยยิ้มเจื่อนๆ ในท้ายที่สุด", "“อันที่จริงแล้ว พวกเราก็แค่กำลังมองหาหนทางเอาชีวิตรอดเท่านั้นขอรับ”", "เขากล่าว", "“ข้าจำได้ว่าตอนที่พวกเราข้ามทะเลมา ท่านพาลูกเรือมาด้วยตั้งสามร้อยคนไม่ใช่หรือ?”", "ลินน์เอ่ยถามด้วยความสงสัย เขาจำได้ว่าลูกเรือเหล่านี้ล้วนเป็นชายหนุ่มที่แข็งแรง แต่ในเวลาไม่ถึงครึ่งเดือน พวกเขากลับกลายสภาพเป็นเหมือนกลุ่มผู้ลี้ภัยไปเสียแล้ว", "ต่อให้ต้องไปรับจ้างทำงานจับฉ่าย มันก็ไม่น่าจะทำให้พวกเขาตกต่ำลงมาจนถึงสภาพเช่นนี้ได้", "“ท่านอาจจะไม่เข้าใจ ดินแดนพ่อมดนั้นไม่เหมือนกับโลกภายนอกหรอกนะขอรับ”", "ลอดด์ขาเป๋ถอนหายใจ", "“สิ่งที่เรามีมากที่สุดที่นี่ก็คือผู้คน หรือข้าควรจะพูดว่า พวกคนยากจนที่ไร้เวทมนตร์อย่างพวกเรา...”"]}, {"t": "เขตฝั่งใต้อันแสนวุ่นวาย", "c": ["ในเมืองท่าอิเยตา พ่อมดฝึกหัดที่รู้จักเวทมนตร์พื้นฐานเพียงเล็กน้อยก็สามารถทำงานแทนกรรมกรนับสิบหรือหลายสิบคนได้แล้ว และหากไม่มีงานอื่นใดให้ทำ อย่างน้อยที่สุดพวกเขาก็ยังสามารถถูกใช้เป็นเสมือนหินเวทมนตร์เพื่อจัดหาพลังเวทได้อย่างไม่จำกัด ดังนั้น ตำแหน่งงานส่วนใหญ่จึงไม่ได้ขาดแคลนคนเลย", "ส่วนเหล่าพ่อมดเต็มตัวนั้น พวกเขาก็ไม่ได้ลงมาเกลือกกลั้วกับงานใช้แรงงาน โดยถ้าพวกเขาไม่ดำรงตำแหน่งสำคัญๆ ภายในเมืองท่า ก็จะทำการวิจัยเวทมนตร์อยู่ในห้องปฏิบัติการสักแห่ง ถือตนว่าเป็นบุคคลชั้นสูงและทรงอำนาจ", "อย่างไรก็ตาม คนกลุ่มนี้ที่มีกันอยู่ราวๆ สามร้อยกว่าคนก็มักจะคอยแย่งชิงธุรกิจกันไปเสียทุกที่", "และเหตุผลที่พวกเขากำลังตกที่นั่งลำบากเช่นนี้ แน่นอนว่าเป็นเพราะพวกเขาพ่ายแพ้ในการแข่งขัน...", "มันช่วยไม่ได้เลย คนอื่นๆ ล้วนมีผู้หนุนหลัง ไม่ว่าจะเป็นการเชื่อมโยงกับห้องปฏิบัติการเวทมนตร์แห่งใดแห่งหนึ่ง หรือมีความเกี่ยวข้องกับพ่อมดสักคน", "แต่เขาไม่มีใครเลย!", "แล้วเขาจะทำอะไรได้อีกในเมื่อเอาชนะคนพวกนั้นไม่ได้?", "แน่นอนว่าเขาก็ต้องกล้ำกลืนและอดทนยอมรับมัน!", "ด้วยเหตุนี้ ตลอดครึ่งเดือนที่ผ่านมา พวกเขาจึงต้องทนทุกข์ทรมานอย่างหนัก และสูญเสียกำลังคนไปบางส่วน แต่โชคยังดีที่พวกเขาสามารถรวบรวมข้อมูลมาได้มากมายเช่นกัน การอาศัยหน้าไม้ทรงอานุภาพหลายสิบกระบอกที่นำติดตัวมาด้วย ทำให้พวกเขาสามารถตั้งหลักในเขตฝั่งใต้ของเมืองได้อย่างฉิวเฉียด", "แต่ก็เห็นได้ชัดว่านี่ไม่ใช่ทางออกที่ยั่งยืน แม้จะเป็นผู้นำของกลุ่มคนสนิทที่ไว้ใจได้ แต่หากพวกเขาไม่สามารถลงหลักปักฐานและทำได้เพียงอาศัยธัญพืชบรรเทาทุกข์อันน้อยนิดประทังชีวิตไปวันๆ แม้แต่ความไว้วางใจที่แข็งแกร่งที่สุดก็ย่อมปรากฏรอยร้าวให้เห็นอย่างหลีกเลี่ยงไม่ได้", "เมื่อได้รับฟังคำบ่นของลอดด์ขาเป๋ ลินน์ก็เริ่มเข้าใจถึงกฎเกณฑ์ที่ซ่อนอยู่เบื้องหลังเมืองท่าอิเยตา เขาเพิ่งจะได้เรียนรู้การมองโลกผ่านมุมมองของเวทมนตร์ และหลายสิ่งหลายอย่างก็กำลังปรับเปลี่ยนการรับรู้ของเขาอย่างต่อเนื่อง", "“นอกจากนี้ พวกเราคงไม่อาจตั้งหลักในเขตฝั่งใต้ได้เลยหากไม่ได้รับความช่วยเหลือจากท่านขอรับ!”", "ลอดด์ขาเป๋กล่าวประจบประแจง", "“ดูเหมือนว่าในช่วงนี้ เจ้าจะยุ่งอยู่กับการอ้างชื่อข้าไปทั่วสินะ...”", "น้ำเสียงของลินน์เย็นชาลงในทันที เพราะเขาไม่ต้องการที่จะสร้างศัตรูโดยไม่รู้ตัว", "“ไม่ขอรับ ไม่ใช่อย่างนั้นแน่นอน เพียงแต่มีคนจำนวนมากรู้ว่าพวกเราข้ามทะเลหมอกมากับท่าน และสามารถเอาชีวิตรอดจากวังน้ำวนขนาดยักษ์มาได้...”", "ลอดด์ขาเป๋รีบส่ายหน้า เป็นการบ่งบอกว่ามันเป็นเพียงผลพลอยได้ที่เกิดจากข่าวลือตามท้องถนนเท่านั้น พวกเขาไม่กล้าทำเรื่องเช่นนั้นหรอก หลังจากลังเลอยู่เล็กน้อย เขาก็ยกมือขวาขึ้นและกล่าวอย่างกล้าๆ กลัวๆ ว่า", "“อีกอย่าง ความร่วมมือของพวกเราก็ยังไม่ได้ถูกยกเลิกไปไม่ใช่หรือขอรับ?”", "ลินน์สังเกตเห็นรอยประทับรูปเปลวไฟอันเด่นชัดบนหลังมือของลอดด์ขาเป๋ในทันที และสีหน้าของเขาก็ฉายแววตื่นตะลึงขึ้นมาเล็กน้อย", "อันที่จริงเขาลืมเรื่องนี้ไปเสียสนิท เพราะในความเป็นจริงแล้ว รอยประทับเวทมนตร์นั้นไม่ได้มีผลใดๆ เลย มันถูกใช้เพียงเพื่อข่มขู่ให้อีกฝ่ายหวาดกลัวและยอมเชื่อฟังเท่านั้น", "อย่างไรก็ตาม ลินน์ไม่ได้เปิดเผยความจริงข้อนี้ และหลังจากครุ่นคิดอยู่ครู่หนึ่ง เขาก็หยิบถุงเงินออกมาจากเสื้อคลุมและโยนให้ลอดด์ขาเป๋", "“นี่คือเหรียญทองเวทมนตร์สิบเหรียญ ถือเสียว่าเป็นค่าตอบแทนสำหรับข้อมูลและการสะกดรอยตามที่จะเกิดขึ้นต่อจากนี้”", "ลอดด์ขาเป๋ยินดีปรีดาเป็นอย่างยิ่งที่ได้รับมัน หากพวกเขายังคงอยู่ในเมืองท่าของจักรวรรดิเซคัส เหรียญทองเวทมนตร์เพียงสิบเหรียญคงไม่ได้มีความหมายอะไรกับเขามากนัก", "แต่ตอนนี้สถานการณ์มันเปลี่ยนไปแล้ว การสูญเสียทรัพย์สมบัติส่วนใหญ่ไปกับดวงตามรณะ และยังต้องแบกรับภาระเลี้ยงดูคนจำนวนมาก ทำให้เขากำลังขาดทุนย่อยยับ เงินก้อนนี้อย่างน้อยก็สามารถช่วยบรรเทาความตึงเครียดของสถานการณ์ลงได้บ้าง", "แต่สิ่งที่สำคัญยิ่งกว่านั้นคือท่าทีของอีกฝ่าย มันหมายความว่าพวกเขากำลังรื้อฟื้นความสัมพันธ์แบบร่วมมือกันขึ้นมาใหม่", "“ต่อจากนี้ จงจับตาดูความเคลื่อนไหวของพ่อมดฝึกหัดผู้นั้นให้ข้าต่อไป และเจ้าพอจะรู้หรือไม่ว่าตอนนี้เขาไปซ่อนตัวอยู่ที่ไหน?”", "ลินน์เอ่ยถาม", "“เป้าหมายมีความระมัดระวังตัวสูงมากขอรับ คนสะกดรอยของข้าเผลอคลาดกับเขาไป แต่ข้าก็เชื่อว่าอาการบาดเจ็บของเขายังไม่หายดี ดังนั้นเขาน่าจะกลับไปที่เดิมอีกในครั้งหน้าขอรับ”", "ลอดด์ขาเป๋รีบอธิบาย", "ลินน์พยักหน้ารับ", "“ครั้งต่อไปที่เขาปรากฏตัว จงให้คนรีบมาแจ้งข้าทันที นอกจากนี้ ข้าต้องการรู้ตัวตนและข้อมูลของคนผู้นี้ให้ละเอียดที่สุดเท่าที่จะเป็นไปได้!”", "ลอดด์ขาเป๋รีบตกปากรับคำทันที ในช่วงเวลานี้ เขาได้รู้จักกับสายข่าวที่กว้างขวางหลายคน สำหรับพ่อมดฝึกหัดแล้ว ตราบใดที่มีเงิน ทุกอย่างก็สามารถจัดการได้ทั้งสิ้น", "“ว่าแต่ ในช่วงนี้เจ้าไปสร้างความเดือดร้อนให้ใครในเขตเมืองฝั่งใต้บ้างหรือไม่?”", "ลินน์เพิ่งจะนึกขึ้นได้ จึงเอ่ยถามด้วยความสงสัย เมื่อพิจารณาจากสภาพของพวกลูกเรือจากแก๊งเดินเรือที่ดูเหมือนเพิ่งจะผ่านการต่อสู้มาหมาดๆ", "“เป็นฝีมือของเรย์โล อสรพิษ หัวหน้าแก๊งของเขตเมืองฝั่งใต้ส่วนนี้ขอรับ เขาผ่านการดัดแปลงเสริมความแข็งแกร่งด้วยเวทมนตร์มาและรับมือได้ยากมาก คราวก่อนเราสูญเสียคนไปไม่น้อยเลยกว่าจะสกัดกั้นการจู่โจมของพวกมันไว้ได้...”", "ลอดด์ขาเป๋อธิบายภาพรวมของสถานการณ์ทั้งหมดอย่างคร่าวๆ เมื่อตอนที่เขามาถึงเมืองท่าอิเยตาเป็นครั้งแรก เขาตั้งใจจะกลับไปทำอาชีพเดิมคือการค้าขายสินค้า แต่เขากลับต้องประหลาดใจเมื่อพบว่าพื้นที่นี้ถูกยึดครองโดยผู้ทรงอิทธิพลหลายรายไปแล้ว", "หลังจากร่อนเร่ไปทั่ว ในท้ายที่สุดเขาก็ไม่มีทางเลือกอื่นนอกจากต้องเข้าไปคลุกคลีกับพวกแก๊งอันธพาลระดับล่าง", "เหตุผลที่เลือกยึดอาณาเขตของเรย์โล อสรพิษ นั้น แน่นอนว่าเป็นเพราะกองกำลังของมันอ่อนแอที่สุด และมันก็ไม่มีผู้หนุนหลังที่แข็งแกร่งคอยคุ้มครองอยู่", "“ดังนั้น เจ้ากำลังจะบอกว่าเจ้ากำลังเผชิญกับปัญหาที่ค่อนข้างใหญ่...แล้วเจ้ามีวิธีแก้ปัญหาหรือไม่?”", "ลินน์เอ่ยถาม", "“การที่ท่านมาปรากฏตัวที่นี่ในวันนี้ มันก็เพียงพอแล้วขอรับ!”", "ลอดด์ขาเป๋กล่าวอย่างระมัดระวัง", "ลินน์ชะงักไปครู่หนึ่ง ก่อนจะเข้าใจความหมายของลอดด์ขาเป๋อย่างรวดเร็ว ตอนที่เขาเดินเข้ามาในเขตเมืองฝั่งใต้นั้น เขาไม่ได้ปลอมแปลงตัวเลยแม้แต่น้อย และใครก็ตามที่มีเจตนาจะสอดแนมก็น่าจะได้รับข่าวนี้ไปแล้ว", "หากข่าวลือที่ว่าแก๊งเดินเรือมีความเกี่ยวข้องกับเขานั้นเป็นเพียงแค่คำบอกเล่าแบบปากต่อปากมาก่อน ตอนนี้มันก็ได้รับการยืนยันแล้ว", "“ข้ามีชื่อเสียงโด่งดังถึงเพียงนั้นเชียวหรือ?”", "ลินน์อดไม่ได้ที่จะรู้สึกประหลาดใจ", "“ตอนนี้ทั่วทั้งอิเยตาก็รู้กันหมดแล้วว่าท่านคือพ่อมดระดับสามวงแหวนที่มีอายุยังไม่ถึงยี่สิบปีด้วยซ้ำ แถมยังมีพรสวรรค์ที่เหนือล้ำยิ่งกว่าท่านออกัสต์ ดาวรุ่งแห่งเวทมนตร์ เสียอีก...\"", "ลอดด์ขาเป๋พรั่งพรูคำสรรเสริญออกมาอย่างไม่หวงแหน จากการต่อสู้ที่เมืองท่า เขาตระหนักดีว่าพ่อมดหนุ่มผู้นี้ เมื่อได้เข้ามาอยู่ในดินแดนพ่อมดแล้ว ย่อมไม่มีทางที่จะถูกลืมเลือนไปอย่างแน่นอน แต่เขาก็ไม่คาดคิดเลยว่าภายในเวลาเพียงครึ่งเดือน ชื่อเสียงของเขาจะพุ่งทะยานขึ้นถึงเพียงนี้", "มีแม้กระทั่งข่าวลือที่ว่า นอกเหนือจากเปลวเพลิงนรกที่ดูราวกับจะแผดเผาได้ทุกสิ่งแล้ว เขายังครอบครองเวทมนตร์อันทรงพลังที่สามารถแช่แข็งได้ทุกสรรพสิ่งอีกด้วย", "เมื่อต้องเผชิญกับคำเยินยอของลอดด์ขาเป๋ ลินน์ก็ไม่ได้ใส่ใจมากนัก เขาตระหนักถึงความแข็งแกร่งในปัจจุบันของตนเองเป็นอย่างดี หากเขาไม่ใช้ความช่วยเหลือจากปัญญาประดิษฐ์สนับสนุน การจะรับมือกับพ่อมดเต็มตัวก็ถือเป็นเรื่องที่ยากลำบากมาก", "ยิ่งไปกว่านั้น ชื่อเสียงนี้ก็เห็นได้ชัดว่าไม่ใช่สิ่งที่ใครๆ จะสามารถแบกรับไว้ได้ อย่างน้อยก็มีกลุ่มหนามสีชาด ที่กล้าวางแผนการสกปรกเช่นนี้ลับหลังเขา", "ขณะที่ครุ่นคิด ลินน์ก็เอ่ยถามข้อมูลเกี่ยวกับเขตเมืองฝั่งใต้และห้องปฏิบัติการเวทมนตร์เหล่านั้นต่อไป ลอดด์ขาเป๋ไม่มีความตั้งใจที่จะปิดบังสิ่งใด และถ่ายทอดข้อมูลทั้งหมดที่เขารวบรวมมาได้ตลอดหลายวันมานี้", "ยิ่งลินน์รับฟัง เขาก็ยิ่งรู้สึกตกตะลึงมากขึ้นเท่านั้น เพราะการจ่ายเงินเพื่อเข้ารับการดัดแปลงเสริมความแข็งแกร่งด้วยเวทมนตร์ในเขตเมืองฝั่งใต้นั้นไม่ใช่เรื่องแปลกประหลาดอะไรเลย วย", "ลินน์ไม่ได้แปลกใจกับเรื่องนี้นัก เมื่อพิจารณาจากสิ่งที่ลอดด์ขาเป๋พูดและสถานการณ์อันวุ่นวายในเขตเมืองฝั่งใต้ สิ่งที่เรียกว่าหน่วยรักษาความปลอดภัยของเมืองก็น่าจะพัวพันอย่างลึกซึ้งกับห้องปฏิบัติการเวทมนตร์เหล่านั้น", "หากเขากดดันพวกเขายิ่งขึ้นไปอีก ผลลัพธ์ที่เป็นไปได้มากที่สุดก็คือ ลีอาจะตามหาและกำจัดพ่อมดฝึกหัดผู้นั้นเพื่อปิดคดีให้เขา โดยที่แทบจะไม่มีโอกาสให้เขาสืบสวนเรื่องนี้ต่อได้เลย", "ในเมื่อไม่มีข้อมูลที่เป็นประโยชน์ ลินน์ก็ไม่มีทางเลือกอื่นนอกจากต้องทำใจให้สงบลงชั่วคราว และดำเนินกิจวัตรประจำวันในฐานะศาสตราจารย์ต่อไป เขาสอนเวทมนตร์และทำการวิจัยไปพร้อมๆ กับค่อยๆ สะสมพลังเวทของเขาไปจนถึงขีดจำกัดสูงสุด", "จนกระทั่งเช้าวันที่สาม ลินน์ซึ่งเตรียมเอกสารมามากมาย ก็พร้อมที่จะทำอะไรบางอย่าง นั่นก็คือการยื่นขอทุนสนับสนุนทางวิชาการ!", "ไม่ว่าจะเป็นการวิจัยเวทมนตร์หรือการสร้างเครือข่ายข่าวกรอง ล้วนแล้วแต่ต้องใช้เงินในแทบทุกด้าน", "เมื่อพิจารณาว่าเรือเหาะเพียงลำเดียวก็ดึงดูดความสนใจจากพวกที่โลภมากได้แล้ว ลินน์จึงไม่มีความตั้งใจที่จะนำสิ่งประดิษฐ์ใหม่ๆ ออกมาเพิ่มเติมในตอนนี้", "ดังนั้น เพื่อที่จะได้เงินทุนก้อนโตมาในเวลาอันสั้น เขาจึงทำได้เพียงเริ่มต้นจากการขอทุนสนับสนุนทางวิชาการเท่านั้น", "ครั้งนี้ เขาเตรียมที่จะยื่นเรื่องขอทุนจำนวนมหาศาลถึง 100 เหรียญทองเวทมนตร์!", "แม้ว่าจำนวนเงินจะค่อนข้างมาก แต่สุภาษิตว่าไว้อย่างไรนะ?", "‘หากต้องการจะเจาะหน้าต่าง ก็จงเสนอให้รื้อหลังคาออกเสียก่อน!’", "แต่แผนการของลินน์ก็ต้องล้มเหลวลงก่อนที่จะได้เริ่มต้นด้วยซ้ำ เมื่อฟิลิปมองดูแผนการสอนอันยาวเหยียด พร้อมส่ายหน้าแล้วยิ้มเจื่อน กล่าวว่า", "“ท่านมาช้าไปหน่อยนะ ศาสตราจารย์ลินน์ ท่านเฮลรามไม่ได้อยู่ที่สถาบันตั้งแต่เมื่อคืนแล้ว”", "“ช่างบังเอิญอะไรเช่นนี้?”", "ลินน์อดไม่ได้ที่จะขมวดคิ้ว", "“จำพ่อมดฝึกหัดสายพลังจิตวิญญาณที่ท่านพามาด้วยได้หรือไม่?”", "ฟิลิปเอ่ยถาม", "“ไป๋เก๋องั้นหรือ?”", "แน่นอนว่าลินน์ยังไม่ลืมเรื่องนี้ และเคยไปเยี่ยมที่ห้องพยาบาลมาแล้วครั้งหนึ่ง ซึ่งก็ยังคงถูกแช่แข็งอยู่ในก้อนน้ำแข็งเหมือนเดิม", "“ใช่แล้ว เมื่อคืนนี้ ท่านเฮลรามได้ออกเดินทางไปพร้อมกับเด็กสาวผู้นั้น และก็น่าจะเดินทางไปถึงนครพ่อมดแล้วล่ะ”", "ฟิลิปกล่าวอย่างไม่ค่อยแน่ใจนัก", "ลินน์พยักหน้ารับ จากนั้นเขาก็ลังเลอยู่ครู่หนึ่งและถามด้วยความมึนงงเล็กน้อยว่า", "“ศาสตราจารย์ฟิลิป ข้ามีเรื่องสงสัยอยู่เรื่องหนึ่ง ดูเหมือนว่าท่านเฮลรามจะค่อนข้างกังวลเกี่ยวกับเรื่องนี้เป็นพิเศษนะขอรับ”", "ไป๋เก๋อเป็นเพียงพ่อมดฝึกหัดธรรมดาที่โครรับเข้ามาในจักรวรรดิเซคัส ตามหลักเหตุผลแล้ว นางไม่ควรจะมีความเกี่ยวข้องใดๆ กับจอมเวทผู้ยิ่งใหญ่เลย", "“บางทีอาจจะเป็นเพราะอิเยตาก็ได้...”", "ฟิลิปคาดเดาอย่างไม่แน่ใจ", "“อิเยตางั้นหรือ? สถาบันแห่งนี้น่ะหรือ?”", "ลินน์ชะงัก เขาไม่ค่อยเข้าใจนักว่าความเป็นอยู่ของไป๋เก๋อจะเกี่ยวข้องกับสถาบันได้อย่างไร", "“ไม่ใช่ ข้ากำลังหมายถึงบุตรสาวของท่านเฮลราม อิเยตา เด็กผู้มีพรสวรรค์ทางเวทมนตร์อันยอดเยี่ยม นางมีส่วนคล้ายคลึงกับเด็กสาวเผ่าฮาล์ฟลิงผู้นั้นอยู่บ้าง แต่น่าเสียดายที่นางเข้ามาพัวพันกับเวทมนตร์เร็วเกินไป จิตใจของนางยังไม่โตพอ และนางก็เสียชีวิตจากอุบัติเหตุทางเวทมนตร์...ดังนั้นเมื่อเขาได้เห็นผู้ใช้พลังจิตที่ชื่อไป๋เก๋อผู้นี้ บางทีมันอาจจะไปกระตุ้นความรู้สึกบางอย่างของเขาก็เป็นได้”", "ฟิลิปกล่าวด้วยน้ำเสียงที่เจือไปด้วยความเสียใจ", "อันที่จริงแล้ว กฎของสถาบันที่ระบุว่านักเรียนต้องมีอายุอย่างน้อยสิบสองปีจึงจะเข้าเรียนได้ ก็มีความเกี่ยวข้องกับเรื่องนี้เช่นกัน เพื่อป้องกันอุบัติเหตุทางเวทมนตร์ที่ไม่จำเป็น", "ลินน์พยักหน้า เข้าใจแล้วว่าเหตุใดท่านเฮลรามจึงยอมอดกลั้นต่อเด็กสาวเผ่าฮาล์ฟลิงที่ชอบสร้างปัญหาและไร้ซึ่งพรสวรรค์ทางเวทมนตร์ถึงเพียงนั้น มันเป็นกรณีของความรักที่เผื่อแผ่ไปถึงสิ่งที่เกี่ยวข้องนั่นเอง", "ในเมื่อจอมเวทผู้ยิ่งใหญ่ไม่อยู่ ลินน์ก็ไม่มีทางเลือกอื่นนอกจากต้องเก็บรายการอุปกรณ์การสอนอันยาวเหยียดนั้นไป ใบเบิกจ่ายของมูลค่าหลายร้อยเหรียญทองไม่ใช่สิ่งที่ศาสตราจารย์เหล่านี้จะสามารถตัดสินใจอนุมัติได้", "“ว่าแต่ ศาสตราจารย์ฟิลิป ข้าได้ยินมาว่ามีห้องปฏิบัติการเวทมนตร์ในเขตเมืองฝั่งใต้หลายแห่งที่ใช้คนยากจนเป็นหนูทดลอง เรื่องนั้นจริงหรือขอรับ? ดูเหมือนว่านี่จะเป็นการละเมิดกฎระเบียบของสภาพ่อมดนะ...”", "ลินน์หยั่งเชิงถาม พลางนึกถึงสิ่งที่เขาได้เห็นและได้ยินมาในเขตเมืองฝั่งใต้เมื่อวันก่อน", "เพียงแค่คำพูดของลอดด์ขาเป๋เพียงอย่างเดียวนั้นไม่เพียงพอที่จะทำให้เขาเชื่อ และลินน์ก็อยากรู้มากกว่าว่าท่านเฮลราม ซึ่งเป็นผู้ปกครองที่แท้จริงของเมืองท่าแห่งนี้ มีมุมมองต่อเรื่องทั้งหมดนี้อย่างไร เขาคงไม่ได้ถูกปิดหูปิดตาอยู่หรอกใช่ไหม?", "“ต่อให้วิธีปฏิบัติบางอย่างจะไม่สอดคล้องกับกฎระเบียบ แล้วมันจะเป็นไรไปล่ะ? คนยากจนส่วนใหญ่ที่เข้ามาเกี่ยวข้องกับการทดลองเวทมนตร์ล้วนแต่สมัครใจเองทั้งสิ้น และไม่มีใครไปห้ามพวกเขาได้ ผู้ที่ปรารถนาจะได้รับพลังแห่งเวทมนตร์ ย่อมต้องยอมจ่ายในราคาที่คู่ควร!”", "น้ำเสียงของฟิลิปค่อนข้างเฉยเมย", "เวทมนตร์สายธาตุ สายแปรสภาพ สายปรุงยา สายการเล่นแร่แปรธาตุ ไม่มีเวทมนตร์สาขาใดเลยที่พัฒนาได้ง่ายๆ", "ตัวอย่างเช่น การผสานธาตุที่แตกต่างกันในบางครั้งก็อาจส่งผลให้เกิดการทำลายล้างเกินกว่าจะจินตนาการได้ หรือยาเวทมนตร์แต่ละชนิดที่ถูกพัฒนาขึ้นมาล้วนต้องใช้หนูทดลองจำนวนมหาศาล ส่วนเวทมนตร์แปรสภาพก็เกี่ยวข้องกับการผ่าตัดและศึกษาโครงสร้างของสิ่งมีชีวิตเวทมนตร์ และแม้แต่ความผิดพลาดเพียงเล็กน้อยในการวาดวงเวทระหว่างการเล่นแร่แปรธาตุก็อาจแสดงผลลัพธ์ที่ไม่อาจคาดเดาได้", "แทบจะทุกปีจะต้องมีพ่อมดที่เสียชีวิตจากการทดลองเวทมนตร์ และมาตรการป้องกันที่เตรียมไว้ล่วงหน้าก็ไม่อาจป้องกันอุบัติเหตุได้ทั้งหมด", "โดยธรรมชาติแล้ว ย่อมเป็นผู้ช่วยที่เป็นพ่อมดฝึกหัดและคนยากไร้ที่มีส่วนร่วมในการทดลองต่างหากที่ต้องล้มตายเป็นจำนวนมาก", "ซึ่งในศตวรรษที่ผ่านมานี้ก็นับว่าดีขึ้นมากแล้ว อันที่จริง กฎระเบียบแต่ละข้อของสภาพ่อมด ล้วนเป็นบทเรียนที่ถูกเขียนขึ้นด้วยเลือดทั้งสิ้น...", "ลินน์พบว่าตนเองพูดไม่ออกไปชั่วขณะ ในต่างโลกอันแสนวุ่นวายแห่งนี้ เห็นได้ชัดว่าเราไม่สามารถคาดหวังให้พวกพ่อมดเห็นคุณค่าของชีวิตมนุษย์มากมายนัก", "“ศาสตราจารย์ลินน์ มีคนมาขอพบท่านอยู่ที่ด้านนอกสถาบัน จะให้พวกเขาเข้ามาหรือไม่เจ้าคะ?”", "ขณะที่ทั้งสองกำลังพูดคุยกัน ศีรษะเล็กๆ ก็โผล่พ้นประตูออกมา มือเล็กๆ จับกรอบประตูแน่น ขณะที่เสียงนั้นเอ่ยถามขึ้น", "เมื่อเห็นใบหน้าที่คุ้นเคยและน่ารักนั้น ลินน์ก็ยิ้มและพยักหน้า", "“ลิเดีย เจ้าช่วยพาพวกเขาไปที่ห้องของข้าได้หรือไม่? เดี๋ยวข้าจะตามไป”", "หากเขาเดาไม่ผิด คนผู้นั้นก็น่าจะเป็นลูกน้องที่ลอดด์ขาเป๋ส่งมาเพื่อติดต่อเขาเป็นแน่", "“หากต้องการจะเจาะหน้าต่าง ก็จงเสนอให้รื้อหลังคาออกเสียก่อน!”", "ประโยคนี้เป็นคมคำที่มีชื่อเสียงของ ลู่ซิ่น (Lu Xun) นักเขียนและนักคิดผู้ทรงอิทธิพลชาวจีน โดยมีความหมายเต็มว่า", "“สันดานของคนเรามักชอบประนีประนอมเสมือนหนึ่งอยู่ในสายเลือด...หากคุ ี เขามองไปยังลินน์ด้วยความเจ็บปวดและหวาดกลัว", "“โนเอล นักเรียนรุ่นที่เก้าที่สถาบันอิเยตารับเข้ามา ถูกบังคับให้ออกเมื่อหกปีก่อนเนื่องจากสอบตกในภาควิชาธาตุและภาควิชาแปรสภาพ และเข้าร่วมกับกลุ่มหนามสีชาดในปีต่อมา...”", "ลินน์ถ่ายทอดข้อมูลข่าวกรองที่เขาได้รับมาจากลอดด์อย่างเป็นระบบ ทำลายกำแพงป้องกันทางจิตใจของคู่ต่อสู้ลงจนหมดสิ้น จากนั้นก็มองไปยังโนเอลและพูดต่อ", "“ข้าคุ้นเคยกับประวัติของเจ้าเป็นอย่างดี โนเอล ดังนั้นเจ้าอย่าได้คิดโกหกต่อหน้าข้าจะดีกว่า...มิฉะนั้น เจ้าคงไม่อยากรู้หรอกว่าจะต้องเจอกับผลลัพธ์เช่นไร”", "“เอาล่ะ ทีนี้บอกข้ามา เมื่อเช้าของสามวันก่อน เจ้าอยู่ที่ไหนและทำอะไร?”", "ลินน์เอ่ยถาม", "“ข้าอยู่ที่โรงเตี๊ยมขวานบิ่น และมีฮาล์ฟลิงที่ชื่อราล์ฟนั่นมาหาข้า เขาพยายามจะเอาแบบแปลนเรือเหาะมาแลกกับเงินรางวัล...”", "ดวงตาของโนเอลลุกหลิกขณะที่เขาตอบอย่างตะกุกตะกัก", "สายตาของลินน์เย็นชาลงในทันที เขาแทงดาบทะลุแขนขวาของโนเอลโดยตรง ความเจ็บปวดอันแหลมคมกระตุ้นให้เกิดเสียงร้องโหยหวนด้วยความเจ็บปวดขึ้นมาอีกระลอก", "เห็นได้ชัดว่าอีกฝ่ายกำลังโกหก", "เพราะเพียงหนึ่งวันก่อนที่ราล์ฟจะตาย เขาเพิ่งจะทำการทดสอบบินไป กลุ่มหนามสีชาดคงไม่ออกประกาศตั้งค่าหัวจนกว่าจะถึงช่วงบ่ายหรือเย็นอย่างเร็วที่สุด และในบ่ายวันนั้น ฮาล์ฟลิงผู้นี้ก็ยังคงช่วยขับเรือเหาะอยู่ แถมยังต้องอยู่โยงเฝ้ายามในตอนกลางคืนอีก นั่นทำให้เขาไม่มีโอกาสที่จะไปรวบรวมข้อมูลลับเช่นนั้นได้เลย", "คิดจะล้อข้าเล่นหรือไง...", "ลินน์มองไปยังโนเอลที่ยังคงไม่ค่อยให้ความร่วมมืออยู่บ้าง และกล่าวด้วยน้ำเสียงที่เจือไปด้วยความขบขัน", "“เจ้ารู้หรือไม่? ในบ้านเกิดของข้า เคยมีการลงทัณฑ์ที่น่าสนใจมากอย่างหนึ่งเรียกว่า หลิงฉือ (การแล่เนื้อพันมีด) ซึ่งจะใช้มีดค่อยๆ แล่เนื้อออกจากตัวนักโทษทีละชิ้นๆ...”", "“แต่ไม่ต้องกังวลไปหรอก ฝีมือของเพชฌฆาตนั้นยอดเยี่ยมเกินกว่าที่เจ้าจะจินตนาการได้ พวกเขาจะหลีกเลี่ยงเส้นเลือดใหญ่ และทำให้เนื้อแต่ละชิ้นที่ถูกแล่ออกมามีความยาวและความหนาที่แม่นยำเท่ากันทุกประการ... และเพื่อป้องกันไม่ให้นักโทษสลบไปเพราะความเจ็บปวด พวกเขามักจะพรมน้ำเกลือลงบนมีดด้วย...”"]}, {"t": "ข้าได้ยินมาว่าอุณหภูมิสูงๆ ก็ช่วยห้ามเลือดได้ดีเช่นกัน!", "c": ["ลินน์บรรยายให้โนเอลฟังถึงวิธีการทรมานที่เรียกว่า หลิงฉือ อย่างเห็นภาพชัดเจน", "โนเอลรับฟังด้วยเหงื่อเย็นที่ไหลซึม สายตาจับจ้องไปที่ดาบยาวซึ่งอยู่ในมือของอีกฝ่าย ด้วยความหวาดกลัวว่าในวินาทีถัดไป มันจะฟาดฟันลงมาบนร่างของเขาดั่งเช่นคำบรรยายนั้น", "หลังจากได้ยินว่าเพชฌฆาตจะพรมน้ำเกลือลงบนมีดด้วย โนเอลก็อดไม่ได้ที่จะตัวสั่นสะท้าน เพราะเขารู้ซึ้งถึงความเจ็บปวดแสนสาหัสของการสาดเกลือลงบนแผลเป็นอย่างดี มันคือชะตากรรมที่อยากอยู่ก็ไม่ได้ อยากตายก็ไม่สมหวังอย่างแท้จริง", "โนเอลถึงกับคิดว่า เมื่อเทียบกับพ่อมดตรงหน้าผู้นี้แล้ว ท่านราดักที่เคยนำคนยากจนมาทดลองเวทมนตร์สารพัดรูปแบบ ยังดูเป็นคนใจดีไปเลย!", "แม้แต่ปีศาจในขุมนรกก็ยังคิดบทลงทัณฑ์เช่นนี้ไม่ออก!", "“ฝีมือของข้าย่อมไม่อาจเทียบเคียงกับเพชฌฆาตเหล่านั้นได้หรอก บ่อยครั้งที่คนมักจะตายไปก่อนที่จะโดนแล่ครบหนึ่งร้อยแผล...แต่ก็นับว่าโชคดีที่ความสามารถในการฟื้นฟูของเจ้านั้นน่าทึ่งมาก ดังนั้นเจ้าจึงเหมาะจะเป็นเป้าซ้อมชั้นยอดเลยล่ะ จริงไหม?”", "ลินน์กล่าวด้วยท่าทีสนใจ จากนั้นเขาก็คลำหากระเป๋าเสื้อคลุม ก่อนจะกล่าวเสริมด้วยความเสียดาย", "“น่าเสียดายที่ข้าดูเหมือนจะลืมหยิบเกลือติดมือมาด้วย!”", "สติสัมปชัญญะของโนเอลที่ใกล้จะพังทลายเต็มทีผ่อนคลายลงเล็กน้อย อย่างน้อย เขาก็จะได้ตายอย่างทรมานน้อยลง ทว่าในวินาทีต่อมา ปีศาจร้ายผู้นั้นก็เอ่ยขึ้นมาอีกครั้ง", "“แต่การจี้ด้วยความร้อนก็อาจจะได้ผลเช่นกันนะ...ข้าได้ยินมาว่าอุณหภูมิสูงๆ ก็ช่วยห้ามเลือดได้ดีเช่นกัน!”", "ขณะที่พูด ลินน์ก็วางมือขวาลงบนใบดาบ เปลวเพลิงอันร้อนแรงพวยพุ่งออกมา เปลี่ยนดาบสีเงินให้กลายเป็นสีแดงฉานจากความร้อน", "ร่างกายของโนเอลสั่นเทาอย่างไม่อาจควบคุมได้ และในวินาทีที่ใบดาบอันร้อนระอุฟาดฟันลงมา เขาก็ไม่อาจกลั้นเสียงกรีดร้องเอาไว้ได้อีกต่อไป", "“เดี๋ยว...เดี๋ยว ข้าเอง...ข้าเป็นคนไปหาราล์ฟ... อ๊ากกก~”", "ก่อนที่เขาจะพูดจบ ใบดาบสีแดงฉานที่แผดเผาก็แทงทะลุหัวไหล่ของโนเอล เฉือนเอาเนื้อชิ้นหนึ่งหลุดออกมา...", "โนเอลรู้สึกราวกับว่าตนเองกำลังจะเสียสติ ดวงตาแดงก่ำของเขาจ้องมองลินน์ และไม่เข้าใจว่าทำไมในเมื่อเขายินยอมที่จะพูดแล้ว แต่อีกฝ่ายก็ยังไม่ยอมปรานีเขา", "“ช้าเกินไป พูดต่อสิ! ข้าหวังว่าคราวนี้คำพูดของเจ้าจะรวดเร็วกว่าดาบของข้านะ!”", "ลินน์ดึงดาบยาวออกและทำการอุ่นมันต่อไป เพื่อไม่ให้ใบดาบเย็นลง", "เมื่อต้องเผชิญกับปีศาจร้าย ไร้ซึ่งความปรานี และพร้อมจะสับคนให้กลายเป็นชิ้นเนื้อได้อย่างไม่สะทกสะท้าน โนเอลก็พังทลายลงอย่างสมบูรณ์ และเริ่มเล่าเรื่องราวของเขาด้วยน้ำเสียงสั่นเครือ", "เรื่องราวเริ่มต้นขึ้นเมื่อห้าวันก่อน ตอนที่เขาแอบได้ยินพวกฮาล์ฟลิงหลายคนที่โรงเตี๊ยมขวานบิ่น กำลังโอ้อวดเกี่ยวกับการสร้างเครื่องจักรกลเล่นแร่แปรธาตุขนาดยักษ์ ที่สามารถโบยบินขึ้นสู่ท้องฟ้าได้โดยไม่ต้องพึ่งพาเวทมนตร์ใดๆ ทั้งสิ้น", "ไม่ใช่แค่เขาเท่านั้น ทว่าลูกค้าคนอื่นๆ ในโรงเตี๊ยมก็ไม่มีใครเชื่อเลยสักคน ทุกคนต่างก็ปัดตกไปว่ามันเป็นเพียงแค่คำคุยโวของพวกฮาล์ฟลิงขี้เมาเท่านั้น เพราะท้ายที่สุดก่อนหน้านี้ ตอนที่พวกเขาเคยช่วยลิเดียสร้างเครื่องจักรกลบินได้สารพัดรูปแบบ พวกมันก็ล้วนแต่ตกลงมาพังพินาศอย่างไม่มีข้อยกเว้น แม้ว่าพวกเขาจะโอ้อวดถึงความยอดเยี่ยมของมันไว้เสียดิบดีก็ตาม", "จนกระทั่งลินน์ได้ทำการสาธิตการบินอันน่าทึ่งต่อหน้าผู้คนมากมาย โนเอลจึงได้ตระหนักว่าเรื่องทั้งหมดนั้นเป็นความจริง", "ดังนั้น เมื่อรู้ว่ามีพ่อมดจากกลุ่มหนามสีชาด ยินดีจะจ่ายเงินถึงห้าร้อยเหรียญทองเพื่อแลกกับแบบแปลนของเรือเหาะ เขาก็เกิดความโลภขึ้นมาทันที และไปดักรออยู่ใกล้ๆ กับโรงเตี๊ยมขวานบิ่นอย่างอดทนทุกวัน และรู้ดีว่าพวกฮาล์ฟลิงที่รักการดื่มเบียร์เหล่านี้จะต้องมาปรากฏตัวที่นี่ในสักวันหนึ่งอย่างแน่นอน...", "ขณะที่โนเอลพรั่งพรูทุกสิ่งทุกอย่างออกมาจนหมดเปลือก เขาก็ตระหนักดีว่าเมื่อเขาเปิดเผยข้อมูลทั้งหมดที่มีออกไปแล้ว เขาก็จะหมดประโยชน์และคงไม่แคล้วต้องตายอย่างแน่นอน แต่มันก็ยังดีกว่าการถูกเฉือนเนื้อออกไปอย่างช้าๆ จนเหลือแต่โครงกระดูกอาบเลือดด้วยใบดาบอันร้อนระอุ", "“ดังนั้น เจ้าจึงเล็งเป้าหมายไปที่ราล์ฟที่อยู่ตามลำพัง และหลังจากที่หมอกนิทราใช้ไม่ได้ผล เจ้าก็ลงมือสังหารเขาสินะ?”", "ลินน์กล่าวพร้อมกับแค่นเสียงเย็นชา", "สีหน้าเสียใจแผ่ซ่านไปทั่วใบหน้าของโนเอล ไม่ใช่เสียใจที่โจมตีราล์ฟ แต่เสียใจที่ตนเองไม่ระมัดระวังให้มากพอ จนไม่ได้คาดคิดว่าเหล้าองุ่นเก่าแก่จะส่งผลกระทบต่อฤทธิ์ที่ทำให้ง่วงนอนของผงรากหญ้าแห้ง มิฉะนั้น มันคงไม่มีทางที่การกระทำของเขาจะถูกเปิดโปงได้อย่างแน่นอน", "ลินน์ไม่ได้เชื่อคำพูดของอีกฝ่ายอย่างง่ายดาย แต่กลับซักไซ้ไล่เลียงรายละเอียดทุกขั้นตอนของปฏิบัติการ โดยบังคับให้โนเอลเล่าทุกสิ่งที่เขาทำในช่วงหลายวันนี้ตั้งแต่ต้นจนจบ จากนั้นก็ตั้งคำถามในแต่ละประเด็นแยกกัน หากมีร่องรอยของความล const START = 1;
let idx = 0;
function initIdx(){const h=parseInt(location.hash.replace('#',''));if(h>=1&&h<=CHAPTERS.length)idx=h-1;}
function render(){
  const ch=CHAPTERS[idx];
  const paras=ch.c.map(p=>`<p>${escapeHtml(p)}</p>`).join('');
  const isLast=idx===CHAPTERS.length-1;
  const endNote=isLast?`<div class="endnote">🎉 จบชุดนี้แล้ว (ถึงตอนที่ <b>${START+idx}</b>)<br>รอลิงก์ชุดตอนต่อไปจากเจ้าของเพจได้เลย 💌</div>`:'';
  document.getElementById('reader').innerHTML=`
    <div class="chap-no">ตอนที่ ${START+idx}</div>
    <h2 class="chap-title">${escapeHtml(ch.t)}</h2>
    <div class="body">${paras}</div>
    <div class="nav">
      <button class="btn" onclick="go(-1)" ${idx===0?'disabled':''}>← ตอนก่อนหน้า</button>
      <button class="btn" onclick="go(1)" ${isLast?'disabled':''}>ตอนถัดไป →</button>
    </div>${endNote}`;
  location.hash=idx+1;buildTOC();window.scrollTo(0,0);
}
function go(d){const n=idx+d;if(n>=0&&n<CHAPTERS.length){idx=n;render();}}
function buildTOC(){document.getElementById('toc').innerHTML=CHAPTERS.map((ch,i)=>`<li class="${i===idx?'active':''}" onclick="jump(${i})"><span class="n">${START+i}</span>${escapeHtml(ch.t)}</li>`).join('');}
function jump(i){idx=i;render();toggleTOC();}
function toggleTOC(){document.getElementById('overlay').classList.toggle('open');}
function toggleTheme(){const h=document.documentElement,d=h.getAttribute('data-theme')==='dark';h.setAttribute('data-theme',d?'light':'dark');document.getElementById('themeBtn').textContent=d?'🌙':'☀️';}
let fs=19;
function changeFont(d){fs=Math.min(30,Math.max(15,fs+d*2));document.documentElement.style.setProperty('--reader-size',fs+'px');}
function escapeHtml(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
initIdx();render();
</script></body></html>
